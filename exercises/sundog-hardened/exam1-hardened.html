の Claude Code ドキュメント（non-interactive (print) mode と output formats）を参照のこと。`--max-turns` は機能的な harness 強制型 flag であり、その上限はモデル側の指示ではなく実行時に検証可能である。"}, {"qid": "exam1-q29", "domain": "Claude Code", "type": "mc", "scenario": "あるチームは夜間の CI ジョブで Claude Code を実行し、その日にマージされた変更をレビューしている。このジョブは無人（エンジニアが不在）で実行され、下流のツールに対して1つの値としてパースできる単一の構造化オブジェクトを渡し、かつ agentic なターン数にハードな上限を設ける必要がある。エージェントがその上限内でレビューを完了できない場合は、実行を続けたり遅く完了したりするのではなく、パイプラインが確実に検知できる形で失敗し、誰かが調査できるようになるべきである。要件を最もよく満たすのはどのアプローチか？", "options": [{"text": "print mode（claude -p）を使い、エージェントを headless で実行して interactive UI を開かずに結果を返す。--output-format json を渡し、下流のツールが1つの完全でパース可能な result object を受け取れるようにする。さらに --max-turns N を渡す。エージェントが N ターンに達すると非ゼロで終了するため、レビューが上限内に完了しない場合は際限なく実行されるのではなく、パイプラインが確実に検知できる形で失敗する。", "is_correct": true, "why": "各要素は print mode のドキュメントに記載された挙動に対応する。-p/--print は non-interactive なパスであり、prompt を実行して結果を返し、REPL を開かずに終了する。--output-format json は stream-json が生成する per-event のストリームではなく、1つの完全な object（result, session ID, metadata）を出力する。--max-turns は print mode のターン上限であり、CLI reference では「limit に達した際に error で終了する」と記載されている。この非ゼロ終了こそ、レビューが N ターン以内に完了しなかった際に CI ジョブを確実に検知できる形で失敗させるもので、シナリオが求めるハードで fail-loud な上限を満たす。無人実行・単一の構造化オブジェクト・決定論的なターン上限を同時に満たす唯一の選択肢である。"}, {"text": "headless ジョブを --output-format json で実行するが、CLI のターン上限ではなく、CLAUDE.md に「すべての diff をレビューし終えたら停止する」というルールを記述し、モデルがその指示に従うことに頼ってターン数を抑える。", "is_correct": false, "why": "これにより無人実行と単一の構造化オブジェクトは実現でき、モデルも通常は「diff 後は停止」というルールに従う。しかし CLAUDE.md の指示は確率論的な model-level のナッジに過ぎない。エージェントが追加の tool-calling ターンを取る可能性は残り、取ったとしてもジョブを失敗させる仕組みはない。要件は決定論的で fail-loud な上限であり、--max-turns だけがそれを強制する。これは hook のような決定論的な仕組みではなく、強調された prompt に頼るのと同じギャップである。"}, {"text": "ターン数ではなく API の消費額で各実行を制限する。claude -p を --output-format json で実行し、--max-budget-usd N を渡して、API 呼び出しで N ドル消費した時点でエージェントが停止するようにする。", "is_correct": false, "why": "--max-budget-usd は print mode の実際のフラッグ（「API 呼び出しで消費する最大ドル金額に達したら停止」）だが、誤った次元で制限をかける。1回の高額なターンで使い切る可能性がある一方、多数の安価なターンで意図したターン数を超過する可能性がある。また消費上限への到達はコストに関するものであり、エージェントの反復回数の固定値ではない。シナリオは fail-loud なセマンティクスを持つターン上限を求めており、それはまさに --max-turns が制限し、--max-budget-usd が制限しないものである。"}, {"text": "claude -p を --output-format json で実行し、CI runner の wall-clock timeout を唯一の上限とする。ジョブが実行中に kill された場合、完全な object はエージェントが完了した時にだけ書き込まれるため、下流のツールは JSON を受け取れない。", "is_correct": false, "why": "wall-clock timeout は正当な CI のセーフティネットだが、経過時間を制限するものであり、エージェントのターン数を制限するものではないため、シナリオが求める形でループを cap しない。また kill 時に構造化出力を壊す。plain json の場合、Claude Code は完全な object を組み立てて実行完了時にだけ書き込むため、実行中の timeout は下流のツールにパースすべきものを何も残さない（部分的な per-event fragment は stream-json の挙動であり、plain json ではない）。"}], "explanation": "正解: A。print mode（claude -p / --print）は Claude Code の headless パスであり、prompt を non-interactive な agent flow で実行し、結果を返して interactive UI を開かずに終了するため、エンジニアの同席が不要である。--output-format json は、per-event のメッセージストリームを出力する stream-json とは異なり、下流のツールが1つの構造化された値としてパースできる完全な object（result, session ID, metadata）を1つ出力する。--max-turns N（print mode 専用）は決定論的なターン上限であり、CLI reference では「limit に達した際に error で終了する」（省略時の default の cap はない）と記載されている。そのため CI では上限到達がジョブを非ゼロで失敗させ、レビューが上限内に完了しなかった場合のシナリオが求める fail-loud な挙動を正確に満たす。\n\n他が不正解の理由: (B) は決定論的な CLI の上限を CLAUDE.md の指示で置き換えている。これは確率論的なナッジであり、停止する確率を上げるが、固定のターン上限を保証することもジョブを失敗させることもできない。hook ではなく強調された prompt に頼るのと同じギャップである。(C) は実際の print mode フラッグを使っているが、誤った次元に対してである。--max-budget-usd は API 呼び出しの消費ドルを cap するものであり、ターンを cap しないため、1回の高額なターンでトリガーされる一方、多数の安価なターンで意図した回数を超過する可能性がある。(D) はターン上限をインフラレベルの wall-clock timeout に置き換えているが、これはターン数ではなく経過時間を制限する。また plain json ではエージェントが完了した時にだけ完全な object が書き込まれるため、kill 時にパース可能な出力が得られない（部分 fragment は stream-json の挙動である）。根拠: Claude Code CLI reference (code.claude.com/docs/en/cli-reference) の -p/--print、--output-format (text|json|stream-json)、--max-turns（「limit に達した際に error で終了する」）、--max-budget-usd に関する記載。"}, {"qid": "exam1-q30", "domain": "Tools and MCPs", "type": "mc", "scenario": "エージェント型コーディングツールが、ローカルの MCP サーバーを stdio サブプロセスとして起動する。起動時にサーバーはバージョンバナーを出力し、メトリクスライブラリが定期的にログ行を書き込み、推移的依存ライブラリが非推奨の警告を出す。これらがすべて、サーバーの JSON-RPC ツールレスポンスと同じストリームに流れる。結果としてクライアントの JSON-RPC パーサーがすべての応答を拒否してしまう。チームは4つの修正案を提案した。最も妥当なのはどれか。", "options": [{"text": "各出力元（サーバー自身のロガー、メトリクスライブラリ、依存ライブラリの警告ハンドラ）を設定し、stderr に書き出すようにする。stdout は JSON-RPC メッセージ専用に予約する。", "is_correct": true, "why": "stdio トランスポートは、クライアントがパースするプロトコルチャネルを stdout、人間が読むログや診断情報のチャネルを stderr と定義している。したがって今回の障害はトランスポート契約の違反であり、モデルやアプリケーションのバグではない。非プロトコルの出力元をすべて、出力時点で stderr に向ければフレーミングエラーは決定論的に解消される。モデルの協力もヒューリスティックなフィルタリングも不要で、クライアントのパーサーにも手を加えない。"}, {"text": "サーバーを stdio から Streamable HTTP トランスポートに移行し、プロトコルメッセージとログが同じストリームを共有しないようにする。", "is_correct": false, "why": "Streamable HTTP は正規の MCP トランスポートであり、チャネルを分離できる。しかし出力先の誤りを回避するためだけに、シンプルなローカルサブプロセスを、セッション管理・SSE・/mcp エンドポイントを公開するリモート型の統合に変えてしまうことになる。唯一の欠陥が「ログが誤ったストリームに書かれていること」であるローカルツールに対してはオーバーエンジニアリングだ。"}, {"text": "サーバーの出力はそのままにし、system prompt と各ツールの説明に、ツール結果の前にある非 JSON 行を無視するよう Claude に指示する文言を追加する。", "is_correct": false, "why": "モデルは生の stdout バイトを受け取ることはない。クライアントの JSON-RPC パーサーが、モデルの推論が走る前に汚染されたストリームを拒否するからだ。したがってプロンプトやツール説明の文言は誤ったレイヤーで動くことになり、トランスポート層のフレーミング障害を修復できない。能力アップグレードや few-shot の例が、モデルが一度も適用を見たことのない契約への準拠を保証できないのと同じ理由だ。"}, {"text": "出力元はそのままにし、サーバーの stdout の周りにラッパーを置く。各行を検査し、有効な JSON-RPC だけをクライアントに転送し、残りは破棄する。", "is_correct": false, "why": "フィルタリングラッパーは症状を隠せる。しかし stdout は正規の JSON-RPC メッセージも運ぶため、ラッパーは内容に基づいて各行をプロトコルかノイズかに分類しなければならない。これはサードパーティライブラリのバッファリングされた非同期書き込みと競合するヒューリスティックであり、フレーミングを誤分類した本来のプロトコルメッセージをドロップ・破損するおそれがある。さらに根本の契約違反は未修正のまま残るため、ログレベルやライブラリのバージョンが変わればバグが再発する。各出力元をソース時点で stderr に向ければ、この二重使用の曖昧さは完全に消える。"}], "explanation": "正解: A。stdio トランスポートは stdout をプロトコル境界とする。クライアントはサーバーをサブプロセスとして起動し、JSON-RPC リクエストをサーバーの stdin に書き込み、JSON-RPC のレスポンスと通知を stdout から読み取る。サーバーは UTF-8 のログや診断文字列を stderr に書いてもよい（MAY）が、stdout には有効な MCP メッセージだけを流さなければならない。したがって今回の汚染はトランスポート契約の違反であり、修正はトランスポート層で行うべきだ。非プロトコルの出力元（サーバー自身のロガー、メトリクスライブラリ、依存ライブラリの警告ハンドラ）を、ソース時点で stderr に向ける。これは決定論的で、モデルの協力を必要とせず、クライアントのパーサーにも手を加えない。何かを毎回必ず実行させたいなら prompt ではなく hook が正しい解になるのと同じ理由付けだ。\\n\\n他の選択肢がダメな理由: B（Streamable HTTP）はチャネルを分離できる正規の MCP トランスポートだが、出力先の誤りを回避するためだけに、シンプルなローカルサブプロセスをリモート型統合（セッション、SSE、/mcp エンドポイントの公開）に変えてしまう。ローカルツールには見当違いの対処だ。C は誤ったレイヤーで動く。クライアントのパーサーが Claude がバイトを受け取る前にストリームを拒否するため、system prompt やツール説明の文言ではトランスポート障害を直せない。これは、繰り返しの指示や few-shot の例でモデルの動作を保証できないのと同じだ。能力や文言は確率を上げるだけであり、契約を強制はしない。D（stdout のフィルタリングラッパー）は症状を抑えられる。しかし stdout は正規の JSON-RPC メッセージも運ぶため、内容で各行をプロトコルかノイズかに分類しなければならない。このヒューリスティックはライブラリのバッファリングされた非同期書き込みと競合し、本来のプロトコルメッセージを破損するおそれがある。さらに契約違反は未修正のまま残るため、ログレベルやライブラリのバージョンが変われば再発する。出力元をソース時点で stderr に向ければ二重使用の曖昧さは消え、境界で傍受するより厳密に頑健になる。"}, {"qid": "exam1-q31", "domain": "Applications and Integration", "type": "mr", "scenario": "Crestmont Insurance の請求受付チームは、トリアージ審査機能を claude.ai のプロトタイプから Messages API を使ったサービスに移行している。このサービスは、担当者がメール・ポータル投稿・コールセンターの記録から貼り付けたアジャスターのメモをスコアリングし、その結果を別の請求処理システムに転送する。貼り付けられたメモにはポリシー文言が引用されることが日常的にあり、契約者からの指示が埋め込まれることもある。信頼性の高い本番連携を支える設計上の選択として最も適切なものを2つ選べ。", "options": [{"text": "サービス内にバージョン管理されたプロンプトテンプレートを保持し、固定の評価用指示と毎回の貼り付けメモを XML タグで区切る。", "is_correct": true, "why": "Messages API はステートレスであり、claude.ai のセッション状態を一切引き継がないため、サービス自身がすべてのリクエストを構築しなければならない。XML タグで区切られたバージョン管理テンプレートは、指示とデータの境界を明確にし、ポリシー文言の引用や契約者からの指示を含みうる貼り付けメモを隔離する（Anthropic が XML タグによるプロンプト構造化で推奨している方法）。"}, {"text": "正しくスコアリングされたメモの few-shot 例を与え、毎回の呼び出しで Claude が同じスコアリング形式を再現するようにする。", "is_correct": false, "why": "few-shot は有効なプロンプト手法だが、モデルを導くことはできても束縛はできない。毎回の呼び出しでレスポンスの構造はモデルの判断に委ねられ、下流の請求処理システムに対する確定的な契約は得られない。"}, {"text": "structured outputs で必要なスコアリング項目を JSON schema として定義し、転送前にパース結果を検証する。", "is_correct": true, "why": "下流のシステムには散文ではなく予測可能な構造が必要である。structured outputs（output_config.format、client.messages.parse() 経由）は、モデルの出力に関わらずすべてのレスポンスにスキーマを強制する。ただしパース結果は、サービスが処理に使う前にコードでも検証すべきである。"}, {"text": "system prompt に強い表現の指示（例：「常にこれらの項目を、この順序で応答せよ」）を加え、毎回の呼び出しでモデルが従うようにする。", "is_correct": false, "why": "強い表現は従う確率を上げるだけで、確定性を保証するわけではない。モデルは任意の呼び出しで逸脱しうる。一方、スキーマに基づく structured output はモデルの出力に関わらず強制される。"}, {"text": "最も成績の良かった claude.ai のスレッドをメッセージ履歴として毎回のリクエストで再現し、プロトタイプの調整済み挙動を本番に引き継がせる。", "is_correct": false, "why": "プロトタイプのトランスクリプトは探索的な対話であり、バージョン管理された契約ではない。これを再現すると、毎回の呼び出しでトークンとレイテンシが膨らみ、再現性のないやり取りを抱え込む。制御されたテンプレートから組み立て直す代わりに、本番の各リクエストを非決定的にしてしまう。"}], "explanation": "信頼できる Claude 連携は、プロトタイプから契約を引き継ぐのではなく、リクエストとレスポンスの契約を明示的にする。Messages API はステートレスであり、claude.ai のセッション状態を一切引き継がない。そのためサービスは、毎回の呼び出しで system prompt・メッセージ構築・出力期待を自前で管理しなければならない。\\n\\nポリシー文言の引用や契約者からの指示を含む貼り付けメモは変動コンテンツであり、XML タグで区切られたバージョン管理テンプレートの内側に置くべきである。これにより Claude は評価用指示とデータを区別できる。これが1つ目の正解である。\\n\\n下流のシステムが結果を利用する場合、structured output の JSON schema（output_config.format）が確定的な構造を与える。client.messages.parse() で検証し、さらにサービスはパース結果を処理に使う前にコードでも検証すべきである。これが2つ目の正解である。\\n\\n3つの誤答選択肢はいずれも有効な手法だが、確定的でバージョン管理された契約をもたらすものはない。few-shot 例や system prompt の強い表現は、目的の形式が出る確率を上げるだけで、実際の構造は毎回の呼び出しでモデルの判断に委ねられる。指示の言い換えではモデル駆動のステップを保証できないのと同じである。また、調整済みのプロトタイプスレッドをメッセージ履歴として再現すると、移植性も再現性も持たない探索的な対話を持ち込むことになり、コストとレイテンシが膨らむだけで契約は得られない。"}, {"qid": "exam1-q32", "domain": "Agents and Workflows", "type": "mr", "scenario": "跨境送金処理事業者である Heron Pay の金融犯罪チームが、Claude Agent SDK を使ってマネーロンダリング（AML）調査エージェントを構築している。1つの不審取引ケースの処理中、エージェントは KYC、制裁スクリーニング、トランザクショングラフの各サービスに対して独立したルックアップを並行して発行し、多数のターンにわたってケースの文脈を維持しつつ、コーディネータのスレッドにすべての生の tool result を保持しないようにする必要がある。このワークフローに最も適した設計選択を2つ選べ。", "options": [{"text": "3つのルックアップをそれぞれ専用の subagent に委譲する（KYC 取得、制裁スクリーニング、トランザクショングラフ走査のそれぞれに1つ）。各 subagent は独自の context window で実行され、コーディネータには簡潔な所見だけを返す。", "is_correct": true, "why": "最適。独立した探索的なルックアップは subagent の典型ユースケースである。各 subagent は個別の context window で動作し、最終メッセージだけを親に返すため、生のログやツール出力がコーディネータのスレッドに蓄積されることはない。分離は構造によって担保され、モデルが短く要約することへの依存ではない。"}, {"text": "恒久的なケースの結論を memory に保存し、サーバーサイドの context management を有効にする。スレッドが成長するにつれて最も古い tool_result block が履歴から確定的に削除され、すべての生の観察データを保持することなく主要な意思決定だけを残せる。", "is_correct": true, "why": "最適。長期間の調査には context の圧力に耐える状態が必要である。memory がターンをまたいで恒久的な所見を保持する一方、context management ベータ版の clear_tool_uses 戦略はモデルに依存せずサーバーサイドで古い tool_result block を削除する。これは subagent と補完関係にあり、「何を恒久的に残し、何を削除するか」を決める選択である。"}, {"text": "コーディネータを Claude Opus 4.8（effort を high に設定）に移行し、次のステップに進む前に各 tool_result を短い要約に圧縮するルールを system prompt に追加することで、要約だけが蓄積されるようにする。", "is_correct": false, "why": "もっともらしい——高 effort の大型モデルは要約が得意だから——が、context の制御をモデルの判断に委ねてしまう。要約が行われる前に、完全な生の tool_result がコーディネータの context に入ってしまうため、成長の抑制は設計ではなく挙動に依存する。capability のアップグレードは分離の仕組みではない。"}, {"text": "コーディネータに完全な生の tool_result 履歴を保持したまま、毎ターン cache_control のブレークポイントを設定し、蓄積された結果が prompt cache から供給されて安価に再処理されるようにする（全額再課金を避ける）。", "is_correct": false, "why": "もっともらしい——prompt caching は、長く安定した prefix を再読みするコストとレイテンシを確実に下げる——が、すべての生の tool_result をコーディネータの context に残したままにする。これは保持のコストを変えるだけで、保持そのものが起きるかどうかは変えない。caching は課金の最適化であり、context 分離の仕組みではない。"}, {"text": "すべてのルックアップをメインの agent ループ内でインライン実行し、完全な生の tool_result 履歴をコーディネータのスレッドに保持することで、コンプライアンス監査人が調査全体をエンドツーエンドで再現できるようにする。", "is_correct": false, "why": "もっともらしい——監査可能性は AML の本来の関心事である——が、すべての生の結果を保持することはシナリオが回避を求めた context 増大を最大化し、分離すべきとされた中間データの上でコーディネータに推論を行わせることになる。エンドツーエンドの再現は、モデルの context を膨張させるよりもツール呼び出しを別経路のログとして記録するほうが適切に実現できる。"}], "explanation": "マルチステップの agent ワークフローでは、3つの関心事を分けて考える必要がある。調整（coordination）、実行の分離（execution isolation）、そして恒久的な状態（durable state）である。2つの正解は、このうち2つを構造的に解決する。\n\nSubagents は、ワークが独立していてノイズが多い場合に適したツールである。各 subagent は独自の context window で動作し、親には要約だけを返すため、生のトランザクションログやツール出力は設計によってコーディネータのスレッドに入らない。Agent SDK はこれを context isolation として明示的に文書化しており、中間の tool call とその結果は subagent の内部にとどまり、最終メッセージだけが親に返る。\n\n多数のターンにまたがるケースでは、memory とサーバーサイドの context management が補完的な問題——何を恒久的に残し、何を削除するか——に対応する。memory はターンをまたいで恒久的な所見を保持する。context-management-2025-06-27 ベータ版は clear_tool_uses_20250919 戦略を提供し、token の trigger を超えるとサーバーサイドで最も古い tool_use/tool_result block を削除し（trigger・keep・exclude_tools で設定可能）、内容が削除されたことをモデルに知らせる placeholder を残す。この2つを組み合わせることで、ケースを破棄することなくコーディネータの context 増大を抑えられる。\n\n3つの誤答選択肢は、いずれも異なる目的に向けた正当な技術である。問われているのは、それぞれがこのワークフローの構造的要件（生の中間出力をコーディネータのスレッドに残さず、同時に恒久的なケースの状態を保つこと）を満たすかどうかであって、技術的に洗練されて見えるかではない。選択肢Cは LLM 流のアプローチであり、大型モデルと自己要約ルールの組み合わせは簡潔さの確率を高めるが、確率論的なままにとどまる。これは「capability のアップグレードは強制の仕組みではない」という原則と一致し、実際に削除を保証するのは選択肢Bの確定的な context management 戦略である。選択肢Dの prompt caching は履歴保持のコストを下げるだけで context からの除去は行わないため、分離の仕組みではなく課金の最適化にすぎない。選択肢Eは context の経済性と完全性をトレードオフにするが、監査可能性はモデルの context を膨張させるよりも外部ログで実現するほうが適切である。いずれも一見して間違いというわけではなく、技術的な厚みがあるからといって選ぶのではなく、要件に照らして評価しなければならない。"}, {"qid": "exam1-q33", "domain": "Applications and Integration", "type": "mc", "scenario": "信頼性チームは Messages API を使い、入力される各センサーアラートを短い内部フォルトコードに分類している。下流のトリアージパーサーは、すべてのレスポンスがリテラルマーカー `ALR-` で始まり、その後にコードが続くことを要求する。自然言語テキストや JSON のラップは一切許容しない。このパーサー契約に最も適合する統合パターンはどれか。", "options": [{"text": "structured outputs を使い、フォルトコードがスキーマに適合することを保証する。その後、アプリケーションコード内で `ALR-` を先頭に付加してから結果をパーサーに渡す。", "is_correct": true, "why": "structured outputs はコードが宣言したスキーマに適合することを保証する。さらに `ALR-` プレフィックスを決定論的なアプリケーションコードに移せば、パーサーに渡す文字列は開発者が制御するコードで組み立てられ、モデルの裁量に左右されない。フォーマット保証を確率論的なモデルの振る舞いから切り離せる唯一の選択肢であり、厳格なパーサーがまさに求めるもの。"}, {"text": "system prompt に `ALR-` を含め、他は一切出力しないよう厳格に指示し、パーサー側で余分なプリアンブルを取り除く。", "is_correct": false, "why": "もっともらしい。現在の flagship モデルでは assistant message の prefill が使えないため、Anthropic は system prompt の指示をドキュメントに記載されたフォーマット制御の代替として挙げている。しかし依然として振る舞いの誘導に過ぎない。モデルが自然言語を前置したり先頭トークンを変えたりする可能性が残り、取り除くロジックが契約が排除しようとした脆さを再び持ち込んでしまう。"}, {"text": "各 assistant の応答が `ALR-` で始まる user/assistant の例を複数追加し、最終レスポンスから regex でコードを抽出する。", "is_correct": false, "why": "few-shot は正当かつ広く使われる手法で、多くの場合で正しい形式を生成する。しかしモデルを誘導するだけで、応答の境界を固定するわけではない。先頭マーカーは保証されず、regex のフォールバックは厳格なパーサーが避けるために設計されたのと同じ脆いパーシングに過ぎない。"}, {"text": "各呼び出しで最新のアラートだけを送り、リクエスト間で以前の分類コンテキストを API が引き継ぐことに頼る。", "is_correct": false, "why": "Messages API はステートレスであり、各リクエストは完全に自己完結して呼び出し間で何も保持しない。モデルが必要とするコンテキスト（以前の分類、マーカー、完全な履歴）は毎回のリクエストで再供給しなければならず、サーバー側では何も引き継がれない。"}], "explanation": "Messages API はステートレスであり、各リクエストは自身の system prompt、完全なメッセージ履歴、パラメータを持ち、呼び出し間で何も保持しない。バイトレベルで厳密なプレフィックスを要求し、周囲に自然言語を許容しないパーサーに対しては、モデルにプレフィックスの生成を求めるのを完全にやめるのが決定論的な解決策である。structured outputs がコードのスキーマ適合を保証し、アプリケーションコードで `ALR-` を先頭付加することで、パーサーに渡す文字列は開発者が制御するコードの問題となり、モデルの裁量に委ねられない。（現在の flagship モデルではかつての assistant message の prefill がエラーを返すため、structured outputs と system prompt の指示がドキュメントに記載されたフォーマット制御の仕組みとなる。）system prompt と few-shot の選択肢は正当であり多くの場合機能するが、振る舞いを確率論的に形作るに過ぎない。先頭トークンを保証せず、出力の範囲も区切らないまま確率を改善するだけなので、例外を許容できないパーサーはリスクに晒されたままである。コンテキスト引き継ぎの選択肢は、API がリクエスト間でステートを保持しないため完全に失敗する。より一般的な原則として、下流の契約が依存するものはすべて決定論的なコードで強制し、モデルの裁量に委ねてはならない。"}, {"qid": "exam1-q34", "domain": "Model Selection and Optimization", "type": "mc", "scenario": "法務テックチームのアシスタントは、リクエストをまたいでバイト単位で完全に同一の巨大な契約書テンプレートと条項ライブラリを送信し、続けて相手方のドラフトとレビュアーの質問を送っている。そのため毎回の呼び出しで、テンプレート全体が通常の入力価格で再処理されている。毎回の呼び出しでこの同一のプレフィックスに対する再処理の課金を止めるには、単一の変更として何が最も直接的か。", "options": [{"text": "安定したテンプレートプレフィックスの末尾、つまりリクエストごとのドラフトと質問ブロックの直前に cache_control を設定する。", "is_correct": true, "why": "prompt caching は、cache_control のブレークポイントまでのプレフィックスがバイト単位で完全に一致するとき、cache read（cache_read_input_tokens、基本入力価格の約0.1倍で課金）を提供する。ブレークポイントは安定したテンプレートの末尾に置くべきで、リクエストごとに変わる内容はその後ろに残して通常通り処理させる。"}, {"text": "最後のユーザー質問ブロックに cache_control を設定し、リクエスト全体を毎回新しい cache entry としてチェックポイント化する。", "is_correct": false, "why": "cache_control が cache hit を生むのは、キャッシュされたプレフィックスが同一に再現されたときだけである。最後のユーザー質問は毎回の呼び出しで変わるため、各リクエストは後続の呼び出しで読み込まれることのない有料の cache write（cache_creation_input_tokens、約1.25倍のプレミアムで課金）になり、再帰的な入力コストは変わらないか、むしろ悪化する。"}, {"text": "system-prompt に指示を追加し、テンプレートを記憶して以降の呼び出しでは再読み込みをスキップするよう Claude に伝える。", "is_correct": false, "why": "Messages API は呼び出しごとにステートレスであり、あるリクエストで Claude に伝えた内容は次のリクエストに引き継がれない。テンプレート全体は毎回の呼び出しで送信・課金されるため、指示でキャッシュを代用することはできない。決定論的な再利用機構が必要な箇所に、確率論的なプロンプトの回避策を当てようとしている。"}, {"text": "Haiku 4.5 に切り替えて、再処理されるテンプレートプレフィックスをより低いトークン単価で課金させる。", "is_correct": false, "why": "より安価なモデルはトークン単価を下げるが、同一のプレフィックスは毎回の呼び出しで完全に処理され課金される。再帰的な再処理コストは単価が下がるだけで除去されず、さらに契約レビューはチームが依存している Sonnet レベルの精度を失う。"}], "explanation": "正解は A。prompt caching は呼び出しをまたいで同一のプロンプトプレフィックスを再利用する。cache hit を得るには、cache_control のブレークポイントまでのプレフィックスがバイト単位で完全に一致する必要がある。そのためブレークポイントは安定したテンプレートの末尾、かつリクエストごとに変わる内容の前に置く。以降の呼び出しは cache read（cache_read_input_tokens、基本入力価格の約0.1倍で課金）として計上される。\n\n他の選択肢が不適切な理由: B はブレークポイントを毎回変わる内容に置くため、hit することのない書き込み専用のキャッシュ（約1.25倍のプレミアム）を生み出す。C が失敗するのは Messages API がステートレスであるためで、指示はリクエスト間で引き継がれずテンプレートは毎回送信・課金される。決定論的な機構であるキャッシュが必要な箇所で、LLM 的な回避策を使っている。D はトークン単価を下げるが、毎回の呼び出しでプレフィックス全体を再処理するため、再帰的なコストは低い単価で残り続け、精度まで犠牲にする。同一プレフィックスの再処理を決定論的に除去できるのはキャッシュだけである。"}, {"qid": "exam1-q35", "domain": "Security and Safety", "type": "mc", "scenario": "本番環境のコンピュート上で稼働するバックエンドサービスが Claude API を呼び出している。セキュリティポリシーはホスト上に長期間有効な共有シークレットを置くことを禁止し、監査要件は本番のすべての呼び出しを個々のエンジニアではなくデプロイされたワークロード自身に帰属させることを求めている。両方の要件を満たすアプローチはどれか。", "options": [{"text": "Workload Identity Federation を使用し、ワークロードが呼び出しごとに自身のクラウドの identity token を short-lived な Anthropic access token と交換するようにする。", "is_correct": true, "why": "ベストな選択肢。ワークロードは short-lived なクラウド発行の identity token を、同じく short-lived な Anthropic token と交換する。そのため static key がホスト上に書き込まれることは一度もなく、token はそのワークロードに紐付いた専用の service account として振る舞う。結果として no-shared-secret と per-workload attribution の両要件を満たす。"}, {"text": "ワークロードに IAM execution role を付与し、S3 や DynamoDB と同じ keyless パターンで role の ambient credentials を使って認証する。", "is_correct": false, "why": "もっともらしいが不適切。ambient credentials が認証できるのはそのクラウド自身の API に対してのみで、Anthropic API には通じない。Anthropic API が受け付けるのは Anthropic API key か OAuth token のみであり、ワークロードは Claude を呼び出すための有効な credential を持たないままである。"}, {"text": "オンコールエンジニア自身のログインから short-lived な access token を取得してデプロイに注入し、有効期限が切れる前に更新する。", "is_correct": false, "why": "もっともらしいが不適切。token は確かに short-lived であり、長期間有効なものはディスクに書き込まれない。しかしすべての呼び出しがワークロードではなくエンジニア個人に帰属し、オンコールの引き継ぎが起きるたびにデプロイが壊れる。"}, {"text": "起動時に secrets manager からワークロード固有の API key を取得し、数時間ごとに rotate して漏洩時の影響を時間制限する。", "is_correct": false, "why": "もっともらしいが不適切。rotation と secrets manager の組み合わせで露出期間は短縮される。しかしそれでも各間隔でホスト上に共有 static key が存在し続け、ワークロード identity に暗号学的に紐付けられていない。そのためどちらの要件も満たさない。"}], "explanation": "Workload Identity Federation を使うと、ワークロードは自身のクラウドプロバイダ（AWS、GCP、GitHub Actions、Kubernetes、Microsoft Entra ID、Okta、その他標準準拠の OIDC issuer）が発行する short-lived な identity token を提示し、それを呼び出しごとに送る short-lived な Anthropic access token と交換できる。ホスト上に static key は一切置かれず、発行・保存・rotate・漏洩すべきものが何もない。そして token はそのワークロードに紐付いた専用の service account として振る舞うため、すべての呼び出しをエンジニア個人ではなくデプロイされたワークロードに帰属させることができる。\\n\\n他の選択肢が不適切な理由: B の ambient credentials はそのクラウドの API に対する認証には使えるが Anthropic には通じず、ワークロードは有効な Anthropic credential を持たないままになる。C は short-lived だがワークロードではなくエンジニアに帰属し、引き継ぎのたびに壊れる。D は侵害時の blast radius を縮小できるだけで除去はできず、rotation の合間もホスト上に共有 key が残り、ワークロード identity にも紐付かない。つまりリスクの低減であって、ポリシーが要求する確定的な保証ではない。static な API key はローカル開発では引き続き適切な選択だが、ポリシーが本番サーバ上の長期間有効な共有シークレットを禁止する場合は不適切である。"}, {"qid": "exam1-q36", "domain": "Applications & Integration", "type": "mr", "scenario": "Harborline Insurance はクレームプラットフォームに Claude を活用した2つの機能を追加する。(1) アジャスターが未決済のクレームについてリアルタイムに追加質問を行えるワークベンチ。(2) 過去のクレーム記述 64,000件を、アクチュアリーチーム向けに新たな peril taxonomy（災害分類体系）へ再コーディングする一括の夜間バッチ。結果は翌朝までに低コストで入手する必要がある。コンプライアンス要件として、契約者データは必ずプラットフォーム既存のデータアクセスサービス経由で扱わなければならず、いかなる Claude レイヤーも直接クエリしてはならない。セッション・認可・データアクセスの制御権は引き続きプラットフォームが握り続ける必要がある。これらの要件を最もよく満たす実装はどれか、2つ選べ。", "options": [{"text": "アジャスターワークベンチを Messages API 上に構築する。ポリシーホルダー（契約者）検索を user-defined tool として定義し、Claude はその呼び出しを要求できるようにする。ただし実際の呼び出しは、データアクセス権の権威であるクレームプラットフォームが実行して結果を返す。", "is_correct": true, "why": "インタラクティブなワークフローに最適。Messages API を使えばプラットフォームが毎回のリクエストを駆動するため、セッションと認可はコードで制御されたままになる。user-defined tool を通じて Claude はポリシーホルダー検索を要求できるが、その実行はプラットフォームだけがデータアクセスサービス経由で行う。これによりコンプライアンス境界を保ちつつ、同期的かつターンごとのレイテンシで動作する。"}, {"text": "アジャスターワークベンチを Claude Agent SDK 上に構築する。各アジャスターのセッションとツールの所有権を単一の agent に持たせ、その agent がポリシーホルダーデータベースに直接クエリできるようにする。", "is_correct": false, "why": "機能面では問題ない。Agent SDK は hooks や permission modes を使ってインタラクティブなセッションを動かせるからだ。しかしここで提示された設計自体が要件を満たさない。agent に規制対象のポリシーホルダーデータベースへ直接クエリするツールを与えると、モデルがデータパス上に乗ることになり、要件が権威として定めたデータアクセスサービスをバイパスしてしまう。正しいパターンでは、ポリシーホルダー検索の実行を担うのはモデルではなくプラットフォームだけである。"}, {"text": "ワークベンチでは、各アジャスターがアクセス権を持つポリシーホルダーデータのみを使うよう Claude に厳格な表現の system prompt で指示することで、アジャスターごとの認可スコープを強制する。", "is_correct": false, "why": "決定的制御（deterministic control）を要する要件に対する、典型的な LLM 流の解決策。system prompt は Claude がスコープを遵守する確率を高めるが、保証はできない。規制対象 PII への認可は必ず決定的でなければならない。プラットフォーム側で検索を実行すれば、モデルの判断にかかわらずスコープがコードで強制される。反復的な指示よりも hook が勝る理由も同じである。"}, {"text": "夜間の peril 再コーディングを Message Batches API（POST /v1/messages/batches）で実行する。各リクエストの入力はプラットフォームがデータアクセスサービス経由で組み立てる。", "is_correct": true, "why": "夜間バッチに最適。Batches API は Messages API のリクエストを非同期で実行し、標準価格の 50% で提供する。1バッチあたり最大 100,000リクエスト（または 256 MB）を受け付け、最大処理時間は24時間（大半は1時間以内に完了）。結果は作成後29日間利用可能。これは「レイテンシに余裕があり、コストを抑えたい、結果は翌朝までに必要」という一括処理に合致する。同時にプラットフォームが各入力を組み立てるため、データアクセスの権威性も保たれる。"}, {"text": "夜間バッチでは、64,000件の同期的 Messages API リクエストを並列発行し、共有の peril taxonomy を prompt caching することでコストを抑える。", "is_correct": false, "why": "一理ある。prompt caching は共有の taxonomy プレフィックスのコストを64,000リクエスト全体で削減するため、コスト面からの反論は生き残り、コストだけを理由に排除はできない。しかし同期的なファンアウトは、バッチの構造的 50% 割引と、夜間のレイテンシ余裕が本来アンロックするはずの非同期スケジューリングを手放すことになる。caching はトークンコストを削るだけで統合モデルを変えない。それどころか Batches の割引と重ね合わせることで、さらに大きな節約が可能だったはずだ。"}], "explanation": "両ワークロードを貫く制約は1つ。契約者データは必ずプラットフォームのデータアクセスサービス経由で扱うこと、そしてセッション・認可・データアクセスの制御権はプラットフォームが握り続けること。その上で、それぞれのワークロードは異なるレイテンシ特性を持つ。2つの正解は、この両方を満たす API の形を選んでいる。つまり本問は無関係な事実を2つ問うのではなく、「権威の境界とレイテンシ特性の双方に統合パターンを合わせる」という1つの原則を2つの事例で問うている。\n\nリアルタイムのワークベンチでは、プラットフォームが毎回のリクエストを駆動し、ポリシーホルダー検索もプラットフォーム自身が実行する必要がある。これは user-defined tools を備えた Messages API が同期的レイテンシで提供する。一方、夜間の再コーディングは正反対の特性を持つ。結果は翌朝まで不要で、コストも重視する。これはまさに Message Batches API が想定したユースケースであり、最大 100,000リクエスト（または 256 MB）のバッチを標準価格の 50% で非同期処理し、大半は1時間以内に完了、最大処理時間は24時間。結果は作成後29日間利用可能。なお Anthropic のバッチドキュメントによれば、時間内に完了しなかった個別リクエストは 'expired' という result type で返される。つまり expiration は結果ストリームにおけるリクエスト単位の状態であり、バッチ単位のデッドラインではない（24時間は処理時間の上限であり、一斉失効のタイミングではない）。\n\n誤答選択肢は3つの異なる軸で原則を破っている。Agent SDK の agent にポリシーホルダーデータベースへの直接クエリ権を与えると、モデルが規制対象のデータパスに乗り、権威境界が壊れる。SDK 自体は hooks や permission modes でインタラクティブなセッションを動かせるので、問題は SDK の能力不足ではなく、その特定の設計選択にある。system prompt で認可を強制しようとするのは、決定的かつコードで強制すべき制御に対する LLM 流の解決策であり、prompt は遵守の確率を上げるだけで保証はできない。prompt caching を使った同期的ファンアウトは部分的には正しい。caching は確かに共有プレフィックスのコストを削る。しかしバッチの構造的 50% 割引と、夜間のレイテンシ余裕がアンロックする非同期スケジューリングを捨てている。caching はトークンコストを変えるだけで統合モデルは変えず、本来なら Batches の割引と重ね合わせて更大的に節約できたはずだ。"}, {"qid": "exam1-q37", "domain": "Applications and Integration", "type": "mc", "scenario": "あるフィンテック企業のオンコールチームが、Claude Code 上でインシデント要約ツールのプロトタイプを作った。重大度分類ルールとステータスページのトーンガイドラインはリポジトリの CLAUDE.md に記述されており、プロトタイプが出力するドラフトはすべてそのルールに従っている。その後、同じ要約を本番で生成するため、messages.create(...) を呼び出す Python SDK サービスをリリースした。デプロイされたコンテナ内に CLAUDE.md は存在するのに、本番環境のドラフトは重大度ルールを無視し、トーンも間違っている。本番でも同じルールに従わせるには、どうすればよいか。", "options": [{"text": "ルールは CLAUDE.md にだけ残す。Messages API は Claude Code と同じようにリポジトリのメモリファイルを読み取るので、本番でも自動的に拾い上げるはずだ。", "is_correct": false, "why": "CLAUDE.md は Claude Code のセッション規約であり、Claude Code が起動時にコンテキストへ読み込む。一方 Messages API はファイルシステムを持たず、リポジトリにもアクセスできず、Claude Code のメモリという概念自体がない。コンテナ内のファイルを一切参照しないため、ルールは API からは見えない。"}, {"text": "ルールに対して prompt caching を有効化する。API がルールをサーバー側に保持するので、サービスは以降のリクエストで送信をやめられる。", "is_correct": false, "why": "prompt caching は、同じブロックを再送したときのコストとレイテンシを下げるサーバー側の prefix 最適化。キャッシュヒットを起こすには、キャッシュ対象のブロックを毎リクエストで必ず送信しなければならない。API は呼び出し間でステートレスであり、自らは何も保持しない。キャッシュは再送のコストを下げるだけで、送信そのものを代替することはない。"}, {"text": "本番のモデルをより高性能なものにアップグレードする。訓練データからオンコールルールを認識し、リクエストにルールを含めなくても適用してくれるはずだ。", "is_correct": false, "why": "モデルが扱えるのはリクエストに含まれる内容だけ。受け取ったことのない特定チームのプライベートな重大度ポリシーを、どのモデルも取り出せるはずがなく、訓練データがそのルールを知ることもない。性能の高さは情報伝達の代わりにはならない。送信されていないルールを無視するモデルは、より高性能でもやはり無視するモデルにすぎない。"}, {"text": "サービスが起動時にルールファイルを読み込み、その内容を毎回の Messages API 呼び出しの system prompt として送信する。ルールの上に cache breakpoint を置き、コストを抑える。", "is_correct": true, "why": "Messages API が参照できるのは、各リクエストに含まれる system・messages・tools・添付ドキュメントだけ。ルールを system prompt として送れば振る舞いが明示的かつ再現可能になり、サービスと一緒にバージョン管理でき、Claude Code がローカルでやっていたことと一致する。サービスのコードでファイルを読めば CLAUDE.md を唯一のソースとして保てる。さらに cache breakpoint により、ルールをリクエストから除外することなく、安定したルールの prefix を毎回再送するコストを削減できる。"}], "explanation": "Claude Code は起動時に CLAUDE.md をセッションへ読み込むため、プロトタイプはルールに従っていた。一方 Messages API はステートレスであり、各呼び出しは独立していて、渡された system prompt・messages・tools・ドキュメントしか参照できず、ファイルシステムもリポジリアクセスも、Claude Code との共有メモリも持たない。したがってルールを毎回のリクエストに乗せるのはサービス自身の仕事であり、起動時にファイルを読んで system prompt として送るのが標準的なパターンで、その安定した prefix の再送コストは cache breakpoint で抑えられる。\n\n各誤答が崩れる理由はそれぞれ異なる。CLAUDE.md は API が決して読まないローカルのセッションメモリなので、自動読み込みに頼れば本番は空のコンテキストのままになる(A)。prompt caching はブロックの再送コストを下げるが、ブロック自体が存在し続けることを前提とするため、ステートレスな API をステートフルな保存場所には変えられない(B)。モデルのアップグレードは、リクエストに一度も含まれなかったルールを守らせることはできない。性能は内容に取って代わらないからだ(C)。\n\nもっとも判別が難しいのは B と正解の違いで、どちらも caching を扱うためだ。しかし caching が有効なのは、ルールを送るという前提の上に載せる最適化としてだけであり、送信をやめる手段としては成立しない。\n\n一般教訓: それぞれのランタイムサーフェスには独自のメモリ契約がある。Claude Code の中でエージェントが「知っている」ことは、サービスコードがリクエストへ詰め込まない限り Messages API からは見えない。だからルールは、兄弟ランタイムが勝手に見つける設定ではなく、サービスが所有して毎回の呼び出しで送信するデータとして扱うべきである。"}, {"qid": "exam1-q38", "domain": "Agents and Workflows", "type": "mc", "scenario": "バッチジョブが Agent SDK を組み込んでエージェントを実行する。このエージェントは、終了までに複数ラウンドの tool call をループで回す可能性がある。チームの要件は、モデルの挙動にかかわらず、すべての実行が設定した上限内で確実に停止すること、そしてその上限に達した場合は失敗としてフラグ付けされること。この要件を満たすアプローチはどれか。", "options": [{"text": "system prompt で、1回の実行あたり少数の tool call で停止するよう Claude に指示し、短い実行例の few-shot examples で指示を補強する。", "is_correct": false, "why": "system prompt と few-shot examples は実際に Claude の振る舞いを左右するが、あくまで確率的にすぎず、無視されることも上限を超えることもある。実行には停止の保証がなく、失敗をフラグ付けする決定的なシグナルもない。停止も失敗判定も、ハーネスではなくモデルの判断に依存したままになる。"}, {"text": "allowedTools をジョブが必要とする少数のツールに限定し、auto-approve 系の permission mode で実行する。ツールの対象範囲が小さいことで各実行を抑え込むという狙い。", "is_correct": false, "why": "allowedTools と auto-approve 系の permission mode（acceptEdits や bypassPermissions など）は実際の SDK オプションだが、これらが管理するのは Claude がどのツールを呼べるか、各呼び出しで承認を求めるかどうかであって、ターン数でもコストでもない。許可された範囲の中で延々とループし続ける可能性があり、停止も失敗も抑え込めない。"}, {"text": "各実行に max_budget_usd を設定し、予算を使い切ったことを失敗扱いにする。max_turns はデフォルトのまま残す。", "is_correct": false, "why": "予算上限に達したら失敗にする仕組みは、確かに保証された上限の一つである。予算を超過すると SDK は error_max_budget_usd の result を返し、アプリはこれをフラグ付けできる。しかし max_turns はデフォルトで無制限のため、予算内に収まる安価なターンを多数こなしながら回り続ける実行はフラグ付けされない。「単一の設定上限内で停止する」という保証は半分しか満たされない。"}, {"text": "SDK が実行の上限として公開しているハーネス側の2つの制限――max_turns（会話ターン数の上限）と max_budget_usd（USD での最大支出）――の両方を設定し、いずれかの上限に達したことによる終了をすべて失敗として扱う。", "is_correct": true, "why": "これらは SDK が公開する2つの実行上限であり、どちらもデフォルトは無制限で、モデルではなくハーネスが強制する。max_budget_usd への到達は error_max_budget_usd の result を返すことがドキュメントで明記されており、max_turns への到達はクエリを停止させ、最終の ResultMessage の stop_reason と num_turns から検出できる。どちらの場合もアプリは上限到達を決定的に検出して実行を失敗として記録でき、停止の保証と失敗フラグの両要件をモデルの判断に依存せずに満たせる。"}], "explanation": "Agent SDK は Claude Code の自律ループを動かす。Claude が推論し tool call を発行すると、SDK がそれを実行して結果をフィードバックし、終端の ResultMessage に至るまでサイクルが繰り返される。無人で動くジョブにおいては、終了と失敗を握るのはモデルではなくハーネスでなければならない。これは hook からチェックを発火させるか、モデルに実行を頼むかの違いと同じ「決定的か確率的か」の原則である。毎回必ず起きなければならないこと（今回は上限内で停止すること、そして上限に達した時にフラグ付けされること）をモデルの裁量に委ねてはならない。\n\nSDK が公開する実行上限は2つで、どちらもデフォルトは無制限（None）である。max_turns は「クエリが停止するまでの最大会話ターン数」としてドキュメント化されており、「1ターンはユーザーメッセージとアシスタント応答の組」（1ターンに複数の tool_use block が含まれうる）。max_budget_usd は USD での最大支出で、超過すると「error_max_budget_usd の result を返す」。この2つの上限は終了の仕方が異なり、その区別は重要である。max_budget_usd の消費は実行を error result（error_max_budget_usd）として終わらせるが、max_turns への到達は単にクエリを停止させるだけで、最終の ResultMessage が stop_reason と num_turns を公開しアプリが検査できる。どちらの場合も終了はハーネスが強制し検出可能なため、アプリはいずれも決定的に失敗扱いへマッピングできる。どちらの上限も、モデルが停止を選ぶことに依存していない。\n\n他の選択肢がダメな理由: 選択肢 A は確率的なレバーである。プロンプトや few-shot は振る舞いを形作るが、ハードキャップを保証したり決定的な失敗シグナルを生み出したりはできないため、ループする実行は抑えられもしなければ失敗として記録もされない。選択肢 B はツールの対象範囲をループ上限と取り違えている。allowedTools と permission mode が管理するのはどのツールを実行してよいか、承認が必要かどうかであり、ターン数やコストではない。選択肢 C は半分正しい。予算上限を使い切ったら失敗にする仕組みは確かに保証された本物の上限の一つだが、max_turns を上限なしのまま残すと、予算内で安価なターンが多数回転し続けてもフラグが立たず、単一の設定上限内での停止は保証されない。両方のハーネス上限を設定し、どちらの終了も失敗にマッピングする方法だけが、決定的かつ完全に要件を満たす。"}, {"qid": "exam1-q39", "domain": "Applications and Integration", "type": "mc", "scenario": "二人の data-ops チームが、毎日の業務終了後に Claude を使ったジョブを実行している。このジョブは複数の内部サービスを呼び出し、実行に1時間近くかかる。実行が途中で狂い始めたとき、オンコールのアナリストはその場で実行を止めるか、別の入力に切り替えできなければならない。しかもその制御は、モデルがたまたま従ったときだけではなく、毎回必ず有効にならなければならない。チームには自前の container platform も session store もない。どの Anthropic のサーフェスがこの用途に最適か。", "options": [{"text": "Managed Agents でジョブを実行する。Anthropic が agent と session ごとの sandbox を運用し、session event log をホストする。アプリケーションは event を送信して run を停止・リダイレクトし、結果をストリームで受け取る。", "is_correct": true, "why": "ここで唯一、sandbox・session event log・実行環境をチームから引き受け、同時に本物の制御チャネルを提供するサーフェスだから。アナリストの停止やリダイレクトは harness が確実に処理する event であり、モデルが無視するかもしれない単なる提案ではない。チームが自前でホストできない、長時間・制御可能・ツールを使用するジョブにぴったり合う。"}, {"text": "Claude Agent SDK を組み込む。SDK が agent loop・built-in tools・permissions・MCP を提供するので、チームは loop の仕組みではなくビジネスロジックだけを書けば済む。", "is_correct": false, "why": "SDK は loop とツール実行の負担を確実に取り除く。だから最も有力な対抗馬だ。しかし実際にはチーム自身のプロセス内で動く。sandbox・JSONL session log・実行環境はすべてチームが運用し、操作者向けの制御チャネルもチームが自前で構築しなければならない。ゼロから作るよりは近いが、「container も session store も自前で持たない」という条件には届かない。"}, {"text": "Message Batches で夜間の処理量を約半分のコストで実行する。各ステップは事前に分かっており、レイテンシに敏感なジョブではないから。", "is_correct": false, "why": "Batch は非同期で、各リクエストは独立した非インタラクティブな呼び出し。session を持たず、tool loop も実行しない。実行中の run を止めたりリダイレクトしたりはできない。オフラインのバルク処理向けにコストを最適化するものであって、インタラクティブで制御可能な agent 向きではない。コスト面のメリットは本物だが、形状が合わない。"}, {"text": "強力な system prompt と few-shot examples を使って Messages API を呼び出し、Claude にツール呼び出しの順序を自分で決めさせ、アナリストのレビューのために一時停止するよう指示する。これで agent インフラは不要になる。", "is_correct": false, "why": "根本的な問題が2つある。Messages API はステートレスでサーバー側の loop を持たないため、「agent インフラ不要」は錯覚だ。チームは結局 loop や session storage を自前で構築・実行することになる。さらに、モデルが自分で一時停止することに頼るのは確率論であり、system prompt は従率を上げることはできても毎回確実に停止させることはできない。それがシナリオの要件である。"}], "explanation": "正解: A。シナリオは2つの中核となる要件を提示している。チームが sandbox や session インフラを自前で運用できないことと、アナリストの停止指示が毎回必ず有効にならなければならないこと。Managed Agents はこの両方を満たす唯一のサーフェスだ。Anthropic が agent と session ごとの sandbox を運用し、session event log をホストする。アプリケーションは event を送信して run を制御するため、その制御は harness が確実に処理するチャネルであり、モデルが拒否するかもしれないリクエストではない。この判断は原則に基づくものであり、プロダクト名のマッチングではない。シナリオのどこにも「managed」という言葉は出てこないし、Agent SDK も同じくらい agent らしい響きを持つ。だから各サーフェスが実際に何を運用するのかを考えて判断しなければならない。他の選択肢がダメな理由: Agent SDK (B) は loop・tools・permissions・MCP を提供するが、チーム自身のプロセス内で動き、sandbox や JSONL session log は自社のインフラに置かれる。操作者向けの制御も自前で構築する必要があるため、実行環境は結局チームが運用することになる。Message Batches (C) は形状が違う。非同期でリクエストごとに独立し、session も実行中の制御もない。半分のコストでオフラインのバルク処理を行うものであって、インタラクティブで制御可能な agent 向きではない。prompt だけの Messages API 呼び出し (D) は2つの意味で失敗する。API はサーバー側の loop を持たないため、harness の仕事は実際には消えない。そしてモデルの一時停止に頼るのは確率論であり、このジョブが要求する「毎回確実」な制御ではない。"}, {"qid": "exam1-q40", "domain": "Applications & Integration", "type": "mc", "scenario": "あるプロダクトでは、Claude のレスポンスをストリーミングでユーザーに配信し、生成完了を待たずに最初のトークンを表示している。監査要件として、各ユーザーに実際に表示されたテキストをそのまま保存しなければならない。アーカイブ記録をユーザーに表示された内容と一致させるには、どのアプローチが適切か。", "options": [{"text": "ストリーミングレスポンスのイベントから組み立てられたテキスト、つまり表示の基になった単一リクエストの出力を、モデルを再度呼び出さずにそのままアーカイブする。", "is_correct": true, "why": "正解。UI に配信されるイベントは完全な出力を組み立てるものと同じであるため、その蓄積テキストをアーカイブすれば、ユーザーが見た内容が 1 リクエスト内で正確に保持される。再生成が発生しないため、表示内容との乖離も生じない。"}, {"text": "temperature を 0 に設定してリクエストを再発行し、新しいレスポンスをアーカイブする。greedy decoding によって同じ補完結果が再現されることに頼る。", "is_correct": false, "why": "temperature=0 はサンプリング分布を狭め、出力の再現性を高める。しかし Anthropic は呼び出し間でビット同一の補完を保証しておらず（浮動小数点やサービングレイヤの非決定性が残る）、アーカイブされたレスポンスがストリーミング時と異なる可能性は排除できない。"}, {"text": "元のプロンプトで prompt caching を有効化してリクエストを再発行し、キャッシュされたリクエストから返されたレスポンスをアーカイブする。", "is_correct": false, "why": "prompt caching は入力コストとレイテンシを下げるためにプロンプトのプレフィックスだけを保存するものであり、completion をキャッシュも再現もしない。2 回目の呼び出しでも新しい出力が生成されるため、表示されたテキストから乖離し得る。"}, {"text": "system prompt に指示を追加し、同じレスポンス内でバックエンドがアーカイブできるよう全文の「canonical」コピーを別個に出力させる。", "is_correct": false, "why": "そのブロックを生成すること自体が生成ステップである。モデルは自身の過去の出力を確率的にしか再現できないため、両者が同一リクエスト内にあったとしても「canonical」コピーはユーザーが実際に見たテキストと異なる可能性がある。"}], "explanation": "ストリーミングレスポンスの正本はレスポンスそのものである。UI に配信されるイベントは完全な出力を組み立てるものでもあるため、その蓄積テキストをアーカイブすれば、ユーザーが見た内容が 1 リクエスト内で正確に記録され、再生成は発生しない。temperature=0 を選ぶ選択肢は greedy decoding で同一の補完が得られるという前提に立つが、Anthropic が保証するのは「temperature 0 で出力の再現性が上がる」ことであり、呼び出し間でビット同一の結果を保証するわけではない。そのため 2 回目の呼び出しでも乖離が生じ得る。prompt caching の選択肢はキャッシュの対象を誤解している。prompt caching はコストとレイテンシのためにプロンプトのプレフィックスを対象とするもので、completion は決してキャッシュしない。再リクエストでは結局新しいテキストが生成される。「canonical copy」の選択肢は単一リクエスト内に収まるものの、モデルに自身の過去の出力を再現させようとする点で変わらず、サンプリング依存であり正確ではない。決定的な判断基準は、アーカイブ対象のバイトが表示されたレスポンスそのものに由来するか、それとも何らかの再生成によるかである。この基準を満たすのは最初の選択肢だけだ。"}, {"qid": "exam1-q41", "domain": "Tools and MCPs", "type": "mr", "scenario": "薬物安全性監視（pharmacovigilance）チームが、Claude アプリケーションで利用する MCP server を構築している。このサーバーには、治験プロトコル文書と再利用可能な有害事象（adverse-event）レビュー用テンプレートを公開し、安全性データベース上で承認済みのケースステータス遷移を実行し、社内ネットワーク上のリモート HTTP クライアントからの接続を受け付けるという要件がある。MCP server の設計プラクティスに最も合致する実装上の選択を2つ選べ。", "options": [{"text": "承認済みの各ケースステータス遷移を個別の tool としてモデル化し、tools/list で公開し、tools/call で呼び出す。", "is_correct": true, "why": "最適。tools は MCP の model-controlled primitive であり、副作用を持つ実行可能操作のために用意されている。安全性データベースの承認済み遷移はまさに tools capability が想定している用途で、tools/list で発見され、tools/call で実行される。"}, {"text": "単一の Streamable HTTP endpoint を公開し、クライアントからの JSON-RPC メッセージには POST を、サーバーからクライアントへのストリーミングには GET を使う。", "is_correct": true, "why": "最適。Streamable HTTP は現行のリモート transport（protocol version 2025-03-26）であり、1つの endpoint でクライアントリクエストに POST、任意のサーバーからクライアントへのストリーミングに GET を使用する。従来の2つの endpoint を使う HTTP+SSE transport に取って代わるものだ。"}, {"text": "治験プロトコル文書を tools として公開し、ケースレビュー中に model が必要な文書を取得できるようにする。", "is_correct": false, "why": "もっともらしい。tools もデータを返せるからだ。しかし治験文書は application-controlled data であり、resources capability に属すべきものである。tools として公開すると取得権限が model に渡り、本来 application が持つべき権限を譲渡してしまう。"}, {"text": "protocol version 2024-11-05 で規定されている通り、リクエストとストリーミングで別々の endpoint を持つ HTTP+SSE transport をデプロイする。", "is_correct": false, "why": "もっともらしい。HTTP+SSE は protocol version 2024-11-05 におけるリモート transport であり、実際にリモートクライアントに対応していた。しかし 2025-03-26 で Streamable HTTP に取って代わられ、そちらでは2つではなく単一の endpoint が使われる。"}, {"text": "汎用的な単一の 'update_case' tool を公開し、system prompt 内の few-shot examples で遷移を承認済みのセットに制限する。", "is_correct": false, "why": "もっともらしい。few-shot examples は model の挙動を誘導できるからだ。しかし、それはコンプライアンスの確率を上げるに過ぎない。規制対象の書き込み操作では、承認された各遷移を個別の schema-constrained tool にすべきであり、prompt ではなく tool schema が安全性の境界となるようにする必要がある。"}], "explanation": "MCP の設計では、まず各 capability を正しい primitive に対応付けることから始まる。tools は model-controlled の実行可能操作なので、承認済みの遷移は tools/list で公開し tools/call で呼び出す細粒度の tool として定義すべきである。一方、治験文書は application-controlled の resources に、レビュー用テンプレートは user-controlled の prompts に属す。リモートクライアント向けの現行 transport は Streamable HTTP（protocol version 2025-03-26）であり、クライアントリクエストに POST、サーバーからクライアントへのストリーミングに GET を使う単一の endpoint を提供する。これは 2024-11-05 で定義された2つの endpoint を持つ HTTP+SSE transport を置き換えるものだ。system prompt だけで誘導する単一の過度に広い tool は、規制対象の書き込み操作にとって誤った境界となる。なぜなら、強制の行使を tool schema ではなく model の判断に委ねてしまうからである。"}, {"qid": "exam1-q42", "domain": "Tools and MCPs", "type": "mc", "scenario": "コンプライアンスチームのアシスタントは、トランザクション審査のために Claude（Sonnet 5）に2つのツールを与えている。審査で両方のツールが必要な場合、Claude は1つのレスポンス内に2つの `tool_use` block を返す。両方の呼び出しを完遂し、Claude がターンを継続できるようにするため、アプリケーションは何をすべきか。", "options": [{"text": "system prompt で指示し、few-shot example を使って Claude 自身にルックアップを実行させて結果を報告させる。これによりアプリケーションは tool_result block を構築しなくて済む。", "is_correct": false, "why": "これは、毎回必ず発生するステップを prompting で代替しようとする罠（モデルが従うという過信）。tool_use block は呼び出しの要求を出すだけであり、Claude はクライアントツールを決して実行しない。いかなる指示や example でも、実行をモデルに移譲することはできず、有効な tool_result を生み出すこともできない。"}, {"text": "両方の操作を実行したうえで、最初の tool_use_id に対応付けた1つの tool_result block を返し、両方の出力を1つの combined payload として埋め込む。", "is_correct": false, "why": "Messages API は、直前の assistant ターンの各 tool_use_id に対して、id が一致する tool_result block を1つずつ要求する。2つの結果を1つの id にまとめると、2つ目の tool_use_id が未応答のまま残り、トランスクリプトが不正な状態となって、Claude が継続する前にリクエストがエラーになる。"}, {"text": "要求された各操作を実行した後、次の user メッセージで tool_use_id ごとに1つずつ tool_result block を送信する。各 id は Claude のレスポンス内の対応する id と一致させる。", "is_correct": true, "why": "これはドキュメントに記載されたクライアントツールループの動作である。tool_use block は呼び出しを要求するだけで、実行はしない。アプリケーションが各関数を実行し、tool_use_id ごとに1つの tool_result を返す（id を一致させ、1つの user メッセージにすべて含める）。その後、Claude は返された結果を受けて処理を再開する。"}, {"text": "tool_choice を設定して Claude に両方のツールを必ず呼び出させ、API 側でサーバーサイド実行させて結果を補給させる。これによりアプリケーションは tool_result block を構築しなくて済む。", "is_correct": false, "why": "tool_choice はモデルがツールを呼び出す「かどうか」を制御するものであり、誰が実行するかは制御しない。API の tools パラメータで渡したツールはクライアントツールであり、アプリケーションのみが実行できる。Anthropic のインフラが実行するのは独自のサーバーサイドツール（web search・code execution）のみであり、tool_choice を設定しても tool_result block は生成されない。"}], "explanation": "アシスタントのレスポンスが1つ以上の tool_use block を含む場合、Claude は呼び出しを要求しただけであり、実行はしていない。アプリケーションが各関数を実行し、すべての tool_use_id に対して tool_result block を1つずつ（id につき1つ、id を一致させて）含む1つの user メッセージで応答すると、Claude はその結果を受けて処理を継続する。これは決定的な API 契約であり、モデルの裁量ではない。A（prompting）も D（tool_choice）も、実行をモデルや API に押し付けようとするが、API の tools パラメータで渡されたツールはアプリケーション内でしか実行されないため、どちらも不可能である。B は2つ目の tool_use_id を未応答のまま残し、トランスクリプトを破損させる。ループを満たすのは C だけである。"}, {"qid": "exam1-q43", "domain": "Model Selection and Optimization", "type": "mc", "scenario": "あるチームが2つの Claude ワークロードを運用している。1つ目は、1日数百万件のリクエストを受け付け、後段へ振り分ける前に素早くカテゴリラベルを付与する大量処理の classifier で、このパスではコストとレイテンシが最優先される。2つ目は、長大なポリシー文書を慎重に推論する必要がある複雑な案件の日次の小さなキューで、このパスでは推論品質が最優先される。チームはこの2つのパスにモデルをどのように割り当てるべきか。", "options": [{"text": "ワークロードごとにルーターを切り分ける。数百万件の分類処理は Claude Haiku に、複雑案件は Claude Sonnet に振り分ける。", "is_correct": true, "why": "各パスを、そこで最も重要となるモデル特性に合わせる。大量処理パスではスループットと低コスト、品質パスでは推論の深さである。ルーターはこれをリクエスト単位の決定論的なワークロードルールとして適用するため、モデルの選択をモデル自身に委ねることなく、毎回正しい tier を選べる。"}, {"text": "両方のパスを Claude Opus に標準化し、すべてのリクエストで最高品質を確保しつつ、運用するモデルを1つに絞る。", "is_correct": false, "why": "もっともらしい。モデルが1つになれば管理・プロンプト管理・オンコールローテーションが簡素化され、機密性の高い業務では最高品質という選択も正当化しやすい。しかし、数百万件の些末なラベル付けに最強で最も遅く最も高価な tier を充てると、コストとレイテンシが最優先とされたパスで予算を大きく超過してしまう。"}, {"text": "両方のパスを Claude Sonnet で実行し、system prompt を引き締めて1呼びあたりのトークン数を削減し、few-shot example を追加して精度を引き上げることで分類器のコストを下げる。", "is_correct": false, "why": "もっともらしい。system prompt を引き締めれば実際に1呼びあたりの入力トークン数は減り、few-shot example で分類精度も上がるため、それらしいコスト最適化に見える。しかしバランス型モデルと高速 tier のモデルのコスト差は構造的なモデル適合度の差であり、プロンプトの冗長さの問題ではない。プロンプトを引き締めてもこの差は埋まらず、数百万件の呼び出しに伴うリクエストごとのオーバーヘッドは依然として高すぎる。"}, {"text": "両方のパスを Claude Haiku で実行し、複雑案件パスでは extended thinking を大きな token budget で有効化して品質を補う。", "is_correct": false, "why": "もっともらしい。extended thinking はモデルの推論を実際に向上させ、単一 tier の運用は管理と運用負荷を簡素化する。しかし extended thinking はデコード時の機能強化であり、長大なポリシーや規制の慎重な分析において高速 tier モデルの基本能力を強力な推論モデルと同等の水準まで引き上げるものではない。大きな thinking budget で無理やり補おうとすると、高速 tier を選んだ理由である1呼びあたりのコスト削減効果を損なう上に、品質の基準にも届かない。"}], "explanation": "モデル選定はルーティングの問題である。常に最も能力の高いモデルに流すのではなく、各ワークロードを、そこで支配的なモデル特性に合わせる。分類器パスは数百万件の呼び出しにわたりコストとレイテンシが支配的であるため、高速・低コストの tier である Claude Haiku が適合する。複雑案件パスは1日あたりの処理量が小さく推論品質が支配的であるため、Claude Sonnet のようなより強力な推論モデルが適合する。ルーターがこれらをリクエスト単位の決定論的なワークロードルールとして適用するのが、構造的な解決策である。\\n\\n選択肢 B は品質重視の方向性は正しいが、大量処理パスのコスト設定を間違えている。数百万件の些末なラベルに最強 tier のモデルを充てることは、明示されたコストとレイテンシの優先事項に反する。運用簡素化のトレードオフとしては現実的だが、このケースでは間違った選択である。\\n\\n選択肢 C はプロンプトエンジニアリングのレバーに手を伸ばす。system prompt の引き締めは実際に1呼びあたりのトークンを減らし、few-shot example は精度を引き上げるが、プロンプトの調整で構造的な tier 間コスト差は埋まらない。したがって大量処理パスはバランス型モデルでは予算超過のままである。これは正解が決定論的なルーティングであるにもかかわらず、LLM 流のアプローチで解決しようとする典型例である。\\n\\n選択肢 D は品質パスの論理を逆転させる。extended thinking は推論を向上させるが、デコード時の機能強化であり、長大なポリシーや規制の複雑な分析において高速 tier モデルの基本能力をより強力なモデルの水準まで引き上げるものではない。許容品質に近づくために必要な大きな thinking budget は、高速 tier を選んだ本来の理由である1呼びあたりのコスト削減を損なってしまう。"}, {"qid": "exam1-q44", "domain": "Claude Code", "type": "mc", "scenario": "チームは共有の .claude/settings.json の default として Sonnet を固定し、すべてのコラボレーターが同じ挙動になるようにしている。あるエンジニアが、出力品質を比較するため、そのセッションだけで1回限りのタスクを Opus で実行したい。この実行は共有 config を変更してはならず、commit できるものを残してはならず、後のセッションに痕跡を残してもならない。最も適した方法はどれか。", "options": [{"text": "CLI の model flag でセッションを起動する — `claude --model opus` — 。これにより、より高性能なモデルはその起動のみに紐づく。", "is_correct": true, "why": "Claude Code の settings の優先順位では、command-line arguments は local・project・user settings より上位に位置する一時的な session override として文書化されている。モデルはプロセス起動時に解決され、flag はディスクに何も書き込まない。したがって構造上、共有 config は変更されず、commit 可能なものは残らず、次のセッションは後始末なしで pinned default に戻る。"}, {"text": "pinned default で通常のセッションを起動し、最初のメッセージで Claude にこのタスクを Opus で実行するよう指示する。", "is_correct": false, "why": "自然言語の指示は振る舞いへの要求であり、runtime binding ではない。アクティブなモデルはセッション開始時に固定され、Claude はプロンプトから自身の inference call を別モデルへ再ルーティングできない。そのためタスクは結局 pinned default で実行される。モデルの切り替えには外部の仕組みが必要であり、モデル自身に対する要求では実現できない — 決定論的なステップが必要な場面でプロンプトに頼るのと同じ穴。"}, {"text": ".claude/settings.local.json（Claude Code が個人用・非共有の変更用に文書化している gitignore 済みファイル）に `model` override を追加する。", "is_correct": false, "why": "スコープは正しい — 個人用で commit されない — が、settings.local.json は永続ファイルである。override はディスクに残り、手動で削除するまでそのリポジトリの以降の全セッションに暗黙に適用される。生存期間が実行を超えてしまうため、構造上『後のセッションに痕跡を残さない』という要件を満たさない。"}, {"text": "user scope の settings が共有 project file を触らずに hot-reload されると期待して、セッション中に ~/.claude/settings.json の `model` key を編集する。", "is_correct": false, "why": "user scope は共有 config を一切触らないが、`model` key は Claude Code がセッション開始時に1回だけ読み取り、hot-reload の対象から明示的に除外している（セッション中の切り替えには /model を使う）。そのためセッション中に編集しても次回起動まで何も変わらない。しかも一度有効になれば、そのエンジニアのすべてのプロジェクトに適用され、この1タスクの範囲を大きく超えてしまう。"}], "explanation": "制約が要求するのは、ephemeral で session-scoped、かつ single-engineer なモデル変更 — つまり仕組み自体の生存期間とスコープが最初から一致していることだ。CLI flag（`claude --model opus`）は構造上この3つをすべて満たす: その1回の起動に対して local・project・user settings を override し、起動時にモデルを binding し、ディスクに何も書き込まない。そのため共有 config の編集も、commit すべきものも、次セッションへの持ち越しも起きない。各誤答は表面上の制約をクリアしつつ仕組みで破綻する。プロンプトで Claude に指示するのは、モデルが自身の routing について許可できない振る舞いの要求であり、結局 pinned model が call を処理する（決定論的 vs 指示型のギャップ — 何かを毎回必ず発生させたい時に hook がプロンプトに勝つ理由と同じ）。settings.local.json は個人スコープとして正しいが永続ファイルであり、生存期間が実行を超える。そして user settings の `model` 編集はセッション中は無効（key は起動時に1回しか読まれない）で、有効になってもすべてのプロジェクトに過剰適用される。応用できる教訓: ある特性を短命かつ狭いスコープにしたいなら、振る舞いの指示や『後で掃除する』ことを覚えておく必要がある永続ファイルではなく、組み込みのスコープと生存期間が最初から一致する仕組みを選ぶべきである。"}, {"qid": "exam1-q45", "domain": "Prompt and Context Engineering", "type": "mc", "scenario": "あるクレーム処理チームは、自由記述の事故報告を Claude に通し、その結果を型付きレコードとしてウェアハウスに保存している。レコードは `incident_type` enum、数値の `payout_amount`、`summary` 文字列からなる。しかし、Claude がレコードを散文で包んだり、金額を数値ではなく \"$1,200\" のような整形済み文字列で返したり、フィールドを commentary キーの下にネストしたりするため、下流のパーサーが繰り返し壊れている。チームは、ウェアハウスが防御的な後処理なしでレコードを読み込めるようにするため、Claude 自身の最終レスポンスが毎回固定の JSON Schema に適合することを求めている。この契約を API レイヤーで強制するアプローチはどれか。", "options": [{"text": "`messages.create()` で `output_config.format` にレコードの JSON Schema を設定し、API が Claude の直接の最終レスポンスを有効な JSON に制約するようにする。バリデーションは `client.messages.parse()` に任せる。", "is_correct": true, "why": "`output_config.format` はドキュメントに記載された Structured Outputs の仕組みであり、Claude の直接の最終レスポンスに対してスキーマを考慮した制約付きデコーディング（constrained decoding）を適用する。つまりモデルが従うことを信頼するのではなく、API 自体がスキーマに違反する出力を拒否する。契約は確率的ではなく API レイヤーで強制され、`client.messages.parse()` が自動的にバリデーションを行う。"}, {"text": "システムプロンプトを厳しくして JSON のみを出力するよう要求し、整形式のレコードの few-shot 例を追加する。", "is_correct": false, "why": "プロンプトでの指示と few-shot 例は一貫性を高めるが、API はスキーマによる制約を何も適用しない。散文で包まれたレスポンスや型が誤ったレスポンスを拒否するものがないため、同じ失敗が起き続ける。これはモデルに対する確率的な誘導であり、契約の強制ではない。"}, {"text": "レコードと同じ形の `input_schema` を持つ tool を定義し、`strict: true` を設定して、`tool_choice` で呼び出しを強制する。", "is_correct": false, "why": "`strict: true` は確かにスキーマ検証された JSON を生成するが、検証されるのは tool の引数である。Claude は直接の最終テキストではなく `tool_use` block を返す。つまり Claude 自身の回答ではなく tool 呼び出しの引数が制約され、呼び出し側が実行して展開しなければならない tool 往復が強制される。"}, {"text": "assistant ターンの先頭を `{` で prefill し、モデルにそこから JSON オブジェクトを続けさせる。", "is_correct": false, "why": "Prefill は実際に存在する手法だが、Structured Outputs や JSON 出力モードとは両立しない。ドキュメントでも message prefilling は非互換として挙げられており、現在のモデルでは 400 を返す。仮に許容される場合でも、最初のトークンを誘導するだけで、スキーマの保証は何もない。"}], "explanation": "型付きの下流コンシューマーにとって標準となるパターンは、`messages.create()` の `output_config.format`（あるいは SDK の `client.messages.parse()` ヘルパー）による Structured Outputs である。これは制約付きデコーディングを適用し、Claude の直接の最終レスポンスを指定した JSON Schema に適合させる。契約はモデルの判断に委ねられず、API レイヤーで強制される。\\n\\n各誤答はそれぞれ異なる理由で不十分である。プロンプトによる強調と few-shot は、スキーマの保証がないベストエフォートに過ぎない。`strict: true` による tool の強制呼び出しは検証済みの JSON を生成するが、レスポンスが `tool_use` block に変わってしまう。これは Claude 自身の回答ではなく tool の引数を制約し、さらに tool 往復を追加する。Prefill は JSON 出力モードと両立せず（message prefilling は現在のモデルで 400 を返す）、最初のトークンを誘導するだけである。\\n\\n呼び出し側が対処すべき注意点が二つある。第一に、`stop_reason: \\\"max_tokens\\\"` がレスポンスを完成前に切り詰める可能性があるため、`max_tokens` を十分に大きく設定すること。第二に、安全機能による `refusal` がスキーマに適合しない可能性があること。`client.messages.parse()` はいずれもエラーとして表面化させ、不正なレコードを暗黙に保存することはない。スキーマへの適合だけでは完全性を保証しないにもかかわらず、契約強制という結論が成り立つ理由はここにある。\\n\\nなお、`messages.create()` で以前からあるトップレベルの `output_format` パラメータは非推奨である。標準的な指定方法は `output_config: {format: {...}}` である。"}, {"qid": "exam1-q46", "domain": "Claude Code", "type": "mc", "scenario": "セキュリティチームは、すべての開発者のマシンで Claude Code が `patient-records/` 配下のファイルを読み取れないようにする `permissions.deny` ルールをデプロイしなければならない。このルールは、開発者自身の `settings.local.json` がより広い読み取りアクセスを許可している場合でも、またリポジトリにコミットされた project settings が個人の作業コピー上で後から編集された場合でも、維持されなければならない。下位のレイヤーで上書きされないようにするには、ルールをどこに配置すべきか。", "options": [{"text": "CLAUDE.md に「patient-records/ 配下のファイルは決して読み込まない」という目立つ指示を追加し、すべてのセッションでポリシーを常に想起させる。", "is_correct": false, "why": "CLAUDE.md は会話に読み込まれるメモリであり、モデルの振る舞いをガイドするが、ツールアクセスの権限は制御しない。そのため、競合する local 側の許可を取り消すことも、いかなる settings レイヤーを上書きすることもできない。決定論的な権限適用が求められる場面で、モデルの裁量に頼る対応に過ぎない。"}, {"text": "各開発者の `~/.claude/settings.json` に配置し、deny ルールをそのユーザーのすべてのプロジェクトに適用させる。", "is_correct": false, "why": "User settings は最も優先度が低く、マシン単位の設定であるため、project settings と local settings の両方で上書きされるうえ、管理者がデプロイするものでもない。寛容な `settings.local.json` が存在すればルールは維持できず、チーム全体への一貫した展開もできない。"}, {"text": "リポジトリにコミットされた `.claude/settings.json` に配置し、チーム全体がリポジトリ経由で deny ルールを継承する。", "is_correct": false, "why": "Project settings は共有されるが、優先度は `settings.local.json` よりも低く、開発者が編集可能な作業コピー内に存在する。そのため、local での上書きや個人的な編集によってルールが無効化される余地が残る。正解に最も近い、惜しい選択肢。"}, {"text": "managed (enterprise) settings に配置する。これらは管理者側でデプロイされ、user・project・local の各 settings より上位でマージされるため、下位のレイヤーでは上書きできない。", "is_correct": true, "why": "Managed settings は最も高い優先度を持ち、user・project・local のいずれの settings でも上書きできない。これは組織全体でバイパス不可の読み取りブロックにまさに求められる性質であり、開発者自身が編集・削除できない唯一のレイヤーである。"}], "explanation": "D が正解。managed (enterprise) settings は最も高い優先度を持ち、user・project・local のいずれの settings でも上書きできない。これは、下位レイヤーのいかなる編集に対しても維持されなければならない組織全体ルールにまさに求められる性質である。A はモデルの裁量に頼る対応であり、CLAUDE.md は振る舞いをガイドするがツールアクセスを強制しないため、寛容な local 側の許可が勝ってしまう。B と C は実際の settings レイヤーを選んでいるが、user settings は最も優先度が低く、project settings は `settings.local.json` で上書きされ、かつ個人の作業コピーで編集可能なため、いずれも問題の要件を満たせない。"}, {"qid": "exam1-q47", "domain": "Model Selection and Optimization", "type": "mc", "scenario": "Bramwell Capital は Sonnet 4.6 上で動く株式リサーチ向けコパイロット「Atrium」を運用している。Atrium が捌くトラフィックは大きく2種類──簡単なファクト検索（ある企業の決算期末、指定ティッカーが上場する取引所など）と、高度な多段階分析（10-K から割引キャッシュフロー・モデルを組み上げるなど）だ。回答品質を守るため、チームは全リクエストを深い推論向けに設定した。すなわち output_config: {effort: \"high\"} を一律に適用し、簡単なコールで推論を軽減・省略する手段は用意していない。トラフィックの大半はファクト検索が占め、1件ごとに深い推論のコストを丸ごと負担するため、応答が遅く、コストも割高になっている。この混在ワークロードに最も適した変更はどれか。", "options": [{"text": "adaptive thinking を有効化（thinking: {type: \"adaptive\"}）し、output_config.effort をリクエストごとに設定する。ファクト検索では low、分析では high とし、推論の深さを複雑さに応じてスケールさせ、すべてのコールで深い推論を走らせる事態を避ける。", "is_correct": true, "why": "adaptive thinking により、Claude は推論を必要としないコールでは推論をスキップできる。さらに output_config.effort は1コールあたりの深さに対する決定論的な上限であり、low で検索を抑えつつ high で分析の品質を保てる。これにより、単一の固定設定では不可能なリクエスト単位のコスト・レイテンシ制御が正確に実現できる。"}, {"text": "システムプロンプトを書き換え、ファクト検索では簡潔に推論し、複雑な分析でのみ深い推論を行うよう Claude に指示する。", "is_correct": false, "why": "この指示は勧告に過ぎない。簡潔になる可能性は上がるが、thinking が発火するかどうか、何トークンの推論を消費するかを決定論的に制御できないため、実行ごとにコストがばらつく。毎回必ず上限を設けるべきものを、モデルが従うかどうかに依存させてはいけない。"}, {"text": "決算期やティッカーの検索に対して1行の簡潔な回答を示す few-shot 例を追加し、その簡潔さをモデルに模倣させる。", "is_correct": false, "why": "few-shot は最終回答のスタイルや長さを確実に整えられるが、舵を切るのは応答テキストだけだ。thinking が発火するか、何トークンの推論を消費するか（本当のコスト駆動要因）は制御できない。表面上は短く読めても、裏側で同じ深い推論トークンを消費し続ける可能性がある。"}, {"text": "adaptive thinking を有効化（thinking: {type: \"adaptive\"}）し、effort はデフォルトのまま残す。検索がシンプルすぎて深い推論をスキップできるかは Claude 自身に判断させる。", "is_correct": false, "why": "adaptive thinking により Claude が自己調整して最も些末なコールをスキップできるのは事実だ。しかし深さはモデルの判断に委ねられ、デフォルトの高い effort も維持されるため、thinking が発火した検索はすべて高深度で実行される。平均すれば過剰コストは減るが、1コールごとに上限がかかるわけではない。既知のシンプルかつ大量のリクエストクラスには、モデルの裁量ではなく決定論的な1コールあたりの深度設定が必要だ。"}], "explanation": "問題の根本は、すべてのリクエストに単一の深い推論設定が適用されている点にある。そのため大量のファクト検索が、10-K 分析と同じ推論コストを丸ごと負担している。この目的に最適な修正は、不要なときは Claude が推論をスキップできるようにすること（adaptive thinking）と、1コールあたりの深度を決定論的に上限設定すること（output_config.effort: 検索は low、分析は high）である。これにより、単一の固定設定では不可能なリクエスト単位のコスト・レイテンシ制御が実現する。\\n\\n他の選択肢がダメな理由: システムプロンプトの指示（B）と few-shot 例（C）はプロンプトレベルの制御であり、出力スタイルを整え、最終回答の長さを削ることはできる。しかし、いずれも extended thinking が発火するかどうかを制御したり、トークン消費に上限を設けたりはできないため、推論コストはモデルの裁量に委ねられたままだ。これは「毎回必ず制御すべきものは、モデルが自発的に行うかに依存させてはいけない」という原則と同じである。\\n\\n最も正解に近いのは D だが、adaptive thinking を有効にしても effort をデフォルトの高い値のままにしておくと、最も些末なコールはスキップできるものの、thinking が発火した検索はすべて高深度で実行される。そのため過剰コストは平均すれば減るが、1コールごとに上限がかかることはない。既知のシンプルで大量のリクエストクラスでは、深度をモデルの判断に委ねず、1コールごとに決定論的に設定しなければならない。"}, {"qid": "exam1-q48", "domain": "Model Selection and Optimization", "type": "mc", "scenario": "Harborline は B2B 向けの貨物クレームプラットフォームで、届いた出荷例外チケットを Claude Opus 4.6 で8種類の固定の disposition code（輸送中の破損、誤配送、税関保留、書類エラーなど）のいずれかに振り分けている。ラベルの精度はすでに十分確保されている。しかしピーク期のボリュームになると、チケットあたりの p95 レイテンシもトークンコストも高すぎる。このワークロードに最も適した変更はどれか。", "options": [{"text": "トリアージ工程を Claude Haiku 4.5 に移行する。Haiku 4.5 は高速かつ経済的な大量処理向けに位置付けられており、あわせて既存の eval set で精度が維持されることを確認する。", "is_correct": true, "why": "モデルの能力をタスクの複雑さに合わせている点で最も適している。入力が短く閉じたラベル集合への分類器は、Opus クラスの推論能力も、その価格帯も必要としない。Haiku 4.5 は高速・低コストな大量処理向けに位置付けられているため、この変更はレイテンシとコストの両方をユニットコストの次元で改善し、同時に既存の eval set がすでに確立された精度を担保する。"}, {"text": "Opus 4.6 の effort 設定を下げて thinking の深さを減らし、トリアージ呼び出しあたりの課金トークン数を減らす。", "is_correct": false, "why": "effort は GA の実パラメータで、実際に thinking の深さとトークン全体の消費を減らすため、ドキュメントに記載された節約策ではある。しかし Opus 4.6 のトークン単価とレイテンシの下限は Haiku 4.5 の数倍のままであり、最小化した Opus の呼び出しであっても、大量処理のシンプルな分類器にはユニットエコノミクス上不適切だ。コストの支配的なレバーは thinking の深さではなく、フロンティアモデルの価格帯のほうである。"}, {"text": "Opus 4.6 の system prompt に各 disposition code につき1件の few-shot example を追加し、ラベルのみを出力するよう制約を強める。", "is_correct": false, "why": "ラベルのみの出力にする部分は出力サイズを削れるし、few-shot は難しいケースの精度を向上させうる。しかし本件の問題は精度ではなく、ラベルはすでに正確だ。さらに few-shot example はそれぞれ input prefix を大きくし、すでに高すぎるワークロードのコストとレイテンシを逆に上昇させる。つまり最適化の軸を間違えている。"}, {"text": "共通の8カテゴリ分類について Opus 4.6 で prompt caching を有効にし、繰り返しの呼び出しをより安い cache-read 単価で課金させる。", "is_correct": false, "why": "prompt caching は最小キャッシュ可能長を超えたときだけ有効になり、Opus/Sonnet クラスのモデルではその閾値が約 1024 tokens だ。8カテゴリの分類と短い指示を合わせても数百トークンにしかならないため、リクエストはキャッシュされずに処理され、節約効果はゼロになる。仮に閾値を超えたとしても、キャッシングが削るのは input prefix のコストだけである。Anthropic のドキュメントによれば出力トークンには影響せず、出力はどのチケットでも Opus 4.6 の正規料金で課金される。"}], "explanation": "入力が短く、閉じた8ラベルの集合を扱い、精度がすでに確立されている大量処理の分類器では、コストとレイテンシの支配的なレバーは「モデルの能力をタスクの複雑さに合わせる」ことだ。シンプルな分類器にフロンティアモデルの推論は不要であり、フロンティアの価格帯を支払っていること自体が両症状の根本原因である。Claude Haiku 4.5 は高速・低コストな大量処理向けに位置付けられているため、工程を同モデルに移せばユニットコストの次元でレイテンシとコストを改善でき、既存の eval set が精度の維持を裏付ける。\n\nほかの選択肢は、実在するドキュメント記載済みの最適化を、適用先の次元を間違えて使っている。Opus 4.6 の effort を下げれば thinking の深さとそれが生むトークンは削れるが、Opus のトークン単価とレイテンシの下限は変わらないため、最小化した Opus の呼び出しでも Haiku 呼び出しの数倍のコストになる。few-shot は、存在しない精度問題を解決するために input prefix を膨らませる。prompt caching はそもそも有効にならない。8カテゴリの分類と短い指示で数百トークン程度であり、Opus/Sonnet の最小キャッシュ可能長である約 1024 tokens を下回るため、リクエストはキャッシュなしで処理され、仮に有効化されても出力トークンには影響しない。\n\nAnthropic の models overview でも示されているとおり、能力が高いほどよいとは限らない。正解は「すでに持っている精度を維持できる範囲で最も安いモデル」である。"}, {"qid": "exam1-q49", "domain": "Applications and Integration", "type": "mc", "scenario": "Messages API で構築された社内サポートアシスタントは、顧客レコードの参照、注文データベースの検索、そしてケースごとに上限が決められたアカウントクレジットの発行を行う。要件は絶対的である——注文のキャンセル、source-of-truth レコードの変更、返金の発行はいかなる場合も許されず、敵対的あるいはインジェクションされたプロンプトに対しても同様である。tool 定義とリクエスト処理コードは共有リポジトリに置かれ、すべてのエンジニアが同一の構成をデプロイする。モデルが破壊的なアクションを実行できないことを最も確実に保証する設計はどれか。", "options": [{"text": "tools array には目的に特化した tool のみを公開する——読み取り専用の lookup と、handler 内で上限を課した credit tool のみ——そしてキャンセル、変更、返金を行える tool は一切定義しない。", "is_correct": true, "why": "最適解。Messages API では、モデルが emit できる tool_use block は application が tools array に列挙した tool のみであり、各 tool が何を行うか、何を tool_result として返すかは application 側の handler が決める。上限付きの tool のみを定義し、データ変更を行える tool を一切定義しなければ、破壊的な能力は構造的に排除される——インジェクションされたプロンプトが呼び出せる tool がそもそも存在しなくなる。制限の実施ポイントは integration layer にあり、モデルの裁量の外にあり、この定義を共有リポジトリに commit することで、すべてのエンジニアが同一の least-privilege な構成を手に入れられる。"}, {"text": "tools array にすべての account tool を公開したうえで、キャンセル、レコード変更、返金を禁じる厳格な system prompt の指示を追加し、あらゆる入力に対してモデルがルールを守ることに頼る。", "is_correct": false, "why": "もっともらしい——強い system prompt の指示は実際に振る舞いを整え、良い実慣でもある。しかしデータ変更を行える tool が依然として公開されたままでは、遵守はインジェクションや敵対的なプロンプトを含むあらゆる入力に対して、モデルが指示を守ることに依存する。指示はモデルを導くものであり、能力の上限を設けるものではない。したがって強制適用ではなく、確率的にすぎない。"}, {"text": "データ変更を行える tool を利用可能なままにしつつ、読み取り専用呼び出しの few-shot example でモデルを誘導し、最も能力の高い model tier で実行する。", "is_correct": false, "why": "もっともらしい——few-shot example と能力の高いモデルは実際に出力の一貫性を向上させる。しかし指示への追従は確率的であり、大きなモデルは遵守の確率を上げるだけで保証はしない。そして一度モデルがデータ変更可能な tool に対して tool_use を emit すれば、この設計には handler の実行を止める要素は何もない。"}, {"text": "すべての tool を公開しつつ、モデルが emit する tool_use ごとに audit log エントリを書き込み、レビュー時に破壊的な呼び出しを捕捉してリカバリできるようにする。", "is_correct": false, "why": "もっともらしい——audit log は価値ある運用上の制御である。しかし logging は、モデルが tool_use を emit し handler がそれを実行した後に破壊的な呼び出しを記録するものであり、呼び出しを防ぐものではない。検出（detection）と復旧（recovery）であって強制適用（enforcement）ではなく、アクションが決して起きないことを保証はできない。"}], "explanation": "この要件はベストエフォートではなく保証であり、すべてのエンジニアが共有する構成を通じて実現されなければならない。Messages API では、tool use がモデルが外界に作用する唯一のチャネルである——モデルは request の tools array から tool を指定して tool_use block を emit し、その tool が何を行うか、何を tool_result として返すかは application 側の handler が決める。つまり enforcement point はモデルではなく application である。上限付きの tool（読み取り専用の lookup と、上限を handler が強制する credit tool）のみを公開し、注文のキャンセル、レコードの変更、返金を行える tool を一切定義しなければ、それらの能力は構造的に利用できなくなる。インジェクションされたプロンプトがモデルを騙して呼び出せる tool が存在せず、この定義を共有リポジトリに commit することで、すべてのエンジニアが同一の least-privilege な構成を持てる。他の選択肢はどれも enforcement をモデルの判断や事後レビューに押し付けている。system prompt の指示（B）や few-shot と能力の高いモデル（C）は遵守の確率を上げるが、確率的なままであり、敵対的な入力の下ではバイパス可能である——一度モデルがデータ変更可能な tool に tool_use を emit すれば、どちらの設計にも handler の実行を止める要素はない。audit logging（D）は破壊的な呼び出しを実行された後に記録するだけであり、検出と復旧であって強制適用ではない。この 3 つはいずれも capability boundary を作らず、それこそが要件の求めるものである。"}, {"qid": "exam1-q50", "domain": "Security and Safety", "type": "mr", "scenario": "ある信用組合が、審査担当者（underwriter）向けに融資適格性の勧告案を起草する Claude アシスタントをデプロイしようとしている。申込者はアシスタントに対して自由形式のメッセージを送信でき、チームはアシスタントを操って適格性ルールを無視させようとする試みが繰り返されると想定している。Anthropic の安全性ガイダンスに最も合致するデプロイメント上の対応を 2 つ選べ。", "options": [{"text": "各申込者メッセージを Claude Haiku 4.5 で事前スクリーニングし、構造化された risk label を返す。アプリケーションコードはその risk label を消費し、メッセージをメインの Sonnet 5 アシスタントに渡すかどうかを判定する。", "is_correct": true, "why": "最適。エンドユーザーが敵対的になりうる場合、Anthropic の guardrails ガイダンスはメインのアシスタントの判断に頼るのではなく、レイヤー化された緩和策を推奨する。具体的には、軽量な別モデル（Haiku 4.5）による入力の事前スクリーニングと、分類のための structured output の活用である。risk label は下流処理をゲートするコードが消費するため、Sonnet 5 が拒否を選ぶかに依存せず強制できる。"}, {"text": "system prompt に明示的な拒否ルールと few-shot examples を追加し、Sonnet 5 がポリシー違反のリクエストを自ら拒否するようにする。", "is_correct": false, "why": "有効なレイヤーではあるが、prompt hardening はモデルの判断に依存し確率的である。Anthropic はメインのアシスタント単独に頼るのではなく、独立した入力スクリーニングとレイヤー化することを推奨している。拒否ルールや few-shot examples はコンプライアンス率を引き上げるが、敵対的入力に対する保証にはならない。"}, {"text": "各申込者メッセージをポータルの禁止コンテンツカテゴリ（harassment、personal information など）に照らして分類し、該当するものは Claude に転送する前にブロックする。", "is_correct": false, "why": "これはユーザー生成コンテンツの content moderation である。harassment や personal information などの禁止素材は捕捉できるが、申込者がアシスタントを操作して適格性ルールを回避するという提示された脅威には対処できない。別の問題に対する実効性のあるコントロールではあるが、アシスタントを敵対的入力から保護する guardrail ではない。"}, {"text": "メインのアシスタントを Opus 4.8 に切り替え、敵対的圧力下でも適格性ルールに従う信頼性を高める。", "is_correct": false, "why": "能力のアップグレードは確率的である。より大きく能力の高いモデルは平均的に指示に従う信頼性は高いが、それは強制メカニズムではない。jailbreak 耐性はモデル依存のままであるため、レイヤー化された入力スクリーニングや必須の人間によるレビューの代わりにはならない。"}, {"text": "すべての融資適格性の勧告について、確定前にライセンス保持の審査担当者（underwriter）によるレビューと承認を必須にする。", "is_correct": true, "why": "最適。融資適格性の勧告は高リスクのユースケースである。Anthropic の Usage Policy は、個人に直接影響を与える金融・融資の意思決定を、出力の確定前に資格のある人間によるレビューを含む追加の保護措置を必要とするものとして扱っている。"}], "explanation": "2 つの独立した安全性要件が適用され、正解のペアはそれぞれから 1 つずつ取る。(1) 融資適格性の勧告は高リスクのユースケースである。Anthropic の Usage Policy は、個人に直接影響を与える金融・融資の意思決定を、出力の確定前に資格のある人間によるレビューを含む追加の保護措置を必要とするものとして扱う。したがって審査担当者による承認（E）は必須であり、任意ではない。(2) 申込者が敵対的になりうるため、Anthropic の guardrails ガイダンスはメインのアシスタントの判断に頼るのではなく、レイヤー化された緩和策を求める。軽量な別モデル（Haiku 4.5）で各メッセージを事前スクリーニングし、構造化された risk label に基づいてコードで下流処理をゲートする（A）のが推奨パターンである。ゲートが Sonnet 5 の拒否の選択に依存しないからだ。B と D は正当なレイヤーではあるが、モデル依存かつ確率的である。prompt hardening（B）や能力の高いモデル（D）はコンプライアンス率を引き上げるが保証にはならないため、レイヤー化された guardrail を補完するものであり、置き換えるものではない。C はユーザー生成コンテンツの content moderation であり、harassment や personal information などの禁止素材は捕捉できるが、申込者が適格性ルールを回避するという提示された脅威には対処できないため、別の問題に対するコントロールである。"}, {"qid": "exam1-q51", "domain": "Agents and Workflows", "type": "mc", "scenario": "請求処理チームが、Messages API 上に直接自動化エージェントを構築している。ある実行の途中で、Claude が内部の eligibility-lookup サービスからのデータ取得を要求する tool_use block を返した。アプリケーションは次に何をすべきか。", "options": [{"text": "アプリケーション自身のコードで eligibility-lookup サービスを実行し、出力を tool_result として返し、モデルが end_turn を返すまで再び呼び出す。", "is_correct": true, "why": "これは Messages API における tool-use の標準的なループ構造だ。Claude が tool_use block を返したら、アプリケーションは該当ツールを実行し、その出力を（対応する tool_use_id を持つ）tool_result block として次の user message に含めて返し、再度モデルを呼び出す。このループは stop_reason が end_turn になるまで繰り返される。ユーザー定義ツールに対してモデルが行うのは要求の発行だけなので、アプリケーション自身のコードでサービスを実行するのは、API が要求する通りの振る舞いである。"}, {"text": "エージェントを Claude Agent SDK に移行し、その管理された harness に eligibility-lookup サービスの実行とループの駆動を任せる。", "is_correct": false, "why": "Agent SDK は実際に管理された agentic loop を実行し、カスタムツールもサポートするため、架空ではなく現実に成立する代替アーキテクチャである。しかし本問は、Messages API 上で既に開始した実行においてアプリケーションが次に何をすべきかを問うている。SDK の採用は harness がオーケストレーションを握るマイグレーションであり、アプリケーション自身の次の一手を説明するものではない。"}, {"text": "system prompt に、Claude が自ら eligibility-lookup サービスを実行し、結果を次の応答に組み込むよう指示するルールを追加する。", "is_correct": false, "why": "プロンプトによる解決策だが、失敗する。理由は、モデルにできるのは tool_use 要求の発行だけで、自身の assistant turn の中でコードを実行したり tool_result を生成したりすることはできないからだ。ツールの実行は決定論的なアプリケーション側のロジックであり、モデルに指示を出しても実際にサービスが動くことはなく、本物のデータは戻らず、ループは前に進まない。"}, {"text": "eligibility-lookup サービスを実行した後、出力だけを引き継ぐ新しい会話でモデルを再呼び出し、それより前の推論ターンは省く。", "is_correct": false, "why": "実際のサービスを実行してモデルを再呼び出すため、一見すると正解に近い。しかし新しい会話を始めると、ツール要求を生み出したマルチターンのコンテキストが失われる。tool-use ループは同じ会話の中で継続しなければならず、そうしてはじめてモデルは最初からやり直すことなく同じタスク状態から再開できる。"}], "explanation": "エージェントを Messages API 上に直接構築する場合、オーケストレーションループはアプリケーションが所有する。Claude が tool_use block を返したら、アプリケーションは該当ツールを実行し、その出力を（対応する tool_use_id を持つ）tool_result block として次の user message に含めて返し、再度モデルを呼び出す。このループは stop_reason が end_turn になるまで繰り返される。ユーザー定義ツールに対してモデルが行うのは要求の発行だけ。実行はアプリケーションの仕事であり、自身のコードでサービスを動かすのが API が要求する通りの振る舞いだ。\\n\\n他の選択肢がダメな理由: B（Agent SDK）は実際に管理された loop を実行し、カスタムツールもサポートする。しかし SDK の採用は harness がオーケストレーションを握るマイグレーションであり、既に始まっている実行におけるアプリケーション自身の次の一手を説明しない。C はプロンプトによる解決策。これが失敗するのは、モデルにできるのは tool_use 要求の発行のみで、自身の assistant turn 内でコードを実行したり tool_result を生成したりすることはできないからだ。ツールの実行は決定論的なアプリケーション側のロジックであり、モデルに指示してもサービスは動かず、ループは前に進まない。D はサービスを実行してモデルを再呼び出しはするが、新しい会話で行うため、要求を生み出したマルチターンのコンテキストが失われる。ループは同じ会話内で継続しなければならず、それによりモデルは同じタスク状態から再開できる。\\n\\n共通の教訓: Messages API 上では、実行とループ制御に対する完全な権限と完全な責任はアプリケーションにある。毎回必ず発生すべき処理を、モデルが自発的に選ぶことに依存させてはいけない。"}, {"qid": "exam1-q52", "domain": "Applications and Integration", "type": "mc", "scenario": "ツールチームが、lookup skill と PreToolUse で secret をブロックする hook をバンドルした Claude Code plugin を開発しており、現在も毎日イテレーションを回している。4人のエンジニアが各自のマシンで最新ビルドを実行し、編集から稼働中のセッションへの反映までを最短で確認できる必要がある。どのアプローチが最適か。", "options": [{"text": "plugin development loader を使う: 各セッションを `claude --plugin-dir ./plugin` で起動し、編集のたびに `/reload-plugins` を実行する。install 不要で、セッション内に最新ビルドが反映される。", "is_correct": true, "why": "これは公式ドキュメントに記載された plugin の local development flow である。`--plugin-dir` は unpacked な plugin ディレクトリを install なしでセッションに読み込み、`/reload-plugins` がセッション内で最新の編集内容に差し替える。marketplace も install cycle も不要で、編集から稼働までの最短経路となる。"}, {"text": "plugin を共有の git repository に local marketplace として配置する。各マシンで `/plugin marketplace add` と `/plugin install` を実行し、チームが変更を push するたびに `/plugin update` を実行する。", "is_correct": false, "why": "もっともらしく、完全にドキュメントに記載された方法である。git-backed な local marketplace はチーム共有の標準的な手段であり、全エンジニアが plugin を入手できる。ただし各イテレーションで push に加えて `/plugin update`（または再 install）が必要になり、セッション内 reload ではなく install cycle が発生するため、編集から稼働までの経路が長くなる。"}, {"text": "plugin のバンドルを解除し、各構成要素をエンジニア各人のマシンに standalone 設定としてデプロイする: skill は `.claude/skills/` 配下、hook は `.claude/settings.json` に配置し、変更のたびにファイルを再同期する。", "is_correct": false, "why": "もっともらしい。`.claude/skills/` と `.claude/settings.json` の hook は実際の standalone 設定面であり、各コンポーネントは機能し続ける。しかしバンドルが失われ（namespace も version field も単一ユニットもない）、変更のたびに1つのディレクトリを reload するのではなく、4台のマシンに対して手動でファイルを再同期しなければならない。"}, {"text": "plugin のファイルを `@path` 参照でチーム共有の `CLAUDE.md` に import し、Claude に対して skill を適用し、すべての tool call で hook のルールを強制するよう指示する。", "is_correct": false, "why": "もっともらしい。`CLAUDE.md` は `@path` による import をサポートし、毎セッションの挙動を形成する。しかし import はファイルの内容をテキストコンテキストとして注入するだけであり、実行可能な plugin コンポーネントとして登録はしない。そのため skill は単なる提案にすぎず、PreToolUse hook は決定的に発火することはない。挙動を制御するコンテキストであり、plugin loader ではない。"}], "explanation": "最適なのは plugin development loader である。`--plugin-dir` は unpacked な plugin ディレクトリを install なしでセッションに読み込み、`/reload-plugins` がバンドルされた skill と hook をセッション内で最新の編集内容に差し替える。marketplace も install step も不要で、変更から稼働中のセッションまで最短の経路となる。他の選択肢はいずれも実際の仕組みを使っているが、経路が長くなる。git-backed な local marketplace（B）はドキュメントに記載されたチーム共有の手段であり、plugin を全マシンに行き渡らせることはできる。しかし各イテレーションで push に加えて `/plugin update` が必要で、セッション内 reload ではなく install cycle となる。standalone の `.claude/` 設定面へのバンドル解除（C）はコンポーネントを機能させ続けるが、バンドルされたユニットを失う — namespace も version field も単一の reload 対象もなく、変更のたびに各マシンへ手動で再同期しなければならない。`CLAUDE.md` の `@path` によるファイルの import（D）は LLM 流の解決策である。テキストコンテキストを注入するだけなので、skill はモデルがスキップ可能な提案になり、PreToolUse hook は決定的に発火しない。本問が問う核心の区別: local plugin loader のみが、install や publish の cycle なしに、バンドルされた hot-reload 可能な単一ユニットをチームに提供する。"}, {"qid": "exam1-q53", "domain": "Claude Code", "type": "mc", "scenario": "プラットフォームチームは、多数のメンバーが交代で参加する中、Claude Code を使って大規模な内部 SDK を保守している。各セッション開始時にリポジトリを再分析することなく、ビルドコマンド・テストの実行方法・規約を Claude に把握させ、同時に次のレビュー担当者が追える記録を残したい。このワークフローを最もよく支えるプラクティスはどれか。", "options": [{"text": "リポジトリ内でバージョン管理される CLAUDE.md を保守し、ビルドコマンド・テストの実行方法・アーキテクチャ規約を記録する。", "is_correct": true, "why": "CLAUDE.md は Claude Code の永続的なプロジェクトメモリである。リポジトリ内に存在し、各セッション開始時に自動で読み込まれ、コードと並べてバージョン管理・差分比較できる。Claude はすでに規約を把握した状態で作業を再開し、すべてのレビュー担当者は Claude が従った同じ指示を読める。ローテーションチームが求める、永続的でチーム共有の信頼できる唯一の情報源となる。"}, {"text": "最も高性能なモデルと extended thinking を標準採用し、各セッション開始時にリポジトリから規約を再構築させる。", "is_correct": false, "why": "より高性能なモデルと extended thinking は確かにリポジトリから規約を再構築できるため、一見十分に見える。しかし、プロジェクトのガイダンスをモデルの裁量と毎セッションの再導出に完全に依存させ、完了済みの分析をやり直してトークンを無駄に消費する。レビュー担当者が読める書面記録も残らない。確率的でモデルの裁量に依存する対策である。"}, {"text": "プロジェクト用に1つの長期間維持される会話を保持し、context window が一杯になるたびに /compact を実行して、要約をセッション間で引き継ぐ。", "is_correct": false, "why": "/compact は実際の Claude Code コマンドだが、本来は1つの会話が context 制限に近づいても継続できるよう、以前のターンを要約するために存在する。その要約は会話に閉じたもの（他のレビュー担当者はトランスクリプトを読まなければ見えない）で、設計上どうしても情報が欠落し、ロールバックポイントも持たない。そのため再開要件も監査要件も満たせない。"}, {"text": "規約を prompt caching で保護される system prompt の先頭部分としてエンコードし、キャッシュされた先頭部分が各セッション開始時に同一のコンテキストを復元することを当てにする。", "is_correct": false, "why": "prompt caching は安定した先頭部分に対するコストとレイテンシを確かに下げる（Claude Code も内部で使用している）。しかしこれは TTL を持つパフォーマンス最適化であり、状態管理システムではない。キャッシュ時点で先頭部分にあった内容だけを保持し、セッション間で実際に何が変わったかは一切扱わず、レビュー担当者が読めるものもチームがロールバックできるものも提供しない。"}], "explanation": "正解は A。CLAUDE.md は Claude Code の永続的なプロジェクトメモリであり、リポジトリ内に存在し、各セッション開始時に自動で読み込まれ、バージョン管理される。そのため Claude はすでに規約を把握した状態で再開し、すべてのレビュー担当者は Claude が従った同じ指示を読める。ローテーションチームにとって、これはあらゆるコンテキストリセットを生き延びる、永続的でチーム共有の信頼できる唯一の情報源となる。\n\n他が不正解の理由: B は確率的な対策である。より高性能なモデルと extended thinking は規約を再構築できるが、毎セッション完了済みの分析をやり直してトークンを無駄に消費し、モデルの裁量に完全に依存し、レビュー担当者が読める書面記録を残さない。C は /compact の誤用であり、本来は1つの会話が context 制限に近づいたときに継続できるよう要約するもの。その要約は会話に閉じたもので、設計上情報が欠落し、他のレビュー担当者からは見えず、ロールバックポイントもない。D は prompt caching を状態管理と混同している。caching は安定した先頭部分のコストとレイテンシを下げるが、TTL を持つパフォーマンス最適化であり、セッション間で何が変わったかを捉えず、レビュー担当者に監査材料を与えない。\n\n判別の原則は、永続的＋バージョン管理対象＋人間が読める形式（CLAUDE.md）と、一時的＋確率的＋モデル内部（再導出・圧縮・キャッシュ）の対比である。Anthropic の Claude Code memory ドキュメント（CLAUDE.md）、および /compact・context window・prompt caching の各リファレンスを参照のこと。\n\n注: CLAUDE.md / Claude Code memory は CCDV-F blueprint（3.1%）において Domain 7 のトピックであるため、ドメインを Applications and Integration から Claude Code（Domain 7）に再分類した。正解選択肢は中立的なメカニズムの説明（シナリオを鏡映する \"so...reviewer can audit\" のような利点節を含まない）とし、各誤答選択肢と構造的に並列にした。シナリオと選択肢は Purcell の密度（約50語のシナリオ、約17〜23語の選択肢）に合わせて圧縮した。"}];
const TOTAL = QUESTIONS.length;
const DOMAIN_ORDER = ["Agents and Workflows", "Applications and Integration", "Claude Code", "Eval, Testing, and Debugging", "Model Selection and Optimization", "Prompt and Context Engineering", "Security and Safety", "Tools and MCPs"];
const TIME_LIMIT = 120*60;
let state = { answers:{}, marked:new Set(), cur:0, finished:false, timeLeft:TIME_LIMIT };
const LS_KEY = 'ccdvf-hardened-exam1';

function load(){ try{ const s=JSON.parse(localStorage.getItem(LS_KEY)); if(s){state.answers=s.answers||{}; state.marked=new Set(s.marked||[]); state.cur=s.cur||0; state.finished=s.finished||false; state.timeLeft=(s.timeLeft!=null)?s.timeLeft:TIME_LIMIT;} }catch(e){} }
function save(){ localStorage.setItem(LS_KEY, JSON.stringify({answers:state.answers, marked:[...state.marked], cur:state.cur, finished:state.finished, timeLeft:state.timeLeft})); }

function correctIdx(q){ return q.options.map((o,i)=>o.is_correct?i:-1).filter(i=>i>=0); }
function isCorrect(qid){ const q=QUESTIONS[qid]; const ans=state.answers[qid]||[]; const corr=correctIdx(q); if(q.type==='mc'){ return ans.length===1 && corr.includes(ans[0]); } const as=new Set(ans); return corr.length===as.size && corr.every(i=>as.has(i)); }

function renderPalette(){ const p=document.getElementById('palette'); p.innerHTML=''; QUESTIONS.forEach((q,i)=>{ const c=document.createElement('div'); c.className='cell'; if(state.answers[i]&&state.answers[i].length) c.classList.add('ans'); if(state.marked.has(i)) c.classList.add('flag'); if(i===state.cur) c.classList.add('cur'); if(state.finished&&!isCorrect(i)) c.classList.add('incorrect'); c.textContent=i+1; c.style.position='relative'; c.onclick=()=>{state.cur=i; render();}; p.appendChild(c); }); }

function render(){ if(state.finished){ renderResults(); return; } document.getElementById('exam').classList.remove('hidden'); document.getElementById('results').classList.add('hidden'); renderPalette(); const q=QUESTIONS[state.cur]; const ans=state.answers[state.cur]||[]; const typeLbl=q.type==='mr'?'複数選択':'単一選択'; const mk=state.marked.has(state.cur); let oh=''; q.options.forEach((o,i)=>{ const sel=ans.includes(i)?'sel':''; const inp=q.type==='mc'?`<input type="radio" name="q${state.cur}" ${ans.includes(i)?'checked':''}>`:`<input type="checkbox" ${ans.includes(i)?'checked':''}>`; oh+=`<label class="${sel}" data-i="${i}">${inp}<span>${o.text}</span></label>`; }); document.getElementById('qpanel').innerHTML=` <div class="qmeta"><span>Question ${state.cur+1}</span><span class="pill ${q.type==='mc'?'mc':''}">${q.domain}</span><span class="pill">${typeLbl}</span><button class="markbtn ${mk?'on':''}" onclick="toggleMark()">${mk?'★ Marked':'☆ Mark'}</button></div> <div class="scenario"><div class="lead">問題</div>${q.scenario}</div> <div class="opts" id="opts">${oh}</div>`; document.getElementById('opts').querySelectorAll('label').forEach(l=>{ l.onclick=(e)=>{ const i=+l.dataset.i; if(q.type==='mc'){ state.answers[state.cur]=[i]; } else{ const a=state.answers[state.cur]||[]; const idx=a.indexOf(i); if(idx>=0) a.splice(idx,1); else a.push(i); state.answers[state.cur]=a; } save(); render(); }; }); document.getElementById('qpos').textContent=`${state.cur+1} / ${TOTAL}`; document.getElementById('prevBtn').disabled=state.cur===0; document.getElementById('nextBtn').disabled=state.cur===TOTAL-1; }

function toggleMark(){ if(state.marked.has(state.cur)) state.marked.delete(state.cur); else state.marked.add(state.cur); save(); render(); }
function go(d){ state.cur=Math.max(0,Math.min(TOTAL-1,state.cur+d)); save(); render(); window.scrollTo(0,0); }

function finishExam(){ if(!confirm('Finish the exam? 採点して結果を表示します。')) return; state.finished=true; save(); renderResults(); }
function renderResults(){ document.getElementById('exam').classList.add('hidden'); document.getElementById('results').classList.remove('hidden'); let correct=0; const byDomain={}; const di={}; QUESTIONS.forEach((q,i)=>{ const ok=isCorrect(i); if(ok) correct++; const d=q.domain; byDomain[d]=byDomain[d]||{tot:0,ok:0}; byDomain[d].tot++; if(ok) byDomain[d].ok++; di[i]=ok; }); const pct=Math.round(correct/TOTAL*100); const pass=pct>=72; let rows=DOMAIN_ORDER.filter(d=>byDomain[d]).map(d=>{ const b=byDomain[d]; const p=Math.round(b.ok/b.tot*100); return `<tr><td>${d}</td><td class="num">${b.tot}</td><td class="num">${b.ok}</td><td class="num">${p}%</td><td><div class="bar-cell"><div style="width:${p}%"></div></div></td></tr>`; }).join(''); let cards=QUESTIONS.map((q,i)=>{ const ok=di[i]; const ans=state.answers[i]||[]; const corr=correctIdx(q); let oh=''; q.options.forEach((o,oi)=>{ let cls='opt'; let pre=''; if(o.is_correct) cls+=' correct'; if(ans.includes(oi)&&!o.is_correct){ cls+=' you-wrong'; } oh+=`<div class="${cls}">${o.text}<div class="why">${o.why}</div></div>`; }); const mk=state.marked.has(i)?`<span class="st marked">Marked</span>`:''; return `<div class="rq" id="rq${i}"><div class="rhead" onclick="this.parentNode.classList.toggle('open')"><span class="st ${ok?'correct':'incorrect'}">${ok?'Correct':'Incorrect'}</span>${mk}<span class="qno">Question ${i+1}</span><span class="pill" style="background:#ecebfb;color:#8710d8;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600">${q.domain}</span><span class="hint">▶ Explain this further</span></div><div class="rbody"><div class="scenario">${q.scenario}</div>${oh}<div class="exp"><b>解説:</b> ${q.explanation}</div></div></div>`; }).join(''); document.getElementById('results').innerHTML=` <div class="results-hero"><div class="score ${pass?'pass':'fail'}">${correct}/${TOTAL} · ${pct}%</div><div class="sub">${pass?'合格（72%以上）':'不合格（72%未満）'} · ${ Object.values(di).filter(x=>x).length } 正答 / ${TOTAL-correct} 不正答</div></div> <h3 style="margin:18px 0 8px">Domains</h3><table class="dtable"><tr><th>Domain</th><th class="num">題数</th><th class="num">正答</th><th class="num">正答率</th><th></th></tr>${rows}</table> <h3 style="margin:24px 0 8px">Question review (クリックで解説展開)</h3> <div class="filters"><button class="on" onclick="filterReview(this,'all')">All</button><button onclick="filterReview(this,'incorrect')">Incorrect</button><button onclick="filterReview(this,'marked')">Marked</button></div> ${cards}`; window.scrollTo(0,0); }
function filterReview(btn,f){ document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); document.querySelectorAll('.rq').forEach((el,i)=>{ let show=true; if(f==='incorrect') show=!isCorrect(i); if(f==='marked') show=state.marked.has(i); el.style.display=show?'':'none'; }); }

function tick(){ if(state.finished) return; if(state.timeLeft>0) state.timeLeft--; const m=Math.floor(state.timeLeft/60), s=state.timeLeft%60; const t=document.getElementById('timer'); t.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s; t.classList.toggle('warn', state.timeLeft<=300); if(state.timeLeft<=0){ state.finished=true; save(); renderResults(); } else save(); }

load();
if(state.finished) renderResults(); else render();
setInterval(tick, 1000);
</script>
</body>
