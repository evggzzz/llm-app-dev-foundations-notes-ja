<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sundog Exam1 — Purcell難易度改題 | CCDV-F 本番シミュレーション</title>
<style>
:root{--udemy:#a435f0;--udemy-d:#8710d8;--ok:#1e8e3e;--bad:#c41e3a;--warn:#b26a00;
--bg:#f7f8fa;--card:#fff;--ink:#1c1d1f;--sub:#6a6f73;--line:#d1d7dc;--sel:#e6f0fa;}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;
background:var(--bg);color:var(--ink);line-height:1.7;font-size:15px;}
header.bar{position:sticky;top:0;z-index:50;background:var(--ink);color:#fff;padding:10px 20px;
display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
header.bar .title{font-weight:700;font-size:15px;}
header.bar .timer{background:rgba(255,255,255,.12);padding:6px 14px;border-radius:6px;font-family:"SF Mono",Menlo,monospace;font-size:15px;font-weight:600;}
header.bar .timer.warn{background:var(--bad);}
header.bar .spacer{flex:1;}
header.bar button{background:var(--udemy);color:#fff;border:none;padding:8px 18px;border-radius:6px;font-weight:700;cursor:pointer;font-size:14px;}
header.bar button:hover{background:var(--udemy-d);}
.wrap{max-width:980px;margin:0 auto;padding:20px;}
.qmeta{color:var(--sub);font-size:13px;margin-bottom:8px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.qmeta .pill{background:#ecebfb;color:var(--udemy-d);padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;}
.qmeta .pill.mc{background:#e6f4ea;color:var(--ok);}
.qmeta .markbtn{margin-left:auto;background:none;border:1px solid var(--line);border-radius:6px;padding:3px 10px;cursor:pointer;font-size:12px;color:var(--sub);}
.qmeta .markbtn.on{background:#fff3cd;color:var(--warn);border-color:var(--warn);}
.scenario{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:20px 24px;margin-bottom:16px;font-size:15.5px;}
.scenario .lead{font-weight:700;margin-bottom:6px;color:var(--udemy-d);}
.opts label{display:block;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:14px 18px;margin-bottom:10px;cursor:pointer;transition:.12s;}
.opts label:hover{border-color:var(--udemy);}
.opts input{margin-right:10px;}
.opts label.sel{border-color:var(--udemy);background:var(--sel);}
.opts label.ans-ok{border-color:var(--ok);background:#e6f4ea;}
.opts label.ans-bad{border-color:var(--bad);background:#fde7ea;}
.opts label.ans-miss{border-color:var(--warn);background:#fff3cd;}
.nav{display:flex;justify-content:space-between;align-items:center;margin:24px 0;gap:10px;flex-wrap:wrap;}
.nav button{background:var(--card);border:1px solid var(--line);padding:9px 22px;border-radius:6px;cursor:pointer;font-weight:600;color:var(--ink);}
.nav button:disabled{opacity:.4;cursor:not-allowed;}
.nav button.primary{background:var(--udemy);color:#fff;border-color:var(--udemy);}
.palette{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:18px;}
.palette .ptitle{font-size:12px;color:var(--sub);margin-bottom:8px;}
.palette .cells{display:flex;flex-wrap:wrap;gap:6px;}
.palette .cell{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:6px;cursor:pointer;font-size:13px;background:var(--card);}
.palette .cell.ans{background:#e6f4ea;border-color:var(--ok);color:var(--ok);}
.palette .cell.flag::after{content:"★";color:var(--warn);position:absolute;transform:translate(11px,-11px);font-size:10px;}
.palette .cell.cur{outline:2px solid var(--udemy);}
.palette .cell.incorrect{background:#fde7ea;border-color:var(--bad);}
.hidden{display:none;}
/* Results */
.results-hero{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:28px 32px;margin-bottom:20px;}
.results-hero .score{font-size:42px;font-weight:800;}
.results-hero .pass{color:var(--ok);} .results-hero .fail{color:var(--bad);}
.results-hero .sub{color:var(--sub);font-size:14px;margin-top:4px;}
.dtable{width:100%;border-collapse:collapse;font-size:13.5px;background:var(--card);}
.dtable th,.dtable td{padding:9px 11px;border-bottom:1px solid var(--line);text-align:left;}
.dtable th{background:#f0f1f3;color:var(--sub);font-weight:600;}
.dtable td.num{text-align:center;font-variant-numeric:tabular-nums;}
.bar-cell{background:#eee;border-radius:4px;height:8px;overflow:hidden;}
.bar-cell>div{height:100%;background:var(--ok);}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0;}
.filters button{background:var(--card);border:1px solid var(--line);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;}
.filters button.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.rq{background:var(--card);border:1px solid var(--line);border-radius:8px;margin-bottom:12px;overflow:hidden;}
.rq>.rhead{padding:12px 18px;display:flex;gap:10px;align-items:center;cursor:pointer;}
.rq>.rhead .st{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;}
.rq>.rhead .st.correct{background:#e6f4ea;color:var(--ok);}
.rq>.rhead .st.incorrect{background:#fde7ea;color:var(--bad);}
.rq>.rhead .st.marked{background:#fff3cd;color:var(--warn);}
.rq>.rhead .qno{font-weight:700;}
.rq>.rhead .hint{margin-left:auto;color:var(--sub);font-size:12px;}
.rq.open>.rbody{display:block;}
.rbody{display:none;padding:0 18px 16px;}
.rbody .scenario{margin-bottom:12px;}
.rbody .opt{padding:10px 14px;border:1px solid var(--line);border-radius:6px;margin-bottom:7px;font-size:14px;position:relative;}
.rbody .opt.correct{border-color:var(--ok);background:#e6f4ea;}
.rbody .opt.correct::before{content:"✓ 正解";color:var(--ok);font-weight:700;font-size:11px;position:absolute;top:8px;right:10px;}
.rbody .opt.you-wrong{border-color:var(--bad);background:#fde7ea;}
.rbody .opt.you-wrong::before{content:"✗ あなたの選択";color:var(--bad);font-weight:700;font-size:11px;position:absolute;top:8px;right:10px;}
.rbody .opt .why{font-size:12.5px;color:var(--sub);margin-top:4px;}
.rbody .exp{background:#f7f8fa;border-left:3px solid var(--udemy);padding:10px 14px;border-radius:0 6px 6px 0;font-size:13.5px;margin-top:10px;}
.footer{text-align:center;color:var(--sub);font-size:12px;margin:30px 0 60px;}
</style>
</head>
<body>
<header class="bar">
  <div class="title">CCDV-F Practice Exam 1 — Purcell Hardened</div>
  <div class="timer" id="timer">120:00</div>
  <div class="spacer"></div>
  <button id="finishBtn" onclick="finishExam()">Finish Exam</button>
</header>
<div class="wrap">
  <!-- Exam view -->
  <div id="exam">
    <div class="palette">
      <div class="ptitle">Question palette ★=Marked</div>
      <div class="cells" id="palette"></div>
    </div>
    <div id="qpanel"></div>
    <div class="nav">
      <button id="prevBtn" onclick="go(-1)">◀ Prev</button>
      <span id="qpos" style="color:var(--sub);font-size:13px"></span>
      <button id="nextBtn" class="primary" onclick="go(1)">Next ▶</button>
    </div>
  </div>
  <!-- Results view -->
  <div id="results" class="hidden"></div>
  <div class="footer">Sundog Exam1 を Purcell 難易度（厳しい distractor）に改題したオリジナル問題集 · 解説は Anthropic 公式 doc 準拠 · 53問</div>
</div>
<script>
const QUESTIONS = [{"qid": "exam1-q1", "domain": "Agents and Workflows", "type": "mc", "scenario": "あるリーガルテック企業が、ヘッドレスの Claude Agent SDK ジョブ（Claude Sonnet 5）を運用している。このジョブは社内の監査メモのディレクトリを走査し、redaction manifest（秘匿化マニフェスト）を出力する。ファイルの読み取りと検索は許可されるが、シェルコマンドの実行やファイルの変更は一切禁止されている。プロトタイプでは `allowedTools: [\"Read\", \"Grep\", \"Glob\"]` を設定し、`permissionMode: \"bypassPermissions\"` で起動している。しかしステージング環境では、Claude が時折 `Bash` を提案し（好みの `grep` フラグを使うため）、その呼び出しが実際に実行されてしまう。セキュリティ要件として、ファイルを変更するツールやシェルツールは一切実行できないこと、さらに将来のデバッグセッションでモードが `bypassPermissions` に戻った場合でもこの保証が維持されなければならない。読み取り専用の境界を決定論的（deterministic）かつモード非依存（mode-independent）で保証する変更はどれか。", "options": [{"text": "設定はそのまま変更せず、system prompt で境界を強化する。`Bash` やファイル書き込みツールの提案を明示的に禁止し、Claude がそのような操作を拒否する few-shot 例を追加する。", "is_correct": false, "why": "System prompt の禁止指示や few-shot 例は遵守確率を高めるが、決定論的な保証はできない。`bypassPermissions` 下では、Claude が `Bash` や書き込みツールを提案してしまった場合にそれをブロックする仕組みが SDK 側に存在しないため、境界は単なる勧告に過ぎない。プロンプトの強化は遵守へのナッジであり、強制メカニズムではない。これはモデルの裁量に依存する罠であり、モードがすべてを自動承認する状況では何の保証も与えない。"}, {"text": "`permissionMode` を `\"dontAsk\"` に切り替え、`allowedTools: [\"Read\", \"Grep\", \"Glob\"]` は維持したまま、他のルールは追加しない。", "is_correct": false, "why": "`dontAsk` はドキュメントでロックダウンモードとして説明されており、CI/CD で有用なのは `allowedTools` に含まれないツールをプロンプトで確認せず拒否するからである。モードが `dontAsk` である間は境界は維持される。しかし要件は将来 `bypassPermissions` に戻った後も保証が維持されることを求めており、`allowedTools` は自動承認リストであってブロックリストではない。モードが `bypassPermissions` に戻った瞬間、リスト外の `Bash` のようなツールは再び自動承認されてしまう。この選択肢が与える保護は実在するが、完全にモード依存である。"}, {"text": "`disallowedTools: [\"Bash\", \"Write\", \"Edit\"]` を追加し、防御を深める（defense in depth）ために `dontAsk` のような制限的なモードと併用する。", "is_correct": true, "why": "Permission rules は選択したモードの上に重ねて適用される。モードに関わらず、deny ルールは常に allow ルールより優先され、`bypassPermissions` — 他のすべてを自動承認してしまう唯一のモード — の下でも deny ルールは強制される。したがって `disallowedTools` で `Bash`、`Write`、`Edit` を指定すれば、モードが `bypassPermissions` であれ `dontAsk` であれ、それらをブロックできる。これにより読み取り専用の境界が決定論的かつモード非依存になる。`dontAsk` との併用は防御を深め、そのモードが有効な間はリスト外の他のツールも拒否する。"}, {"text": "`permissionMode: \"plan\"` でジョブを実行する。plan mode はドキュメントで読み取り専用とされているため。", "is_correct": false, "why": "Plan mode は有効な間は確かに読み取り専用であり、それがプラン作成の目的である。しかし plan mode も「モード」の一つであり、モード非依存な保証は提供しない。将来のデバッグセッションで `bypassPermissions` に戻った瞬間、読み取り専用の制限も同時に外れてしまう。さらに plan mode はアクセス制御の境界ではなく計画支援ツールであり、要件の真の要求である「モードに関わらずこれらのツールをブロックせよ」を表現できない — それは deny ルールにしかできない。"}], "explanation": "Claude Agent SDK の permission rules は選択したモードの上に重ねて適用される。モードに関わらず、deny ルールは常に allow ルールより優先され、`bypassPermissions` — 他のすべてを自動承認するモード — の下でも強制される。したがって `disallowedTools: [\\\"Bash\\\", \\\"Write\\\", \\\"Edit\\\"]` を追加すれば、どのモードが有効であってもこれらのツールをブロックできる。これが、将来 `bypassPermissions` に戻った後も境界が維持されるという要件を満たす唯一の選択肢である。\n\n他の選択肢はそれぞれ異なる理由で失敗する。System prompt の禁止指示と few-shot 例による強化は確率論的であり、Claude が遵守する可能性を高めるものの、`bypassPermissions` 下では Claude が呼び出しを発してしまった場合にそれを強制する仕組みがない。`dontAsk` への切り替えと `allowedTools` のみの運用は、モードが `dontAsk` である間のみ有効である。`allowedTools` は自動承認リストでありブロックリストではないため、モードが `bypassPermissions` に戻った瞬間、リスト外の `Bash` のようなツールは再び自動承認されてしまう。Plan mode は有効な間は読み取り専用だが、やはりモードの一つであり、モードが変わった瞬間に保護は消滅する。Plan mode は計画支援であり、セキュリティ境界ではない。\n\n無条件に維持されなければならない要件に関する一般原則: モデルが遵守を選択すること（プロンプト）や、単一の設定可能なモード（`dontAsk`、`plan`）に依存すべきではない。deny ルールによって強制すべきである。deny ルールは permission hierarchy においてモードの上に位置し、したがって `bypassPermissions` を上書きする。"}, {"domain": "Agents and Workflows", "explanation": "アクションを予防しなければならない制御では、強制の仕組みはツールの実行前に動作し、かつ決定論的なコードでなければならない。PreToolUse は Bash 呼び出しの実行前に発火し、それを拒否する判定を返せるため、モデルが何を出力してもデータベースコマンドは実行されない。決定論的でかつ実行前である唯一の選択肢だ。各誤答は異なる理由で不適切となる。system prompt のルールは確率的であり、PostToolUse hook はメカニズムの系統は正しいがイベントが違い、コマンド実行後にしか発火しない（予防ではなく検知）。そして Bash の prefix allowlist はコマンド内容を検査できないため、任意のコマンドに埋め込まれたデータベース呼び出しがすり抜けてしまう。", "options": [{"is_correct": true, "text": "Bash ツールに PreToolUse hook を登録し、実行前に各コマンドを検査して、本番環境の決済データベースを対象とする呼び出しをすべて拒否する。", "why": "PreToolUse は SDK が Bash ツールの実行前に発火する決定論的なコールバックであり、コマンドを検査して呼び出しを拒否する判定を返せる。そのためデータベースを対象とするコマンドは決して実行されない。強制はモデルの制御下にない SDK のコードによって毎回の呼び出しで適用され、実行前に動く。だからこそ検知ではなく予防になる。"}, {"is_correct": false, "text": "system prompt にルールとコンプライアンス遵守の診断例を記述し、エージェントの返信で本番データベースを避けたことを確認させる。", "why": "具体例付きの system prompt のルールは振る舞いを誘導するだけだ。データベースを回避する確率は上がるが、モデルが出力するコマンドそのものを防ぐことはできない。また返信レベルの確認は、実際に動くチェックではなくモデルの自己申告にすぎない。これはガイダンスであり、強制ではない。"}, {"is_correct": false, "text": "Bash ツールに PostToolUse hook を登録し、各コマンドの結果を検査して、本番環境の決済データベースにアクセスした場合は実行を中断する。", "why": "実在する hook ではあるが、PostToolUse は Bash ツールの完了後にしか発火しない。そのため、hook が結果を検査して中断する前に、コマンドはすでにデータベースに対して実行されている。メカニズムは正しいがイベントが違う。事後検知であり、予防ではない。"}, {"is_correct": false, "text": "Bash を permission の prefix allowlist として構成し、承認済みのコマンド prefix のみを許可し、psql や mysql などのデータベースクライアントの prefix を除外する。", "why": "permission システムは prefix パターンを受け付けるが、prefix マッチングはコマンドの先頭しか確認しない。データベースへのアクセスは、スクリプト、ヒアドキュメント、間接呼び出し、prefix がフィルタを通過する言語ランタイム経由でも可能だ。コマンドの内容を検査できない allowlist では予防を保証できない。"}], "qid": "exam1-q2", "scenario": "サイトリライアビリティチームが、Claude Agent SDK 上で社内エージェントを運用している。エージェントはインフラに対してシェルコマンドを実行し、そのインフラには本番環境の決済データベースが含まれる。コンプライアンス要件として、そのデータベースに対するいかなるコマンドの実行も禁止されている。求められるのは事後検知ではなく予防だ。エージェントは他システムに対する診断を実行する必要があるため、Bash へのアクセスは維持する。全ツール呼び出しにおいてこれを保証として強制できる実装はどれか。", "type": "mc"}, {"qid": "exam1-q3", "domain": "Model Selection and Optimization", "type": "mc", "scenario": "DevSecOps チームが、受信するすべての pull request を検査する自動コードレビューサービスを運用している。各呼び出しでは Claude に同じ社内セキュアコーディング規約（38ページのドキュメント）と、脆弱なコードと安全なコードを対比させた同じ6つの注釈付きサンプルを送り、続けてその pull request の diff と、セキュリティリスクをフラグ付けする指示を送る。レビューポリシーは全リクエストで同一に保つ必要がある。チームは繰り返し発生する input コストとレビューごとのレイテンシを削減したい。最も効果的な単一の変更はどれか。", "options": [{"text": "規約とサンプルのブロックの末尾に1つの cache_control breakpoint を置き、各 diff はそのキャッシュ済み prefix の後に送信する。", "is_correct": true, "why": "Prompt caching は厳密な prefix ベースで動作する。cache_control breakpoint までのすべての token が直近のリクエストとバイト単位で一致してはじめて cache hit となり、以降その prefix は base input price の約10%で読み込まれ、再処理されない。そのためコストと time-to-first-token が両方下がる。規約と6つのサンプルはレビュー間で同一だが各 diff は異なるため、breakpoint は安定したコンテンツすべての末尾に置くべきで、diff は cache されない suffix として後に続ける。"}, {"text": "まず Haiku を呼び出して38ページの規約を1ページの要約に圧縮し、毎回のレビューではその要約・サンプル・diff だけを送信する。", "is_correct": false, "why": "もっともらしい—prompt が小さければ1呼び出しあたりのコストは下がるし Haiku は安価で高速だから—が、独自のレイテンシとコストを持つ追加リクエストを生み、レビュアーが微妙な違反を見抜くために必要な詳細を恒久的に失い、毎呼び出しで要約とサンプルを全文再送する。これは確率論的で劣化を伴う圧縮であり、決定論的な cache 読み込みなら完全な精度の規約をより低い実効価格で保持できる。"}, {"text": "messages 呼び出しで streaming を有効にし、レビューを token ごとに配信して最初の token が早く現れるようにする。", "is_correct": false, "why": "もっともらしい—streaming は出力を生成しながら送出するので体感レイテンシは下がる—が、38ページ全体の prefix が処理されないと最初の token は現れず、その prefill は毎呼び出しで input price 全額で再課金される。streaming は出力の配信にしか影響せず、caching が取り除く繰り返しの input コストや入力処理レイテンシには何も作用しない。"}, {"text": "cache_control でセキュアコーディング規約だけをマークし、6つのサンプルと各 diff は毎呼び出しで新しいコンテンツとして送信する。", "is_correct": false, "why": "一部は正しいので誘惑的—規約は cache され安価に読み込まれる—が、6つのサンプルもレビューごとに同一のため、breakpoint の後に置くと毎回 input price 全額で再課金され、約10%での cache 読み込みを逃す。breakpoint は安定したコンテンツすべての末尾に置くべきであり、最大の1ピースの末尾に置くべきではない。"}], "explanation": "Prompt caching はリクエストを過去に cache されたコンテンツと厳密な prefix で照合する。cache_control breakpoint までのすべての token が直近のリクエストと一致してはじめて cache hit となり、以降その prefix は base input price の約10%で読み込まれ、再処理されないため、コストと time-to-first-token が両方下がる。最初の条件を満たすリクエストが prefix を cache に書き込む（cache_creation_input_tokens、base input より割増課金）。TTL 内の後続リクエストはすべてそれを読み込む（cache_read_input_tokens、約90%引き）際、cache_creation_input_tokens はゼロになり、breakpoint 後のリクエストごとに異なるコンテンツは regular input_tokens として全額課金される。このレビューサービスでは規約と6つのサンプルはレビュー間で同一だが各 pull request の diff は異なるため、breakpoint は規約とサンプルのブロックの末尾に置くべきであり、diff は cache されない suffix として後に続けなければならない。エンジニアはこれを、cache_read_input_tokens が上昇し cache_creation_input_tokens がゼロに下がり、diff が response の usage オブジェクトで全額課金の regular input_tokens として現れるのを確認し、呼び出しを5分の TTL 内に収める（レビューの間隔が空く場合は1時間の TTL に切り替える）ことで検証する。他の選択肢は目標の一部しか達成しない。Haiku の要約前処理は prompt を縮めるが round-trip を増やし、精度を失い、毎呼び出しで圧縮済みの素材を再課金する。streaming は出力配信を短縮するが prefix 全体の prefill コストとレイテンシには触れない。規約だけを cache すると最大のブロックは安価に読み込めるが、同じく安定したサンプルを無駄に全額再課金する。安定したコンテンツ全体に単一の breakpoint を置くことが実現する決定論的かつ prefix 全体にわたる節約を、他の選択肢はいずれも提供できない。"}, {"qid": "exam1-q4", "domain": "Applications & Integration", "type": "mc", "scenario": "Marsten Freight 社では、配送ディスパッチャーが自由形式の配達メモを貼り付けます。各メモは、型付きの JSON オブジェクト（トラッキング参照・約30個のコードからなる固定リストから選ぶ例外理由・1行のフォローアップ）に変換され、列が型付きかつ non-nullable のデータベーステーブルに直接書き込まれます。有効な JSON でない、あるいはフィールドの欠落や型違いがあるレスポンスは、INSERT に失敗します。このジョブは毎回 schema-valid なオブジェクトを出力しなければなりません。どのアプローチがそれを最も確実に保証しますか？", "options": [{"text": "Structured Outputs に3つのフィールドと reason enum を含む JSON schema を設定し、レスポンスがそれに一致するように制約する。", "is_correct": true, "why": "Structured Outputs は制約付きデコード（constrained decoding）を適用するため、レスポンスは生成時点で schema に対する validation を強制される。つまり schema validity は構造的に保証され、モデルが従うかどうかに依存しない。"}, {"text": "system prompt で Claude に対し、これら3つのフィールドを持つ JSON オブジェクトだけを返すよう指示し、具体例（few-shot）で補強する。", "is_correct": false, "why": "few-shot 例付きの system prompt 指示は well-formed な出力の確率を上げるが、依然として確率的である。例とは異なるメモが来た場合、モデルは非 JSON を出力したり、フィールドを落としたり、値の型を間違えたりする可能性が残る。prompt 側の技法は振る舞いを形作るだけであり、schema を強制しない。"}, {"text": "利用可能な最も能力の高いモデルに切り替え、より強力な instruction-following で毎回 well-formed な JSON を生成させる。", "is_correct": false, "why": "より能力の高いモデルは一致性を向上させるが、instruction-following は依然として確率的であり、モデルは無効な JSON を出力したり必須フィールドを省略したりする可能性がある。capability の選択は enforcement 機構ではない。"}, {"text": "Claude の assistant turn の冒頭を JSON オブジェクトの開始部分で prefill し、そのまま JSON に続けさせる。", "is_correct": false, "why": "assistant turn の prefill はモデルに JSON で始めさせるよう誘導するが、制約されるのは冒頭のトークンだけである。以降の生成は形式崩れ・切り詰め・必須フィールドの欠落を起こしうる。prefill はレスポンスの冒頭を形作るだけであり、schema validity は保証しない。さらに現行の flagship モデルでは assistant prefill は完全に削除されている。"}], "explanation": "唯一の違いは、決定論的な schema enforcement か、確率的な prompt 側・モデル側のアプローチか、という点である。downstream のシステムが毎回 schema-valid なオブジェクトを必要とする場合、Structured Outputs（messages.create() 上で output_config: {format: {type: \\\"json_schema\\\"}} として設定）が、そのために設計された機構である。制約付きデコードが最終レスポンスをトークンレベルで schema に validate することを強制するため、validity はモデルが従うかどうかに依存しない。他の選択肢はどれも validity をモデルの判断に委ねてしまう。few-shot 例付きの system prompt 指示（B）は確率を改善するが保証はできない。最も能力の高いモデルへの切り替え（C）も確率的のままであり、instruction-following は enforcement ではない。そして assistant prefill（D）は冒頭のトークンだけを形作る上、現行の flagship では完全に削除されている。これは決定論 vs 確率論というパターンそのものを映している。毎回成り立つべきことは、モデルがそうすることを選ぶかに依存してはならない。"}, {"qid": "exam1-q5", "domain": "Applications and Integration", "type": "mr", "scenario": "あるリーガルテックチームが、Claude を活用した契約書レビューワークフローをパイロットから本番へ移行しようとしている。このワークフローは、契約条項を分類するカスタム Agent Skill（`clause-router`）と、同社の redline-policy ルールを組み込んだ共有 prompt template を使っている。プラットフォームチームは、安定したリリース、再現性のあるテスト、安全な長期保守を担う。これらの目標を最も推進するアクションは次のうちどれか、2つ選べ。", "options": [{"text": "本番環境を、Skill と prompt template の両方の不変な content-addressed リビジョン（例えばリリースパイプラインがビルド元とした Git SHA）に固定し、作業中の編集は別の開発ワークスペースで行う。", "is_correct": true, "why": "Agent Skills はファイルシステム/プラグインの artifact であり、prompt は管理対象の設定である。Anthropic は両者を、ホストされたポインタが解決するテキストではなく、本番昇格前にバージョン管理して検証すべき artifact として扱う。自分が定義した content-addressed リビジョンに本番を固定すると、意図的なリリース境界ができる。つまりそのリビジョンを bump したときだけ挙動が変わる。これが、パイロットから本番へのリリースに必要な再現性をもたらす。"}, {"text": "`SKILL.md`、prompt template、回帰評価スイートをまとめてバージョン管理に格納し、新しいリビジョンが本番に届く前に eval の実行が通ることと tagged release を必須とする。", "is_correct": true, "why": "これはアプリケーションコードに適用するリリースライフサイクルを、prompt と Skill にも適用するという発想である。commit → 固定スイートで評価 → tag → promote。Anthropic は、prompt や agent の変更を promote する前に eval を実行することを推奨している。これにより、トレーサビリティ（artifact → tag）、再現性のあるテスト、rollback が得られる。"}, {"text": "extended thinking を使い、結果を返す前にルーティングされた各条項を redline-policy ルールに対して再検証するパスを追加し、ポリシーの回帰を実行時に自動で検出する。", "is_correct": false, "why": "extended thinking やコンテキスト内の自己検証は正当な品質向上手法だが、確率論的である。出力を生成したのと同じモデルと prompt で検証するため、固定 eval が検出する回帰を見逃す可能性がある。さらに、変更が本番にデプロイされた後でしか検証しない。再現性のあるテストが求める、決定論的で昇格前のゲートは提供できない。何かを毎回必ず実行しなければならない場合に hook が再プロンプトより好まれるのと同じ理由である。"}, {"text": "redline-policy template で extended TTL を使った prompt caching を有効にし、cache された prefix を凍結された本番参照として扱い、予定されたリリースでのみ更新する。", "is_correct": false, "why": "Prompt caching はコストとレイテンシの最適化であり、バージョニングの仕組みではない。cache key は厳密な prefix であり、エントリは有限の寿命（最低5分・使用のたびに更新、extended TTL で最大1時間）を持つ。編集すると自動的に無効化されて書き直され、history も audit trail も rollback path も保持しない。したがって cache された prefix は、凍結された再現可能な artifact ではない。"}, {"text": "モデルを dated snapshot alias に固定してモデル挙動をロックし、Skill と prompt template は本番ワークスペースに single source of truth として保持する。", "is_correct": false, "why": "dated snapshot alias はモデルの重みだけを固定する。prompt、Skill、ツール定義は固定しないため、その場での編集はいずれも artifact も eval も rollback もなく本番挙動を変えてしまう。モデルの安定性には対処するが、プラットフォームチームが担う prompt と Skill のライフサイクルは未管理のままである。さらに snapshot alias 自体も、時間経過で廃止されるとドキュメントに明記されている。"}], "explanation": "Anthropic は prompt、Agent Skills、その他の agent 設定を、その場で気軽に編集するテキストではなく、開発・検証・デプロイ・保守を経る管理対象 artifact として扱う。とりわけ Skills は、ホストされたポインタが解決するものではなく、自分でバージョン管理するファイルシステム/プラグインの artifact である。最も適合する2つのアクションは、Skill と prompt の両方を不変な content-addressed リビジョンに固定すること（A）と、それらの artifact に回帰 eval を加えてバージョン管理に格納し、eval 合格＋tagged release のゲートを通すこと（B）である。両者を組み合わせることで、意図的な昇格境界、再現性のある検証、rollback が実現する。残り3つは本物の有用な Claude 手法だが、それぞれ異なるドメイン固有の理由でリリース管理の要件を満たせない。extended thinking による実行時の自己検証（C）は確率論的であり、変更のデプロイ後にしか動かないため、再現性のあるテストが求める決定論的なゲートにはなれない。これは hooks 対 prompting の保証パターンと同じ理由である。prompt caching（D）はコスト/レイテンシの最適化であり、有限の TTL、history なし、rollback なしを持つため、cache された prefix は凍結されたバージョンではない。そして model snapshot alias の固定（E）はモデルの重みだけを凍結し、prompt と Skill はその場での編集のたびに自由に drift し、alias 自体も最終的に廃止される。"}, {"qid": "exam1-q6", "domain": "Applications and Integration", "type": "mc", "scenario": "社内のサポートツールは、Claude のレスポンスをストリーミングでオンコールエンジニアに配信している。独自の consumer が到着する各イベントの payload をプレーンテキストとして単純に結合する。ステータス更新は正しく表示されるが、tool call の arguments は毎回壊れた状態で到達するため、下流の自動化処理が一度も実行されない。エンジニアへのインクリメンタルな配信は必須要件。チームが最初に思いつくのは system prompt を強化すること。tool call の失敗を正しく解決する修正はどれか。", "options": [{"text": "クライアント側でストリーミングイベントを蓄積して完全な構造化 message を組み立てる。各 tool call を構成する JSON の断片を順次結合し、tool を呼び出す前にその結果を parse する。", "is_correct": true, "why": "streaming を維持したまま実行可能な tool input を得る唯一の修正。Messages API のストリームはテキストストリームではなく、content block ごとに紐づけられた型付きイベントのシーケンスである。tool_use block の arguments は JSON の断片（input_json_delta）として順次到達し、結合して parse してからでないと tool は実行できない。各 block の再構成は決定的でプロトコルレベルの処理なので、自動化は毎回確実に動作する。"}, {"text": "system prompt を強化し、Claude に対して各 tool call を単一の完全な JSON 値として一括で出力するよう明示的に指示する。", "is_correct": false, "why": "プロンプトエンジニアリングとして自然な反射だが、機能しない。wire format は API のトランスポート層が決めるものであり、どんな指示を与えても tool_use の arguments は断片として到達する。さらに、tool は構造化された tool_use content block を通じてのみ実行され、モデルにテキストとして出力させたものからは発火しない。指示をより強く繰り返しても、サーバーが制御するプロトコルを再定義することはできない。"}, {"text": "ストリーミングをやめて完成した状態で届く non-streaming レスポンスに切り替え、クライアント側で各メッセージを chunk に分割してエンジニア向けのライブ感を保つ。", "is_correct": false, "why": "完成した non-streaming メッセージには完全で有効な tool input が含まれるため、malformed な JSON という症状は本当に消える。だから一見きれいな回避策に見える。しかし必須要件が求める真のインクリメンタル配信（time-to-first-token やストリーミング中のキャンセル）を捨てることになり、ストリーミングの consumer 自体も未修正のまま残る。"}, {"text": "各イベントのテキストを content block ごとに index して表示し、JSON の断片は join せずに debug log に書き出す。", "is_correct": false, "why": "イベントを block ごとに index するのは正しい低レベルの直感であり、プレーンテキストも正しく表示できるため、慎重で手堅い選択肢に読める。しかし tool の arguments は断片から結合して parse しないと実行できず、未結合のまま log に書き出しても下流の自動化は以前と同じ壊れた入力のままになる。"}], "explanation": "Messages API のストリームはテキストストリームではなく、型付きイベントのシーケンス（message_start, content_block_start, content_block_delta, content_block_stop, message_delta, message_stop）である。各 content block は型付きの delta を運び、tool_use block の arguments は JSON の断片（input_json_delta）として順次到達し、tool が実行される前に結合・parse される必要がある。すべての payload をプレーンテキストとして扱う consumer はこれらの断片を再構成できないため、tool input は無効になり自動化は失敗する。\\n\\n正しい修正は決定的でプロトコルレベルの処理である。イベントを蓄積して完全な構造化 Message を組み立てる（あるいは SDK の get_final_message() / finalMessage() を呼ぶ。これらがまさに同じことを行う）。そして各 tool_use block の再構成された input を parse してから tool を呼び出す。\\n\\n各誤答はもっともらしいが根本原因を見逃している。system prompt の指示（B）は API が制御する wire format を再定義できず、tool は常に構造化された tool_use block を通じてのみ実行され、モデルにテキストとして出力させたものからは発火しない。ストリーミングの無効化（C）は確かに完全で有効な tool input を得られるため、きれいな回避策に見えるが、要件が求めるインクリメンタル配信を捨て、ストリーミングの consumer を未修正のまま残す。テキストを index しつつ断片を log に書く（D）はプレーンテキストを正しく表示するものの、tool input を再構成しないため、自動化は全く同じ理由で失敗する。\\n\\nこの block 再構成の規律は他の型付き block にも一般化できる。例えば extended-thinking の content とサーバーが生成する signature も、同様に block ごとに引き継がないと turn を継続できない。"}, {"qid": "exam1-q7", "domain": "Agents and Workflows", "type": "mc", "scenario": "クレーム審査チームは、受領するすべての保険クレームを同じ検証ステップで同じ順序で処理しなければならない。全体のシーケンスは事前に判明しておりクレームごとに同一だが、一部のステップでは Claude の判断が必要になる。最も適切なアーキテクチャパターンはどれか。", "options": [{"text": "ステップをコード上の離散的で順序付きの操作として実行し、判断が必要なステップでのみモデルを呼び出す固定ワークフロー（fixed workflow）。", "is_correct": true, "why": "最適な選択肢。全体のパスが事前に判明しているため、コード制御のルーティングによりクレームごとに同一のステップ順序を保証できる。モデル呼び出しを判断ステップだけに限定すれば、設計はシンプルかつ低コストになる。これはまさに Anthropic の「Building effective agents」が、予測可能で反復可能なタスク向けに推奨するワークフローパターンそのもの。"}, {"text": "ステップの全リスト・厳密な順序指定・正しい順序の few-shot examples を system prompt に記述し、1回の Claude 呼び出しで全ステップを実行させる。", "is_correct": false, "why": "ステップの順序と出力フォーマットがモデルの裁量に委ねられ、同一シーケンスを保証できない。プロンプトを強化しても（few-shot examples を含めても）向上するのは従順さの確率だけであり、決定論性ではない。決定論的なステップが消費する出力トークンも、コードなら無料で処理できる範囲。"}, {"text": "ステップごとに1つの tool を持つ自律的な Claude agent で、クレームごとにどの tool をどの順序で呼ぶかを決定させる。", "is_correct": false, "why": "予測性と柔軟性のトレードオフを逆転させる。クレームごとに tool の呼び出し順序が変わると固定シーケンスが壊れ、レイテンシとコストが増える一方で、完全に判明しているパスには不要な柔軟性を得るだけ。"}, {"text": "各クレームをサブタスクに分解し、専門担当の subagents に委譲して、その結果を集約する supervisor agent。", "is_correct": false, "why": "未知の作業を異なる専門領域にまたがって動的に分解するために設計されたパターン。単一の判明したパスで、かつ専門役割も存在しない状況では、調整の複雑さとコストが増えるだけで利益はない。"}], "explanation": "正解: A。ステップが事前に判明しておりリクエストごとに同一の場合、固定ワークフロー（fixed workflow）がまさに適する。コード制御のルーティングは、予測可能なステップ順序と各ステップのバリデーションを最低コストで保証する。だからこそ Anthropic の「Building effective agents」は、agentic な複雑さを追加する前に、タスクを満たす最もシンプルなアーキテクチャから始めることを推奨している。\\n\\n他の選択肢が不適な理由: B はステップ順序と出力をモデルの裁量に委ねるため、同一シーケンスを保証できない。プロンプトを強化しても向上するのは従順さの確率だけで、決定論性ではない。C は、完全に判明したパスには不要な自律的プランニングのオーバーヘッドを追加する。D は、未知の作業を動的に分解するためのマルチエージェント調整の複雑さを追加するもので、固定のチェックリストには不要。"}, {"qid": "exam1-q8", "domain": "Tools and MCPs", "type": "mr", "scenario": "チームが初めてツールを使用する Claude アシスタントを構築している。Claude に独自の QueryInventory 関数（チームの自社サーバーでホスト）を呼び出させ、社内在庫レベルを取得させたい。このツールを機能させるために必要な実装ステップを2つ選べ。", "options": [{"text": "リクエストの `tools` 配列で QueryInventory を name、plaintext description、JSON Schema の input_schema とともに宣言する。", "is_correct": true, "why": "モデルが tool_use block を出力できるのは tools に宣言されたツールだけ。tool_use block はサービスを実行するための確定的なシグナルであり、input_schema がモデルが要求できる引数を定義する。"}, {"text": "ツール定義はスキップし、代わりに system prompt に詳細な検索手順と具体例を記述し、モデルに JSON 形式のリクエストを text 出力で返させる。", "is_correct": false, "why": "tools エントリがないと tool_use の仕組み自体が存在しない。アプリケーションは自由形式のテキストをパースしなければならず、確率的なシグナルで実行の契約を持たない。「必ず実行すべきチェックは prompt ではなく hook に置くべき」というのと同じ理由。"}, {"text": "tool-use loop の中で QueryInventory を名指す各 tool_use を実行し、次の turn に進む前に、tool_use_id がリクエストと一致する tool_result block を返す。", "is_correct": true, "why": "クライアントツールはホストアプリケーション内で実行される。id が一致する tool_result だけが、次の turn でモデルが観察結果を自身のリクエストに紐付ける唯一の手段。これがないと tool_use が未応答のままで、loop は end_turn に到達して終了できない。"}, {"text": "全リクエストで tool_choice を {\"type\": \"any\"} に設定し、回答の前に必ずツール呼び出しが行われるようにする。", "is_correct": false, "why": "\"any\" は検索が必要かどうかにかかわらず各 turn で最低1回のツール呼び出しを強制し、不要な turn でも無駄な呼び出しを発生させる。検索は auto でモデル主導にし、リクエストが正当化する場合にのみ発火するようにすべき。"}, {"text": "QueryInventory を server-side tool として登録し、Anthropic のインフラ上で実行させることで、アプリケーション自身は一切ツール呼び出しを実行しないようにする。", "is_correct": false, "why": "web search や code execution などの server-side tool は Anthropic が提供する機能であり、Anthropic のインフラ上で動く。社内のプライベート関数はそこに登録できず、実行者もいない。"}], "explanation": "正解は A と C。Tool use は確定的な契約であり、2つの必須要素から成る。A はツールを宣言することで、モデルが構造化された tool_use を出力できるようにする。C は id が一致する tool_result を返すことで、次の turn でモデルが観察結果を突き合わせられるようにする。他の選択肢が不適切な理由: B は A を prompt の指示と自由形式テキストで置き換えるが、宣言されたツールが確定的なのに対し、こちらは確率的である。D は tool_choice: \\\"any\\\" で毎 turn 強制的に呼び出させ、モデルが検索の要否を判断する余地を奪う。E はプライベートサービスが server-side で動くと想定しているが、server-side で動けるのは Anthropic 提供のツールのみである。"}, {"qid": "exam1-q9", "domain": "Applications and Integration", "type": "mr", "scenario": "Claude の Messages API 上に構築したカスタマーサクセスアシスタントが、プランの機能や請求に関するマルチターンのチャットでユーザーを案内する。各応答はユーザーがそれまでに述べた内容と一貫している必要があり、エンタープライズアカウントでは、各会話をゼロからではなく承認済みのウェルカムスクリプトから始めたいとチームは考えている。Messages API の実際の挙動に合致する戦略を2つ選びなさい。", "options": [{"text": "トランスクリプトは自前のデータベースに保存し、毎回の呼び出しで関連する過去の user・assistant ターンを `messages` 配列に再展開する。", "is_correct": true, "why": "Messages API はステートレスであり、各リクエストはそのリクエスト自身の内容だけで評価される。後続の呼び出しが継続できるサーバー側の会話は存在しない。そのため会話の連続性を保つには、アプリケーション自身がトランスクリプトを永続化し、毎回の呼び出しで関連する過去のターンを `messages` 配列に再展開する必要がある。これこそが、後の応答をユーザーが先に述べた内容と一貫させる仕組みである。"}, {"text": "エンタープライズアカウントでは、承認済みのウェルカムのやり取りを user role と assistant role のエントリとして `messages` 配列の先頭、つまり最初の実際のターンの前に置く。", "is_correct": true, "why": "`messages` 配列全体はアプリケーションが構築するものであり、先頭に近い assistant role のエントリが本物の Claude の出力である必要はない。用意したスクリプトを確立された過去のターンとして提示すれば、会話の開始状態を既知のものにできる。これこそが「承認済みスクリプトから会話を始める」という要件に合致する。"}, {"text": "各リクエストに conversation id を渡し、API が過去のやり取りを自動的に再接続するようにする。", "is_correct": false, "why": "一部のプロバイダの API は識別子をキーとしたサーバー側スレッドを公開しているが、Messages API はいかなる種類の会話ハンドルも公開しない。すべての `/v1/messages` リクエストは独立している。アプリケーションが識別子を付与しても、履歴がリクエスト内に存在しなければ Claude はそれを見ることができない。"}, {"text": "会話のプレフィックスに対して `cache_control` を有効にし、API にそれらのターンを保持させることで、以降のリクエストでは送らなくて済むようにする。", "is_correct": false, "why": "`cache_control` は実在する機能であり、繰り返し現れるプレフィックスのコストとレイテンシを削減するが、会話の状態は一切保持しない。キャッシュされた内容も毎回のリクエストに含める必要がある。キャッシュはプレフィックスの再送を最適化するだけで、送信の義務をなくすわけではない。"}, {"text": "system prompt に指示を追加し、ユーザーの以前の回答を保持して同じセッション内で再利用するよう Claude に伝える。", "is_correct": false, "why": "指示は Claude が実際に見える内容にしか作用しない。API はステートレスであるため、過去のターンを思い出せという指示は、それらのターンがリクエスト内に存在しなければ何ら作用しない。モデルに状態を保持させるのは確率的な期待に過ぎず、決定論的な解決策は履歴をリクエストに含めることである。"}], "explanation": "Messages API は明示的にステートレスである。すべての `/v1/messages` リクエストは、そのリクエスト自身の内容（`messages` 配列、および system prompt、tools などの各フィールド）だけで評価される。サーバー側の会話ハンドルや thread id、過去の呼び出しに対する暗黙のメモリは一切存在しない。ここから2つの戦略が直接導かれる。(1) アプリケーションはトランスクリプトを永続化し、毎回の呼び出しで関連する履歴を再展開しなければならない。これが後の応答をユーザーが先に述べた内容と一貫させる仕組みである。(2) `messages` 配列はアプリケーションが完全に制御できるため、先頭の assistant role エントリが本物の Claude の出力である必要はない。任意の作成内容を置けるため、用意したウェルカムスクリプトを確立された過去のターンとして配置し、エンタープライズの会話をプライミングできる。残る3つの戦略はいずれも、Messages API では持続性を提供しない実在の仕組みを持ち出している。conversation id は存在しないため再接続の対象もない。`cache_control` は、それでも送信が必要なプレフィックスの再処理を回避するだけである。「覚えておけ」という system prompt の指示は、リクエストに含まれないターンには作用できない。Claude は一度も受け取らない内容について推論することはできないため、決定論的な解決策はモデルに保持を頼むことではなく、履歴をリクエストに含めることである。リクエストの構造と会話の仕組みについては、Anthropic の Messages API ドキュメント、マルチターン会話ガイド、prompt caching ドキュメントを参照のこと。"}, {"qid": "exam1-q10", "domain": "Security and Safety", "type": "mc", "scenario": "チームがアシスタントに Claude の memory tool を追加し、セッションをまたいで各ユーザーの設定を思い出せるようにした。ファイルの読み書きは Claude ではなくアプリケーション側が行い、アプリ自身のストレージに対して実行される。テスト中、Claude が `/memories/notes/../../../etc/secrets` というパスに対する memory の編集リクエストを送信してきた。最も強力な対策はどれか。", "options": [{"text": "memory ディレクトリを許可プレフィックスとして allowlist に登録し、そのプレフィックスで始まるパスのリクエストだけを実行する。", "is_correct": false, "why": "入力バリデーション自体は行われているが、解決後のパスではなく字面上の文字列を検査している。`/memories/notes/../../../etc/secrets` のようなパスは許可プレフィックスで始まっていながら memory ディレクトリの外に解決されるため、traversal を防げない。"}, {"text": "system prompt と tool description に「Claude は memory ディレクトリ外のパスを要求してはならない」と記載し、Claude が出したリクエストを実行する。", "is_correct": false, "why": "prompt や tool description が Claude の振る舞いを誘導するのは事実だが、これはガイドラインであって強制力はない。インジェクションされた入力や adversarial なターンが traversal リクエストを送出するおとは残るため、handler 側ですべてのパスを検証する必要がある。"}, {"text": "memory 操作の handler 内で、各リクエストのパスを canonical absolute form に解決し、解決後のターゲットが memory ディレクトリ内に収まる場合のみ操作を実行する。", "is_correct": true, "why": "memory tool はクライアント側であり、Claude は操作の要求を出すだけで実行するかどうかはアプリケーションが決める。つまり handler が境界になる。canonical resolution は `..`・symlinks・エンコードされたシーケンスを実際のターゲットに展開し、containment チェックが memory ディレクトリ外のあらゆるターゲットを拒否する。Claude の遵守に依存しない、決定論的な仕組みである。"}, {"text": "memory ファイルをユーザーごとのキーで encryption at rest し、handler を sandboxed runtime で動かし、その環境内で要求された操作を実行する。", "is_correct": false, "why": "本当の意味での defense-in-depth だが、encryption at rest も sandboxing も個々の操作を認可するものではない。handler はアクセス時に復号し、filesystem はターゲットを到達可能なまま残すため、traversal による読み取りは復号済みの内容を返してしまう。path traversal は認可の問題であり、confidentiality や isolation の問題ではない。"}], "explanation": "Claude の memory tool はクライアント側である。Claude はファイル操作の要求を出すだけで、実行するかどうかはアプリケーションが決めるため、handler が enforcement の境界になる。canonical resolution とディレクトリ containment チェックの組み合わせは決定論的で、`..`・symlinks・エンコードされたシーケンスを展開し、Claude が何を出力しようと memory ディレクトリ外のターゲットをすべて拒否する。\\n\\n他の選択肢が不適な理由: prompt や tool description のルールはガイドラインであって強制力はなく、インジェクションされた入力や adversarial なターンが traversal リクエストを送出するおとは残る。prefix の allowlist は解決後のパスではなく字面上の文字列を検査するため、正しいプレフィックスで始まるパスでもディレクトリ外に解決される可能性がある。encryption と sandboxing はランタイムを堅牢にするが、個々の操作を認可するわけではなく、handler は到達可能な filesystem から復号済みの内容を提供し続けてしまう。"}, {"qid": "exam1-q11", "domain": "Model Selection and Optimization", "type": "mc", "scenario": "あるチームの自律型リファクタリングエージェントは、大規模なレガシーコードベース全体を読み込み、複数ファイルにまたがる変更を計画し、パッチを適用し、テストスイートに対して繰り返し検証を行う。彼らの eval suite では、balanced-capability の階層は独立した編集は綺麗に処理できるものの、離れた場所のテストを壊すパッチをしばしば生成してしまう。チームはこの失敗を、指示が不明確なためではなく、その階層の cross-module reasoning における capability ceiling に起因すると特定した。Anthropic が現在推奨する reasoning-control のアプローチに従いたいと考えている。最も適切な選択肢はどれか。", "options": [{"text": "Anthropic が complex agentic coding 向けに位置づける階層にアップグレードし、adaptive thinking に切り替える。adaptive thinking は、非推奨となった手動の budget_tokens 設定に代わる現在推奨のアプローチである。", "is_correct": true, "why": "2つの問題には2つの解決策が必要。eval は難易度の高い cross-module reasoning における capability ceiling を浮き彫りにした。階層の変更は capability を追加する構造的な手段であり、complex agentic coding 向けの階層はまさにこのワークロードのために設計されている。adaptive thinking は Anthropic が現在推奨する reasoning control であり（手動の budget_tokens パターンは非推奨）、現在のガイダンスに従うという要件も満たす。"}, {"text": "balanced-capability の階層に留まり、システムプロンプトに cross-module reasoning のワーク例を追加して、エージェントが離れたテストについてより慎重に推論するようにする。", "is_correct": false, "why": "few-shot やプロンプトの調整は確率論的な手段にすぎない。正しい推論が得られる確率を上げることはできても、その階層が本来持たない cross-module の洞察を確実に引き出すことはできない。チームはすでに、これは instruction-following の問題ではなく capability ceiling であると確認している。したがってプロンプトの変更で確定的に埋めることはできず、指示を言い換えてもモデルが従うことを保証できないのと同じである。"}, {"text": "balanced-capability の階層に留まりつつ adaptive thinking を有効にし、難しいパッチに対してモデル自身が reasoning effort を引き上げられるようにする。", "is_correct": false, "why": "reasoning control は正しいが、階層が間違っている。adaptive thinking はモデルが既に持つ capability envelope の範囲内でどれだけ深く推論するかを制御するものであり、balanced の階層に欠けている cross-module reasoning の能力そのものを追加するわけではない。有効にしても、実証された capability ceiling はそのまま残る。"}, {"text": "complex agentic coding 向けの階層にアップグレードするが、エンジニアが呼び出しごとに reasoning depth を確定的に制御できるよう、既存の手動 budget_tokens 設定は維持する。", "is_correct": false, "why": "階層は正しいが、reasoning config が間違っている。budget_tokens は非推奨の手動 thinking-budget パターンであり、Anthropic が現在推奨しているのは adaptive thinking である。レガシーの設定を持ち続けることは、現在推奨されるアプローチに従うという要件に直接反する。"}], "explanation": "モデルの選択は、ワークロードが明示的に要求する capability に合わせるべきであり、reasoning control は Anthropic の現在のガイダンスに従うべきである。eval は balanced-capability の階層が cross-module reasoning で上限に達していることを示した — これは階層のアップグレードが直接的に解決する構造的なギャップであり、プロンプトの変更で埋められる種類の問題ではない。complex agentic coding 向けに位置づけられた階層はこのワークロードのために設計されており、adaptive thinking は現在推奨される reasoning アプローチである（手動の budget_tokens パターンは非推奨）。\\n\\n他の選択肢が不適切な理由: B はワーク例で capability gap を埋めようとするが、プロンプトは確率を上げるだけであり、その階層が持たない推論を確実に生み出すことはできない（指示を言い換えても従順さを保証できないのと同じ）。C は正しい reasoning control を有効にするが、すでに失敗した階層に留まっている — adaptive thinking はモデルが既に持つ capability の範囲内で reasoning depth を制御するものであり、その上限を超える capability を与えるものではないため、capability gap は残る。D は正しい階層を選ぶが、推奨される adaptive thinking ではなく非推奨の budget_tokens 設定を維持している。"}, {"qid": "exam1-q12", "domain": "Model Selection and Optimization", "type": "mc", "scenario": "チームは、プロンプトを Claude モデルへ転送するルーティングレイヤーを運用している。管理コンソールには利用可能な各モデル（model ID と display name）が一覧表示され、オペレーターがルーティング先を選べる仕組みだ。現在このリストはハードコードされており、Anthropic がモデルを追加・廃止するたびにエンジニアが手作業で書き換えている。チームは、カタログが変わるたびの手作業による編集も redeploy も不要で、コンソールが自前で利用可能なモデルを追跡できるようにしたいと考えている。", "options": [{"text": "公式 SDK で Models API (GET /v1/models) を呼び出し、返却される ID と display name を TTL 付きでキャッシュし、定期的にキャッシュを更新する。", "is_correct": true, "why": "GET /v1/models はドキュメントに公開されたカタログエンドポイントであり、API が提供する各モデルについて id と display_name（に加えて type と created_at）を返す。そのため誰もリストを編集せずに、モデルの追加や廃止をコンソールが追跡できる。公式 SDK で包めば連携の保守性が保たれ、TTL による定期更新で呼び出し量を抑えつつ最新状態を維持できる。モデルの発見は決定論的で、モデル自身の判断や redeploy に依存しない。"}, {"text": "system prompt で Claude に起動時に自身の現在の model ID と display name を列挙させ、その応答をコンソール用にキャッシュする。", "is_correct": false, "why": "Claude は自身のモデルファミリーについてある程度の知識を持つため、一見機能するように見える。しかし一覧は学習時点で固定されており、モデルは ID をハルシネーションしたり省略したりする。モデルに自身のカタログを宣言させるのは、決定論的なエンドポイントが置き換えるために存在する確率論的なアプローチであり、まさにチームが脱却しようとしているアンチパターンである。"}, {"text": "各候補の model ID に対して POST /v1/messages/count_tokens へプローブリクエストを送り、input token 数が返った ID をすべてキャッシュする。", "is_correct": false, "why": "count_tokens は実在するエンドポイントだが、model ID を事前に指定する必要があり、その単一リクエストの input token を推定するだけである。つまり1つの名前付きモデルをチェックするだけで、カタログを列挙しない。さらにプローブ呼び出しが増えるうえ、テストすべき ID をすでに知っていることを前提としており、それはチームが廃止したい手作業メンテのリストそのものである。"}, {"text": "deploy 時に SDK 経由で Models API を一度だけ呼び出し、返却された ID と display name をバージョン管理された config ファイルに書き出し、実行時にそのファイルを読み込む。", "is_correct": false, "why": "正しいエンドポイントを使っているためもっともらしく見えるが、結果を config ファイルに固定するとカタログを捕捉できるのは deploy 時だけになる。リリース後に最新状態を保つにはやはり redeploy か人手の編集が必要で、チームが排除したかった手作業更新の問題が戻ってくる。明示された no-redeploy 要件に違反している。"}], "explanation": "Models API (GET /v1/models) は Anthropic がドキュメントで公開するカタログエンドポイントである。レスポンスは API が提供する各モデルを id と display_name（type と created_at とともに）で一覧表示するため、手作業のリストなしでコンソールはリリースと同期し続けられる。公式 SDK で包めば連携の保守性が保たれ、TTL 付きキャッシュによりルーティングのたびではなくスケジュールでカタログを更新して呼び出し量を抑えられる。発見プロセスは決定論的で、モデル自身の判断や redeploy に依存しない。なお、このエンドポイントは id・display_name・type・created_at のみを返し、ケイパビリティや token 上限は公開しない（max_tokens は Messages API のリクエストパラメータであり、Models API のレスポンスフィールドではない）。\\n\\n各誤答はもっともらしいが、いずれも要件を見落としている。system prompt で Claude に一覧を列挙させる方法は古い学習データに依存し、ID をハルシネーション・欠落させる。モデルの判断に頼ること自体が、カタログエンドポイントが排除するアンチパターンであり、決定論的か確率論的かの違いが核心の判別軸となる。/v1/messages/count_tokens をポーリングするのは token 推定エンドポイントの誤用であり、model ID を事前に要求してモデルを列挙せずにそのリクエストの input token を推定し、プローブ呼び出しを増やしながらチームが廃止したい ID リストを前提としてしまう。deploy 時に Models API を一度呼び出して結果を config ファイルに固定する方法は正しいエンドポイントを使うが手作業の成果物を再導入し、リリース後の最新維持にやはり redeploy が必要になる。これが正解 A を D から分かつ no-redeploy 要件への直接違反である。"}, {"qid": "exam1-q13", "domain": "Security and Safety", "type": "mc", "scenario": "Lattice & Vale のデータプラットフォームチームは、Claude Code を使って `analytics-platform` リポジトリ内の dbt migration script を保守している。以前、破壊的な SQL 文が migration の実行を通じて本番環境に到達するインシデントが起きた。これを受け、セキュリティ上の強制力ある制御が求められている——各 Bash command の実行前に検査し、そのコマンドが本番テーブルを変更するものであれば、呼び出しをブロックするかオペレーターの承認に回すもの。この要件を満たすのはどれか。", "options": [{"text": "`Bash` にマッチする PreToolUse hook を設定し、`tool_input.command` を読み出してチームの検査ロジックを適用したうえで、`permissionDecision` として `deny` または `ask` を返すようにする。", "is_correct": true, "why": "PreToolUse は、パラメータ生成と tool dispatch の間で実行される唯一の hook event である。実際のコマンドを `tool_input.command` で受け取り、構造化された `permissionDecision` を返せる——`deny` で呼び出しを即座に拒否、`ask` でオペレーターの確認に回す——ため、そのターンでの model の判断に委ねるのではなく、マッチするたび毎回コードでゲートを強制できる。検査ロジックはコマンドを自由にパースできるため、psql や migration runner 経由でデータベースに届く SQL も検査対象に含められる。まさに要件が求めるものである。"}, {"text": "`Bash` にマッチする PostToolUse hook を設定し、観測したコマンドが破壊的だった場合に、理由とともに `decision: block` を返すようにする。", "is_correct": false, "why": "PostToolUse は実在する hook であり、理由付き block 出力も公式に文書化されている。しかし発火するのは tool が正常に完了した後だけである。hook が実行される時点では、破壊的なコマンドはすでに本番環境で実行された後である。理由は次ターンの Claude の挙動を形作るためにフィードバックされるため、監査やリカバリには有用だが、呼び出しを差し止めたり事前承認に回したりはできない。被害を防ぐのではなく、被害に反応するだけである。"}, {"text": "`.claude/settings.json` の `permissions.deny` および `permissions.ask` リストに、`Bash(*DROP*)`、`Bash(*TRUNCATE*)` などのエントリを追加する。", "is_correct": false, "why": "allow/ask/deny の permission リストは実行前にコードで強制されるため、決定論的にブロックやプロンプトを出せ、タイミングの要件は満たす。しかし tool call を静的な pattern に対してマッチさせるしくみである。DROP をキーにした deny ルールは、`psql -c` や `dbt` の migration runner、shell alias 経由で発行された DROP TABLE を認識できない——Bash の表面は `psql` や `dbt` であり、その内側の SQL テキストではないからである。各コマンドの実際の効果を検査する（固定の表面文字列をマッチさせるのではない）という要件では、静的な pattern では不十分である。"}, {"text": "チームのポリシーに照らしてコマンドを検査する独自の `validate_command` MCP tool を公開し、system prompt で Claude に対し、毎回の Bash 呼び出し前に必ず呼ぶよう指示する。", "is_correct": false, "why": "検証専用の tool は正当かつ有用な構成要素であり、Bash の前に呼ぶのも理にかなった workflow である。しかし tool の定義には、毎ターン Bash の前に必ず呼ぶことを強制する仕組みはない。Claude が `validate_command` を呼び、その結果を待つかどうかはターンごとの model の判断であり、検査をスキップしてそのまま Bash に進むターンを構造的に防ぐことはできない。毎回の呼び出しで必ず効く実行前の強制は、model に従うよう求める workflow ではなく、hook に持たせるべきものである。"}], "explanation": "この要件は3つの要素から成る——実行前のタイミング、各コマンドの実際の効果をコマンドごとに検査すること、ブロックかオペレーター承認かの二者択一の出力。これら3つをすべて満たすのは PreToolUse だけである。PreToolUse は、Claude が tool のパラメータを出力した後、かつ呼び出しが dispatch される前に発火し、`tool_input.command` で具象コマンドを受け取り、構造化された `permissionDecision` を返す——`deny` で呼び出しを拒否、`ask` でオペレーターに回す。評決がマッチするたび毎回実行されるコードによって生成されるため、model がそのまま進もうとするターンでもゲートは効き続ける。\n\nPostToolUse は hook という語彙を共有するが、tool が return した後にしか発火しないため実行を差し止めることはできない。block 判断は今回の呼び出しを防ぐのではなく Claude の次ターンを誘導するものであり、これが audit signal と guardrail の違いである。permissions の allow/ask/deny リストは実行前かつコード強制だが、コマンドを静的な表面 pattern にマッチさせるため、`psql` や migration runner、alias の背後に隠れた破壊的操作を認識できない——構文でゲートし、意味でゲートしない。独自の MCP 検証 tool はポリシーを表現する手段としては確かに有用だが、Bash の前に呼ぶのは model が毎ターン選択しなければならないステップであり、hook がなければスキップするターンを構造的に防ぐものは何もない。PreToolUse の `permissionDecision` の値（allow/deny/ask）および PostToolUse に対する PreToolUse のライフサイクル上の順序については Claude Code hooks reference を、permissions allow/ask/deny の pattern 構文については settings reference を参照のこと。"}, {"qid": "exam1-q14", "domain": "Applications and Integration", "type": "mc", "scenario": "データチームは毎晩、数時間かかるジョブでその日のテレメトリを照合しなければならない。このジョブは、CSV エクスポートに対して Python ヘルパーを実行し、作業ディレクトリでファイルの読み書きを行い、多数のターンにわたってコンテキストを保持する。経営陣は、チーム自身が agent loop、tool dispatcher、execution sandbox を構築・運用すること、さらにそれらをホストする runtime を立ち上げることを禁じている。要件を最もよく満たすアプローチはどれか。", "options": [{"text": "毎晩のテレメトリを Message Batches API に非同期リクエスト群として送信し、24時間の完了ウィンドウ内で処理させ、非同期向けの低価格レートを活用する。", "is_correct": false, "why": "強い誘導となる選択肢。深夜実行・レイテンシ許容・コスト最適化はいずれも Batches を指している。しかしバッチ内の各エントリは独立した1回の Messages 呼び出しにすぎない。Batches には永続的な session、tool-calling loop、共有ファイルシステム、リクエスト間で引き継がれる state が一切ないため、ヘルパーを実行しターンをまたいでファイルを維持するような多ターンの照合ジョブには対応できない。"}, {"text": "Claude Agent SDK でジョブを構築する。SDK には出来合いの agent loop と、bash・file・web・MCP の組み込みツールが同梱されているため、チームは loop も dispatcher も自作しなくてよい。", "is_correct": false, "why": "最も紛らわしい選択肢。SDK は確かに『loop と dispatcher を構築する』負担を取り除き、制約を満たしているように見える。しかし SDK はチーム自身のプロセス内で動作するライブラリであり、数時間にわたる runtime とその実行環境のプロビジョニング、スケジューリング、運用はチーム自身が行う必要がある。loop をコードとして出荷することは、インフラを運用しないこととは別物であり、経営陣が禁じたのは後者である。"}, {"text": "Claude Managed Agents を使用する。エージェントのツールと指示を一度定義し、クラウド環境を構成して、Anthropic がホストするインフラ上で動作する session を起動する。この session は durable なサーバー側 session log と組み込みの compaction を備える。毎晩の実行は scheduled deployment 経由でトリガーする。", "is_correct": true, "why": "最適解。Managed Agents は Anthropic が提供する、長時間の agent ワークロード向けのホステッドハーネスである。チームはエージェントと環境を定義して session を開始するだけで、harness（Claude を呼び出しツール呼び出しを振り分ける loop）、bash や file の呼び出しが実行される sandbox、サーバー側 compaction を備える durable session はすべて Anthropic が運用する。scheduled deployment が cron スケジュールで毎晩の定期実行を発火するため、チームは回避すべきと指示された loop・dispatcher・sandbox のいずれも構築も運用もしない。この選択肢を選ぶには、『Anthropic ホストの harness と sandbox』が『チームは禁止されたインフラを一切運用しない』ことを意味すると推論するステップが必要になる。選択肢はトポロジーを描写しており、制約を直接述べているわけではない。"}, {"text": "1つの Messages 会話を開き、extended thinking を有効化し、Python ヘルパーをツールとして公開する。そして Claude が正しい順序でそれらを呼び出し、照合が完了するまで働き続けることに頼る。", "is_correct": false, "why": "一見もっともらしい。tool use、extended thinking、巨大な context window があれば長時間タスクには十分に見える。しかし Messages 会話が提供するのは低レベルの primitives にすぎず、チームは tool dispatcher と実行環境を自前で実装・実行し、毎ターン conversation の state を再送し、数時間にわたるプロセスを自身でホストしなければならない。managed sandbox も durable なサーバー側 session も存在せず、ステップの順序付けはモデルの確率的な選択に委ねられる。これは『自家運用インフラ禁止』の制約に違反するだけでなく、アーキテクチャが決定論的な managed インフラを求めている箇所に、確率的なモデル側の解決策を当てはめてしまう。"}], "explanation": "このワークロードは、ツールを実行し、ファイルを維持し、多数のターンをまたいで state を保持する、自律的な数時間タスクである。同時にチームは、オーケストレーションや sandbox を自前で構築・運用してはならない。Claude Managed Agents はまさにこの用途のために作られている。エージェントとクラウド環境を定義して session を起動すれば、harness、shell や file の呼び出しが実行される sandbox、組み込み compaction を備える durable session を Anthropic が実行する。scheduled deployment が cron スケジュールで毎晩の実行を発火する。Agent SDK が適しているのは、同梱の loop と組み込みツールは欲しいが、runtime と sandbox は自分でデプロイ・運用してよい場合である。これは本問の『自家運用インフラ禁止』という制約とは正反対であり、だからこそ Agent SDK が最も紛らわしい選択肢になる。『構築』の負担は取り除くが『運用』の負担は残るからだ。Message Batches API は、独立した単一の Messages 呼び出しを大量に非同期処理する用途向けであり、session、tool loop、リクエスト間で繋ぐ共有 state は存在しない。tool use と extended thinking を有効にした単一の Messages 会話でも、チームは dispatcher、実行環境、スケジューリングを自前で構築・実行しなければならず、順序付けはモデルに委ねられる。決定論的な managed インフラが必要な箇所に、確率的な解決策を当てはめることになる。"}, {"qid": "exam1-q15", "domain": "Model Selection and Optimization", "type": "mr", "scenario": "コンテンツプラットフォームのモデレーションサービスが、Claude Sonnet 4.5 のプロトタイプからの移行を進めている。このサービスは2つのパスで構成される。1つは流入する各投稿を固定のトピック分類（taxonomy）にタグ付けする大ボリュームパス（入力は短く、ラベルはほぼ確定）。もう1つは、異議申し立てがあった削除処分について審査要旨を起草する、より小規模なパスである。共通のリクエストビルダーは両パスの全呼び出しで、依然として `thinking: {type: \"enabled\", budget_tokens: N}` を送信している。移行計画に含めるべき変更を2つ選べ。", "options": [{"text": "大ボリュームのタグ付けパスについて、代表的なトラフィックサンプルで品質・レイテンシ・コストを検証した上で Claude Haiku 4.5 にルーティングする。", "is_correct": true, "why": "Haiku 4.5 は現在提供されている最速のモデルであり、フロンティアに迫る知能を持つと公式に位置付けられている。大ボリュームの単純な分類タスクに推奨されるモデルでもある。本番トラフィックの大半を切り替える前に実サンプルで検証することで、プラットフォームが求める品質基準を担保できる。"}, {"text": "タグ付けパスを Claude Opus 4.6 に移行する。より高い能力でエッジケースの投稿の誤分類を減らせるはず、という理由による。", "is_correct": false, "why": "直感では妥当に見える。Opus 4.6 は最も能力の高いモデルだからだ。しかし Opus 4.6 は複雑なエージェント処理やエンタープライズ用途に位置付けられており、短くほぼ確定したラベルに対しては1呼び出しあたりのコストもレイテンシも Haiku 4.5 を大きく上回る。その割に品質向上は得られず、コストに見合わない。"}, {"text": "タグ付けパスは Claude Sonnet 4.6 のまま維持し、`output_config: {effort: \"low\"}` を設定して推論量・レイテンシ・トークンコストを下げる。", "is_correct": false, "why": "もっともらしい選択肢である。`effort: \"low\"` は GA の実在する制御手段であり、Sonnet 4.6 の推論量とトークン消費を確かに抑えられる。しかし大ボリュームでほぼ確定した分類においては、effort の設定にかかわらず Sonnet 4.6 の1呼び出しあたりのコストもレイテンシも Haiku 4.5 より高い。そのため、メインパスを Haiku に切り替えることで得られるはずの、より大きなコスト/レイテンシ削減を見送ることになる。"}, {"text": "審査要旨パスについては `thinking: {type: \"enabled\", budget_tokens: N}` をそのまま残し、推論を簡潔に保つよう求める指示を system prompt に追加する。これにより共通ビルダーには構造上の変更が不要になる。", "is_correct": false, "why": "もっともらしい。ビルダーの変更を最小限に抑え、プロンプトで推論を誘導するという発想は実務的にも自然だからだ。しかし Sonnet 4.6 は非推奨となった `budget_tokens` をリクエスト受領時に拒否し（HTTP 400）、モデルが呼び出される前にエラーを返す。したがってプロンプトの指示では修正できず、リクエストの構造自体を変える必要がある。"}, {"text": "審査要旨パス（Claude Sonnet 4.6）では `budget_tokens` を削除し、`thinking: {type: \"adaptive\"}` を使う。さらに `output_config` の中で `effort` を設定し、推論の深さ・レイテンシ・トークン消費を制御する。", "is_correct": true, "why": "Sonnet 4.6 は `budget_tokens` を非推奨とし、代わりに adaptive thinking を採用している。推論/レイテンシ/トークンのトレードオフは GA の `effort` が公式の制御手段である。この変更によりリクエストの構造問題を解消しつつ、繊細な要旨を必要とするパスでの推論制御を維持できる。"}], "explanation": "モデル選択は能力・レイテンシ・コスト・機能の互換性のトレードオフであり、すべてのワークロードに当てはまる単一モデルは存在しない。大ボリュームのタグ付けパスは単純でほぼ確定した分類であり、まさに Haiku 4.5（現在提供されている最速のモデルで、フロンティアに迫る知能を持つ）が推奨される領域である。ただしプラットフォーム自身の品質評価によるゲートを通すことが前提となる（A）。\\n一方、移行は能力の問題とは別次元の課題である。リクエストの形はモデルのリリースをまたいで壊れる。Sonnet 4.6 は手動の `budget_tokens` を非推奨とし（API はリクエスト受領時に HTTP 400 で拒否する）、代わりに adaptive thinking を使う。推論/レイテンシ/トークンのトレードオフは `output_config` 内の GA パラメータ `effort` が公式の制御手段である。したがって Sonnet 4.6 に残す審査要旨パスは、budget を削除し adaptive thinking を採用し、`effort` を使わなければならない（E）。\\n誤答選択肢はそれぞれ異なる理由で外れる。Opus 4.6 は複雑なエージェント処理やエンタープライズ用途向けであり、短くほぼ確定したラベルに対する1呼び出しあたりのコストもレイテンシも正当化されない（B）。`effort: \\\"low\\\"` の Sonnet 4.6 は実在する制御手段だが、バルク分類では1呼び出しあたりのコストが Haiku 4.5 より高く、より大きな削減を見送る結果になる（C）。`budget_tokens` を残したままプロンプトで推論を抑えようとする手法は機能しない。リクエストがモデルの呼び出し前に拒否されるためであり、リクエストの構造自体を変える以外に解決策はない（D）。"}, {"qid": "exam1-q16", "domain": "Applications and Integration", "type": "mc", "scenario": "Helix Drivetrain は、組み込みエンジニアがモーターコントローラファームウェアのクラッシュダンプをトリアージするための、Claude 搭載 copilot を提供している。バックエンドは各ターンで最新のユーザーメッセージだけを Messages API に転送する。Claude が register-transfer trace 上の3つの候補となる interrupt-handling race をエンジニアに順に説明したあと、エンジニアは「じゃあ、DMA コントローラが v3 ボードと同じようにダブルバッファリングするなら、2番目のやつは発生し得る？」と尋ねる。しかし Claude は race condition に関する一般的な入門解説を返すだけで、先ほど列挙した3件と結びつけようとしない。「2番目のやつ」のような後続の参照表現を以前のターンに対して確実に正しく解決させるには、どの変更が有効か？", "options": [{"text": "自社バックエンドで会話履歴（transcript）を永続化し、新しいユーザーターンと Claude が必要とする過去のターンから各リクエストを再構成する。context window が埋まるにつれて、古い履歴はトリムまたは要約する。", "is_correct": true, "why": "Messages API はステートレスである。各呼び出しはそのリクエストに含まれるメッセージだけを元に評価され、同じ API key・ユーザー識別子・セッションで行われた以前の呼び出しの内容は一切保持されない。新しいターンと必要な履歴から各リクエストを再構成するのがマルチターンの標準パターンであり、context window が埋まるにつれてトリム・要約・選択を自分で制御できる。"}, {"text": "`metadata.user_id` に会話ごとに安定した値を設定し、API がそのユーザーの下でリクエストを関連付けて、以前のターンを Claude に引き継がせる。", "is_correct": false, "why": "`metadata.user_id` は実在するパラメータだが、目的は不正利用監視（abuse monitoring）とレート制限であり、サーバー側に会話ステートを作ることはない。API は引き続き各リクエストをそのリクエスト内のメッセージだけで評価するため、user_id を共有しても以前のターンが後続のリクエストで利用可能になることはない。"}, {"text": "会話のプレフィックスに `cache_control` ブレークポイントを追加する。以降の呼び出しではキャッシュされたターンが Claude のために保持され、再送が不要になる。", "is_correct": false, "why": "プロンプトキャッシュは、毎回のリクエストで送信するプレフィックスに対するコスト・レイテンシの最適化である。キャッシュヒットはそれらのトークンが再処理されずに再利用されることを意味するが、messages に存在し続けなければならない。過去のターンを削除すれば、「2番目」といった序数参照はインデックスすべき元ネタを失う。キャッシュは記憶を呼び戻す仕組みではない。"}, {"text": "Opus にアップグレードして extended thinking を有効にし、Claude に周囲の会話から「2番目のやつ」が何を指すか再構築するための、より大きな推論能力を持たせる。", "is_correct": false, "why": "これは可用性（availability）の問題に対する能力（capability）での解決策である。Opus の能力は高く、extended thinking はより多くの推論バジェットを与えるが、リクエストで一度も送信されなかったコンテンツを復元できるモデルは存在しない。「2番目のやつ」はインデックスすべき元リストを持たないままである。ステートレス性はエンドポイントのアーキテクチャ上の性質であり、より多くの推論で乗り越えられる壁ではない。"}], "explanation": "Messages API はステートレスな request-response エンドポイントである。各呼び出しは独立しており、アプリケーションが必要な履歴を messages 配列で再送しない限り、Claude は同じ API key・ユーザー識別子・セッションで行われた以前の呼び出しの内容を一切保持しない。信頼できるマルチターンパターンは、アプリケーション側で会話ステートを永続化し、新しいユーザーターンと Claude が必要とする過去のターンから各リクエストを再構成することだ。これにより、context window が成長するにつれて履歴のトリム・要約・選択を自分で制御できる。各誤答選択肢には、もっともらしいが破綻したメンタルモデルが込められている。`metadata.user_id` は実在するフィールドだが、目的は不正利用監視とレート制限であり、サーバー側に会話ステートを作らない。そのため user_id の下でリクエストを関連付けても、以前のターンが後続のリクエストに現れることはない。`cache_control` を使ったプロンプトキャッシュは、繰り返し送るプレフィックスのコストとレイテンシを下げるが、リクエストから省かれたコンテンツの代わりにはならない。キャッシュされたプレフィックスも送信内容の一部だからである。そして、より大きなモデルに extended thinking を付けてアップグレードするのは、本質的に可用性の問題に対する能力での解決策である。ステートレス性はエンドポイントのアーキテクチャ上の性質であり、どれほど推論を重ねても一度も送信されなかったコンテキストを生み出すことはできない。"}, {"qid": "exam1-q17", "domain": "Applications and Integration", "type": "mc", "scenario": "コンサルティング企業の API integration では、クライアントごとの dataset を標準 template に当てはめ、社内で再利用する Python helper を実行して、整形済みの spreadsheet と deck ファイルを生成している。これらの helper は決定論的に実行する必要があり、生成中の outbound network call は一切禁止されている。要件を最も満たす実装はどれか。", "options": [{"text": "正しく整形された出力の完全な working example を system prompt に置き、model の effort を max に設定することで、クライアントごとに同じ構造を再現する。", "is_correct": false, "why": "worked example と高 effort は出力の品質と構造の一貫性を実際に向上させるため、もっともらしい選択肢。しかしこれは確率論的で model の裁量に依存する仕組みであり、Python helper を実行する sandbox を何も提供しない。model がテキストだけから有効な spreadsheet や deck のバイナリを確実に出力することもできない。結果として、決定論的実行とバイナリ成果物という 2 つの要件をどちらも満たせない。"}, {"text": "Files API 経由で data・helper・template を upload し、code execution tool を有効化する。これにより Claude は隔離された server-side sandbox で helper を実行し、完成したファイルを返す。", "is_correct": true, "why": "ベストな選択肢。成果物は internet access のない環境で実際の Python を決定論的に実行することを必要とするが、それはまさに server-side の code execution tool が提供するもの。Files API は dataset・helper・template をその sandbox に配置する仕組みであり、Claude がそれらを操作して完成ファイルを返せるようにする。すべての要件に合致する。"}, {"text": "template と helper を Agent Skills として package 化し、Messages API request で有効化することで、model が各クライアントに適用する。", "is_correct": false, "why": "Agent Skills は再利用可能な instruction・参照ファイル・script を package 化できるため魅力的。しかし Agent Skills は Claude Code の機能（.claude/skills/ 配下の markdown や script）であり、Messages API request の parameter ではない。有効化すべき skills field は存在しない。さらに Agent Skills は code を実行するのではなく progressive-disclosure の context を通じて model の挙動を整形するため、helper を実際に実行するものは何もない。"}, {"text": "helper と template を MCP server 上の tool として公開し、各クライアントの生成中に Claude が live で呼び出すようにする。", "is_correct": false, "why": "Claude が database や内部 API などの外部システムへ live で access する必要がある場合の正しい pattern。しかし本問では tradeoff を裏返しにしている。MCP server は稼働中の networked service であり、まさに no-network-calls の要件が禁止する live の outbound 依存に該当する。自己完結した workflow を、実行時に service に依存するものに変えてしまう。"}], "explanation": "決め手は、成果物がバイナリファイルであり、その生成に「実際の Python を決定論的に実行すること」と「outbound network call を行わないこと」が共に要求される点にある。3 つの制約をすべて満たす唯一の API mechanism は、server-side の code execution tool と Files API の組み合わせだ。Files API で dataset・helper・template を upload し、code execution を有効化すれば、Claude は internet access のない隔離された container の中で helper を実行し、完成したファイルを返す。これは決定論的、つまり実際の sandbox で実際の Python が走るということを意味し、確率論的・裁量依存の選択肢とは対照的である。\n\n他の選択肢が不適な理由: A は古典的な LLM 側の workaround であり、worked example と max effort は正しい構造の確率を上げるものの、code を実行したり有効なバイナリファイルを確実に出力したりはできない。決定論的実行の要件は満たされない。C は 2 つの仕組みを混同している。Agent Skills は context を通じて model の挙動を整形する Claude Code の機能であり、code を実行する API parameter ではない。Messages request で「有効化」できるものではなく、sandbox も関与しない。D は外部システムへの live access における正しい pattern だが、本問では no-outbound-calls のルールが禁止する、まさに稼働中の networked service を持ち込んでしまう。本問で問われている概念は、確率論的な prompting・Claude Code の context・live の networked service と対比した、決定論的な server-side code execution である。"}, {"qid": "exam1-q18", "domain": "Agents and Workflows", "type": "mc", "scenario": "法務チームが取引先から届くベンダー契約をレビューしている。各契約は privacy・IP・liability・pricing といった条項分野のいかなる組み合わせにも該当しうるが、どの分野が該当するかは契約を読むまで分からない。各分野には独自の深い専門レビューが存在する。チームは契約ごとに1通の統合メモを作成したい。最適なアーキテクチャパターンはどれか。", "options": [{"text": "リードcallが各契約に必要な専門workerを選択し、その結果をマージする orchestrator-workers workflow。", "is_correct": true, "why": "最適。Anthropic は orchestrator-workers を、サブタスクが入力ごとに変わり予測できないタスク向けに定義している。リードcallが該当するworkerを動的に選択し、各workerは独立したコンテキストで実行され、synthesis callが1通のメモを生成する。予測不能な条項の組み合わせにまたがる契約はまさにこのパターンの典型であり、専門workerのサブセットは契約ごとに異なり、実行時にしか判明しない。"}, {"text": "各契約で全専門レビューを並列実行し、出力を1通のメモにマージする parallelization workflow。", "is_correct": false, "why": "もっともらしい。専門家へ fan-out し、高速で、确实にマージされたメモを出力する。しかし parallelization は入力ごとに固定の branch 群を実行するため、ある契約に該当しない分野も含めて毎回すべての専門レビューを実行してしまう。選択の仕組みが一切なく、それこそが要件の核心である。"}, {"text": "専門レビューごとに1つの tool を持つ単一の自律 agent が、実行時に何を呼ぶかを決定する。", "is_correct": false, "why": "もっともらしい。すべての tool を持つ能力の高い agent は柔軟性が最大で、契約ごとに適応できる。しかし構造化されたリード/worker の分離を model の裁量に丸め込み、チームが依存する独立した専門家作成の specialist context を手放すことになる。「該当する深いレビューを毎回必ず実行する」という要件が、構造的な保証ではなく確率的挙動に退化してしまう。"}, {"text": "各契約を主たる条項分野に分類し、その分野のレビューを実行する routing workflow。", "is_correct": false, "why": "もっともらしい。routing は入力によって処理を変え、各分野のレビューは複数ステップになりうるため、近いように聞こえる。しかし routing は各入力を単一のカテゴリと単一の playbook に振り分ける。privacy と liability にまたがる契約は、手作りの組み合わせ playbook がなければ表現できず、チームが組み合わせを予測できない以上、routing では全体をカバーできない。"}], "explanation": "正解: A。Anthropic の \"Building effective agents\" は、workflow（LLM と tool の呼び出しを調整する事前定義された構造）と agent（model が自身のプロセスを動的に指揮するもの）を区別する。workflow 間の決定的な識別基準は、必要なサブタスクが入力ごとに予測可能かどうかである。routing は固定のカテゴリ集合を前提とし、parallelization は入力ごとに固定の branch 集合を実行し、prompt chaining は固定のシーケンスを前提とする。orchestrator-workers は残りのケースを担う。リードLLM が入力を検査し、該当する worker を動的に選択し、それぞれを独立したコンテキストで実行し、1つの出力に統合する。予測不能な条項の組み合わせにまたがる契約はこれに完全に合致し、該当する専門 worker のサブセットは契約ごとに変わり、事前には分からない。\\n\\n他が不適な理由: B（parallelization）は入力ごとに固定の branch 集合を実行するため、該当しない条項分野も含めて全契約で全専門レビューを実行してしまう。C（単一の自律 agent）は「該当する深いレビューを毎回実行する」ことを構造的な保証ではなく確率的・model 主導の選択に変え、チームが整備した独立した specialist context を破棄する。能力の向上は強制メカニズムではなく、指示を繰り返したりより大きな model に切り替えても、あるステップが必ず実行されることを保証できないのと同じである。D（routing）は各入力を単一のカテゴリと単一の playbook に対応付けるため、チームが予測できない組み合わせに向けて手作りの組み合わせ playbook を増産しない限り、複数分野にまたがる契約をカバーできない。"}, {"qid": "exam1-q19", "domain": "Claude Code", "type": "mc", "scenario": "開発チームが共有リポジトリで Claude Code を運用している。この環境では未検証の特定のビルドコマンドを Claude に一切実行させないという強い制約があり、例外なく毎回ブロックしなければならない。このルールは、モデル自身の判断に頼らず、クライアントが決定論的に（確実に）強制できる場所に定義すべきである。どこに定義すべきか？", "options": [{"text": "`.claude/settings.json` の `permissions.deny` にそのコマンドを追加する。クライアントはすべてのツール呼び出しに対して permission ルールを評価し、一致する呼び出しを拒否する。", "is_correct": true, "why": "`.claude/settings.json` は Claude Code が強制適用する設定レイヤである。クライアントはすべてのツール呼び出しに対して permission ルールを評価し、評価順序は deny → ask → allow で最初にマッチしたものが優先される。そのため、モデルがどう判断しても deny エントリは毎回確実にコマンドをブロックする。また、いかなる settings スコープの deny ルールも、allow ルールや事前承認をすべて上書きする。"}, {"text": "`CLAUDE.md` に禁止事項を記載し、Claude がプロジェクトコンテキストとして読み取ってコマンドの実行を控えるようにする。", "is_correct": false, "why": "`CLAUDE.md` はモデルのコンテキストを形成するメモリ・ガイダンスであり、クライアントが強制するルールではない。従うかどうかは確率的に過ぎず、Claude がコマンドを実行しようとする可能性が残るため、毎回のリクエストでブロックを保証することはできない。"}, {"text": "`model` フィールドをより高機能なモデルに設定し、エッジケースでもプロジェクトの指示に確実に従うようにする。", "is_correct": false, "why": "より高機能なモデルは指示に従う確率を引き上げるが、依然として確率的でしかない。モデルの機能選択は強制メカニズムではなく、コマンドが一切実行されないことを保証できない。"}, {"text": "`.claude/settings.json` の `permissions.ask` にコマンドを追加し、Claude が実行する前にクライアントが確認プロンプトを出すようにする。", "is_correct": false, "why": "`permissions.ask` は呼び出しを拒否するのではなく確認プロンプトで挟むだけである。プロンプトが承認されれば（自動承認されても）コマンドは実行されるため、非実行を保証できない。deny → ask → allow の順序において無条件でブロックするのは deny だけであり、ask は毎回人間の判断に委ねるに過ぎない。"}], "explanation": "`.claude/settings.json` は Claude Code が強制適用する設定レイヤである。クライアントはすべてのツール呼び出しに対して permission ルールを評価し、その評価順序は deny → ask → allow で最初にマッチしたものが優先される。したがって、モデルがどう判断しても `deny` エントリは毎回コマンドをブロックする。また、いかなる settings スコープの deny ルールも allow ルールや事前承認をすべて上書きするため、例外なく効くことが保証される。一方、`CLAUDE.md` はメモリ・ガイダンスであり、モデルのコンテキストを形成するだけでクライアントは強制しない。そこに書かれた禁止事項は確率的にしか従われない。より高機能なモデルを選ぶのも同様で、従う確率を高めるだけで決定論的にはならず、モデルの機能向上は決して強制メカニズムではない。`permissions.ask` は強い保証を求める用途に不適切で、拒否ではなく確認プロンプトを挟むだけのため、承認されればコマンドは実行されてしまう。指針として、例外なく効かせたい制御には強制設定の `permissions.deny` を使う。`CLAUDE.md` はモデルが考慮すべきガイダンス用、モデル選択は機能のためであり、強制のためではない、と覚えておくこと。"}, {"qid": "exam1-q20", "domain": "Agents & Workflows", "type": "mc", "scenario": "開発者がストリーミング対応の agent framework でマルチターンのアシスタントを構築している。ユーザーは前のターンの tool result を踏まえて追加質問を投げる。UI は、長時間のターンをストリーミング途中で中断し、そのあと言い直せるようにする必要がある。中断は model 呼び出しの隙間だけでなく、model 呼び出しのあいだで tool が実行中のときにも効かなければならない。マルチターンの状態保持と中断要件の両方を最も満たすのはどれか。", "options": [{"text": "単一の永続的な agent session でターンをまたいで会話を一元管理し、session の stop control を通じて実行中の run を中断する。この stop control は tool call 内のものを含め実際の run を確実に止め、次のリクエストの前に UI が途中までのストリームを取り切れるようにする。", "is_correct": true, "why": "最適。永続的な agent session が connection と会話の lifecycle を保持するため、追加質問は前に取得した tool result を自然に引き継げる。session の stop control は、client 側のループで実行されている tool call 内のものを含め、実際の in-flight run を確実に停止し、次のリクエストの前に UI が途中までのストリームを取り切れるようにする。これこそ、SDK の長寿命 client（interrupt() を持つ ClaudeSDKClient）が担うべき役割である。"}, {"text": "中断を system-prompt のルールとして組み込み、ユーザーの stop phrase が出たら model が停止して制御を返すようにする。ユーザーはこれで長時間の run を止めて言い直せる、という方式。", "is_correct": false, "why": "もっともらしく見える。prompt ルールは stop control のように読めるからである。ただし確率的でしかない。model がその語句を観察し、自発的に停止を選ぶことに依存しており、agent の client 側ループで tool call がすでに実行中のときには発火できない。長時間の tool 駆動ターンが時間を費やすのはまさにその場所である。毎回必ず効くはずの制御を、model の判断に委ねるべきではない。"}, {"text": "framework の one-shot helper を各ターンで呼び出し、それまでの transcript 全体を前に付与して各ターンが過去の result を見えるようにする。run を止めるには周囲の asyncio task を cancel する。", "is_correct": false, "why": "もっともらしく見える。transcript の再提示と task の cancel は、文脈保持と stop control の組み合わせに見えるからである。ただし one-shot helper には永続的な connection や会話の lifecycle がないため、graceful に中断できる in-process run が存在しない。周囲の task を cancel すると、途中までの状態を drain せず捨てることになり、session は次のターンで再利用もできない。transcript の再提示は、native で監視可能な session 管理の代わりに平坦化されたテキストを充てるだけでもある。"}, {"text": "streaming を有効にした one-shot helper を実行し、UI が incrementally に出力を描画できるようにする。run の cancel は stream の読み取りを止めることで行う。", "is_correct": false, "why": "もっともらしく見える。streaming と「読み取りを止める」は cancel のように聞こえるからである。ただし streaming は delivery の仕組みであって制御の仕組みではない。読み取りを止めても影響するのは client だけで、agent の client 側 tool loop は完了するまで動き続ける。そのため abort はストリームの途中では効かず、one-shot helper は相変わらずターンをまたぐ永続的な session を提供しない。"}], "explanation": "決め手は、そのやり取りが継続的でステートフルな会話であり、かつ UI がストリーミング途中でも確実に停止できなければならないかどうかである。framework の one-shot helper（SDK の query()）は自己完結したプロンプト向けに作られている。各呼び出しは単独で完結し、永続的な connection や会話の lifecycle は持たない。長寿命の agent client（SDK の ClaudeSDKClient。async context manager として client.query() と receive_response() を使う）が、マルチターン session 向けの primitive である。connection と会話を保持するため、追加質問は前に取得した tool result を自然に引き継げる。\n\n中断の要件が選択を決定的にする。ここには繰り返し現れる原則が響く。毎回必ず起きなければならないことを、model の判断に委ねるべきではない。agent の tool loop は SDK プロセス内で動き、session の stop control である interrupt() は、model のターンのあいだで tool call が実行されているものを含め、実際の in-flight run を確実に停止し、次のリクエストの前に UI が途中までのストリームを取り切れるようにする。これが、タスクの途中で agent の実行を止めるために公式に文書化された仕組みである。\n\n代替案は要件に近づくが、abort を保証できない。model が stop phrase で自己停止する system-prompt のルール（B）は確率的で、model が観察し従うことに依存し、model のターンのあいだで tool call が実行中のときには作用できない。transcript を one-shot helper に再提示して asyncio task を cancel する（C）は、native な session 管理の代わりに平坦化されたテキストを充てる。graceful に中断できる永続的な connection は存在せず、task の cancel は途中までの状態を drain せず捨てる。response を streaming して読み取りを止める（D）は delivery と制御を混同する。streaming が支配するのは token を client にどう描画するかであって、run が続くかどうかではない。そのため tool loop は問わず最後まで走り切る。詳細は Agent SDK の概要と、query() と ClaudeSDKClient を比較した Python のリファレンスを参照のこと。"}, {"qid": "exam1-q21", "domain": "Prompt and Context Engineering", "type": "mc", "scenario": "インシデント対応エージェントが数百ターンに及ぶ長時間の調査を実行し、各ツール結果は数万トークンに達する。長時間実行の後半になると、以前の発見と矛盾する回答を出したり context-length エラーに陥ったりする。静的プロトコルでは既に prompt caching を有効化しているにもかかわらずである。チームは、コンテキスト量を抑えつつ重要な状態を保持する、デフォルトの context-management 設計を求めている。最適なアプローチはどれか。", "options": [{"text": "1M-context モデルに切り替え、毎回のリクエストで圧縮前のトランスクリプトをすべて保持する。", "is_correct": false, "why": "より大きなコンテキストウィンドウはヘッドルームを増やすが、それはキャパシティであって管理ではない。ツール結果と生成出力は蓄積され続け、キャッシュされたトークンもウィンドウを占有し続け、再呼び出し精度も低下し続ける。状態を保持するのではなく、同じ障害を遅らせるだけである。"}, {"text": "system prompt に、以前の発見を自己要約し毎ターン古いツール結果を再読しないよう指示する一文を追加する。", "is_correct": false, "why": "LLM らしい自然な解決策に見えるが、確率的でしかない。毎ターンモデルが指示に従うかどうかに依存し、トークン数を機械的に抑えることはなく、要約が実際に次のリクエストへ引き継がれる保証もない。指示駆動の振る舞い全般と同様、スキップされうる。"}, {"text": "server-side compaction（beta, Opus 4.6, header `compact-2026-01-12`）を有効化する。API がトリガー閾値に近づくと以前のコンテキストを要約し、会話は圧縮された状態から継続される。", "is_correct": true, "why": "最適。トリガーは閾値（デフォルト 150K トークン）で機械的に発火し、モデルの遵守に依存しない。API は要約を返し、アプリケーションは毎ターンの response content としてそれを保持する。これによりアクティブなコンテキスト量を抑えつつ、以前の状態の要約を保持できる。長時間実行の agentic workflow 向けに公式ドキュメントで示された設計である。"}, {"text": "メッセージ履歴から古い tool-call 結果を定期的に削除し、直近の数ターンだけを完全な形で残す。", "is_correct": false, "why": "トークン削減の技法としては有効。しかし古いツール結果を要約せず破棄するため、以前の発見は保持されずに切り捨てられる。数百ターンにわたって重要な状態を保持するという要件を満たさない。"}], "explanation": "context rot と context-length エラーは、管理されていないコンテキストの兆候であり、キャパシティ不足を意味しない。だから静的プロトコルの caching は効かなかった。キャッシュされたトークンも依然としてウィンドウを占有する。caching はコストとレイテンシを変えるのであって、送信するデータサイズを変えるわけではない。\\n\\nserver-side compaction は、長時間実行の agentic workflow 向けに公式ドキュメントで示された機構（beta, Opus 4.6 のみ, header `compact-2026-01-12`）。有効化すると、API はトリガー閾値（デフォルト 150K トークン）に近づいた時点で以前のコンテキストを要約し、会話は圧縮された状態から継続される。アプリケーション側は通常のマルチターン会話と同様に、毎ターンの response content として返された内容を保持するだけでよい。発火は機械的であり、モデルが指示に従うかどうかに依存しない。一方で要約内容自体はモデルが生成したものである。これによりアクティブなコンテキスト量を抑えつつ、重要な状態の要約を保持できる。\\n\\n他の選択肢が不十分な理由: (A) 1M-context モデルはヘッドルームを増やすがコンテキストを管理しない。ツール結果と生成出力は蓄積され、再呼び出し精度も劣化し続ける。キャパシティは戦略ではない。(B) system prompt の自己要約指示は確率的であり、モデルがスキップしうるうえにトークン数の機械的な上限もない。compaction はその機械的な代替となる。(D) 古いツール結果の削除はトークンを削減するが、要約ではなく破棄するため、要件が保持を求める状態が失われる。compaction だけが、コンテキストを抑えつつ状態の要約を保持する唯一の選択肢である。"}, {"qid": "exam1-q22", "domain": "Tools and MCPs", "type": "mc", "scenario": "ある企業が、Messages API を使って Claude を自社の社内サポートアシスタントに組み込んでいます。ユーザーからの質問に答えるために、パブリックインターネットから到達不可能な社内のアカウントデータベースからレコードを取得しなければならないことがあります。このデータベースをクエリできる唯一の認証情報は企業のアプリケーション自体が保持しており、ルックアップはそのアプリケーション内で実行しなければなりません。チームはどのアプローチを採用すべきでしょうか。", "options": [{"text": "input schema（例えば account_id と要求フィールド）を持つ custom tool を定義し、アプリケーション側で認証付きルックアップを実行して、その結果を tool_result として Claude に返す。", "is_correct": true, "why": "クライアント定義の tool は Claude から tool_use block として出力され、アプリケーション側で実行されます。そのため認証付きルックアップはアプリケーション自身の認証情報とプライベートネットワークアクセスを用いてアプリケーション内で実行され、Claude は標準の tool_result ラウンドトリップでデータを受け取ります。Claude が直接データベースにアクセスする必要はありません。"}, {"text": "アカウントレコードの取得方法とフォーマット方法を示す詳細な指示と複数の few-shot example を system prompt に追加し、ユーザーがアカウントについて尋ねたときにモデルが確実にルックアップを実行するようにする。", "is_correct": false, "why": "指示や few-shot example はモデルが望ましい出力を生成する確率を調整するだけであり、到達手段のないデータへのアクセスを Claude に与えることはできません。指示をどれだけ強く書いてもプライベートデータベースにはモデルから到達できず、これは指示を繰り返し強調してもモデルが呼び出せないサービスに到達できないのと同じで、根本的に欠けている能力に対する確率的な修正にすぎません。"}, {"text": "custom tool を定義せずに、Claude がアカウントレコードのフィールドを typed JSON として返すよう要求する JSON schema を伴う structured outputs を使用する。", "is_correct": false, "why": "structured outputs は Claude の応答の形状（shape）だけを制約し、データを取得する仕組みは提供しません。tool がなければモデルにはプライベートレコードの取得元がなく、実際のレコードを取得する代わりに捏造したり空のフィールドを返したりしてしまいます。"}, {"text": "アカウントデータベースを Anthropic-hosted tool として登録し、必要になったときに Claude のインフラストラクチャがモデルの代わりにレコードを取得するようにする。", "is_correct": false, "why": "Anthropic の hosted tools は、特定のパブリックまたは Anthropic 管理のエンドポイントに対して実行される固定のサービス群（web search や code execution など）です。チームが自社のプライベートデータベースを hosted tool として登録することはできません。custom tools は tool_use block として出力され、プライベートネットワークと認証情報が存在するアプリケーション側（クライアント側）で実行される必要があります。"}], "explanation": "正解: A。ルックアップは、データベースの認証情報とプライベートネットワークアクセスを保持するアプリケーション内で実行されなければなりません。custom client tool がそのための仕組みです。Claude が schema で検証された引数とともに tool_use block を出力し、アプリケーションが認証付きルックアップを実行して tool_result を返すため、認証情報・ネットワークアクセス・実行のすべてがアプリケーション側に留まります。\n\n他の選択肢が不適切な理由: B は LLM 的なアプローチです。指示や few-shot example は望ましい出力の確率を動かすだけで、到達手段のないデータへのアクセスを作り出すことはできず、プロンプトをどれだけ工夫しても Claude はプライベートレコードを取得できません。C（structured outputs）は応答の形状のみを制約しデータソースを提供しないため、tool がなければモデルはフィールドを捏造するか空で返すしかありません。D は tool の実行場所を誤解しています。Anthropic の hosted tools は特定のパブリックまたは Anthropic 管理のサービスに対して実行される固定のセットであり、チームが自社のプライベートデータベースをそこに登録することはできません。一方 custom tools は tool_use block として出力され、プライベートネットワークと認証情報が存在するアプリケーション側で実行されます。"}, {"qid": "exam1-q23", "domain": "Tools and MCPs", "type": "mc", "scenario": "あるゲームスタジオが、プロシージャルゲーム向けのレベル仕様を生成する Claude ベースのツールを構築している。生成された各レベルは、設計ルール集に準拠し、再利用可能なバイオームとエンカウンターのテンプレートから組み立てられ、さらにパッケージ化されたバリデータスクリプトの一群（マップ到達可能性、難易度予算の強制、アセット参照チェック）に合格しなければならない。これらのバリデータは、生成されたすべてのレベルに対して実際に実行される必要がある。設計ルール集、テンプレート、バリデータはビルドエージェント上で自己完結して動作し、スタジオの内部アセットサーバーや公開ネットワークのエンドポイントを呼び出してはならない。どのアプローチが要件に最も適しているか。", "options": [{"text": "設計ルール集、テンプレート、バリデータスクリプトを Agent Skill としてバンドルし、code execution tool を有効化して、バリデータがそのサーバーサイド sandbox 内で実行されるようにする。", "is_correct": true, "why": "最適。Skill は再利用可能なガイダンス、テンプレート、スクリプトを progressive disclosure のもとでバンドルし、レベル生成タスクで必要になったときだけロードされる。code execution tool は（アウトバウンドのネットワークアクセスを持たない）サーバーサイド sandbox を提供し、その中でパッケージ化されたバリデータが実際に実行される。内部サービスにも公開サービスにも一切呼び出しを行わずに、すべての要件を満たせる。"}, {"text": "設計ルール集とテンプレートを system prompt に記述し、Claude に対して各バリデーションチェックをレスポンス内で実行するよう指示する。さらに、正しくバリデーションされたレベルの few-shot example で指示を補強する。", "is_correct": false, "why": "もっともらしい。system prompt は恒久的なガイダンスの自然な置き場所であり、few-shot example は各ルールが適用される確率を高める。しかし、モデルにバリデータをインラインで実行させるのは確率的であり（チェックをスキップしたり誤適用したりする）、プロンプトはパッケージ化されたスクリプトを実行できる sandbox を提供せず、設計ルール集全体が毎ターン再送される。"}, {"text": "各設計ルール、テンプレート、バリデータを custom client tool としてモデリングし、アプリケーションがそれを呼び出して Claude に返す。", "is_correct": false, "why": "もっともらしい。custom client tool は Claude に呼び出し可能な機能を与えるための標準的な仕組みである。しかし、安定したガイダンスやテンプレートのナレッジストアとして tool の抽象化を誤用し、オーケストレーションのオーバーヘッドと「ある呼び出しでどのルールが適用されるか」の非決定性を増やし、バリデータの実行をパッケージ化された sandbox ではなくアプリケーション側で行わせてしまう。"}, {"text": "設計ルール集、テンプレート、バリデータを local stdio MCP server として公開し、Messages API の MCP connector 経由で接続する。", "is_correct": false, "why": "もっともらしい。MCP は Claude にツールやリソースを渡すための標準的な手段である。しかし、Messages API の managed connector は HTTP ベースのトランスポート（SSE / streamable HTTP）経由でしかサーバーに到達できない。local stdio server には、managed connector ではなく、Claude Desktop、Agent SDK、Claude Code のようなクライアントサイドの MCP ホストから到達する。仮にリモートサーバーにしたとしても、公開到達可能な HTTPS エンドポイントと OAuth が必要となり、それ自体が no-public-network の制約を破ってしまう。"}], "explanation": "設計ルール集、テンプレート、バリデータは安定しており自己完結している。つまり、再利用されるガイダンスとテンプレートに加えて、決定的に実行されるスクリプトがあり、生成時に内部サービスや公開サービスへ到達することはない。Agent Skill はこの3つをすべて progressive disclosure のもとでパッケージ化し（レベル生成時にのみロード）、code execution tool がバリデータが実際に実行されるサーバーサイド sandbox を提供する。この組み合わせだけが、再利用可能なガイダンス、テンプレートの再利用、決定的なスクリプト実行を同時に実現する。\\n\\n他の選択肢が適さない理由は次のとおりである。system prompt と few-shot を組み合わせる方法では、モデルにバリデータをインラインで近似させることしかできず（確率的であり、sandbox もない）、毎ターン設計ルール集を再ロードする。custom client tool は tool の抽象化をナレッジストアとして誤用し、バリデータの実行をアプリケーション側に押し込めてしまう。Messages API の managed MCP connector はリモートの HTTP ベースのサーバーにしか到達できないため、local stdio server には届かず、リモートサーバーにしたとしても公開 HTTPS エンドポイントが必要となり、no-public-network の制約に違反する。\\n\\nAnthropic の Agent Skills overview、code execution tool documentation、tool-use overview、MCP connector documentation を参照のこと。"}, {"domain": "Eval, Testing, and Debugging", "explanation": "SSE ストリーミングでは、ストリームを開く HTTP 200 はトランスポート層の確認にすぎない。接続が受け付けられたことを示すだけで、レスポンスが完了したことを意味しない。サーバーはイベントの送信を開始したあとに event: error を送ることがあり、そのペイロードは構造化された error オブジェクトを運ぶ。これは完了の合図ではなく、生成の失敗である。overloaded_error は HTTP 529 に対応する一時的なサーバー過負荷なので、exponential backoff でリトライ可能であり、公式 SDK も自動的に同じ振る舞いをする。\n\n選択肢Bは判断自体は正しいが、分岐の基準にするフィールドを間違えている。error.message は人間向けの自由形式テキストで、同一エラーでも文字列が異なり得る。API が分岐のために公開している安定した機械可読の分類子は error.type である。\n\n選択肢Cはレイヤーを読み違えている。HTTP 200 と部分 delta の組み合わせは、完了したレスポンスではなく、部分的で失敗したレスポンスを示す。\n\n選択肢Dは、決定論的なクライアント側処理を要する問題に対する LLM 流の解決策である。モデルはサーバー側の過負荷を観測も予測もできないため、プロンプトの指示でこのエラーを予防・予知することはできない。", "options": [{"is_correct": true, "text": "生成の失敗とみなし、同じリクエストを exponential backoff でリトライする。overloaded_error はサーバー側の一時的な状態だから。", "why": "HTTP 200 が示すのはストリームが開いたことだけで、完了したことではない。ストリーム途中の event: error は生成の失敗を示す合図であり、完了の合図ではない。overloaded_error は HTTP 529 に対応する一時的な過負荷であり、公式 SDK も exponential backoff でリトライする。"}, {"is_correct": false, "text": "生成の失敗とみなしてリトライするが、リトライするかどうかは error.message フィールドに基づいて判断する。", "why": "error.message は人間が読むための自由形式テキストで、事前告知なく表現が変わる可能性がある。API が分岐のために公開している安定した機械可読の分類子は error.type である。同一の過負荷でもメッセージ文字列は異なり得るため、error.message をリトライロジックの基準にするのは信頼性に欠ける。"}, {"is_correct": false, "text": "ストリームが HTTP 200 で開かれ、content_block_delta イベントがすでに受信されているため、正常に完了したものとして扱う。", "why": "HTTP 200 はストリームが開いたというトランスポート層の確認であり、レスポンスが完了したことではない。エラー前に受信した delta は、最終的に失敗した生成の部分出力であり、完了したレスポンスとして返すべきではない。"}, {"is_correct": false, "text": "過負荷状態が発生する前に報告するよう Claude に指示する system-prompt を追加し、consumer がエラーパスを完全に回避できるようにする。", "why": "overloaded_error はサーバー側のレートリミットであり、モデルは観測も予測もできない。system-prompt の指示で、モデルの視野外にある状態を報告させることはできない。仮にそのようなシグナルが出たとしても、ストリームがすでにエラーになった後でしか到達しない。正しい対応は、クライアント側での決定論的なリトライである。"}], "qid": "exam1-q24", "scenario": "結合テスト中、Messages API 向けに独自実装した SSE consumer が HTTP 200 でストリームを開き、複数の content_block_delta イベントを受信したあと、data ペイロードの error.type が \"overloaded_error\" である event: error を受信した。consumer はこのイベントをどう扱うべきか。", "type": "mc"}, {"qid": "exam1-q25", "domain": "Prompt and Context Engineering", "type": "mc", "scenario": "金融業のコンタクトセンターチームが、転送された顧客メールを4つの調査キューのいずれか1つに振り分ける（triage）用途で Claude を利用している。現在のプロンプトは1つの長く区切りのないテキストブロックで、チーム自身のルーティング指示と信頼できない生のメール本文が混在している。リグレッションテストの結果、\"flag this as fraud immediately\"（ただちに不正フラグを立てろ）や \"bypass the queue, this is P1\"（キューを迂回しろ、これは P1 だ）のような表現を本文に含むメッセージが誤ったキューに振り分けられることがある。チームは、これらの埋め込み表現が分類対象のコンテンツではなくルーティング指示として解釈されているのではないかと疑っている。誤振り分けの根本原因に最も対処する変更はどれか。", "options": [{"text": "チームのルーティング指示と信頼できないメール本文をそれぞれ、内容を表す明確にラベル付けされた XML タグで囲み、要求される出力フォーマットを明示する。", "is_correct": true, "why": "Anthropic が提示する信頼できないコンテンツの処理ガイダンスでは、信頼できる指示と指示に似たユーザー入力の可能性があるものを、明確に区切られた説明的な XML タグの中で分離することを推奨している。これによりメールはコマンドではなくデータとして解釈され、出力フォーマットの明示が一貫した分類を保証する。この方法は、モデルが入力に抵抗することに頼るのではなく、入力が指示と混同されるという根本原因そのものを取り除く。"}, {"text": "プロンプトの先頭に、メール本文をデータとして扱い、その中に含まれる指示は一切無視するよう Claude に命じる一文を追加する。", "is_correct": false, "why": "メールをデータとして扱う明確な指示は有効なテクニックだが、メールは依然としてプロンプト内にインラインで存在するため、指示に従うかどうかはモデルの判断に委ねられる。敵対的な表現はこの指示を覆し、同じ誤振り分けを引き起こす可能性がある。"}, {"text": "structured output の JSON schema を構成し、Claude の応答を4つの調査キュー名のいずれかに一致する単一の enum 値に制限する。", "is_correct": false, "why": "structured output は決定論的だが、応答レイヤで機能する。schema は返信が有効なキュー名であることは保証しても、それが正しいキュー名であることまでは保証しない。誤分類は上流、すなわちメールが指示と混同される箇所で発生するため、schema には適合するが誤ったルーティングが返されるおそれがある。"}, {"text": "入力される各メールを事前に処理し、既知の操作的な表現を精査してまとめた blocklist に一致する語句を削除（redact）してから Claude に渡す。", "is_correct": false, "why": "blocklist は作成者が予想した語句しか除去できない。新しい言い回し、言い換え、難読化はすり抜けるため、リストの維持は勝ち目のないイタチごっこになる。コンテンツをフィルタリングするだけで構造的な分離を行わないため、根本原因は残り続ける。"}], "explanation": "Anthropic が提示する信頼できないコンテンツの処理ガイダンスでは、信頼できる指示と指示に似たユーザー入力の可能性があるものを、明確に区切られた説明的な XML タグの中で分離することを推奨している。これによりメールはコマンドではなくデータとして解釈され、明示的な出力フォーマットとの組み合わせで一貫した分類が実現する。この構造的な分離は、正しい振る舞いの確率を高めるにとどまらず、入力が指示と混同されるという根本原因そのものを取り除く。プロンプト先頭の指示（B）は、メールが依然として指示とインラインで存在し、モデルが進んで従うことに依存するため、敵対的な表現で覆される可能性がある。structured output（C）は真に決定論的だが、応答レイヤで機能する。返信が有効なキュー名であることは保証しても正しいキュー名であることは保証しないため、誤振り分けを引き起こす上流の混同は防げない。blocklist の事前処理（D）は予想された語句のみをフィルタリングし、入力を分離しないまま新しい表現に対するイタチごっこに敗れる。プロンプトの変更全般に言えることだが、改訂後のルーティングワークフローは直感だけで判断せず、測定可能な基準に基づく evaluation を構築して検証すべきである。"}, {"qid": "exam1-q26", "domain": "Prompt and Context Engineering", "type": "mc", "scenario": "Caldera Logisticsの運用チームは、配車ディスパッチャーの例外ノートをClaudeに入力し、各出荷例外についてJSON形式のインシデントレコードを返すよう求めている。初期テストでは出力が不安定で、例外タイプのキーが `exception_code` と `disruption_type` の間で揺れ、約8回に1回は閉じ波括弧の後に自由形式のテキストサマリーが付加される。チームは出力を一貫させたい。最も適切なアプローチはどれか。", "options": [{"text": "客観的な合格基準と代表的なノートからなる小規模な評価セットを定義し、そのテストに照らしてプロンプトを反復改善する。これにより各変更を、出力を目視で確認するのではなく測定によって検証する。", "is_correct": true, "why": "Anthropicのガイダンスでは、反復改善に取り掛かる前に成功基準を定義し評価セットを構築することが推奨されている。これにより各プロンプト変更が、都合の良い少数の出力を目視で確認するのではなく、測定可能なテストで検証される。この方法は、チームが「改訂によって揺れが減ったかどうか」を判断できないという問題を直接的に解決する。"}, {"text": "Claudeのassistant turnの先頭に `{` をプレフィル（事前入力）し、すべてのレスポンスがJSONオブジェクトとして始まるよう強制する。これによりキーの揺れと末尾のコメントを発生源で排除する。", "is_correct": false, "why": "assistant turnに `{` をプレフィルするのは標準モードのMessages APIにおける正規のテクニックであり、extended thinkingが有効な場合（本シナリオでは未使用）にのみ禁止される。ただし制御できるのはレスポンスの先頭のみで、オブジェクト内部で誤ったキー名が出力されたり閉じ波括弧の後に散文が付加されたりするのは防げない。結果として報告されたどちらの症状も解決しない。"}, {"text": "各ディスパッチャーの例外ノートをsystem promptに移動し、Claudeがそれを権威的な指示として扱うようにする。同時にuser turnをレコード要求の固定1行にまで減らす。", "is_correct": false, "why": "system promptには持続的な重みがあるが、これはすべての会話に適用される安定した指示を想定したものであり、リクエストごとの例外ノート向けではない。入力をそこに移しても出力スキーマの一貫性は強制されない。報告された問題が出力フォーマットの問題だからである。"}, {"text": "指示を厳格化し、コメントなしで必須キーのみを要求する。その後、サンプル出力を確認しながら一貫して正しく見えるまで文言を磨き続ける。", "is_correct": false, "why": "明示的な出力制約を設けるのは、確かに修正の一部である。しかしサンプル出力が正しく見えるまで文言を磨くのは直感による反復であり、客観的な合格基準と評価セットがなければ、変更が本当に揺れを減らしたかを判断できない。これは「測定優先」のサイクルが防ぐべきアンチパターンそのものである。"}], "explanation": "正解: A。Anthropicのプロンプトエンジニアリングガイダンスは、効果的な反復改善を「何かを変更する前に成功基準を定義し、評価セットを構築すること」として位置付けている。これによりチームは改訂が揺れを減らしたかを客観的に確認できる。構造的な修正（明示的な出力制約・XMLタグ付きセクション・厳選された少数の例）は、機能すると仮定するのではなく、それらのテストに対して検証される。\\n\\n他の選択肢が不適切な理由: Bのassistant turnのプレフィルは標準モードの有効なテクニック（extended thinkingがオンの場合にのみ禁止、本シナリオでは未使用）だが、修正できるのは最初のトークンだけである。オブジェクト内部で誤ったキー名が出力されたり閉じ波括弧の後に散文が付加されたりするのは防げない。Cはsystem promptの誤用であり、system promptは会話全体の安定した指示向けであってリクエストごとの例外ノート向けではなく、入力をそこに移しても出力スキーマは強制されない。Dは修正の一部（明示的な制約）を正しく捉えているが、サンプルを目視で確認しながら文言を磨くのは直感による反復であり、合格基準と評価セットがなければチームは改訂が挙動を改善したかを判断できないままである。"}, {"qid": "exam1-q27", "domain": "Prompt and Context Engineering", "type": "mc", "scenario": "ケースレビューを担当する agent は、context window に迫るような長期のマルチターンにわたる係争を処理します。セッションを継続させるため、チームは server-side compaction を有効にしました。ところが session store は各 assistant response の `text` field だけを永続化し、他の content block はすべて破棄しています。compaction 発生後、以降のターンでは過去の決定が参照されなくなります。continuity を最もよく保てる変更はどれですか？", "options": [{"text": "毎ターン assistant の `content` array 全体を（compaction block を含めて）保存し、`text` field だけを永続化する現在の挙動をやめる。", "is_correct": true, "why": "ドキュメントに記載された仕組みです。server-side compaction は assistant response の `content` array 内に構造化 compaction block を挿入し、次回の request で API はその block を compact 済み履歴の代替として扱います。完全な `content` を保存して再送すれば block は維持されますが、`.text` だけを取り出すと暗黙的に破棄されてしまいます。結果として continuity は確定的になり、モデル任せにはなりません。"}, {"text": "system prompt に指示を追加し、各 response の冒頭で過去の決定を再述させることで、モデル自身が内容を引き継ぐようにする。", "is_correct": false, "why": "もっともらしい選択肢です。決定を再述すれば continuity が保たれるように聞こえますが、モデルの裁量に依存しています。再述が部分的になったり、言い換えられたり、省略されたりする可能性があり、API が再利用する構造化 block ではなく普通の prose を往復させるだけです。continuity の可能性は高まりますが、保証はされません。"}, {"text": "各 compaction 発生後に、それまでの決定について prose summary をモデルに書かせ、以降のターンでその summary を user message として再送する。", "is_correct": false, "why": "もっともらしい選択肢です。prose summary は確かに情報を前へ運びますが、普通のテキストであり、API が特別扱いする構造化 compaction block ではありません。user message として再送しても block の代替にはならず、サーバーがすでに生成した compact 済み state が使われないままになります。"}, {"text": "session store はそのままに、より高能力な model に切り替えて、長いセッション全体で過去の context をより確実に保持させる。", "is_correct": false, "why": "もっともらしい選択肢です。高能力な model の方が多くを保持するように見えますが、モデルが関与する前に決定は失われています。session store は model にかかわらず compaction block を破棄します。能力の向上も確率的であり、request に再入り込まない content を回復することはできません。"}], "explanation": "server-side compaction は通常の assistant prose を生成するわけではありません。assistant response の `content` array 内に構造化 compaction block を挿入し、次回の request で API がその block を compact 済み履歴の代替として使用します。これが、長いセッションを context limit を超えて実行しながら continuity を保つ仕組みです。ドキュメントのガイダンスでは、毎ターン `response.content`（`text` field だけでなく完全な content array）を再送することを推奨しています。text だけを取り出すと compaction state が暗黙的に失われます。3つの誤答選択肢はいずれも continuity の仕事をモデルに押し付けています。system prompt での再述指示(B)はモデルの裁量に依存し prose を往復させます。モデルが書いた prose summary を user message として再送する(C)は普通のテキストであり、API が再利用する構造化 block ではありません。より高能力な model への切り替え(D)は session store が破棄した block を回復できず、やはり確率的です。共通の間違いは、API がすでに確定的な仕組みを提供しているのに、continuity をモデルが処理すべきものとして扱っていることです。公式の Compaction guide と Context windows guide を参照してください。"}, {"qid": "exam1-q28", "domain": "Claude Code", "type": "mc", "scenario": "ある決済会社のオンコールツールチームは、毎晩スケジュールされたジョブで Claude Code を実行し、決済失敗の異常をトリアージしている。このジョブは次の要件を満たさなければならない。terminal UI を起動せず無人で実行すること。agent が作業する様子をリアルタイムで描画するステータスコンソールに進行状況を供給すること。スタックした実行が無限ループに陥らないよう tool turns の数を固定で制限すること。トリアージ完了と同時に終了すること。これらの要件を最も満たす invocation はどれか。", "options": [{"text": "各 nightly invocation で `claude -p --verbose --output-format stream-json --max-turns 15 \"<triage prompt>\"` を実行する。", "is_correct": true, "why": "Print mode (`-p`) はプロンプトを headless で実行し、完了すると terminal UI を一切開かずに終了する。`--print` 配下では `stream-json` は `--verbose` に依存し（これがないと CLI がエラーになる）、両方を指定すると実行が進むにつれて newline-delimited の JSON メッセージイベント（assistant turns, tool calls, tool results）が段階的に出力されるため、ステータスコンソールは進行をライブで描画できる。`--max-turns 15` は agentic loop のターン数を固定で制限し、harness が強制する。モデルの判断に関わらず実行はこの上限を超えない。つまり、スタックした実行はモデルの判断ではなく CLI によって抑え込まれる。3 つの要件はすべて、モデルの裁量の及ばない機構によって満たされる。"}, {"text": "`claude -p --verbose --output-format stream-json \"<triage prompt>\"` を実行し、system prompt に「15 回程度の tool call で終わらせるよう」指示を 1 行追加する。", "is_correct": false, "why": "Print mode、必須の `--verbose`、streaming 出力はいずれも正しく、invocation は実行できる。しかしターン上限は自然言語の指示であり、停止する確率を上げるだけで終了を保証しない。上限が強制力のある CLI gate ではなくモデルの裁量の内にあるからだ。モデルは大抵従うが、無限ループがあってはならない無人自動化において、モデルが上書きできる上限は上限ではない。これは hook が繰り返しの指示より優れている理由と同じ、決定論と確率論の差である。"}, {"text": "invocation を `timeout 900 claude -p --verbose --output-format stream-json \"<triage prompt>\"` でラップし、15 分後にプロセスを kill する。", "is_correct": false, "why": "wall-clock の上限は真に決定論的であり（モデルが無視できない OS シグナルで強制されるため）、確率論だと片付けることはできない。しかし制限をかけるのは tool turns ではなく経過時間である。1 回の長時間 tool call がわずか数ターンで予算を使い切ることもあれば、高速なターンの連発が制限内に収まりながら妥当なターン数をいくらでも超えることもある。制限をかける対象が要件と一致しないため、ターン数は事実上無制限のままである。"}, {"text": "各 nightly invocation で `claude -p --output-format json --max-turns 15 \"<triage prompt>\"` を実行する。", "is_correct": false, "why": "Print mode と決定論的なターン上限は正しく、invocation も実行できる。しかし `json` は実行完了後に単一の batch document を 1 つだけ出力する、streaming ではなく batch-output のアーキテクチャである。進行をライブで描画しなければならないステータスコンソールは streaming consumer であり、完了まで何も出力しないアーキテクチャでは、他の flag がどれだけ正しくても供給できない。"}], "explanation": "Claude Code の print mode (`claude -p`) は無人自動化のために公式に文書化されたアーキテクチャである。terminal UI を起動せずに 1 つのプロンプトを agent loop で実行し、完了すると終了する。まさにスケジュールジョブが必要とするライフサイクルだ。進行状況を streaming するには output format を `stream-json` にしなければならないが、`--print` 配下ではこの format は `--verbose` に依存する。これを指定しないと CLI は `stream-json` を拒否する（runtime error: \"When using --print, --output-format=stream-json requires --verbose\"）。両方の flag を指定すると、実行が進むにつれて newline-delimited の JSON メッセージイベント（assistant turns, tool calls, tool results）が段階的に出力される。そのためライブコンソールは最終 payload を待つことなく進行を描画できる。別途存在する `--include-partial-messages` はその stream の上に重ねる token レベルのオプション拡張であり、前提条件ではない。ターンの上限は `--max-turns` で、harness が強制する CLI flag として agentic loop を固定回数に制限する。モデルの判断に関わらず実行はこの上限を超えない（実行時に検証可能で、`--max-turns 1` で実行すれば 1 ターンで終了する）。つまり、スタックした実行はモデルの判断ではなく harness によって抑え込まれる。3 つの要件（headless, live, bounded）はいずれもモデルの裁量の及ばない機構によって満たされる。\\n\\n誤答選択肢 B は `--max-turns` の代わりにプロンプトの指示で代用する。invocation は実行でき、モデルも大抵従う。しかし自然言語の指示は停止する確率を上げるだけであり、停止を保証しない。これは hook（Purcell 1.4）が繰り返しの指示より優れている理由と同じ、決定論と確率論の差である。無限ループがあってはならない無人自動化において、モデルが上書きできる上限は上限ではない。誤答選択肢 C は invocation を wall-clock の timeout でラップする。これは決定論的（モデルが無視できない OS シグナル）だが、制限をかける対象が間違っている。tool turns ではなく経過時間である。1 回の長時間 tool call がわずか数ターンで時間予算を使い切ることもあれば、高速なターンの連発が制限内に収まりながら妥当なターン数をはるかに超えることもある。制限をかける量が要件と一致しない。誤答選択肢 D は正しい headless mode と決定論的なターン上限を備え、invocation も実行できるが、実行完了後に単一の batch JSON document を 1 つだけ出力する。進行をライブで描画しなければならないコンソールは streaming consumer であり、完了まで何も出力しない batch アーキテクチャでは、他の flag がどれだけ正しくても供給できない。各誤答選択肢はいずれも実行可能な invocation でありながら、enforcement reliability（強制の信頼性）・the bounded dimension（制限をかける対象）・output architecture という特定の 1 つの軸で失敗している。したがって、どれも「flag の抜け落ちを見つける」程度では排除できず、要件がどのアーキテクチャを求めているかを考えなければ排除できない。公式
