<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sundog Exam2 — Purcell難易度改題 | CCDV-F 本番シミュレーション</title>
<style>
:root{--udemy:#a435f0;--udemy-d:#8710d8;--ok:#1e8e3e;--bad:#c41e3a;--warn:#b26a00;
--bg:#f7f8fa;--card:#fff;--ink:#1c1d1f;--sub:#6a6f73;--line:#d1d7dc;--sel:#e6f0fa;}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;
background:var(--bg);color:var(--ink);line-height:1.7;font-size:15px;}
header.bar{position:sticky;top:0;z-index:50;background:var(--ink);color:#fff;padding:10px 20px;
display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
header.bar .title{font-weight:700;font-size:15px;}
header.bar .timer{background:rgba(255,255,255,.12);padding:6px 14px;border-radius:6px;font-family:"SF Mono",Menlo,monospace;font-size:15px;font-weight:600;}
header.bar .timer.warn{background:var(--bad);}
header.bar .spacer{flex:1;}
header.bar button{background:var(--udemy);color:#fff;border:none;padding:8px 18px;border-radius:6px;font-weight:700;cursor:pointer;font-size:14px;}
header.bar button:hover{background:var(--udemy-d);}
.wrap{max-width:980px;margin:0 auto;padding:20px;}
.qmeta{color:var(--sub);font-size:13px;margin-bottom:8px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.qmeta .pill{background:#ecebfb;color:var(--udemy-d);padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;}
.qmeta .pill.mc{background:#e6f4ea;color:var(--ok);}
.qmeta .markbtn{margin-left:auto;background:none;border:1px solid var(--line);border-radius:6px;padding:3px 10px;cursor:pointer;font-size:12px;color:var(--sub);}
.qmeta .markbtn.on{background:#fff3cd;color:var(--warn);border-color:var(--warn);}
.scenario{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:20px 24px;margin-bottom:16px;font-size:15.5px;}
.scenario .lead{font-weight:700;margin-bottom:6px;color:var(--udemy-d);}
.opts label{display:block;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:14px 18px;margin-bottom:10px;cursor:pointer;transition:.12s;}
.opts label:hover{border-color:var(--udemy);}
.opts input{margin-right:10px;}
.opts label.sel{border-color:var(--udemy);background:var(--sel);}
.opts label.ans-ok{border-color:var(--ok);background:#e6f4ea;}
.opts label.ans-bad{border-color:var(--bad);background:#fde7ea;}
.opts label.ans-miss{border-color:var(--warn);background:#fff3cd;}
.nav{display:flex;justify-content:space-between;align-items:center;margin:24px 0;gap:10px;flex-wrap:wrap;}
.nav button{background:var(--card);border:1px solid var(--line);padding:9px 22px;border-radius:6px;cursor:pointer;font-weight:600;color:var(--ink);}
.nav button:disabled{opacity:.4;cursor:not-allowed;}
.nav button.primary{background:var(--udemy);color:#fff;border-color:var(--udemy);}
.palette{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:18px;}
.palette .ptitle{font-size:12px;color:var(--sub);margin-bottom:8px;}
.palette .cells{display:flex;flex-wrap:wrap;gap:6px;}
.palette .cell{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:6px;cursor:pointer;font-size:13px;background:var(--card);}
.palette .cell.ans{background:#e6f4ea;border-color:var(--ok);color:var(--ok);}
.palette .cell.flag::after{content:"★";color:var(--warn);position:absolute;transform:translate(11px,-11px);font-size:10px;}
.palette .cell.cur{outline:2px solid var(--udemy);}
.palette .cell.incorrect{background:#fde7ea;border-color:var(--bad);}
.hidden{display:none;}
/* Results */
.results-hero{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:28px 32px;margin-bottom:20px;}
.results-hero .score{font-size:42px;font-weight:800;}
.results-hero .pass{color:var(--ok);} .results-hero .fail{color:var(--bad);}
.results-hero .sub{color:var(--sub);font-size:14px;margin-top:4px;}
.dtable{width:100%;border-collapse:collapse;font-size:13.5px;background:var(--card);}
.dtable th,.dtable td{padding:9px 11px;border-bottom:1px solid var(--line);text-align:left;}
.dtable th{background:#f0f1f3;color:var(--sub);font-weight:600;}
.dtable td.num{text-align:center;font-variant-numeric:tabular-nums;}
.bar-cell{background:#eee;border-radius:4px;height:8px;overflow:hidden;}
.bar-cell>div{height:100%;background:var(--ok);}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0;}
.filters button{background:var(--card);border:1px solid var(--line);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;}
.filters button.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.rq{background:var(--card);border:1px solid var(--line);border-radius:8px;margin-bottom:12px;overflow:hidden;}
.rq>.rhead{padding:12px 18px;display:flex;gap:10px;align-items:center;cursor:pointer;}
.rq>.rhead .st{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;}
.rq>.rhead .st.correct{background:#e6f4ea;color:var(--ok);}
.rq>.rhead .st.incorrect{background:#fde7ea;color:var(--bad);}
.rq>.rhead .st.marked{background:#fff3cd;color:var(--warn);}
.rq>.rhead .qno{font-weight:700;}
.rq>.rhead .hint{margin-left:auto;color:var(--sub);font-size:12px;}
.rq.open>.rbody{display:block;}
.rbody{display:none;padding:0 18px 16px;}
.rbody .scenario{margin-bottom:12px;}
.rbody .opt{padding:10px 14px;border:1px solid var(--line);border-radius:6px;margin-bottom:7px;font-size:14px;position:relative;}
.rbody .opt.correct{border-color:var(--ok);background:#e6f4ea;}
.rbody .opt.correct::before{content:"✓ 正解";color:var(--ok);font-weight:700;font-size:11px;position:absolute;top:8px;right:10px;}
.rbody .opt.you-wrong{border-color:var(--bad);background:#fde7ea;}
.rbody .opt.you-wrong::before{content:"✗ あなたの選択";color:var(--bad);font-weight:700;font-size:11px;position:absolute;top:8px;right:10px;}
.rbody .opt .why{font-size:12.5px;color:var(--sub);margin-top:4px;}
.rbody .exp{background:#f7f8fa;border-left:3px solid var(--udemy);padding:10px 14px;border-radius:0 6px 6px 0;font-size:13.5px;margin-top:10px;}
.footer{text-align:center;color:var(--sub);font-size:12px;margin:30px 0 60px;}
</style>
</head>
<body>
<header class="bar">
  <div class="title">CCDV-F Practice Exam 2 — Purcell Hardened</div>
  <div class="timer" id="timer">120:00</div>
  <div class="spacer"></div>
  <button id="finishBtn" onclick="finishExam()">Finish Exam</button>
</header>
<div class="wrap">
  <!-- Exam view -->
  <div id="exam">
    <div class="palette">
      <div class="ptitle">Question palette ★=Marked</div>
      <div class="cells" id="palette"></div>
    </div>
    <div id="qpanel"></div>
    <div class="nav">
      <button id="prevBtn" onclick="go(-1)">◀ Prev</button>
      <span id="qpos" style="color:var(--sub);font-size:13px"></span>
      <button id="nextBtn" class="primary" onclick="go(1)">Next ▶</button>
    </div>
  </div>
  <!-- Results view -->
  <div id="results" class="hidden"></div>
  <div class="footer">Sundog Exam2 を Purcell 難易度（厳しい distractor）に改題したオリジナル問題集 · 解説は Anthropic 公式 doc 準拠 · 53問</div>
</div>
<script>
const QUESTIONS = [{"qid": "exam2-q1", "domain": "Tools and MCPs", "type": "mc", "scenario": "データ分析チームは、Streamable HTTP transport 上で動くローカル MCP server をバックエンドに持つ Claude assistant を運用しており、その server は独自の顧客データベースを公開している。アナリストは同じマシン上でウェブブラウザを使用する。チームが必要としているのは、assistant が完全に prompt injection を受けてもなお有効な防御である。その保証を与えるのはどのアプローチか。", "options": [{"text": "すべての受信リクエストで Origin header を検証し、server を loopback のみに bind し、auth token を要求する。これらはすべて、セッションが作成される前、ツールが起動される前に server の middleware で強制する。", "is_correct": true, "why": "正解。ブラウザから到達可能な Streamable HTTP server に対して MCP 仕様が定める3つの階層的防御である。Origin を検証して（MUST）DNS rebinding を防ぎ、localhost に bind して（SHOULD）ネットワークの攻撃面を縮小し、認証を要求して（SHOULD）defense in depth を図る。3つとも model が関与する前に server middleware で実行される。完全な prompt injection 下でも成り立つ理由はこれ一点に尽きる — model にこのチェックを任せないからだ。"}, {"text": "server を loopback のみに bind し、auth token を要求し、さらに system prompt に「assistant は各ツール呼び出しが信頼されたデスクトップクライアント由来であることを実行前に確認せよ」というルールを追加する。", "is_correct": false, "why": "もっともらしい。2つの実効あるコントロールを維持し、由来の確認ルールも defense in depth の衛生策に見えるからだ。しかし、そのルールを強制するのは攻撃者が prompt injection しているまさにその model であり、そもそも model は HTTP Origin header にアクセスできない。「model が正しく振る舞うこと」に依存する保証は、定義上、保証ではない。"}, {"text": "有効な証明書で TLS を終端し、loopback のみに bind し、auth token を要求したうえで、server 側で Origin を検証する代わりに、ブラウザの same-origin policy に cross-origin request を拒否させる。", "is_correct": false, "why": "もっともらしい。TLS、loopback、auth はいずれも本物のコントロールだからだ。しかし DNS rebinding はまさに「ブラウザが通信相手だと信じ込んでいる origin」を攻撃者が制御することで成立する。つまりブラウザの same-origin policy こそ、rebinding が迂回する境界そのものである。Origin は server 自身が検証しなければならず、これをブラウザに委ねると、そのコントロールが閉じるために存在する唯一の隙間を残すことになる。"}, {"text": "loopback のみに bind し、auth token を要求するが、server 側での Origin 検証はスキップし、loopback 境界と認証で内部ツールとして十分なアクセス制御ができているとみなす。", "is_correct": false, "why": "もっともらしい。loopback と auth はどちらも実効あるコントロールであり、内部ツールなら低リスクに思えるからだ。しかし仕様は server 側での Origin 検証を DNS rebinding を防ぐ MUST と位置づけており、loopback への bind 単独では防げない — rebinding は攻撃者のドメインを 127.0.0.1 に解決するため、リクエストは loopback に bind された server に到達してしまう。他の2つのコントロールがこの役割を代替することはない。"}], "explanation": "問われているのは、その防御が model が関与する前に動く、決定論的な transport 層のコントロールかどうかである。ブラウザから到達可能な Streamable HTTP server について、MCP 仕様（version 2025-06-18）は3つの階層的コントロールを定める。すべての接続で Origin header を検証して DNS rebinding を防ぐこと（中核となるコントロール、MUST）、wildcard address ではなく localhost に bind すること（SHOULD）、認証を適用すること（SHOULD）である。3つともツールが起動される前に server 側で動く。これこそが完全に prompt injection された model に対しても生き残る唯一の理由だ。\n\n他の選択肢がダメな理由:\n- B は由来の検証を system prompt のルールに委ねるが、そのルールを強制するのは攻撃を受けている model であり、そもそも model は Origin header を見ることができないため、由来を検証も強制もできない。これは「model に毎回チェックを実行させる」というパターンと同じである。毎回成り立たなければならないものを、model が実行するかどうかに依存させてはならない。\n- C は server 側での Origin 検証の代わりにブラウザの same-origin policy を代用する。DNS rebinding は、攻撃者がブラウザが信じている origin を制御できるため same-origin policy を無効化する。したがって server 自身が Origin を検証しなければならない。\n- D は server 側での Origin 検証を省略し、loopback と認証で十分と判断する。仕様は Origin 検証を DNS rebinding を防ぐコントロールと位置づけており、loopback への bind 単独では防げない — rebinding ドメインは 127.0.0.1 に解決され、loopback に bind された server に到達してしまう。\n\n3つのコントロールすべてを、model が実行される前に、middleware 内で決定論的に強制するのは A だけである。"}, {"qid": "exam2-q2", "domain": "Model Selection and Optimization", "type": "mc", "scenario": "税務相談事務所が Claude API の上にリサーチアシスタントを構築している。毎回のリクエストは同じ4つのブロックをこの順序で組み立てる。(1) 税法の全文コーパス（約55,000トークン）。議会が改正したときだけ更新され、年数回程度。(2) 事務所の恒久的な解釈ガイドライン（6,000トークン）。案件ごとにバイト単位で完全一致する。(3) クライアント固有の事実。案件ごとに異なる。(4) アドバイザーの質問。チームは初めて prompt caching を有効化し、新規案件のたびに各リクエストのできるだけ広い範囲を cache-read 料金で処理したい。cache_control breakpoint はどこに置くべきか。", "options": [{"text": "block (2) のガイドラインの末尾に cache_control breakpoint を1つだけ置く。", "is_correct": true, "why": "ここが、案件間で prefix がバイト単位で一致する最後の地点である。block 1 と block 2（税法とガイドライン）は案件間で一切変化せず、これこそ API が保存済みの prefix を cache-read 料金（base input より約90%安価）で返すために要求する条件である。block 3 と block 4 は案件ごとに固有のため、breakpoint の後に正しく置かれ、キャッシュされることはない。安定した2つのブロックはリクエスト先頭で連続しているため breakpoint は1つで十分である。税法がたまに改正されると cache-write 料金（base input より割高）でキャッシュが1回作り直されるが、その後は再び read に戻る。重要なのは連続する呼び出し間で一致していることであり、永遠に不変であることではないため、差し引きで大きく節約できる。"}, {"text": "過去の案件の税法を再利用するよう Claude に指示する system-prompt。", "is_correct": false, "why": "prompt caching は決定論的な API の仕組みであり、モデルが選んで実行できるものではない。cache hit が起きるのは、cache_control breakpoint までのバイトが API が以前保存した prefix と一致したときだけである。自然言語の指示で Claude に別リクエストの入力を再利用させることはできないし、breakpoint がなければ API は prefix を一切保存しない。これは LLM を制御装置と見なす誤謬である。出力を決めるのはモデルだが、保存された prefix を返すかどうかを決めるのはモデルではなく API である。結果として cache read はゼロになり、コストは変わらない。"}, {"text": "block (3) のクライアント事実の末尾に cache_control breakpoint を1つだけ置く。", "is_correct": false, "why": "可能な限り大きな prefix をキャッシュするのは網羅的に見えるが、クライアントの事実は案件ごとに固有なため、breakpoint までの prefix は二度と同じにならない。各案件は既存エントリを cache-read 料金で読む代わりに、毎回 cache-write 料金で新規キャッシュエントリを書き込むことになり、目的と逆になる。breakpoint を広げても cache hit がゼロになるのは、追加した領域がまさに毎回変化する部分だからである。"}, {"text": "Messages API から Batch API に切り替える（breakpoint は置かない）。", "is_correct": false, "why": "Batch API はバッチ内の各リクエストを独立して非同期に実行し、標準料金の約50%で処理する。しかし入力の重複排除や、リクエスト間での保存済み prefix の共有は行わない（バッチリクエストもキャッシュをサポートするが、各リクエストが独自の cache_control breakpoint を持つ場合だけである）。prompt caching は各リクエストの breakpoint の配置で制御され、配送モードでは制御されない。Batch で base 料金は半額になるが、breakpoint が提供する cache-read の割引（base の約10%）は得られない。breakpoint がなければ、税法は毎回の案件で全額課金される。同期 API の代わりに Batch 料金になるというだけである。"}], "explanation": "API が保存済みの prefix を cache-read 料金で返すのは、次の2条件が成り立つときだけである。cache_control breakpoint がその prefix の末尾を示していること、そして breakpoint までのバイトが呼び出し間で完全に一致すること。今回は税法とガイドライン（block 1 と 2）が案件間で一致する一方、クライアントの事実と質問（block 3 と 4）は案件ごとに固有である。したがって安定した prefix は block 2 の直後で終わる。そこに breakpoint を1つ置けば安定領域全体を捕捉でき、以降の各案件は約61,000トークンを cache-read 料金で読み、案件ごとに変わる小さな末尾だけに full input 料金を払う。税法がたまに改正されるとキャッシュされた prefix は無効になり、次の呼び出しで作り直される。重要なのは連続する呼び出し間での一致であり、永遠の不変性ではないため、差し引きで大きく節約できる。他の選択肢はどれも安定したキャッシュ prefix を確立できない。system-prompt の指示ではキャッシュを発生させられない。保存された prefix を返すかどうかを決めるのはモデルではなく API であり、breakpoint で末尾を示さなければ prefix は保持されないからである。可変のクライアント事実の後に breakpoint を置くと、毎回の呼び出しが read ではなく write になる。Batch API は各リクエストを独立して処理し base 料金を半額にするが、breakpoint の代わりにはならない。バッチリクエストがキャッシュできるのは、同期 API と同じ cache_control の配置があるときだけである。"}, {"qid": "exam2-q3", "domain": "Eval, Testing, and Debugging", "type": "mc", "scenario": "レポート生成サービスが、`stop_reason` が `end_turn` でない Anthropic API レスポンスをすべて失敗とみなしている。同じプロンプトを3回リトライし、その後オンコールをページする。トレースを取得したある呼び出しでは HTTP 200 が返り、部分的なテキストと `stop_reason: \"max_tokens\"` を含むが、`error` オブジェクトはない。最も強力な修正はどれか。", "options": [{"text": "`stop_reason` で分岐させる。`max_tokens` は成功したが切り詰められたレスポンスとして扱い、リクエストの `max_tokens` を増やす。リトライとページングは、構造化された `error.type` を伴う non-2xx の HTTP ステータスでのみ行う。", "is_correct": true, "why": "最適解。`stop_reason` は成功した HTTP 200 の Messages レスポンスに含まれるフィールドであり、エラー信号ではない。`max_tokens` は生成がリクエストで設定された出力上限に達したことを示す。`max_tokens` を増やせば切り詰めを決定論的に取り除ける。リトライとページングは、構造化された `error.type` を伴う non-2xx の HTTP ステータスに対して行うべきものであり（429 `rate_limit_error`、500 `api_error`、529 `overloaded_error` — SDK が自動的にバックオフする対象）、今回のケースには当てはまらない。"}, {"text": "システムプロンプトを簡潔な few-shot のレポート例で書き直し、より大きなモデルに切り替えて、出力が現在のトークン上限内に確実に収まるようにする。", "is_correct": false, "why": "もっともらしいが確率論的。few-shot プロンプティングとより大きなモデルで上限に達する頻度は下げられるが、どちらもモデルの判断に依存し、制御フローの誤分類は手つかずのまま。サービスは長いレポートをすべて失敗扱いし、オンコールをページし続ける。"}, {"text": "切り詰められたターンを一時停止状態とみなし、後続リクエストで部分レスポンスを再送して、モデルに停止位置から生成を再開させる。", "is_correct": false, "why": "2つの stop_reason を混同している。`pause_turn` はサーバー側ツールがターン途中で反復上限に達したときに返され、公式ドキュメントの復旧手順は `response.content` を assistant メッセージとして再送して再開すること。一方 `max_tokens` は既に終了したターンを打ち切るものであり、部分出力を再送しても再開しない。"}, {"text": "`max_tokens` に対して指数バックオフ付きリトライを追加し、この切り詰めを次の試行で解消される一時的なスロットルとして扱う。", "is_correct": false, "why": "決定論的な上限を一時的なものと誤分類している。`max_tokens` は設定された出力上限であり、同じ上限のまま同じリクエストをリトライすれば毎回同じ切り詰めが再現される。指数バックオフは一時的かつ再試行可能な HTTP エラー（429/500/529）に対する正しいツールであり、自ら設定した生成上限に対するものではない。"}], "explanation": "原因は制御フローの誤分類であり、API エラーではない。`stop_reason` は成功した HTTP 200 の Messages レスポンス上のメタデータであり、`max_tokens` は生成がリクエストで設定された出力上限に達したことを示す。したがって決定論的な修正は `max_tokens` を増やすこと（同等に決定論的な手段として、部分の assistant content を再送した上で残りを要求する user ターンを続けて送りターンを継続する方法もある。これはモデル依存の機能ではなく、汎用的なマルチターンパターン）。リトライとページングが発火すべきなのはトランスポート層の失敗、すなわち構造化された `error.type` を伴う non-2xx の HTTP ステータスのみであり、そのうち 429 `rate_limit_error`、500 `api_error`、529 `overloaded_error` が SDK が自動的にバックオフする再試行可能なエラー。B は確率論的なプロンプト/モデルによる緩和であり、制御フローのバグは残ったまま。C は `max_tokens` と `pause_turn` を混同しており、`pause_turn` は別の stop_reason で、再送による再開という復旧手順が適用されるのは API がターン途中で一時停止したサーバーツールのターンのみ。D は決定論的な出力上限を一時的なスロットル扱いするため、バックオフはリトライのたびに同じ切り詰めを再現する。"}, {"qid": "exam2-q4", "domain": "Applications and Integration", "type": "mr", "scenario": "ドキュメントチームは Python Agent SDK を使い、ドキュメントリポジトリへのすべてのプルリクエストに対して Claude によるレビューを実行している。各 PR はページを編集または新規追加するもので、Claude はそれらをチームのハウススタイルガイドに照らしてチェックする。このジョブは複数リージョンの CI runner で自動実行され、毎回の実行でスタイルガイドを同一に適用し、各 PR のレビューは過去の PR の記憶を持たずに開始しなければならない。この統合に最も適したアクションを 2 つ選べ。", "options": [{"text": "プロジェクトレベルの CLAUDE.md（ハウススタイルガイドを記載）と、許可するレビュー権限を列挙した .claude/settings.json をドキュメントリポジトリにコミットする。", "is_correct": true, "why": "これらはバージョン管理されたチーム共有のアーティファクトであり、すべての CI runner が同一に読み込む。CLAUDE.md が一貫した指示を与え、プロジェクト settings.json が権限を決定論的に制御する。特定の runner のホームディレクトリの内容には依存しない。"}, {"text": "ClaudeSDKClient を使い、session_id を runner にキャッシュして、新しい PR が前回のセッションを再開し、レビュー済みページの再処理を避けるようにする。", "is_correct": false, "why": "キャッシュした session_id を再開すると、前回実行の会話トランスクリプト（ページ内容・過去の判断・以前のコンテキストすべて）がレビュー側のコンテキストに再読み込みされる。結果として過去の PR の記憶が持ち越され、パイプラインが要求する PR ごとの独立性が壊れる。ClaudeSDKClient は長寿命のインタラクティブセッション向けに作られており、ページ再処理を省けるメリットはあるものの、それは no-memory の保証と引き換えに得られるものだ。"}, {"text": "CI ジョブで query() を使ってレビューを実行し、setting_sources=['project'] を設定する。", "is_correct": true, "why": "query() は SDK のワンショットのエントリポイントで、呼び出しごとに新しいセッションを開始する。これは独立した PR レビューにまさに必要な動作だ。setting_sources を project 階層に限定すると、バージョン管理された CLAUDE.md と settings.json だけが読み込まれ、runner 間で異なる user・machine 固有の settings を実行に混ぜ込まないようにできる。"}, {"text": "レビューを Opus に切り替え、reasoning effort を上げることで、どの runner でもハウススタイルガイドがより一貫して適用されるようにする。", "is_correct": false, "why": "より大きなモデルと高い reasoning effort はガイドの遵守確率を高めるが、確率は保証ではない。遵守はあくまで確率的だ。ここで言う runner 間の一貫性は設定のプロパティ（どの settings 階層を使うか、どの session スコープにするか）であって、capability のプロパティではない。capability を上げても実行ごとの同一動作を保証することはできない。"}, {"text": "setting_sources=['user','project'] を設定し、どの runner でも各レビュー担当者の個人の設定がリポジトリ標準と併せて適用されるようにする。", "is_correct": false, "why": "user 階層を含めると各開発者の ~/.claude settings が再インポートされるが、これらは CI runner 間で存在もしなければ同一でもない。'project' も併記されていても、user 階層がマシン間のばらつきを再導入し、再現性を損なう。それはまさに ['project'] に限定することが避けようとしていることだ。"}], "explanation": "決定論的な CI 自動化において、再現性はモデルのプロパティではなく設定のプロパティだ。query() は SDK のワンショットのエントリポイントで、呼び出しごとに新しいセッションを開始するため、各 PR レビューはクリーンな状態から始まる。setting_sources=['project'] はバージョン管理された project 階層（ハウススタイルガイドの CLAUDE.md と共有権限の .claude/settings.json）だけを読み込み、runner 間で異なる user・local 階層を除外する。これらのアーティファクトをリポジトリにコミットすれば、標準も他のコード変更と同じようにレビュー可能になる。\\n\\n他の選択肢がダメな理由: session_id をキャッシュして再開する (B) と、前回実行の会話トランスクリプト（ページ内容・過去の判断・以前のコンテキストすべて）がレビュー側のコンテキストに再読み込みされる。履歴が PR をまたいで持ち越され、no-memory 要件に違反する。ページ再処理の省略というメリットは本物だが、独立性の保証と引き換えであり、ClaudeSDKClient は独立したワンショットジョブではなく長寿命のインタラクティブ用途向けに設計されている。Opus へのアップグレードと reasoning effort の引き上げ (D) は遵守の確率を向上させるが、保証はできない。capability のアップグレードは強制メカニズムではない。setting_sources に 'user' を追加する (E) と、各開発者の個人的な ~/.claude settings が再インポートされる。これらは CI runner 間で存在もしなければ同一でもないため、project 階層も併記されていても実行はもはや再現可能ではない。\\n\\n正解は、ルール・権限・session スコープを、バージョン管理されたプロジェクトアーティファクトと project スコープのワンショット SDK 呼び出しによってコードに固定することだ。"}, {"qid": "exam2-q5", "domain": "Tools and MCPs", "type": "mr", "scenario": "貸付プラットフォームのチームが、Claude API 上でローンアドバイザーアシスタントを構築している。アシスタントは3つのツールを呼び出す。コアバンキングシステムの読み書きを行う get_account_balance と submit_loan_application、そして最新のプライムレートや規制当局の発表を取得する組み込みの web_search ツールである。tool-use ループの整合性を保つプラクティスを次のうち2つ選べ。", "options": [{"text": "各銀行系 tool_use ごとにアプリ内で実行し、その assistant turn の直後の user message で、対応する tool_use_id を持つ tool_result を返す。", "is_correct": true, "why": "これらは client-side tool であり、アプリが実行する。API の契約では、各 tool_use に対して同じ tool_use_id を持つ tool_result を、直後の user message で返さなければならない。この ID の一致と順序のルールがループの整合性を支える。"}, {"text": "統一性のため、銀行系と web search の3ツールすべてをローカルで実行し、それぞれに tool_result を返す。", "is_correct": false, "why": "client-only のツールセットであれば均一なローカル実行が正解になるため、魅力的に見える。しかし web search は server-side tool であり、server_tool_use と web_search_tool_result block を返す。これは tool_use/tool_result とは異なる content-block の契約である。アプリは web search の tool_use_id を一切受け取らないため、tool_result を構築する対象が存在しない。これは冗長な重複ではなく block-type の不一致であり、除外するには web search が server 実行されるという知識が必要で、問題文だけからは判断できない。"}, {"text": "tool_result block を構築するのは2つの銀行系ツールだけにする。web search は server-side であり、Anthropic が実行して結果を注入する。", "is_correct": true, "why": "実行の所有権が、誰が結果を供給するかを決める。組み込み web search のような server-side tool は Anthropic が実行し、server_tool_use を emit して結果 block を注入する。アプリは自ら実行する client-side tool の結果だけを供給する。受験者は web search が server-side であることを思い出す必要がある。問題文は単に外部データを取得するとしか述べていない。"}, {"text": "few-shot example を追加し、Claude に各ツールを client-side か server-side か実行時にラベル付けさせ、そのラベルに従って tool_result block を構築する。", "is_correct": false, "why": "few-shot example は出力フォーマットを整える効果があるため、もっともらしく聞こえる。しかしツールが client 実行か server 実行かは、そのツールの定義方法で決まる固定のプロパティであり、実行時のモデル判断ではない。決定的な契約を確率的なプロンプトに振り分けることは、prompt-fix 対 deterministic-code のトレードオフ（Purcell 1.4 のパターン）にあたる。"}, {"text": "API の round-trip を最小化するため、すべての tool_result を1つの user message にまとめ、最終回答の直前に追加する。", "is_correct": false, "why": "round-trip の削減は正当なエンジニアリング目標であり、トレードオフとして魅力的に聞こえる。しかし各 tool_result は、対応する tool_use を発行した assistant turn の直後の user message に現れなければならない。結果を末尾のバッチに遅延させると、API が強制する tool_use_id の対応付けと turn ごとの順序が壊れる。"}], "explanation": "tool-use ループは実行の所有権で分かれ、2つの正解はそれぞれ異なる事実を問うているため、独立して成立する。第一に、get_account_balance と submit_loan_application は client-side tool であり、アプリが実行する。各 tool_use に対して対応する tool_use_id を持つ tool_result で応答し、それを発行した assistant turn の直後の user message に配置しなければならない（選択肢1）。これがループの機械的な契約である。第二に、組み込みの web_search は server-side tool であり、Anthropic が実行して server_tool_use block を emit し、web_search_tool_result block を返す。したがってアプリはその tool_use を一切受け取らず、tool_result を構築してはならない（選択肢3）。これが所有権のルールである。2つの事実は独立している。受験者はループの仕組みを知っていても web search が server 実行されることを知らない場合があり、逆もありうる。問題文は意図的に、銀行系ツールがコアバンキングシステムの読み書きを行い web search が外部データを取得する、としか述べておらず、組み込みの web_search が Anthropic の server-side tool の一つであり異なる content-block 契約を使うことを、受験者自身に思い出させる作りになっている。\n\n選択肢2は均一実行のトラップであり、重複ではなく block type で破綻する。web search は server_tool_use と web_search_tool_result を返し、tool_use/tool_result とは異なる content-block 契約であるため、アプリには tool_result を構築するための tool_use_id が存在しない。除外するには web search が server-side であるという知識が必要で、問題文は web search がどこで実行されるかを一切述べていないため、問題文だけからは排除できない。選択肢4は Purcell 1.4 の prompt-fix 対 deterministic-code のトレードオフである。client か server かはツールの定義方法で決まる固定のプロパティであり、実行時のモデル判断ではない。決定的な契約はアプリケーションコードに属し、確率的なプロンプトに委ねるべきではない。選択肢5は、API の tool-use ループが許さない turn ごとの厳密な順序と tool_use_id の対応付けを、round-trip 削減と引き換えに捨てる選択である。"}, {"domain": "Agents and Workflows", "explanation": "要件は、ファイル編集を実行前にブロックし、かつ Claude の記憶に依存しないチェックである。Agent SDK では、PreToolUse hook が SDK によるマッチしたツールの実行前に発火し、permissionDecision \"deny\" を返すと呼び出し全体をブロックするため、編集は working tree に決して触れない。チェックはイベントによって発火するコードであり、モデルが実行するステップではないため、Claude がどう判断しても毎回の編集で走る。正しいイベント（実行前）と正しい決定（deny）を両方満たすのは、この選択肢だけである。\n\n他がダメな理由。B はプリミティブは正しいがイベントが違う。PostToolUse は編集がすでに実行された後にしか発火しないため、Claude に差し戻しを指示することはできても、lint を通らない編集がディスクに書き込まれることを本来の意味で防げない。C はイベントは正しいが決定が違う。permissionDecision \"allow\" は呼び出しの続行を許可するため、hook は warning を追加するだけで編集は通ってしまう。呼び出しをゲートするのは \"deny\"（または \"ask\"）だけである。D はそもそもコードではない。prompt のルールと few-shot example はモデルに確率論的に影響を与えるだけで、毎回チェックが走ることを保証できず、シナリオはそれを明示的に排除している。", "options": [{"is_correct": true, "text": "ライセンスチェックを実行し、ヘッダーがないときに permissionDecision \"deny\" を返す PreToolUse hook。", "why": "PreToolUse は SDK がマッチしたツール呼び出しを実行する前に発火し、permissionDecision \"deny\" は SDK にその呼び出しをブロックさせる。したがってヘッダーがない編集はファイルシステムに到達しない。hook はモデルが選んで実行するステップではなく、イベントによって発火する決定論的なコードであるため、モデルがどう判断しても毎回の編集でチェックが走る。これが、シナリオが求める「例外なく毎回の編集で」という保証にほかならない。"}, {"is_correct": false, "text": "各編集のあとにライセンスチェックを実行し、失敗時に Claude に変更を取り消すよう指示する block decision を返す PostToolUse hook。", "why": "強制のプリミティブ（hook）は正しいが、イベントが違う。PostToolUse はツールの実行が終わった後にしか走らないため、チェックが動く時点で lint を通らない編集はすでにファイルを変更している。呼び出し後のブロックで Claude に差し戻しを指示することはできるが、それは事後の補正であり、編集は working tree に触れてしまう。変更前のブロックという要件を満たせない。"}, {"is_correct": false, "text": "ライセンスチェックを実行し、ヘッダーがないときに transcript に warning を追加しつつ permissionDecision \"allow\" を返す PreToolUse hook。", "why": "イベント（Pre）は正しいが、決定が違う。permissionDecision \"allow\" はツール呼び出しの続行を明示的に許可するため、hook は warning をログに残すだけで lint を通らない編集を通してしまう。PreToolUse hook が呼び出しをゲートするのは \"deny\"（または \"ask\" へのエスカレーション）を返すときだけである。\"allow\" を返すのはブロックの正反対だ。"}, {"is_correct": false, "text": "すべての編集の前に Claude がライセンスヘッダーを検証するよう指示する system prompt のルール。few-shot example で補強する。", "why": "決定論的ではない。system prompt のルールと few-shot example はモデルの振る舞いを確率論的に変えるものであり、コンプライアンスの可能性は高めるが、毎回の編集でチェックが走ることを保証できない。そのステップが実行されるかは、結局モデルが選ぶかに依存するからだ。シナリオが求めているのは Claude の記憶に依存しない強制であり、それはモデルの裁量の外にあるコードによってのみ実現できる。"}], "qid": "exam2-q6", "scenario": "あるツールチームが、社内のコーディングアシスタントに Claude Agent SDK を組み込み、Claude が SDK の組み込みファイルツールでファイルを変更できるようにしている。同チームは、ライセンスヘッダーがない場合にすべてのファイル編集をブロックするライセンスヘッダーチェックを強制しなければならない。lint を通らない編集が working tree を変更することが決してなく、チェックは例外なく毎回の編集で走る必要がある。これを保証する実装はどれか。", "type": "mc"}, {"qid": "exam2-q7", "domain": "Prompt and Context Engineering", "type": "mr", "scenario": "保証請求チームが Messages API 経由で Claude Sonnet 4.6 を自社のケース管理コンソールに接続している。すべてのケースにおいて、最初のターンから恒久的なトリアージプロトコルを適用しなければならない。内容は、クレームを分類すること、書面で責任を認めたり支払いを承認したりしないこと、訴訟に関する言及があればエスカレートすること。別個に、数ターン進んで顧客の地域（EU か US か）が特定された時点で、地域別のデータ取り扱いルールがそのケースの以降に適用される必要がある。チームは、これらの統制指示が (a) 最初のターンから system-level authority を持ち、(b) ターンをまたいで prompt caching の恩恵を受け続けることを望んでいる。両方を実現する配置判断はどれか。2つ選べ。", "options": [{"text": "恒久的なトリアージプロトコルと地域取り扱いルール（EU と US の両方の分岐を条件付き指示として記述）を、最初のターンからトップレベルの `system` parameter に記述する。これにより、すべての統制ルールは最初から system-level authority を持ち、stable prefix の先頭に配置される。", "is_correct": true, "why": "トップレベルの `system` parameter は、恒久的な開発者意図（durable developer intent）を置く正規の場所である。最初のターンから適用され、すべてのレスポンスに対して system-level authority を持ち、cached prefix の先頭に位置する。条件付きルールもここに属する。なぜならルール自体は恒久的な開発者意図であり、地域の「値（VALUE）」だけがケース固有だからだ。"}, {"text": "ケース固有のデータだけを `messages` array で送る（顧客とのやり取り、そして地域が特定されたらその事実＝どの地域が適用されるか＝だけ）ことで、`system` block をターン間でバイト同一に保つ。", "is_correct": true, "why": "ケースごとの内容は定義上可変であり、`messages` の末尾（tail）に属する。これを `system` に入れないことで prefix はターン間で同一になり、prompt caching がターンごとにヒットし続けるために必要な安定性が保たれる。"}, {"text": "トリアージプロトコルを毎回の user message の先頭に強い表現で再記述し、その目立ち具合で毎ターンモデルをプロトコルに整合させ続ける。", "is_correct": false, "why": "これはプロンプトの強調（emphasis）であり、確率的な後押しであって仕組みではない。コンプライアンスの確率を上げることはあっても、交渉不可能なルールが system-level authority を持つという構造的な保証はない。その上、各 user message は新規の未キャッシュ末尾コンテンツであるため、毎回のリクエストの未キャッシュ部分を膨らませる。強調は強制（enforcement）ではない。"}, {"text": "各会話の最初の user message にトリアージプロトコルを置き、Claude が別フィールドではなく対話の一部として出会うようにする。", "is_correct": false, "why": "user message は対話コンテンツであり、system instruction ではない。system-level authority を持たず、stable prefix ではなく未キャッシュの `messages` 末尾に位置するため、ここに置かれたプロトコルは権威的に統制できず、caching の恩恵も受けない。「会話の早い段階」は「system prompt の中」と同じではない。"}, {"text": "毎ターン、トップレベルの `system` parameter を書き換えて、判明した地域ルールと最新のやり取りを追記し、すべてのコンテキストを1つのフィールドにまとめる。", "is_correct": false, "why": "`system` block を編集すると cached prefix の先頭が変わり、後続すべて（毎ターン）のキャッシュが無効になる。これはまさにチームが避けたかった繰り返し発生するコストである。1つのフィールドにまとめることは、実際のキャッシュのメリットを表面上の整頓とトレードしている。"}], "explanation": "関わるのは2つの配置原則だ。第一に、統制ルール — 地域取り扱いルールのような条件付きルールを含む — は恒久的な開発者意図（durable developer intent）であり、トップレベルの `system` parameter に置くべきものである。そこでは最初のターンから適用され、system-level authority を持ち、cached prefix の先頭に位置する。ケース固有なのは地域の「値（VALUE）」だけで、後から fact として供給される。第二に、ケースごとの内容（対話と特定された地域）は可変であり、`messages` の末尾（tail）に属する。これを `system` から外すことで prefix はターン間でバイト同一となり、prompt caching がターンごとにヒットし続けるために必要な安定性が保たれる。この2つを組み合わせることで、ルールに権威を持たせつつ cache hit を維持できる。\n\n他の選択肢がダメな理由：プロトコルを毎回の user message で強い表現で再記述するのは確率的な強調による微調整であり、コンプライアンスを後押しすることはあっても、交渉不可能なルールが system-level authority で扱われることを保証できない。その上、未キャッシュの末尾を膨らませる（強調は強制ではない）。プロトコルを最初の user message に置くのは位置を間違えている。user message は system-level authority を持たない対話コンテンツであり、cached prefix の中に居場所もない。したがって「会話の早い段階」は「system prompt の中」と同じではない。そして、毎ターン `system` parameter を書き換えて新しい内容を取り込むのはキャッシュ観点で最悪の選択である。prefix を変えると下流すべてのキャッシュが毎ターン無効になり、それはまさに stable な `system` block が避けるために存在するコストそのものである。"}, {"qid": "exam2-q8", "domain": "Prompt and Context Engineering", "type": "mc", "scenario": "プラットフォームチームは、長時間のマルチターンClaudeセッションがコンテキストウィンドウに収まるよう、サーバーサイドcompaction（ベータヘッダ `compact-2026-01-12`、デフォルトで150Kトークン到達時にトリガー）を有効にしている。コストダッシュボードは各ターンの課金を、最上位の `usage.input_tokens` と `usage.output_tokens` だけから算出している。ダッシュボードの月次合計は常にAnthropicの請求書を下回り、その差はその月にトリガーされたcompactionの回数とともに拡大していく。課金パイプラインは何を変更すべきか。", "options": [{"text": "レスポンスの `usage.iterations` 配列の全エントリ（`compaction` イテレーションを含む）を集計する。最上位の `usage.input_tokens` / `output_tokens` はcompactionのトークンを含まないため、そちらは使わない。", "is_correct": true, "why": "compactionは、メイン応答の前にモデルが古いコンテキストを読んでサマリーを書き出す、独立した課金対象のsampling iterationとして実行される。ドキュメントでは、最上位のusageフィールドは非compactionのイテレーションのみを反映し、compactionイテレーションのトークンは除外して `usage.iterations` に別途報告されると明記されている。この配列を合計するのが、プラットフォームが実際に実行したワークを確実に捕捉する唯一の確定的な方法である。"}, {"text": "各ターンの終わりに `messages.count_tokens()` を呼び出し、その戻り値の `input_tokens` をセッション全体の権威ある合計として課金のベースにする。", "is_correct": false, "why": "エンドポイントもフィールドも実在するため、もっともらしく見える。だが count_tokens はpreflightの推定器であり、プロンプト内に既にあるcompactionブロックを適用するだけで新たなcompactionはトリガーしない。つまり実質的なpost-compactionリクエストのサイズを測るだけで、compactionイテレーションが実際に消費したトークンは一切報告しない。過少計上は解消しない。"}, {"text": "レスポンスに含まれる `compaction` ブロックのsummaryの文字数をトークンに換算し、それを最上位の `output_tokens` に足すことで抜けているコストを推定する。", "is_correct": false, "why": "summaryはレスポンスに含まれているため、復元できそうに見える。しかしcompactionのコストの大半は、前のコンテキストを読むinputトークンである。ドキュメントの例では約180,000のinputトークンを読み込んで、生成するoutputはわずか約3,500に過ぎない。したがってsummaryの文字数を測っても、課金対象のinput volumeではなくoutputの小さな末尾しか捉えられない。"}, {"text": "system promptでClaudeに指示し、compactionステップを含む総トークン消費量の構造化された自己報告を各レスポンスに付記させ、その自己報告を課金のベースにする。", "is_correct": false, "why": "確定的な会計処理をモデルに委ねることになる。モデルにはサーバーサイドのトークン合計やcompactionイテレーションの課金volumeへの内省的アクセスはない。トークン化はモデルにとって不透明であり、compactionのコストはプラットフォーム側の事実である。結果として、過少計上を信頼性のない推測に置き換えるだけになる。"}], "explanation": "compactionはプラットフォームが無料で肩代わりする要約ではない。メイン応答の前に、モデルが古いコンテキストを読んでサマリーを書き出す、追加の課金対象sampling iterationである。ダッシュボードは最上位の `usage.input_tokens` / `output_tokens` だけを読んでいるが、ドキュメントではこれらがcompactionイテレーションのusageを除外し、非compactionイテレーションのみを反映すると明記されている。compactionイテレーションのトークンは `usage.iterations` に別途報告される。過少計上がcompactionの発生頻度に比例して拡大するという症状は、ヘッドラインのフィールドに課金対象のバックグラウンドワークが抜けていることを示すシグナルである。`usage.iterations` を集計するのが確定的な修正策であり、APIが既に返す構造化usageを読むだけで済み、再構築は不要である。\\n\\n他の選択肢がダメな理由: count_tokens はpreflightの推定器であり、既存のcompactionブロックを適用するだけで新たなcompactionをトリガーしないため、compactionイテレーションが消費したトークンを一切報告しない。レスポンスに見えるsummaryの文字数からの推定も失敗する。compactionのコストは前のコンテキストを読むinputトークンが大半を占め（ドキュメントの例で約180K in / 約3.5K out）、文字数ではoutputの末尾しか見えない。そしてモデルに自己消費量を報告させる手法は、サーバーサイドのトークン合計への内省的アクセスを持たないシステムに確定的な会計タスクを押し付けるものであり、hookを使うべき場所でpromptに頼るのと同じ「確率的 vs 確定的」のギャップを生む。`usage.iterations` を集計する方法のみが、プラットフォームが実際に実行したワークを正しく課金できる。"}, {"qid": "exam2-q9", "domain": "Applications and Integration", "type": "mc", "scenario": "Claude Code セッションで作業中、開発者は monorepo のあるモジュールでデータ層のリファクタリングを完了し、複数ファイルにわたってフィールド名を変更した。その後、別のモジュールに移って新機能を構築し始めたが、Claude はリファクタリング前の古いフィールド名やクエリパターンを提案し続けてしまう。この以前の作業が新しいタスクに持ち込まれるのを最も確実に防ぐ方法はどれか。", "options": [{"text": "新しいモジュールの機能に取り掛かる前に /clear を実行し、context window を空にする。", "is_correct": true, "why": "Claude Code のセッションは会話であり、context window には全メッセージと tool result が /clear（または新規セッション開始）で空にされるまで保持され続ける。/clear は決定的かつ構造的なリセットを提供し、モデルに「古い context を無視して」と頼むのではなく、実際に window を空にする唯一の選択肢である。"}, {"text": "新しいモジュールのファイルを context に読み込ませ、そのコードでリファクタリング前のパターンを上書きする。", "is_correct": false, "why": "新しいモジュールのファイルを読み込めば、たしかにそのコードは window に追加される。しかし「追加」は「退去」ではない。リファクタリング時のメッセージや tool result は依然 window 内に残っており、出力を揺り動かし続ける。構造的なリセットは起きない。"}, {"text": "CLAUDE.md に「前のモジュールで議論した内容はすべて無視せよ」というルールを追加する。", "is_correct": false, "why": "CLAUDE.md は恒常的な context として読み込まれるものであり、強制力のある設定ではない。現在のモジュールへ Claude の関心を向けることはできるが、すでに window 内にあるメッセージを削除することはできない。したがって抑制は確率的・モデル依存の結果に留まる。"}, {"text": "extended thinking を有効にした Opus 4.8 に切り替え、現在のモジュールのコードに照らして再評価させる。", "is_correct": false, "why": "より能力の高い Opus 4.8 に extended thinking を組み合わせても、以前の会話全体がそのまま入力されることに変わりはない。context の漏出は構造的な問題であり、古いパターンが無視されるかどうかはモデル依存であって、window の確実なリセットではない。"}], "explanation": "Claude Code のセッションは、ファイルシステムのビューではなく会話である。context window には /clear（または新規セッション開始）で空にされるまで、すべてのメッセージと tool result が保持される。モジュールを切り替えても変化するのは「Claude が読み取れるファイル」だけであり、リファクタリングの議論は削除されない。そのため古いフィールド名やクエリパターンが新しいタスクに染み出し続ける。/clear は決定的な解決策であり、モデルがどう判断するかにかかわらずクリーンな window を保証する――これは「必ず実行させたい処理」を hooks に任せるのと同じ発想である。\\n\\n各誤答選択肢はもっともらしく見えるが、どれも window をリセットしない。新しいファイルを読み込むのは古い内容を退去させることなく追加するだけ。CLAUDE.md はガイダンス（context であって削除操作ではない）を与えるだけで、すでに送信されたメッセージを消すことはできない。そして extended thinking を有効にした強力な Opus 4.8 も、以前の会話全体をそのまま取り込むため、古い context を無視できるかは確率的・モデル依存の結果であり、確実なリセットにはならない。"}, {"qid": "exam2-q10", "domain": "Model Selection and Optimization", "type": "mc", "scenario": "薬物安全性監視（pharmacovigilance）チームが、市販後調査プログラム全体で報告された稀な有害事象を評価している。評価の対象となるのは、症例記録、臨床試験報告書、発表論文、規制当局との往復書簡を合わせて約92万トークン。チームは、モデルファミリーで最も高いレイテンシとトークンコストも許容する。最優先は分析の網羅性であり、文書をまたぐ微細なシグナルを一つも見逃さないことだ。要件に最も適したアプローチはどれか。", "options": [{"text": "Claude Opus 4.6 で 1M-token beta の context window を使用し、effort を max に設定する。", "is_correct": true, "why": "92万トークンのコーパスは標準の 200K window を超えるため、単一呼び出しには 1M-token beta window が必要になる。これは Opus 4.6 と Sonnet 4.6 で利用可能だが、Haiku 4.5 では使えない。網羅性が最優先である以上、最高性能モデルの Opus 4.6 を選び、effort=max で最も深い推論レベルを指定すべきだ。max は Opus 4.6 でのみ指定でき、effort は adaptive-thinking モデルにおける推論深度の決定論的な制御パラメータである。"}, {"text": "Claude Sonnet 4.6 で 1M-token beta の context window を使用し、few-shot exemplar と chain-of-thought 指示で厳密さを補強する。", "is_correct": false, "why": "Sonnet 4.6 は 1M beta window を備えるため、コーパスは収まる。しかし few-shot や system prompt の指示は確率的な誘導に過ぎず、性能の上限を引き上げることはできない。また Sonnet 4.6 の effort は high が上限で、max は Opus 4.6 専用だ。決定論的な制御が存在するのに、プロンプトで代用しようとする設計ミスである。"}, {"text": "Claude Haiku 4.5 を使用し、コーパスを 200K 未満のチャンクに分割して並列処理し、部分結果を集約する。", "is_correct": false, "why": "Haiku 4.5 の window は 200K で 1M beta はないため、シャーディングは確かに必要であり、各チャンクを 200K 未満に抑えるのも正しい。しかし map-reduce では 92万トークン全体をまたぐ推論が失われ、Haiku は最高性能階層ではない。さらに Haiku 4.5 では effort 指定がエラーになる。そのため、最大限の網羅性を最優先とする要件は満たせない。"}, {"text": "Claude Opus 4.6 で 1M-token beta の context window を使用し、budget_tokens を引き上げてレポート前に思考を延長する。", "is_correct": false, "why": "モデルと window の選択は正しい。しかし budget_tokens は Opus 4.6（および Sonnet 4.6）で廃止されており、使用してはならない。指定しても推論が深まることはなく、リクエストとして拒否される。adaptive-thinking モデルでサポートされている推論深度の制御機構は effort パラメータである。"}], "explanation": "正解は A。92万トークンのコーパスは標準の 200K window を超えるため、単一呼び出しには 1M-token beta context window が必要になる。これは Opus 4.6 と Sonnet 4.6 で利用可能だが、Haiku 4.5 では使えない。網羅性が最優先である以上、最高性能モデルの Opus 4.6 に effort=max を指定するのが最適だ。max は最も深い推論レベルで Opus 4.6 でのみ指定可能、effort は adaptive-thinking モデルにおける推論深度の決定論的な制御パラメータである。\\n\\n他の選択肢が不適な理由:\\nB は window を正しく選んでいるが、網羅性をプロンプトの問題として扱っている。few-shot や system prompt の補強は確率的な誘導に過ぎず、性能の上限は引き上がらない。Sonnet 4.6 の effort は high が上限（max は Opus 4.6 専用）。これは決定論的な制御が存在するにもかかわらずモデルの判断に任せる誤りであり、必須ステップを system prompt で指示するのではなく hook で強制すべき、という原則に反している。\\nC は Haiku 4.5 でシャーディングが必要な点は工学的に正しいが、map-reduce では全体をまたぐ推論が失われ、Haiku は最高性能階層ではなく、Haiku 4.5 では effort 指定がエラーになる。\\nD はモデルと window は正しいが budget_tokens に依存している。budget_tokens は Opus 4.6 と Sonnet 4.6 で廃止されており使用してはならない。サポートされている制御は effort である。"}, {"qid": "exam2-q11", "domain": "Tools and MCPs", "type": "mc", "scenario": "プラットフォームチームが、HTTPS でアクセス可能な共有 MCP サーバーを運用しています。このサーバーはツール群を公開しています（prompts と resources も公開していますが、アプリケーション側では使用しません）。Claude Messages API 上に構築された複数のアプリケーションがこれらのツールを呼び出す必要があり、サーバーの既存の tool set をそのまま利用したいと考えています。チームは独自の MCP クライアントを構築・運用したくありません。最も適切なアプローチはどれですか。", "options": [{"text": "各アプリケーションに詳細な system prompt と、サーバーの JSON-RPC リクエスト形式の few-shot examples を与え、Claude が出力する tool call をそのままサーバーへ転送する。", "is_correct": false, "why": "prompt で Claude の出力を誘導することはできますが、MCP 接続は確立されません。API 側での tool discovery や schema handling も行われず、正しい形式で呼び出せるかはモデルの判断次第になります。確定的な統合を prompt の強調で代用することはできません。"}, {"text": "各アプリケーション内で HTTP transport 経由にサーバーとの MCP client session を開き、SDK の MCP helpers を使って tool-use loop 上でサーバーのツールを公開する。", "is_correct": false, "why": "ドキュメントに記載された client-side の正規の手順（local servers・prompts・resources が必要な場合に使用）ではありますが、各アプリケーションが MCP クライアントと loop を所有し保守することになります。これはまさにチームが手放したい運用負担であり、API が単独で到達できる remote の tools-only サーバーに対しては過剰です。"}, {"text": "1 つの internal gateway service を立ち上げ、そこだけが MCP クライアントを保持して remote server への tool call をプロキシし、すべてのアプリケーションはその gateway を呼び出すようにする。", "is_correct": false, "why": "クライアントを集約すればアプリケーションごとの重複はなくなりますが、API がサーバーに直接接続できるにもかかわらず、チームは独自の MCP クライアントと新たなサービスを開発・ホスト・運用することになります。"}, {"text": "Messages API の MCP connector を使用する: mcp_servers でサーバーを mcp_toolset エントリとともに宣言し、Anthropic 側で接続を開き、サーバーのツールが response の tools として直接公開されるようにする。", "is_correct": true, "why": "connector は、個別のクライアントなしで remote HTTP MCP サーバーを Messages API に接続するためにドキュメントで規定された仕組みです。既存の tool surface をネイティブに利用し、allow/deny や per-tool configuration をサポートし、その tools-only のスコープはアプリケーションが必要とするものと一致します。"}], "explanation": "決め手となるシグナルは 4 つあります。remote HTTPS サーバーであること、tools-only の要件であること、サーバーの既存 tool surface をそのまま利用する意図、そしてチームが MCP クライアントを一切構築・運用しないという制約です。これらすべてを満たすのは MCP connector だけです。remote HTTP MCP サーバーを Messages API に直接接続し、Anthropic が server-side で接続を開き、tool surface をネイティブに利用しつつ allow/deny と per-tool configuration をサポートします。保守すべきクライアントコードはなく、その tools-only のスコープは本シナリオの要件に完全に一致します。\\n\\n他の選択肢が不適切な理由: prompt-and-few-shot（A）はモデルを誘導できますが接続を確立しないため、実際の統合が必要な場面では確率的になり不正解です。per-application の MCP クライアント（B）と集約された gateway（C）は、いずれもチームにクライアントの構築と運用を残します（B は各バックエンド、C は 1 つの新サービス）。API が単独でサーバーに到達できる状況では不要です。\\n\\nこの選択は概念レベルで決まります。保守された外部 tool surface をネイティブに利用するか、クライアントを hand-roll／集約するか、の違いであり、正確なパラメータ名の記憶には依存しません。「クライアントの運用なし」という制約だけで B と C が消え、実際の接続の必要性で A が消えます。そのため、API が MCP サーバーと通信できることを漠然と知っているだけの候補者でも、暗記ではなく推論で D に到達できます。"}, {"qid": "exam2-q12", "domain": "Agents and Workflows", "type": "mc", "scenario": "TypeScript のデスクトップアプリで、ファイルの編集・コードベース検索・シェルコマンドの実行を行う Claude コーディングアシスタントが必要です。各ステップは前のステップの結果を受けて進み、アシスタントはリクエスト完了まで自律的に作業を続け、すべてのステップが実行されるたびに UI に表示されます。チームは厳格な制約を設けています——次にどのツールを呼ぶかを決め、実行し、結果をフィードバックし、作業の完了を判断するコードは自前で書かないこと。これらの要件を満たすアプローチはどれですか？", "options": [{"text": "`@anthropic-ai/claude-agent-sdk` を使う。バンドルされたコーディングツールと turn driver がイテレーション全体を実行するため、チームはツールもループも書かずに済む。", "is_correct": true, "why": "Agent SDK は、チームが自前で書かないと決めた両方のピースを提供します。次のツールを選択し、実行し、結果をフィードバックし、タスクの完了を判断する turn driver と、バンドルされたコーディングツール（file, search, shell）です。チームはイテレーション全体を自前で書くことなく引き継げます。"}, {"text": "`@anthropic-ai/sdk` の Messages API の tool-use を使い、file, search, shell の各ツールを登録し、各ターンをアプリケーション側からドライブする——各ツールを実行し、その結果を Claude の次のステップに返す。", "is_correct": false, "why": "Messages API の tool-use はツール呼び出しのリクエストを返すだけで、アプリケーションがそれぞれを実行し、結果を返して次のターンをドライブしなければなりません。それはまさにチームが自前で書かないと決めたイテレーションコードであり、汎用アーキテクチャとしては正しくても厳格な制約を破ってしまいます。"}, {"text": "`@anthropic-ai/sdk` の Messages API で最強の Opus モデルを使い、詳細な system prompt と、Claude にファイル編集・検索・シェルコマンドの計画と連鎖を教える few-shot examples を組み合わせる。", "is_correct": false, "why": "より強力なモデル、より詳細なプロンプト、few-shot examples は Claude が何をリクエストするかを形作ることはできますが、ツールを実行することもターンごとのイテレーションをドライブすることもできません。API は依然としてクライアントが満たすべき tool call を返すため、これは構造的なギャップに対する確率的なレバーに過ぎません。"}, {"text": "`@anthropic-ai/claude-agent-sdk` を使うが、バンドルされたツールは無効化し、ファイル編集・検索・シェル実行のカスタム TypeScript 実装を独自に供給する。", "is_correct": false, "why": "パッケージの選択は正しいものの、バンドルされたツールをカスタム TypeScript 実装に置き換えると、チームがツールのコードとその実行パスを所有することになり、それは制約が拒否するまさに自前の作業です。`allowedTools` で組み込みのセットを制限するのは正当ですが、全面的に置き換えると SDK の目的を損ないます。"}], "explanation": "Agent SDK は、Claude Code の agentic harness を自前で書かずに使いたいアプリケーションのために作られています。バンドルされた turn driver が次のツールを選び、組み込みのコーディングツール（file, search, shell）で実行し、結果を返し、最終回答が出るまで繰り返すため、チームはループもツールも引き継げます。B は実行をチームに押し付けます——Messages API の tool-use はクライアントが満たすべき tool call リクエストを返すため、チームがループを構築・運用し、ツールを再実装しなければならず、それは制約が禁じる作業そのものです。C は構造的なギャップをモデルで補おうとする発想ですが、スケール、プロンプトの詳細、few-shot examples は確率的なレバーであり、実行ループを作れません。API は依然として tool call をクライアントに返します。D はパッケールの選択こそ正しいものの、バンドルされたツールセットを無効化して再実装するため、制約が拒否する自前のツール作業を再現してしまいます。SDK 導入後も `allowedTools` と `permissionMode` は意図的に設定すべきですが、それらが制御するのは agent に何を許可するかであり、ループを誰が構築・運用するかではありません。"}, {"qid": "exam2-q13", "domain": "Agents and Workflows", "type": "mc", "scenario": "プラットフォーム信頼性チームは、Claude にすべての本番インシデントのトリアージを行わせたいと考えている。スペシャリストのプール — データベースパフォーマンス、ネットワーク、アプリケーション/バックエンド、フロントエンド、インフラ/オートスケーリング、セキュリティ、リリース/デプロイ — は固定されており、オンコールエンジニアに手渡される1ページの Incident Triage Brief も固定のスキーマを持つ。しかし、あるインシデントに対して実際にどのスペシャリストの関与が必要になるかは、アラートのペイロードと初期ログを読んで初めて判明する。", "options": [{"text": "orchestrator-workers ワークフロー。orchestrator LLM が各インシデントのアラートとログを検査して実行時に起動するスペシャリストを決定し、それらを独立した worker として実行し、最後に固定の synthesis ステップが Triage Brief を出力する。", "is_correct": true, "why": "ベストな選択。Anthropic の 'Building Effective Agents' は「必要なサブタスクを予測できない」タスクに対して orchestrator-workers を推奨している。まさにこのチームの状況であり、スペシャリストの構成はインシデントを読むまでわからない。orchestrator が実行時に部分集合を選択する一方で、worker のカタログと最終の synthesis ステップはコードに固定されている。そのため構成は柔軟に変わりつつも、brief のスキーマとインシデントごとのコストは一定に保たれる。"}, {"text": "prompt-chaining パイプライン。すべてのインシデントに対して固定の順序で全スペシャリストを実行し、各ステージの後に validation gate を置き、最後に synthesis 呼び出しを行う。", "is_correct": false, "why": "検討に値する選択肢。chaining は予測可能性を最大化し、ステージごとの gate が validation を追加するため、オンコールの信頼性においてはどちらも本当に価値がある。しかし prompt chaining はすべての入力に適用される固定のサブタスク列として定義される。ここではスペシャリストの部分集合がインシデントごとに変わるため、chaining は無関係なスペシャリスト（純粋なデータベースフェイルオーバーに対するフロントエンド分析など）をすべてのインシデントに強制し、毎回そのトークンとレイテンシのコストを支払うことになる。まさに orchestrator-workers が回避する無駄である。"}, {"text": "routing レイヤー。各インシデントを事前定義されたスペシャリット組み合わせバンドルのいずれかに分類し、一致する複数スペシャリストパスにディスパッチする。", "is_correct": false, "why": "検討に値する選択肢。インシデントには確かに認識可能なタイプがあり、routing はスペシャリストのディスパッチを処理できる。しかし routing は分類器によって「正確に処理できる明確なカテゴリ」、つまり有限で事前定義可能な集合を必要とする。現実のインシデントは組み合わせ的で文脈依存の形でスペシャリストをまたぐ（悪いデプロイが release + database + security を一度に必要とするなど）ため、事前列挙されたバンドル集合では捕捉できず、それこそが orchestrator-workers が存在意義を持つ予測不能なサブタスクのケースである。"}, {"text": "単一の Claude Opus エージェント。すべてのスペシャリストのドメインと brief スキーマを記述した包括的な system prompt を持ち、インシデントごとにどの分析を実行するか、brief をどう組み立てるかを自由に決定する。", "is_correct": false, "why": "検討に値する選択肢。最も能力の高いモデルと綿密な system prompt は、柔軟でエンジニアリング負荷の低い修正に見える。しかしこれは、決定論的なワークフローで十分な場合に LLM 流の当て布をするものにすぎない。スペシャリストの分解も brief の構造もモデルの裁量に任せると、インシデントごとのコスト・レイテンシ・出力形状が無制限になる。これは Anthropic が「ジョブを果たす最もシンプルで十分なアーキテクチャを使え」と警告する状況にあたる。"}], "explanation": "Anthropic の 'Building Effective Agents' は、ワークフローパターンを事前に固定される構造の量で区別する。prompt chaining はすべての入力に対して固定のステップ列を実行し、routing は有限で正確に分類可能なカテゴリ集合のいずれかにディスパッチする。そして orchestrator-workers は、「タスクを動的に分解し、worker LLM に委譲し、結果を統合する」orchestrator LLM を持ち、「必要なサブタスクを予測できない」ケースに対応する。このチームはスペシャリストカタログと Triage Brief のスキーマを固定しているが、インシデントごとのスペシャリスト部分集合はインシデントを読むまで予測できない。これが orchestrator-workers の定義的なユースケースであり、カタログと synthesis を決定論的に保ちつつ、orchestrator が構成を選ぶ。prompt chaining は1つの固定列がすべてのインシデントに適合すると誤って仮定し、routing は有限で事前分類可能なバンドル集合が存在すると誤って仮定する。そして単一の完全自律 Opus エージェントは、決定論的なカタログと brief の出力形状をタスクが求めていないオープンエンドな柔軟性と引き換えに手放してしまい、ジョブを満たす最もシンプルなアーキテクチャを使うという原則に反する。"}, {"qid": "exam2-q14", "domain": "Applications and Integration", "type": "mc", "scenario": "プラットフォームチームのコードレビューボットは、1日約600件のプルリクエストを処理している。毎回の呼び出しで、コーディング標準・アーキテクチャの意思決定記録・APIリファレンス・ツールスキーマからなる約70,000トークンのバンドルを再送している。これらは週単位でほとんど変わらない一方、変動するのは約3,000トークンのdiffだけだ。レビュアーは各結果を数秒以内に受け取ることを期待している。チームは、この共有コンテキストが毎回の呼び出しで再処理されることに起因するコストとレイテンシを削減したい。", "options": [{"text": "コーディング標準・記録・リファレンスを Files API で一度だけアップロードし、毎回の呼び出しではトークンを再送する代わりに、その file_id を渡す。", "is_correct": false, "why": "Files API はあくまで転送・保存の利便性を提供する。upload / list / delete は無料だが、ファイルの内容は依然として入力トークンに展開され、参照するたびに毎回 fully processed され課金される。キャッシュは一切行われないため、70,000 トークンの繰り返し処理はそのまま残る。"}, {"text": "レビューをより安価で高速なモデルに切り替え、毎回の呼び出しでフルコンテキストを再送し続ける。", "is_correct": false, "why": "安価なモデルはトークン単価を下げるが、70,000 トークンのプレフィックス全体は 1 日約 600 回の全呼び出しで処理・課金されるため、「繰り返し処理」という掛け算の構造は変わらない。さらに小さいモデルは、こうしたレビューが依存するセキュリティやアーキテクチャの判断力で劣る。"}, {"text": "安定したコンテキストをリクエストの先頭に置き、その終端に cache_control のブレークポイントを 1 つだけ設定し、その後に diff とレビュー指示を送る。", "is_correct": true, "why": "真のレバーを動かせるのは Prompt caching だけだ。後続の呼び出しではプレフィックスがキャッシュから標準入力レートの約 10% で読み取られ、再処理されないため、コストと time-to-first-token の両方が下がる。各リクエストは通常の同期 Messages 呼び出しのままなので、レビュアーは数秒以内にインラインで結果を得られる。"}, {"text": "標準を system prompt に移し、Claude に一度内部化して記憶から答えるよう指示した上で、毎回のコンテキスト送信をやめる。", "is_correct": false, "why": "モデルは呼び出し間でステートレスであり、トークンが存在しなければルールを内部化して後から思い出すことはできない。「覚えておけ」と頼むのは確率的な期待であって、処理を減らす仕組みではない。結局、コンテキストは毎回の呼び出しで送信しなければならない。"}], "explanation": "ここで動かすべきレバーは、大規模で安定したプレフィックスの「繰り返し処理」であり、単価でもバイト転送でもモデルの記憶でもない。それを確実に動かせるのは Prompt caching だけだ。安定したコンテキンツを先頭に置き、その終端に cache_control のブレークポイントを 1 つ設定し、その後に diff と指示を送る。キャッシュ読み取りは標準入力レートの約 10% で課金され、再処理をスキップする。各 cache_control エントリは厳密に 1 つの TTL を持つ。今回の呼び出し頻度なら、デフォルトの 5 分 TTL がキャッシュヒットのたびにリフレッシュされ、レビューとレビューの間でプレフィックスをウォームに保てる。5 分より長いアイドル間隔が想定される場合は、同じブレークポイントを 1 時間 TTL（\\\"ttl\\\": \\\"1h\\\"）に設定すればよい。2 つの TTL はブレークポイントごとに選ぶ選択肢であり、組み合わせるものではない。Files API が避けられるのはバイトの再アップロードだけで、file_id で参照されるコンテンツは毎回の呼び出しで入力として課金・処理される。ステートレスなモデルに呼び出しをまたいで標準を記憶させるのは確率的なアプローチであり、トークンを消し去ることはない。安価なモデルも単価を下げるだけで、毎回の呼び出しでプレフィックスが完全に再処理される状況は変わらず、レビューの判断力まで弱めてしまう。"}, {"qid": "exam2-q15", "domain": "Applications and Integration", "type": "mr", "scenario": "物流企業の配車コンソールでは、ルーティング提案の説明を Claude が生成し、それを顧客と実時間通話中のディスパッチャーに提示する。そのため、すべての応答は数秒以内に返らなければならない。契約運賃レートについては、同社の既存のユーザー単位の認可チェックがそのディスパッチャーを承認した場合に限り回答に含めることができる。レートはプライベートな料金データベースに格納されており、参照用コードはプラットフォームチームが既に保守している。両方の要件を満たす実装の選択肢を2つ選べ。", "options": [{"text": "各説明リクエストに対して、Message Batches API ではなく同期的な Messages API を使用する。ディスパッチャーは数秒以内の応答を必要とするため。", "is_correct": true, "why": "レイテンシ要件において正しい。Messages API はインタラクティブかつ低レイテンシなリクエスト/レスポンス向けに設計されており、Message Batches は24時間以内に結果を返す。実時間通話中のディスパッチャーはこの遅延を許容できず、秒単位の SLA はコストに関わらず同期的な API を必須とする。"}, {"text": "料金参照をクライアント側のツールとして実装する。配車コンソールがユーザー単位の認可チェックを実行した上でツールを実行し、ディスパッチャーが承認された場合に限り、レートを tool_result として Claude に返す。", "is_correct": true, "why": "認可要件において正しく、かつ構造的な保証を実現する唯一の手段。コンソールがツールの実行を管理するため、既存の認可チェックを自ら実行し、成功時のみ tool_result を返せる。これにより未承認のレートはモデルに一切届かない。この境界は決定論的であり、モデルが指示に従うかどうかに依存しない。"}, {"text": "リクエストあたりのコストをほぼ半減させるため、説明生成に Message Batches API を使用する。", "is_correct": false, "why": "リクエストあたり約50%のコスト削減は事実であり、公式にも文書化されている。しかし Message Batches は最大24時間のターンアラウンドを許容する、レイテンシ非敏感なワークロード向けに設計されている。秒単位の実時間通話 SLA はバッチのターンアラウンドと両立せず、この割引は本ワークロードでは無意味である。"}, {"text": "Claude に料金データベースへの直接読み取りアクセスを付与し、システムプロンプトに、いかなる運賃レートを開示する前にもディスパッチャーの認可レベルを確認するようルールを追加する。", "is_correct": false, "why": "これは保証を指示追従の問題として扱っている。システムプロンプトのルールは従順確率を高めるが、モデルが未承認のレートを出力することを決定論的に防ぐことはできない。認可チェック後のクライアント側ツール実行のみが境界を保証する。なぜならコンソールが承認しない限りデータが構造的に引き渡されないからである。"}, {"text": "Messages API を使用し、Claude に参照ツールを呼び出させる。ただしディスパッチャーはログイン時に認証済みであるため、呼び出しごとのユーザー単位認可チェックの再実行は省略する。", "is_correct": false, "why": "これはセッション認証とデータ単位の認可を混同している。運賃レートの可視性はレーン・顧客・契約ごとに異なり得るため、ログイン時の資格情報では、あるクエリでそのディスパッチャーがどのレートを参照できるかは確定しない。認可チェックは毎回のツール呼び出しで実行しなければならない。さもなくば境界は要求されたデータに対する実際の権限ではなく、古いログイン時の表明に依存することになる。"}], "explanation": "2つの要件は2つの独立した意思決定を要求する。秒単位の SLA には同期的な Messages API が必須である。Message Batches は24時間以内に結果を返すため、約50%のコスト削減も、ディスパッチャーが実時間通話中では無意味になる。認可要件には指示追従ではなく構造的な保証が必要である。クライアント側のツールにより、コンソールはユーザー単位のチェックを実行し、承認時のみレートを tool_result として返せる。そのため未承認のデータはモデルに一切届かない。\\n\\n各誤答は要件の一部を満たすが、特定の制約を1つ破っている。Message Batches（選択肢 C）は実際のコスト削減を実現するものの、レイテンシ SLA を破る。データベースへの直接アクセスとシステムプロンプトのルール（選択肢 D）は保証を確率として扱う。プロンプトのルールは従順確率を高めるが未承認のレートを決定論的にブロックすることはできず、だからこそ強制はプロンプトではなくツール実行層に属する。ログイン済みを理由に呼び出しごとのチェックを省く（選択肢 E）ことは、セッション認証とデータ単位の認可を混同する。運賃レートの可視性はレーンや契約ごとに異なり得るため、チェックは毎回の呼び出しで実行されなければならない。\\n\\n問題文は意図的に単一概念で構成されている。1つのワークフロー、2つの要件、それぞれが1つの要件にきれいに対応する2つの正解、そして技術的には正確なメカニズムでありながら1つの制約だけを正確に破る3つの誤答。回答を示唆する表面的な手がかり（長さ、婉曲な表現、ブランド名）は一切ない。"}, {"qid": "exam2-q16", "domain": "Claude Code", "type": "mr", "scenario": "プラットフォームチームは、全エンジニアが同一の version-controlled なエンジニアリング標準を読めるようにしたい。同時に、各エンジニアは個人的な scratch notes（ローカルのエンドポイント、使い捨てコマンド）を持ち、それらが共有リモートに決して送られないようにしたい。Claude Code のメモリファイルの実際の挙動に合致する設定を2つ選べ。", "options": [{"text": "共有標準を ./CLAUDE.md（ソース管理で配布される project memory）にコミットし、各エンジニアのプライベートなメモは Claude Code が並行して読み込む ./CLAUDE.local.md に保持する。", "is_correct": true, "why": "ドキュメントで規定されたスコープ分離そのもの。./CLAUDE.md（または ./.claude/CLAUDE.md）はチーム全体で共有・バージョン管理される project memory であり、./CLAUDE.local.md はエンジニア個人のメモ用に並行して読み込まれる対応ファイル。"}, {"text": "./CLAUDE.local.md をリポジトリの .gitignore に明示的に追加する。Claude Code はこのファイルを自動的に ignore せず、.gitignore で未追跡のまま放置するとプライベートなメモが共有リモートに push されるリスクがあるため。", "is_correct": true, "why": "ドキュメントでは CLAUDE.local.md は自動的に gitignore されないことが明記されている。チーム自身が .gitignore に追加する（または /init の personal-notes オプションに任せる）ことで、このファイルがコミットされないようにする必要がある。この決定論的な仕組みこそが、メモをローカルに留めることを実際に保証する。"}, {"text": "共有 CLAUDE.md に、CLAUDE.local.md を含むコミットを拒否するよう Claude への指示を追加する。これにより .gitignore を編集せずにプライベートなメモをローカルに留めることを保証できる。", "is_correct": false, "why": "CLAUDE.md は Claude が読んで従おうとする advisory memory であり、enforcement layer ではない。コンプライアンスの確率は上がるが、モデルが指示に反する行動をとる可能性があるため保証はできない。保証には .gitignore（選択肢B）のような決定論的な仕組みが必要。毎回必ず発生すべきことは、モデルに要求するのではなくコードで強制すべきである。"}, {"text": "各エンジニアのプライベートなメモを ~/.claude/CLAUDE.md（user memory）に保持する。これによりプロジェクトリポジトリにコミットされずに毎セッションで読み込まれる。", "is_correct": false, "why": "user-scope のメモリは実在し、プロジェクトにコミットもされない。ただし、そのエンジニアが関わるすべてのプロジェクトにグローバルに適用され、このプロジェクトだけに限定されない。そのため、このリポジトリ専用の scratch notes（sandbox の URL、一回限りのコマンド）を置くと、他のすべてのプロジェクトのコンテキストを汚染してしまう。このリポジトリ限定の個人メモとして正しいスコープは ./CLAUDE.local.md。"}, {"text": "プライベートなメモをリポジトリルートの別ファイル ./NOTES.md に保持する。Claude Code はそこに置かれた任意の markdown ファイルを起動時にコンテキストとして読み込むため。", "is_correct": false, "why": "Claude Code が自動的に読み込むのは、ドキュメントに記載された CLAUDE.md のパス（project の CLAUDE.md、.claude/CLAUDE.md、CLAUDE.local.md、user-scope）のみ。任意の ./NOTES.md はメモリとして読み込まれず、明示的な @import または on-demand の読み込みが必要になる。コミット保護も受けない。"}], "explanation": "Claude Code のメモリはスコープごとに分割されている。version-controlled な共有 project memory は ./CLAUDE.md（または ./.claude/CLAUDE.md）で、ソース管理を通じて配布されるため、全エンジニアが同じ標準を読む。これに対し、個人の対応物が ./CLAUDE.local.md で、エンジニア個人のメモ用に並行して読み込まれる。これにより選択肢Aが正解となる。\\n\\n重要なのは、ドキュメントで CLAUDE.local.md は自動的に gitignore されないと明記されている点。チーム自身が .gitignore に追加する（選択肢B）ことで、プライベートなメモがリモートに push されないようにする必要がある。この決定論的な保証は、Purcell の hooks の問題で示されたのと同じ原則——毎回必ず発生すべきことは、モデルに要求するのではなくコードで強制すべきである。\\n\\n選択肢Cが不適切なのは、CLAUDE.md が振る舞いを確率的に形作る advisory memory であり、enforcement layer ではないため。指示はコンプライアンスの確率を高めるが保証はできず、保証にはモデルへのお願いではなく .gitignore や hooks が必要。\\n\\n選択肢Dが不適切なのは、user-scope のメモリ（~/.claude/CLAUDE.md）がエンジニアの全プロジェクトにまたがるグローバルスコープだから。このリポジトリ専用の scratch notes を置くと他のプロジェクトのコンテキストを汚染してしまい、このリポジトリ限定の個人メモの正しいスコープは ./CLAUDE.local.md。\\n\\n選択肢Eが不適切なのは、Claude Code が起動時に自動読み込みするのは名前付きの CLAUDE ファイルのみで、リポジトリルートの任意の markdown は対象外のため。./NOTES.md は起動時にコンテキストとして読み込まれず、コミット保護も受けない。"}, {"qid": "exam2-q17", "domain": "Applications and Integration", "type": "mc", "scenario": "法律事務所の訴訟準備アシスタントは、弁護士が作業する中で各案件の戦略メモや過去の和解決定の背景にある根拠を記録していく。これらのメモは、同じ案件に関する後日の独立した相談にも引き継がれなければならず、事務所が所有して監査可能なストレージに保持され、かつ毎回の呼び出しでケースファイル全体を再送する必要があってはならない。このアシスタントは Messages API 上で動作し、tool call は事務所自身のバックエンドで実行される。", "options": [{"text": "各案件のメモを事務所が管理する外部の memory store に永続化し、相談のたびにコンテキストには関連する事実だけを読み込む。", "is_correct": true, "why": "モデルは API 呼び出し間でステートレスであるため、案件ごとの知識はアプリケーションが所有する外部ストアに置き、相談ごとに関連する事実だけを読み込む必要がある。client-side memory tool として実装すれば、Claude が読み書きを要求し、事務所のバックエンドがそれを自身の監査可能なストレージに適用する。"}, {"text": "ケースファイル全体を cache_control breakpoint の背後でキャッシュし、同じ prefix が再処理されずに各相談で再利用されるようにする。", "is_correct": false, "why": "prompt caching は繰り返される prefix の再処理コストを下げるが、ストアではない。コンテンツは依然として毎回のリクエストに含める必要があり、context window の消費にもカウントされ、更新されなければ期限切れになる。ファイルを再送しない相談では何も呼び出されない。"}, {"text": "蓄積されたメモを Files API で一度アップロードし、すべての相談で file_id で参照する。", "is_correct": false, "why": "Files API はバイトデータの再アップロードを避けるが、データは事務所管理のストレージではなく Anthropic のインフラ上でホストされる。さらにファイルを参照しても毎回の呼び出しで内容全体がコンテキストに読み込まれる。重複を排除するのはアップロードだけで、呼び出しごとのコンテキストコストや監査要件は満たさない。"}, {"text": "恒常的なメモを system prompt に置き、extended thinking を有効にして、モデルが各案件の過去の決定について慎重に推論するようにする。", "is_correct": false, "why": "これでは案件ごとのメモすべてを毎回のリクエストに戻すことになり、再送禁止の要件に違反し、案件が蓄積するにつれてコンテキストが膨張する。extended thinking は既にコンテキストにある内容についての推論を深めるだけで、過去のメモを選択的に取得するわけではない。in-context で確率的なアプローチであり、just-in-time な memory store ではない。"}], "explanation": "要件は、独立した相談間で案件ごとの状態を永続的に保持し、それを事務所管理のストレージに置き、毎回の呼び出しでケースファイル全体を再読み込みするのではなく just-in-time で呼び出すことである。モデルは API 呼び出し間でステートレスであるため、これは標準的な agent-memory のパターンになる。メモをアプリケーションが所有する外部ストアに永続化し、相談ごとに関連する事実だけを読み込む。client-side memory tool として実装でき、読み書きの操作は事務所のバックエンドが自身の監査可能なストレージに対して実行する。caching と Files API はいずれも毎回のリクエストにコンテンツ全体を含める必要がある（caching は繰り返される prefix のコストを下げるだけで期限切れにもなり、Files API は再アップロードを避けるだけでバイトデータは Anthropic 側でホストされる）。さらに Files API はストレージ管理の要件も満たさない。system prompt + extended thinking の選択肢は、すべてのメモを毎回のリクエストに戻すことになる。reasoning effort は思考の深さを制御するものであり、recall を制御するものではないからだ。"}, {"qid": "exam2-q18", "domain": "Prompt and Context Engineering", "type": "mc", "scenario": "サポートエージェントが検索ツールを呼び出すと、巨大な結果ブロックが返される。現在のターンでは役立つが、後のターンではノイズになる。会話が長くなるにつれ、こうした古い結果が context window を膨張させ、Claude の集中を散らしてしまう。チームは、後のターンでは古い tool results を無視させたいと考えている。最適なアプローチはどれか。", "options": [{"text": "推論時に以前の tool results を無視するよう、system prompt で Claude に指示する。", "is_correct": false, "why": "指示は attention を左右するが、モデルの裁量に依存し、token 数は一切減らない。膨張は解消されず、毎ターンで従う保証もない。"}, {"text": "tool_result ブロックに cache_control breakpoint を指定して prompt caching を有効にする。", "is_correct": false, "why": "キャッシュは繰り返し現れる prefix のコストとレイテンシを下げるが、cached tokens は依然として context window にカウントされる。billing の最適化であって、pruning の仕組みではない。"}, {"text": "アプリケーションコードで、各呼び出しの前に messages array から古い tool_result ブロックを取り除く。", "is_correct": false, "why": "アクティブな context は減らせるが、API が組み込みで server-side に提供している機能を独自コードで再実装することになる。"}, {"text": "API の server-side context editing を有効にし、prompt が Claude に届く前に古い tool_result ブロックをクリアする。", "is_correct": true, "why": "context editing は Claude が prompt を見る前の server-side で動作する。token threshold を超えると最も古い tool_result ブロックから順にクリアされ（placeholder text で置換）、クライアント側は完全な履歴を保持したままになる。あるターンでは役立ち後のターンでは邪魔になる巨大な結果を返す、tool 中心のエージェント向けに作られた機能である。"}], "explanation": "あるターンでは役立ち、後のターンではノイズになる tool results こそが、server-side context editing が対象とする典型例である。clear_tool_uses_20250919 strategy は、設定した token threshold（デフォルトは入力 100,000 tokens）を超えると、最も古い tool_result ブロックから順にクリアし、それぞれを placeholder text で置換する。これにより Claude は削除されたことを認識できる。デフォルトでは results のみがクリアされ、tool_use の呼び出しパラメータも含めてクリアするには clear_tool_inputs: true が必要である。クライアントは完全で未変更の履歴をそのまま送信し続ける。API が server-side で編集するため、アプリケーション側での pruning は不要である。system prompt の指示は LLM 流の修正であり、確率的で token 数に影響しないため、後のターンで古い結果が無視されることを保証できない。prompt caching はコストとレイテンシの最適化であり、pruning ではない。cached tokens は依然として context window を占有する。クライアント側でのトリミングは context を減らせるが、API が組み込みで提供する機能をアプリケーションコードで再実装することになる。"}, {"qid": "exam2-q19", "domain": "Security and Safety", "type": "mc", "scenario": "ある保険会社が Claude を使い、メンバーポータルのメッセージに対する返信文をドラフトしている。同じワークフロー内で Claude には、メンバーのクレーム（請求）履歴を読み取るツールや、支払いの再発行といったクレーム調整をポストするツールが与えられている。メンバーからのメッセージやアップロードされた不服申し立て（アピール）レターには、メンバーが入力した任意のテキストが含まれ得る。データ漏洩と不正操作を最も効果的に防ぐ設計はどれか。", "options": [{"text": "バックエンドで呼び出し元を認証し、各ツールがアクセスできるレコードをその呼び出し元が権限を持つ範囲に限定する。読み取り・書き込みのいずれが実行されるよりも前に認可を行い、メンバーが入力したテキストは信頼できないデータとして system instructions とは分離して扱う。", "is_correct": true, "why": "認可を決定的かつサーバーサイドにする唯一の選択肢である。バックエンドが呼び出し元を検証し、読み取りや書き込みの実行前に各ツールを当該呼び出し元がアクセス可能なレコードへスコープする。さらに信頼できないメンバーのテキストは権限を付与できず、信頼された instruction チャネルにも到達しない。"}, {"text": "毎ターン認可ルールを再述し、Claude に対してメンバーの本人確認とメッセージに埋め込まれた指示の無視を指示する。事後監査のため全ツール呼び出しをログに記録する。ツール自体はそのまま変更しない。", "is_correct": false, "why": "もっともらしい。ルールの再述と呼び出しのログ取得は、通常の挙動やトレーサビリティを確かに改善する。しかし system prompt の指示はアクセス制御ではない。ツールが変更されず任意のクレームを読めるままなら、アピールレターに埋め込まれた injection 指示によって検索を誤ったレコードへ誘導できてしまい、ログは事後の発見にしか役立たない。"}, {"text": "バックエンドで呼び出し元を認証するが、クレーム履歴ツールはメンバーの雇用者グループの全クレームを返し、Claude はドラフト作成前に他のメンバーのフィールドをマスキングし、返信に必要な最小限のデータだけを残す。", "is_correct": false, "why": "もっともらしい。呼び出し元を認証し、出力を最小化もしている。しかしグループ全体のクレームを返す時点で least privilege に違反し、マスキング前に他のメンバーのデータがコンテキストに入り込む。モデルによるマスキングは確率的であり、データが返信へ漏れないことを保証できない。"}, {"text": "より大きく injection 耐性の高いモデルへアップグレードし、安全な拒否の few-shot 例を先頭に置き、各ツールリクエストを実行前に第二のモデルへ通して不審な呼び出しをブロックする。", "is_correct": false, "why": "もっともらしい。より大きなモデルと第二のモデルによるゲートは、平均して injection への耐性を高める。しかしいずれも確率的な推論であり、決定的な強制（enforcement）ではない。能力の強化は、サーバーサイドの認証・スコーピング・入力の分離に代わるものではない。"}], "explanation": "Claude をプライベートデータとアクション実行ツールと組み合わせるワークフローにおいて、Anthropic の tool-use ガイダンスは明確である。ツール呼び出しを提案するのはモデルだが、それを安全に実行する責任はアプリケーションにある。正しい設計では、Claude の出力とメンバーが入力したすべてのコンテンツを「制御されたアプリケーションへの入力」として扱い、決して認可としては扱わない。各ツールを実行するバックエンドは、認証された呼び出し元を検証し、リクエストをその呼び出し元が参照可能なレコードにスコープし、データが返される前・調整がポストされる前に、不正または危険な操作を拒否しなければならない。\\n\\nメンバーのメッセージやアピールレターは、prompt-injection の試行を運び得る信頼できない入力である（既存ルールの無視、他のメンバーのクレームの漏洩、不当な支払いのポストなどを指示する）。だからこそ、これらは信頼された system instructions とは明確に分離されたチャネルを通り、決して権限を付与できない。\\n\\n誤答選択肢はどれも enforcement を確率的なものに委ねている。ルールの再述と呼び出しのログ取得（B）は、任意のクレームを読めるままのツールを制限できず、prompt はアクセス制御ではない。雇用者グループの全クレームを返してモデルにマスキングを任せる設計（C）は、マスキング前に他のメンバーのデータがコンテキストに入り込み、保証されない。より大きなモデル・few-shot 例・第二モデルによるゲート（D）は成功率を上げるが、依然として推論であり enforcement ではない。prompting とモデルの選択は通常の挙動を形作るが、決定的なサーバーサイドの認証・認可・入力の分離に代わるものではない。"}, {"qid": "exam2-q20", "domain": "Claude Code", "type": "mr", "scenario": "プラットフォームチームは、セルフホストの CI runner 上で Claude Code を無人ステップとして実行している。ターミナルにオペレーターはいない。このステップはエージェントタスクを実行して終了しなければならず、対話型セッション（interactive session）は一切起動しない。また、共有の API 予算を保護するため、1 回の実行でエージェントがたどれるターン数には毎回固定の上限を設ける必要がある。チームが取るべきアクションを 2 つ選べ。", "options": [{"text": "Claude Code を print mode で実行する。`claude -p`（または `claude --print`）を使い、プロンプトは CLI 引数、もしくは CI スクリプトから stdin 経由で渡す。", "is_correct": true, "why": "Print mode は Claude Code のドキュメントに記載された headless 実行パスである。プロンプトを CLI 引数または stdin で受け取り、エージェントタスクを実行して出力を返し、interactive なターミナルセッションを起動せずに終了する。無人実行の要件を満たせる唯一のエントリポイントである。"}, {"text": "`--max-turns N` を渡して、1 回の実行で許容されるエージェントのターン数に上限を設ける。", "is_correct": true, "why": "`--max-turns` はドキュメントに記載された、harness が強制するエージェントのターン数上限である。毎回の実行で決定論的に保証されるため、モデルの判断に関わらず共有 API 予算を確実に保護できる唯一のノブである。"}, {"text": "デフォルトの interactive mode で `claude` を実行し、プロンプトを stdin からパイプで渡したうえで、`timeout N` でラップしてプロセスが自走して終了するようにする。", "is_correct": false, "why": "`-p`/`--print` なしでは Claude Code は interactive なターミナルセッションを起動する。それはキーボードの前に人間がいることを前提に設計されており、stdin のパイプや `timeout` の追加によって document された headless パスに変わるわけではない。さらに `timeout` が縛るのは wall-clock 時間であって、対話性の有無ではない。非対話のエントリポイントは print mode だけである。"}, {"text": "`claude -p` を実行し、`--max-turns` の代わりに「N 回の tool call を完了したら停止せよ」のような system prompt の指示を追加して、モデル自身に上限を守らせる。", "is_correct": false, "why": "プロンプト指示によるモデルの自己制限は裁量依存かつ非決定論的であり、実行ごとに上限を超えたり手前で止まったりする。自動化された予算ゲートはこれを信頼できない。毎回の実行で harness が強制するのは `--max-turns` だけであり、モデルの裁量に頼るものではない。"}, {"text": "`claude -p` を実行し、各レスポンスを `max_tokens` で制限して、トークン上限がエージェントの tool call の往復回数を縛ると期待する。", "is_correct": false, "why": "`max_tokens` が制限するのは単一レスポンスの出力長であり、エージェントのターン数ではない。エージェントは短いレスポンスを多数繰り返しながら多くの tool call を実行できるため、ターン予算は実質的に縛られない。ターン数を制御するノブは `--max-turns`、出力長を制御するノブは `max_tokens` である。"}], "explanation": "Print mode（`claude -p` / `claude --print`）は、Claude Code がスクリプトや CI 向けに提供するドキュメント記載済みの headless 実行パスである。プロンプトを CLI 引数または stdin で受け取り、エージェントタスクを実行して出力を返し、interactive なターミナルセッションを起動せずに終了するため、無人実行の要件を満たす。`--max-turns N` はドキュメントに記載された、harness が強制するエージェントのターン数上限である。毎回の実行で決定論的に保証されるため、共有 API 予算を保護する唯一の信頼できる手段となる。各正解アクションは、2 つの要件のうちそれぞれ独立して 1 つを満たす。\n\n他の選択肢が不適な理由: C はデフォルトの interactive mode を維持したまま、stdin のパイプと `timeout` で無人化しようとする。しかし `--print` なしでは Claude Code は interactive セッションを起動し、これは document された headless パスではない。`timeout` が縛るのも wall-clock 時間であって、対話性ではない。D と E はターン上限のノブを間違えている。D はプロンプト指示でモデル自身に上限を守らせようとするが、モデルの自己制限は非決定論的であり自動ゲートは信頼できない。毎回 harness が強制するのは `--max-turns` だけである（決定論的な hook が、繰り返しのプロンプト指示より優れるのと同じ原理）。E は `max_tokens` で代用しようとするが、これは個々のレスポンスの出力長を制限するものであり、エージェントのターン数ではない。エージェントは短いレスポンスを多数重ねて多くの tool call を実行できるため、予算は実質的に縛られない。\n\nAnthropic の Claude Code ドキュメント（Claude Code のプログラム実行に関する項）によれば、無人実行とターン数制限の要件を決定論的に満たすのは `claude -p`（print mode）と `--max-turns N` の 2 つのフラグである。"}, {"qid": "exam2-q21", "domain": "Applications and Integration", "type": "mc", "scenario": "語学学習アプリで、Claude が生成した解説を画面に word-by-word で表示したい。バックエンドサービスが API key を保持し、学習者の代わりに Claude を呼び出す。Claude Messages API が実際に提供する streaming 機構を使っている実装はどれか。", "options": [{"text": "バックエンドから `POST /v1/messages` を `stream=true` で呼び出し、server-sent event stream（`content_block_delta` イベント）を読み取って、各 text delta を画面に転送する。", "is_correct": true, "why": "これが Messages API が実際に提供する transport である。endpoint は REST over HTTP（`POST /v1/messages`）で、`stream=true` を指定すると応答は server-sent events（`message_start`・`content_block_delta`・`message_stop`）として届く。そのためバックエンドは delta が生成された瞬間に画面へ push できる。"}, {"text": "バックエンドから Messages endpoint への WebSocket 接続を開き、サーバーが socket 経由で push する各 frame を転送する。", "is_correct": false, "why": "Anthropic API は WebSocket endpoint を提供しておらず、HTTP 上の server-sent events で streaming を行う。そのため、記載のような socket は接続できない。"}, {"text": "バックエンドから Message Batches API に stream を有効化してリクエストを送信し、各 streamed token を画面に転送する。", "is_correct": false, "why": "Message Batches API は非同期・レイテンシ許容型（完了まで最大24時間、コストは約50%低減）であり、streaming mode は存在しない。結果は batch が完了した時点でのみ返されるため、token は段階的には出力されない。"}, {"text": "system prompt で Claude に1文ずつの turn で回答するよう指示し、turn ごとにモデルを1回呼び出して、各 turn が完了した時点で表示する。", "is_correct": false, "why": "prompt による chunking は出力の形状を変えるだけで、配送の transport は変えない。各 turn の呼び出しは依然として turn 全体を一度に返す（非 streaming）ため、画面は word-by-word で streaming されるのではなく、文単位の burst でリクエストごとの latency を伴って飛び飛びに更新される。"}], "explanation": "正解: A。Claude Messages API は RESTful な HTTP endpoint（`POST /v1/messages`）であり、公式 SDK はこれを wrap している。`stream=true` を指定すると、応答は HTTP 上の server-sent events（`message_start`・`content_block_delta`・`message_stop`）として返されるため、各 delta を生成された瞬間に画面へ転送できる。全選択肢がバックエンド経由であるため、唯一の識別軸は「API が実際に提供する streaming transport を使っているか」であり、A だけがそれを満たす。\n\n他の選択肢がダメな理由: B は、Anthropic API が WebSocket endpoint を提供しておらず、HTTP 上の SSE で streaming するため、socket には接続先が存在しないことで失敗する。C は、Message Batches API が非同期・レイテンシ許容型のワークロード向け（完了まで最大24時間・コスト約50%低減）で streaming mode を持たず、batch 完了時にのみ結果を返すことで失敗する。D は prompt engineering による代替手段であり transport ではない。回答を多数の非 streaming 呼び出しに分割しても各 turn はまとめて返されるため、画面は token-by-token ではなく、リクエストごとの latency を伴う断続的な更新になる。"}, {"qid": "exam2-q22", "domain": "Prompt and Context Engineering", "type": "mc", "scenario": "ある小売業者のデータ取り込みパイプラインでは、毎日何千件もの生の製品フィードレコードを Claude に送り、構造化されたカタログ項目へ正規化している。プロンプトにはターゲットの schema を定義し、あいまいな製品をどう分類すべきかも含めて、すべてのマッピングルールを文章で記述している。しかし QA では、少数ながら予測可能な edge case の製品をモデルが繰り返し誤処理することが分かっている。同じレコードが毎回同じように失敗する状態だ。チームは、モデルの変更や別の validation service の追加を行わずに、これらの特定の失敗を修正したいと考えている。", "options": [{"text": "プロンプトに、失敗する各レコードパターンに対して望ましいマッピング結果を示す worked example（入出力の実例）を追加する。", "is_correct": true, "why": "最適な対応。失敗はシステマティックであり（同一レコードが毎回同じように誤分類される）、これはモデルがルールをランダムに見落としているのではなく、これらの特定パターンが求める正確なマッピングを一度も示されていないことを意味する。プロンプトにはすでに文章によるルールが存在するのに失敗し続けており、Anthropic のプロンプトガイダンスも、あいまいで判断に影響するケースでは worked example（「tell ではなく show する」）がルールの再説明よりもはるかに確実に意図したマッピングを伝えると明言している。これにより欠けていたマッピングを直接教え込み、既知の edge case を確定的に修正できる。モデルの変更も新しい service の追加も不要だ。"}, {"text": "system prompt で edge case のマッピングルールをより明確かつ強調的に言い換え、モデルが重要なルールとして扱うようにする。", "is_correct": false, "why": "ルールはすでにプロンプトに記述されているのに、モデルは毎回同じレコードを失敗させる。これは注意力の一時的な欠如ではなく、一貫した失敗だ。強調や繰り返しは注意力に起因するエラーでは遵守確率を上げるが、worked example が伝えるような正確な入出力マッピングは伝えられない。そのためシステマティックな誤分類は解消しない。Anthropic のガイダンスも、まさにこの種の edge case では強調的な文章よりも具体例を推奨している。"}, {"text": "output_config.format で structured outputs を有効化し、すべてのレスポンスをターゲットの schema に制約する。", "is_correct": false, "why": "Structured outputs はレスポンスの形状を保証する。正しい field と type を持つ構文的に有効な JSON で、許可された値のセットから値が選ばれる点は保証される。しかし、分類が難しいレコードがどの許可値を受け取るべきかまでは決められない。この制約は構造に対して働くものであり、edge case が失敗している意味的な分類には働かない。そのため、各誤分類は schema としては有効だが内容が間違っている出力としてそのまま通過してしまう。"}, {"text": "output_config.effort を上げ、モデルが各レコードについてより長く推論してから回答するようにする。", "is_correct": false, "why": "effort を上げるとモデルの推論予算が増え、コストとレイテンシが上がる代わりに全般的な丁寧さは改善される。しかし、チーム固有の分類ルールが注入されるわけではない。正しいマッピングを一度も示されていないレコードは、推論しても誤った結論に至る可能性が残り、実行ごとに分類が安定しない。そのためシステマティックな edge case の失敗は解消しない。"}], "explanation": "exam2-q22 -- 正解: A。失敗はシステマティックだ。同一レコードが毎回同じように誤分類されるということは、モデルがルールをランダムに無視しているのではなく、これらの特定パターンが求める正確なマッピングを一度も示されていない（そしてプロンプトにある文章ルールがそれを伝えきれていない）ことを意味する。Worked example は正確な入出力マッピングを直接エンコードする。これはまさに Anthropic のプロンプトガイダンスが、あいまいなケースの判断に依存する正規化に対して推奨する対応（「tell ではなく show する」）であり、モデル変更や新しい service なしで既知の edge case を確定的に修正できる。\n\n他の選択肢が不適な理由:\n- B（ルールを強調的に言い換え）: ルールはすでに存在して一貫して失敗している。強調は注意力には働くが、欠けているマッピングには働かないため、システマティックな失敗は残る。これは「モデルがすでに無視している指示を繰り返す」ことと同じ、確率的と確定的の差である。\n- C（output_config.format による structured outputs）: レスポンスの形状を制約し、許可セットからの値を強制するが、分類が難しいレコードがどの値を受け取るべきかは決められない。誤分類は schema としては有効だが内容が間違っている出力として通過してしまう。\n- D（output_config.effort を上げる）: 推論予算の増加はコストとレイテンシの上昇と引き換えに全般的な丁寧さを改善するが、チームの分類ルールは注入されない。正しいマッピングを一度も示されていないレコードは、推論しても誤った結論に至る可能性がある。"}, {"qid": "exam2-q23", "domain": "Applications and Integration", "type": "mc", "scenario": "ある規制対象の決済企業は、Claude Code のコードレビューアシスタントを特定の1つの Sonnet モデルに対して検証済みです。監査人は、エンジニアであれ CI runner であれ、別のモデルを呼び出せないことを要求しています — コマンドラインで `--model` を渡して上書きすることさえも認めません。この要件を強制できる設定の仕組みはどれですか？", "options": [{"text": "検証済みのモデルを `.claude/settings.json` に記述してコミットし、すべての clone で起動時に読み込ませる。", "is_correct": false, "why": "もっともらしい：`.claude/settings.json` は起動時にすべての clone が読み込む共有設定ファイルであり、チーム全体で統一された解決策のように見える。しかし設定の優先順位ではコマンドライン引数より下位に位置するため、開発者が `--model` を渡せば上書きされてしまう。つまり再現可能なデフォルト値を提供するだけで、監査人が禁止している「CLI 上書き」そのものを防ぐことはできない。"}, {"text": "CLAUDE.md に常設の指示を記述し、アシスタントには常に検証済みの Sonnet で動作するよう命じておく。", "is_correct": false, "why": "もっともらしい：CLAUDE.md は起動時に読み込まれる正真正銘のプロジェクトメモリであり、権威的に見える。しかしこれはモデルがセッション内で読み取って解釈するガイダンスにすぎず、`model` フィールドそのものを設定することはできない。確率的な誘導であって設定ではなく、CLI の上書きを防ぐこともできない。"}, {"text": "エンタープライズの managed settings 経由で検証済みモデルをデプロイする。プロジェクトファイルも CLI フラグも上書きできない仕組み。", "is_correct": true, "why": "最適解：managed settings は Claude Code の公式ドキュメントにおける設定の優先順位の最上位に位置し、user・project・local・コマンドライン引数のいずれでも上書きできない。選択肢の中で「単なるデフォルト設定」ではなく本当に強制力を持つ唯一の仕組みであり、監査人が求める「上書き不可能」という要件を満たす。"}, {"text": "すべての開発者と CI launcher に対し、毎回の呼び出しで `--model <sonnet-id>` を渡すことを義務付ける。", "is_correct": false, "why": "もっともらしい：`--model` フラグは実在する機能であり、義務化は規律ある運用に見える。しかしここでの強制は手続きにすぎず、すべての人間とすべてのスクリプトが毎回フラグを覚えていることに依存し、呼び出し側なら誰でも省略や変更ができる。手続き上の規律は、まさに上書き不可能なコンプライアンス統制が排除すべき脆弱性そのものである。"}], "explanation": "ユーザーが上書きしようとしても必ず維持されなければならない要件は、すべて managed settings に置くべきです。Claude Code の settings 階層の中で、プロジェクトファイルやコマンドライン引数で上書きできない唯一の tier だからです。Project settings.json（A）は再現可能な共有デフォルトを提供しますが `--model` に負けるため、強制力はありません。CLAUDE.md（B）はモデルが解釈するガイダンスであり、設定フィールドではありません。CLI フラグ（D）は手続きに依存し、省略が容易です。背後にある原則は deterministic hooks と同じで、毎回の実行で真でなければならない条件は構造的に強制すべきであり、モデルの裁量や人の記憶に委ねてはなりません。詳細は公式の Claude Code settings ドキュメント（settings precedence・configuration scopes）を参照してください。"}, {"qid": "exam2-q24", "domain": "Tools and MCPs", "type": "mc", "scenario": "サポートチームの MCP server は、承認済み playbook のライブラリ（プロダクトラインごとに1本）を参照して返信案を作成する Claude アシスタントを支えている。チームのルールとして、チケットを処理する担当者は Claude が返信を作成する前に、該当プロダクトの playbook を明示的に選択しなければならない。現在 playbook は tools として公開されている。レビューの結果、Claude が自身で playbook を選択するため、誤ったプロダクトの playbook が適用されるケースがある。選択を担当者（Claude ではなく）が行うことを最も確実に保証する再設計はどれか。", "options": [{"text": "playbook を prompts として公開し、各 playbook がプロダクトラインごとに担当者が明示的に選択できるコマンドとして表示されるようにする。", "is_correct": true, "why": "prompts は MCP の user-controlled primitive であり、server はユーザーが明示的に選ぶコマンドとして公開する。playbook を prompts にすればプロダクトの選択権が担当者に移り、Claude が自分で選ぶ余地が消える。要件を直接に満たす。"}, {"text": "playbook は tools のまま残し、「担当者がプロダクト名を指定するまで Claude は返信を作成してはならない」というルールを system prompt に追加し、few-shot examples で補強する。", "is_correct": false, "why": "instructions や few-shot examples は Claude が待機する確率を高めるが、tools は model-controlled のままで、呼び出すかどうか・いつ呼ぶかを決めるのは Claude のままである。コンプライアンスは確率的であり、強制ではない。"}, {"text": "playbook は tools のまま残すが、各 tool の description を単一のプロダクトラインに絞り、Claude がチケットの metadata に合致するものを選ぶようにする。", "is_correct": false, "why": "description を絞れば tool selection は実際に改善される。しかし tools は model-controlled のままで、playbook を選ぶのは担当者ではなく Claude のままである。description の精度で選択権をユーザーに移すことはできない。"}, {"text": "playbook を resources として公開し、host application がチケットに合致するプロダクトタグを持つ playbook を attach するようにする。", "is_correct": false, "why": "resources は application-controlled の context であり、これで Claude の裁量は確かに消える。しかし選択を行うのは担当者ではなく host のタグマッチングであり、要件が求める「ユーザーによる明示的な選択」をバイパスしてしまう。"}], "explanation": "MCP の3つの primitive は、誰がコントロールするかで分かれる。tools は model-controlled（model が発見し呼び出す）、resources は application-controlled（client が attach する）、prompts は user-controlled（ユーザーが明示的に選ぶコマンドとして公開される）。担当者が playbook を選ぶという要件は、そのまま prompts に対応する。tools のまま残したことで Claude が選択者になり、まさにその model-controlled の振る舞いが誤プロダクト適用の根本原因だった。\n\n他の選択肢がダメな理由: B と C はどちらも playbook を model-controlled の tools のまま残すため、呼び出すかどうかを決めるのは Claude のままである。system prompt のルール、few-shot examples、description の厳密化はコンプライアンスの確率を上げるだけで、選択権を担当者に移すことはできない。D は application-controlled な resources を使うため Claude の裁量は消えるが、選択権が担当者ではなく host のタグマッチングに渡り、明示的なユーザー選択の要件を満たさない。実行時に人間を選択者にできるのは prompts だけである。したがって決定論的な修正とは、要件と制御モデル（control model）が一致する primitive を選ぶことである。"}, {"qid": "exam2-q25", "domain": "Applications and Integration", "type": "mc", "scenario": "ある API プロダクト企業が、Messages API 上で営業アシスタントを運用している。保存された transcript のなかで、以前の assistant turn が従量課金の超過単価を「リクエストあたり $0.02」と引用しているが、実際の単価は「リクエストあたり $0.20」である。同じ顧客から続きの質問が届き、来月の超過コストを見積もるよう求めている。チームは次回のレスポンスを、$0.02 の数値が消えて $0.20 の単価が現れるよう修正した会話 state から計算させたい。Messages API がターン間で会話 state を引き継ぐ仕組みを正しく使っている実装はどれか。", "options": [{"text": "新しい follow-up メッセージだけを送り、前回のレスポンスの id を渡して、API に保存された会話をサーバー側で再開させる。", "is_correct": false, "why": "Messages API はステートレスであり、response id は過去の completion を参照するだけで再開はしない。会話はサーバー側に保持されないため、保存された履歴は捨てられ、follow-up は事前の context なしで応答される。"}, {"text": "保存された transcript を変更せずにそのまま送り、正しい超過単価はリクエストあたり $0.20 であることを示す system instruction を追加する。", "is_correct": false, "why": "古い $0.02 の assistant turn が context に残ったままである。system instruction はモデルを修正後の数値へ誘導するが、矛盾する過去の turn を上書きしなければならない状況は変わらない。したがって結果は確率的であり、クリーンな state が保証されるわけではない。"}, {"text": "$0.20 を引用するよう書き換えた assistant turn と新しい follow-up だけを送り、トークン削減のために以前の user・assistant turn は省略する。", "is_correct": false, "why": "API はステートレスなため、このリクエストで送らない内容はすべて失われる。以前の turn を省略すると、見積もりが依存している使用量やプランの詳細が捨てられ、messages 配列は一貫した会話を表さなくなる。"}, {"text": "次回のリクエストで送る保存済み transcript のなかで、$0.02 の assistant turn を $0.20 を引用する turn に置き換え、他の turn はそのまま残し、follow-up を新しい user message として追加する。", "is_correct": true, "why": "Messages API は呼び出し側が毎リクエストで完全なメッセージ履歴を渡すことを要求し、過去の assistant turn はアプリケーションが制御するただの文字列である。Claude が生成した出力と一字一句同じである必要はない。古い turn をその場で編集すれば、矛盾する数値をモデルに調整させることなく、確定的に修正済みの一貫した state が得られる。"}], "explanation": "Messages API はステートレスである。Anthropic はリクエスト間で会話オブジェクトを保持せず、response id は過去の completion を識別するだけで再開するものではない。マルチターンの呼び出しでは毎回アプリケーションが完全なメッセージ履歴を渡すため、呼び出し側の保存済み transcript が唯一の真実の情報源になる。そして配列内の assistant turn はアプリケーションが制御するただの文字列であり、Claude が生成した出力と完全に一致している必要はない。選択肢 D はこれをそのまま適用している。古い assistant turn を $0.20 にその場で編集し、他の turn を残し、follow-up を追加すれば、Claude は確定的にクリーンで修正済みの state に基づいて応答する。選択肢 A は、ステートレスな API が提供しない「response-id 経由の再開」という振る舞いを前提としている。保存された履歴は単にサーバー上に存在しない。選択肢 B はプロンプトレベルの上書きである。$0.02 の turn が context に残り、system instruction はモデルを $0.20 へ傾けるだけなので、結果は確率的で保証されない。確定的なアプリケーション側の修正（配列の編集）が、モデルに矛盾の調整を任せる手法を上回る典型例である。選択肢 C は正しい turn を編集しているが周辺の履歴を捨てている。API はステートレスなため、省略された turn（顧客の使用量やプランの詳細）は失われ、follow-up はコスト見積もりに必要な context なしで置かれることになる。各誤答はそれぞれ異なる理由で失敗する。サーバー側 state の不存在、確率的なプロンプト上書き、周辺 context の喪失、の 3 つである。したがって 2 つを同時に排除することはできず、正解は古い turn を修正しつつ会話の残りを保持する唯一の選択肢である。"}, {"qid": "exam2-q26", "domain": "Applications and Integration", "type": "mc", "scenario": "チームは Claude Code を使って、数週間にわたり決済サービスのリファクタリングを進めている。各セッションの context は次のセッションを始める前にクリアされる。新しく開始したセッションでもそれまでの進捗を把握でき、手順を間違えた際にはクリーンに復元できる必要がある。この要件を満たすのはどれか。", "options": [{"text": "毎セッション、進捗サマリーを書いて再読するよう system prompt で指示し、確実に従わせるために大きなモデルに切り替える。", "is_correct": false, "why": "確率論的なアプローチ。モデルが毎回すべてのモジュール・テスト結果・意思決定を記録するかどうかに依存してしまう。サマリーは情報が落ち、機械的に検証できない。さらに、指示も大きなモデルも、誤った手順を取り消すための checkpoint を作らない。"}, {"text": "auto-compaction に頼る。セッションが長くなると、compaction されたサマリーが状態を次のセッションへ持ち越す。", "is_correct": false, "why": "auto-compaction がサマリー化するのは単一セッション内だけ。クリアされた新規セッションは別セッションの compaction 済みサマリーを引き継がない。サマリーは情報が落ち、会話の外に復元ポイントもない。"}, {"text": "状態を永続的なプロジェクトの成果物に外部化し、各セッションは起動時にそれを読み込む。さらに version control の commit を頻繁に行い、復元可能な checkpoint とする。", "is_correct": true, "why": "決定論的なアプローチ。ディスク上のファイルはモデルの挙動に関わらず、セッション開始時に毎回そのまま読み込まれる。各 commit は検証済みの復元 checkpoint になる。そのため、状態の引き継ぎはモデルが記録を選ぶかに依存しない。"}, {"text": "long-context モデルを使い、単一セッションで全履歴を保持することで、セッション間の引き継ぎをなくす。", "is_correct": false, "why": "大きな context window もセッション単位で動作する。セッション終了時にクリアされ、履歴が増えるにつれて recall も劣化し、戻るべき checkpoint も提供しない。作業メモリの大きさはストレージではない。"}], "explanation": "context window は作業メモリであり、ストレージではない。クリアされたセッション間でメモリは共有されないため、セッションをまたいで保持すべきものは会話の外に置く必要がある。\n\nauto-compaction と long-context window はどちらも単一セッション内で動作し、永続的なものを何も残さない。system prompt の指示と大きなモデルの組み合わせは、うまく引き継げる確率を上げるだけで、復元 checkpoint は生まれない。状態をプロジェクトの成果物に外部化し、新規セッションが起動時にそれを読み、さらに version control の commit を checkpoint として頻繁に作ることが、リファクタリングを再開可能・レビュー可能・復元可能にする。compaction と大きな window は単一の会話内では有用だが、あくまで context 管理の技術であり、運用状態やバージョン履歴の代わりにはならない。詳細は Anthropic の context window に関するガイダンス、および Claude Code のメモリとプロジェクト指示に関するガイダンスを参照のこと。"}, {"qid": "exam2-q27", "domain": "Tools and MCPs", "type": "mc", "scenario": "ローン審査アシスタントは、クライアント側のツールを3つ Claude に公開している —— `pull_credit_report`、`check_sanctions_registry`、`verify_income_docs` である。マネーロンダリング防止規則により、すべての申請を `check_sanctions_registry` でスクリーニングしなければならない。このチェックは申請ごとに必ず発火し、残り2つの兄弟ツールのいずれにも置き換えられてはならない。この要件を強制する `tool_choice` の設定はどれか。", "options": [{"text": "`tool_choice` を `{\"type\":\"tool\",\"name\":\"check_sanctions_registry\"}` に設定し、ルックアップを実行したうえで、`tool_use_id` が一致する `tool_result` を返す。", "is_correct": true, "why": "`tool` タイプに `name` を指定すると対象ツールを固定できる。API は `check_sanctions_registry` に対する `tool_use` ブロック（`stop_reason:\"tool_use\"`）を必ず返すため、チェックの発火が保証され、兄弟ツールに差し替えられることもない。一致する `tool_result` を返せば Claude は処理を継続できる。"}, {"text": "`tool_choice` を `{\"type\":\"any\"}` に設定し、3つのツールのうち Claude が呼び出したものを実行して `tool_result` を返す。", "is_correct": false, "why": "`any` は少なくとも1回のツール呼び出しを強制するが、どのツールを使うかは自由に残されている。Claude は `pull_credit_report` や `verify_income_docs` を呼ぶことも正当に許されるため、必須の制裁チェックが依然として回避され得る。"}, {"text": "`tool_choice` は `auto` のままで、厳格な system-prompt のルールと制裁チェックを1件示す few-shot 例で要件を補強し、モデルがツールを呼んだら `tool_result` を返す。", "is_correct": false, "why": "`auto` は判断をモデルに委ねる。system-prompt のルールや few-shot は従う確率を上げるだけで、チェックを決定的にはできないため、時折の見逃しが残る。"}, {"text": "`tools` 配列の先頭に `check_sanctions_registry` を置き、`tool_choice` は `auto` のままで、Claude が呼んだツールの `tool_result` を返す。", "is_correct": false, "why": "`auto` のもとでは、API は `tools` 配列の順序による優先度を与えない。モデルは定義された全ツールから自由に選べるため、チェックがスキップ・代替される点は plain な `auto` と変わらない。"}], "explanation": "クライアント側ツールの場合、アプリケーションは `tools` で name・description・schema を宣言し、Claude が返す `tool_use` ブロックを一致する `tool_result` で満たす。特定の名前付きツールを毎回必ず実行しなければならないとき、`tool_choice` が唯一の拘束力を持つレバーである。`{\\\"type\\\":\\\"tool\\\",\\\"name\\\":\\\"...\\\"}` は呼び出しと対象の両方を固定し、モデルが兄弟ツールに差し替えられない `tool_use` ブロックを強制的に吐かせる。`any` は呼び出しは強制するが、どのツールかは指定しない。`auto` は配列の順序付け、プロンプト、few-shot のいずれで着飾っても、判断はモデルに残ったままで確率的である。したがって本問は、決定的制御対プロンプトという大原則ではなく、`tool` と `any` の区別に帰着する。名前付き `tool` タイプだけがツールのアイデンティティを拘束する。"}, {"domain": "Applications and Integration", "explanation": "リクエストの `container` 経由で参照される Skill は、特定の公開済みバージョン識別子か `\"latest\"` のいずれかを受け取る。`\"latest\"` は常に最後にアップロードされたバージョンに解決される。production をレビュー済みバージョンに固定することは、モデルの裁量を介さない決定論的なリリース管理である。本番で動く Skill 実装（instructions・scripts・バンドルされたリソース）を正確にフリーズするため、過去のすべての結果がそれを生成したバージョンと対応づく。一方、下位環境で `latest` を使えばイテレーションを高速に保てる。B は Skill を固定せず一貫性を統計的に改善するだけ。C は Skill のバンドルされた scripts を捨て、出力は確率論的なままである。固定されるのは instruction のテキストだけであり、モデルの出力は固定されない。D は再現可能なベースラインを持たず、リスクを軽減するにとどまる。", "options": [{"is_correct": true, "text": "production をレビュー済みの特定の Skill バージョンに固定（pin）し、`version: \"latest\"` を解決するのは development と staging のみにする。", "why": "production をレビュー済みバージョンに固定するのは決定論的なリリース管理であり、本番で動く Skill 実装（instructions・scripts・バンドルされたリソース）を正確にフリーズする。そのため過去のどの結果も、それを生成したバージョンと対応づけられる。一方、下位環境で `latest` を使えばイテレーションの高速なパスを維持できる。"}, {"is_correct": false, "text": "すべての環境で `version: \"latest\"` を維持したまま、production を Opus に切り替え、system prompt を厳しくして出力の一貫性を高める。", "why": "より強いプロンプトと高性能なモデルは、どちらも一貫性を測定可能な形で改善するが、それは統計的な改善にすぎない。本番は新しいアップロードのたびにドリフトし続け、過去の結果を特定の Skill バージョンまで追跡できない。これはリリース管理の問題に対して、モデルの裁量に頼る修正でしかない。"}, {"is_correct": false, "text": "Skill の現在の instructions を各リクエストの system prompt にインライン展開し、バージョンのドリフトを排除する。", "why": "インライン展開で Skill のバージョンドリフトは確かに消える。しかし Skill がバンドルする scripts や参照ファイルは失われ、単一の実装がすべての呼び出し元に分散し、LLM の出力は確率論的なままである。固定されるのは instruction のテキストだけで、結果は固定されない。過去の出力は再現できないままだ。"}, {"is_correct": false, "text": "すべての環境で `version: \"latest\"` を維持したまま、各本番出力の出荷前にレビューアの承認を必須にする。", "why": "人間によるレビューはドリフトを検出でき、標準的な QA のゲートでもある。しかし本番は新しい Skill バージョンが来るたびに変動し続ける。再現可能な実装のベースラインが存在せず、過去の結果を生成したバージョンへ再構成することはできない。"}], "qid": "exam2-q28", "scenario": "あるチームが development・staging・production の各環境で同じ Claude API パイプラインを運用しており、ほぼ月1回の頻度で更新した Agent Skill をリリースしている。本番の出力は常に再現可能でなければならない ―― 過去の各結果が、それを生成した Skill バージョンに正確に対応づくこと ―― ただし継続的なイテレーションをブロックしてはならない。両方の要件を最もよく満たすアプローチはどれか。", "type": "mc"}, {"qid": "exam2-q29", "domain": "Claude Code", "type": "mc", "scenario": "カスタマーサクセスチームが、Claude Code 上で再利用可能なアカウントレビューワークフローを運用している。構成要素は、短いレビュー手順、業界別の分厚いリファレンスガイド、更新チェックリスト、そしてエンタープライズアカウントにだけ適用される複数のルックアップスクリプト。各アナリストがこの機能の共有・バージョン管理された同一バージョンを呼び出せるようにしつつ、Claude の作業コンテキストはリファレンスをすべて前もって読み込むのではなく、レビュー対象のアカウントだけに絞り続けたい。最適なアプローチはどれか。", "options": [{"text": "CLAUDE.md に手順と適切なリファレンスガイドの選択ルールを記述し、実例を2つ添えて、どのアカウントでも同じアプローチを適用させる。", "is_correct": false, "why": "プロンプトレベルのガイダンスにすぎない。Claude が正しいガイドやスクリプトへたどり着く確率は上がるが、ルーティングは決定的なファイル構造ではなくモデルの判断に依存するため、対象アカウントに必ず正しいリファレンスが使われるとは保証できない。さらに手順は毎セッションでコンテキストに読み込まれ、他のアナリストへ配布できるバージョン管理されたパッケージも提供しない。"}, {"text": "手順・すべてのリファレンスガイド・チェックリストを1つの共有インストラクションファイルにまとめ、Claude Code が各セッションで自動的にコンテキストへ読み込むようにする。", "is_correct": false, "why": "常に読み込まれる単一ファイルは完全で共有しやすいが、コンテキストのトレードオフに負ける。参照資料すべてが、現在のアカウントで必要かどうかにかかわらず毎ターン コンテキストを占有し続け、エンタープライズ専用スクリプトの条件付き実行パスも提供しない。"}, {"text": "このワークフローを専用のサブエージェントに委任し、手順を保持させたうえでリファレンスガイドとチェックリストをそのプロンプトに埋め込む。これによりメインセッションのコンテキストはアカウントレビューに集中し続ける。", "is_correct": false, "why": "サブエージェントはメインセッションのコンテキストを分離できる（部分勝利）が、サブエージェントは委任・分離実行のための仕組みであり、再利用可能なリファレンスのパッケージ化プリミティブではない。ガイドを埋め込めばサブエージェント自身の初期コンテキストが膨らみ、条件付き読み込みやアナリスト間でのバージョン管理された発見可能な共有には何も寄与しない。"}, {"text": "ワークフローを Agent Skill としてパッケージ化する。SKILL.md に手順を簡潔に記述し、ガイドとチェックリストは Claude がオンデマンドでコンテキストに読み込む参照ファイル、スクリプトはエンタープライズアカウントに対してだけ Claude が実行する実行可能ファイルとする。", "is_correct": true, "why": "Agent Skills は progressive disclosure によって再利用可能な機能をファイルシステムリソースとして提供する。常に可視のメタデータ（name と description）は小さく保たれ、参照ファイルはレビュー対象アカウントが本当に必要なときだけコンテキストに入り、スクリプトは必要なアカウントタイプに対してだけコマンドとして実行される（コンテキストに読み込まれるのではなく実行される）。1つのバージョン管理されたパッケージをアナリスト間で共有しつつ、各セッションのコンテキストは集中し続ける。"}], "explanation": "Agent Skills はまさにこの用途のために存在する。保守された再利用可能なワークフローを、progressive disclosure によってファイルシステムリソースとしてパッケージ化する。常に可視のメタデータ（name と description）は小さく保たれ、リファレンスガイドとチェックリストはレビュー対象アカウントが必要なときだけコンテキストに読み込まれ、スクリプトは必要なアカウントタイプに対してだけコマンドとして実行される。スクリプトはテキストとして読み込まれるのではなく実行される。結果として、各セッションのコンテキストを分析対象アカウントに集中させたまま、どのアナリストでもインストールできる共有・バージョン管理された機能が得られる。\\n\\n他の選択肢が不適な理由: A はプロンプトレベルのガイダンス（LLM 的な修正）であり、正しいルーティングの確率は改善するが、ルーティングは決定的なファイル構造ではなくモデルの判断に依存するため、正しいリファレンスやスクリプトが使われることを保証できず、インストール可能なパッケージも提供しない。B は完全で共有しやすいが、コンテキストのトレードオフに負ける。参照資料すべてが、現在のアカウントで必要かどうかにかかわらず毎ターン コンテキストを占有し、スクリプトの条件付き実行パスもない。C はメインセッションのコンテキストを分離できる（部分勝利）が、サブエージェントは委任実行の仕組みであり、再利用可能なリファレンスのパッケージ化プリミティブではない。ガイドを埋め込めばサブエージェント自身のコンテキストが膨らみ、アナリスト間でのバージョン管理された発見可能な共有には何も寄与しない。"}, {"qid": "exam2-q30", "domain": "Applications & Integration", "type": "mc", "scenario": "法令出版サービスは、固定のプロンプトテンプレートから組み立てた Claude リクエスト1件で各法令条文を処理する。このジョブは夜間に無人で実行され、同じ条文テキストは常に同じリクエストシーケンスに従う。このサービスに最も適した実装はどれか。", "options": [{"text": "公式の Anthropic SDK を使い、条文ごとに Messages API を1回呼び出す。", "is_correct": true, "why": "実行時に判断要素のない固定で決定論的なリクエストにおいて、Messages API は Anthropic がドキュメント化したプログラム呼び出しのインターフェースであり、公式 SDK はその保守されるファーストパーティクライアントである。シリアライズ・認証・リトライ・ストリーミングを担い、パラメータの追加にも追従しつつ、条文ごとに1回の明示的な呼び出しで完結する。"}, {"text": "Claude Agent SDK を使い、system prompt に few-shot 例とともに厳密なシーケンスを固定して、モデルが常に同じ手順に従うようにする。", "is_correct": false, "why": "few-shot とプロンプトによる強調はモデルがシーケンスに従う確率を上げるが、ループを決定論的にはできない。Agent SDK は実行時にモデルが「行動するか・いつ行動するか」を決定できてしまい、固定パイプラインが要求する「1回の呼び出し保証」を満たさない。"}, {"text": "汎用の HTTP クライアントで、各条文のリクエストを直接 Messages エンドポイントに POST する。", "is_correct": false, "why": "エンドポイント自体はドキュメント化されており到達可能だが、SDK が既に提供し API の進化に合わせて追跡している SSE パース・認証
