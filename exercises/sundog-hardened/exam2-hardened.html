<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sundog Exam2 — Purcell難易度改題 | CCDV-F 本番シミュレーション</title>
<style>
:root{--udemy:#a435f0;--udemy-d:#8710d8;--ok:#1e8e3e;--bad:#c41e3a;--warn:#b26a00;
--bg:#f7f8fa;--card:#fff;--ink:#1c1d1f;--sub:#6a6f73;--line:#d1d7dc;--sel:#e6f0fa;}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;
background:var(--bg);color:var(--ink);line-height:1.7;font-size:15px;}
header.bar{position:sticky;top:0;z-index:50;background:var(--ink);color:#fff;padding:10px 20px;
display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
header.bar .title{font-weight:700;font-size:15px;}
header.bar .timer{background:rgba(255,255,255,.12);padding:6px 14px;border-radius:6px;font-family:"SF Mono",Menlo,monospace;font-size:15px;font-weight:600;}
header.bar .timer.warn{background:var(--bad);}
header.bar .spacer{flex:1;}
header.bar button{background:var(--udemy);color:#fff;border:none;padding:8px 18px;border-radius:6px;font-weight:700;cursor:pointer;font-size:14px;}
header.bar button:hover{background:var(--udemy-d);}
.wrap{max-width:980px;margin:0 auto;padding:20px;}
.qmeta{color:var(--sub);font-size:13px;margin-bottom:8px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.qmeta .pill{background:#ecebfb;color:var(--udemy-d);padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;}
.qmeta .pill.mc{background:#e6f4ea;color:var(--ok);}
.qmeta .markbtn{margin-left:auto;background:none;border:1px solid var(--line);border-radius:6px;padding:3px 10px;cursor:pointer;font-size:12px;color:var(--sub);}
.qmeta .markbtn.on{background:#fff3cd;color:var(--warn);border-color:var(--warn);}
.scenario{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:20px 24px;margin-bottom:16px;font-size:15.5px;}
.scenario .lead{font-weight:700;margin-bottom:6px;color:var(--udemy-d);}
.opts label{display:block;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:14px 18px;margin-bottom:10px;cursor:pointer;transition:.12s;}
.opts label:hover{border-color:var(--udemy);}
.opts input{margin-right:10px;}
.opts label.sel{border-color:var(--udemy);background:var(--sel);}
.opts label.ans-ok{border-color:var(--ok);background:#e6f4ea;}
.opts label.ans-bad{border-color:var(--bad);background:#fde7ea;}
.opts label.ans-miss{border-color:var(--warn);background:#fff3cd;}
.nav{display:flex;justify-content:space-between;align-items:center;margin:24px 0;gap:10px;flex-wrap:wrap;}
.nav button{background:var(--card);border:1px solid var(--line);padding:9px 22px;border-radius:6px;cursor:pointer;font-weight:600;color:var(--ink);}
.nav button:disabled{opacity:.4;cursor:not-allowed;}
.nav button.primary{background:var(--udemy);color:#fff;border-color:var(--udemy);}
.palette{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:18px;}
.palette .ptitle{font-size:12px;color:var(--sub);margin-bottom:8px;}
.palette .cells{display:flex;flex-wrap:wrap;gap:6px;}
.palette .cell{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:6px;cursor:pointer;font-size:13px;background:var(--card);}
.palette .cell.ans{background:#e6f4ea;border-color:var(--ok);color:var(--ok);}
.palette .cell.flag::after{content:"★";color:var(--warn);position:absolute;transform:translate(11px,-11px);font-size:10px;}
.palette .cell.cur{outline:2px solid var(--udemy);}
.palette .cell.incorrect{background:#fde7ea;border-color:var(--bad);}
.hidden{display:none;}
/* Results */
.results-hero{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:28px 32px;margin-bottom:20px;}
.results-hero .score{font-size:42px;font-weight:800;}
.results-hero .pass{color:var(--ok);} .results-hero .fail{color:var(--bad);}
.results-hero .sub{color:var(--sub);font-size:14px;margin-top:4px;}
.dtable{width:100%;border-collapse:collapse;font-size:13.5px;background:var(--card);}
.dtable th,.dtable td{padding:9px 11px;border-bottom:1px solid var(--line);text-align:left;}
.dtable th{background:#f0f1f3;color:var(--sub);font-weight:600;}
.dtable td.num{text-align:center;font-variant-numeric:tabular-nums;}
.bar-cell{background:#eee;border-radius:4px;height:8px;overflow:hidden;}
.bar-cell>div{height:100%;background:var(--ok);}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0;}
.filters button{background:var(--card);border:1px solid var(--line);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;}
.filters button.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.rq{background:var(--card);border:1px solid var(--line);border-radius:8px;margin-bottom:12px;overflow:hidden;}
.rq>.rhead{padding:12px 18px;display:flex;gap:10px;align-items:center;cursor:pointer;}
.rq>.rhead .st{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;}
.rq>.rhead .st.correct{background:#e6f4ea;color:var(--ok);}
.rq>.rhead .st.incorrect{background:#fde7ea;color:var(--bad);}
.rq>.rhead .st.marked{background:#fff3cd;color:var(--warn);}
.rq>.rhead .qno{font-weight:700;}
.rq>.rhead .hint{margin-left:auto;color:var(--sub);font-size:12px;}
.rq.open>.rbody{display:block;}
.rbody{display:none;padding:0 18px 16px;}
.rbody .scenario{margin-bottom:12px;}
.rbody .opt{padding:10px 14px;border:1px solid var(--line);border-radius:6px;margin-bottom:7px;font-size:14px;position:relative;}
.rbody .opt.correct{border-color:var(--ok);background:#e6f4ea;}
.rbody .opt.correct::before{content:"✓ 正解";color:var(--ok);font-weight:700;font-size:11px;position:absolute;top:8px;right:10px;}
.rbody .opt.you-wrong{border-color:var(--bad);background:#fde7ea;}
.rbody .opt.you-wrong::before{content:"✗ あなたの選択";color:var(--bad);font-weight:700;font-size:11px;position:absolute;top:8px;right:10px;}
.rbody .opt .why{font-size:12.5px;color:var(--sub);margin-top:4px;}
.rbody .exp{background:#f7f8fa;border-left:3px solid var(--udemy);padding:10px 14px;border-radius:0 6px 6px 0;font-size:13.5px;margin-top:10px;}
.footer{text-align:center;color:var(--sub);font-size:12px;margin:30px 0 60px;}
</style>
</head>
<body>
<header class="bar">
  <div class="title">CCDV-F Practice Exam 2 — Purcell Hardened</div>
  <div class="timer" id="timer">120:00</div>
  <div class="spacer"></div>
  <button id="finishBtn" onclick="finishExam()">Finish Exam</button>
</header>
<div class="wrap">
  <!-- Exam view -->
  <div id="exam">
    <div class="palette">
      <div class="ptitle">Question palette ★=Marked</div>
      <div class="cells" id="palette"></div>
    </div>
    <div id="qpanel"></div>
    <div class="nav">
      <button id="prevBtn" onclick="go(-1)">◀ Prev</button>
      <span id="qpos" style="color:var(--sub);font-size:13px"></span>
      <button id="nextBtn" class="primary" onclick="go(1)">Next ▶</button>
    </div>
  </div>
  <!-- Results view -->
  <div id="results" class="hidden"></div>
  <div class="footer">Sundog Exam2 を Purcell 難易度（厳しい distractor）に改題したオリジナル問題集 · 解説は Anthropic 公式 doc 準拠 · 53問</div>
</div>
<script>
const QUESTIONS = [{"qid": "exam2-q1", "domain": "Tools and MCPs", "type": "mc", "scenario": "Streamable HTTP 上のローカル MCP サーバが、同一マシン上のブラウザベースのアシスタント UI にプロプライエタリなデータベースツールを公開している。脅威モデルでは、アシスタントが悪意のある Web コンテンツ経由で完全にプロンプトインジェクションされる可能性を想定する。その前提の下でも成立する制御セットはどれか。", "options": [{"text": "Origin ヘッダを検証し、loopback にバインドし、auth token を要求する。いずれもセッション生成やツール呼び出しより前にサーバのミドルウェアで強制する。", "is_correct": true, "why": "正解。MCP 仕様は、DNS rebinding を防ぐための Origin ヘッダ検証、localhost のみへのバインド、認証の実装をサーバに求めている。3つともモデル実行前に強制される確定的なサーバ側チェックであり、チェックをモデルに委ねていないからこそ、モデルが完全にプロンプトインジェクションされても成立する。"}, {"text": "loopback にバインドし、auth token を要求し、さらにアシスタントが機密ツールを実行する前に呼び出し元を確認しなければならないという system-prompt ルールを追加する。", "is_correct": false, "why": "実効性のある制御が2つに、攻撃者がプロンプトインジェクションしているまさにそのモデルによって強制されるルールが加わった構成。モデルはトランスポート層の来歴を検証できず、HTTP Origin ヘッダにもアクセスできない。攻撃下でモデルが正しく振る舞うことに依存する保証は、定義上、保証ではない。"}, {"text": "厳格な CORS ポリシーを設定してブラウザのクロスオリジン制限の強制に依存し、loopback にバインドし、auth token を要求する。", "is_correct": false, "why": "CORS を強制するのはブラウザだが、そのブラウザこそ DNS rebinding 攻撃における攻撃者の侵入経路である。rebinding ドメインは 127.0.0.1 に解決されるため、ブラウザレベルのオリジン強制は無力化する。仕様はチェックをクライアントに委ねるのではなく、サーバ自身が Origin を検証することを求めている。"}, {"text": "loopback にバインドし、auth token を要求し、Origin 検証は省略する。内部ツールなので、loopback の境界と認証の組み合わせで十分とみなす。", "is_correct": false, "why": "DNS rebinding は攻撃者が制御するドメインを 127.0.0.1 に解決するため、リクエストは loopback バインドのサーバに到達してしまう。loopback バインドはネットワークの攻撃面を狭めるが rebinding は止められず、仕様が Origin 検証を指示しているのはまさにこのためである。"}], "explanation": "問われているのは、防御が確定的かつサーバ側で強制され、モデルが関与する前に実行されるかどうかである。MCP 仕様（2025-06-18）は、ブラウザから到達可能な Streamable HTTP サーバに対して3つの階層化された制御を指示している。DNS rebinding を防ぐための Origin ヘッダ検証（仕様上 must）、ワイルドカードアドレスではなく localhost へのバインド（should）、認証の適用（recommended）。いずれもツール実行前にサーバのミドルウェアで強制される。\\n\\n他の選択肢が不適な理由: B は来歴の検証を、乗っ取られたモデルが強制する system-prompt ルールに委ねており、そのモデルは Origin ヘッダを見ることもできない。毎回必ず成立すべき事項を、モデルがそう選ぶかに依存させてはならない。C はブラウザ強制の CORS で代用するが、DNS rebinding 攻撃ではブラウザは攻撃者の道具であり、rebinding ドメインは 127.0.0.1 に解決されてブラウザレベルのオリジンチェックは破られる。D は Origin 検証を完全に省略しているが、攻撃者のドメインが 127.0.0.1 に解決されるため、rebinding は loopback バインドのサーバに到達してしまう。3つの制御をすべて確定的に、ミドルウェアで、モデル実行前に強制しているのは A だけである。"}, {"qid": "exam2-q2", "domain": "Model Selection and Optimization", "type": "mc", "scenario": "ある税務アドバイザリーファームが Claude API でリサーチアシスタントを構築している。ピーク期には毎時多数の案件を処理し、連続する案件は通常、デフォルトの5分間の cache lifetime 内に到着する。各リクエストは同じ4つの content block を以下の順序で組み立てる。(1) 税法 corpus 全体（約55,000 token、年数回の法改正時のみ変更）、(2) ファームの標準的な解釈ガイドライン6,000 token 分（案件間で byte 単位で完全一致）、(3) クライアント固有の事実（案件ごとに一意）、(4) アドバイザーの質問。チームは今回初めて prompt caching を有効化し、各案件でリクエストのできるだけ多くを cache-read rate で処理したいと考えている。cache_control breakpoint をどこに置くべきか。", "options": [{"text": "block (2) のガイドライン末尾に、cache_control breakpoint を1つだけ置く。", "is_correct": true, "why": "block 1 と 2 は案件間で byte 単位で完全一致するため、この地点までの prefix は stable になる。これこそ、API が保存済み prefix を cache-read rate（base input の 0.1 倍）で返すために必要な条件である。合計 61,000 token は、すべての platform のすべての Claude model における cache 対象最小 prompt 長を大きく上回る（公式 doc では model と platform により 512〜4,096 token）。したがって初回の案件から caching を利用できる。block 3 と 4 は案件ごとに一意なので、breakpoint の後に正しく位置し、常に標準の input rate で課金される。2つの stable な block はリクエスト先頭で連続しているため、breakpoint は1つで十分である。法改正で税法が更新されると、cache 済みの prefix 全体が一度無効化され、cache-write rate（5分エントリで base input の 1.25 倍）で再構築される。その後は読み取りが再開され、やはり大きな節約になる。caching が報酬を与えるのは連続する呼び出し間での安定性であり、永遠の不変性ではないからだ。"}, {"text": "block (1) の税法末尾に、cache_control breakpoint を1つだけ置く。", "is_correct": false, "why": "最大の単一 block（55,000 token）は捕捉できるが、あと1 block 手前で止まっている。続く 6,000 token のガイドラインも案件間で byte 単位で完全に同一であるため、これを breakpoint の後に残すと毎リクエストで full input price が課金される。正しい stable prefix は block 2 まで伸びており、ガイドラインは cache 対象最小長をはるかに上回る。除外すれば各案件で得られたはずの cache-read 節約額の約1割を失うことになり、ピーク期の数千リクエストでコストが累積する。1つの breakpoint で両方の stable block をカバーできる。早く終わらせるメリットはない。"}, {"text": "block (3) のクライアント事実末尾に、cache_control breakpoint を1つだけ置く。", "is_correct": false, "why": "cache する prefix が長いほど徹底されているように聞こえるが、block 3 は案件ごとに一意であるため、この breakpoint での prefix hash は二度と同じにならない。各案件で API は breakpoint に一致する entry を見つけられず、後方 lookback（最大 20 block）でもより前の position に既存の write を見つけられない。API が行った唯一の write は前回の案件で block 3 に書いたものであり、それは前のクライアントの事実を hash したものだ。そのため各案件は 0.1 倍の既存 entry 読み取りではなく 1.25 倍の新規 cache write を行い、caching なしより毎リクエストが高価になる。これは公式 doc が説明する典型的な罠である。毎リクエストで変わる content に cache_control を置くと、write は breakpoint でのみ発生し lookback は過去のリクエストが書いた entry しか見つけられないため、cache read はゼロになる。"}, {"text": "明示的な breakpoint を置かず、top-level の automatic cache_control で API に breakpoint 位置を選ばせる。", "is_correct": false, "why": "automatic caching はリクエスト内の最後の cache 対象 block に breakpoint を置く。今回は block 4、つまりアドバイザーの質問である。block 3 と 4 は毎案件で変わるため、その position の prefix hash は二度と同じにならず、後方 lookback はより前の block に既存の write を見つけられない。結果は block 3 の breakpoint と同一で、毎案件で新規 cache write が発生し cache read はゼロになる。automatic caching は、以前の turn が変わらず各 turn が少数の block だけを追加する、成長する会話向けに設計されている。variable suffix を持つ prompt では、明示的な breakpoint が static prefix の末尾を示さない限り機能しない。公式 doc はこの制限を明記し、代わりに最後の stable block に明示的な breakpoint を置くことを推奨している。"}], "explanation": "Prompt caching は、cache_control breakpoint での prefix hash が、以前のリクエストがその position に書いた hash と一致した場合に限り、書き込み済みの prefix を cache-read rate（base input の 0.1 倍）で返す。この仕組みで決定的な性質が2つある。第一に、cache write は breakpoint でのみ発生する。システムは breakpoint ごとに正確に1つの entry を書き込み、その block までを含む累積 hash を cover する。自発的により前の position に entry を書くことはない。第二に、各リクエストでシステムは各 breakpoint から後方に最大 20 block さかのぼり、既存の write を探す。探しているのは以前のリクエストが書いた entry であり、後から retroactive に cache できる stable content ではない。\n\n今回のリクエストでは、block 1 と 2（税法とガイドライン）は案件間で byte 単位で完全一致し、block 3 と 4（クライアントの事実と質問）は案件ごとに一意である。したがって stable prefix は block 2 の直後で終わり、そこに明示的な breakpoint を1つ置けば 61,000 token の stable 領域全体を捕捉できる。これはすべての platform のすべての Claude model の cache 対象最小 prompt 長を上回る（公式 doc では model と platform により 512〜4,096 token）。以降の各案件はこれらの token を base input price の 10 分の 1 で読み取り、案件ごとの小さな末尾部分にだけ標準課金を支払う。\n\n各選択肢はいずれも具体的かつ公式 doc に記載された理由で失敗する。breakpoint を block 1 で止める（option B）と、同じく stable な 6,000 token のガイドラインを見逃し、毎案件で full input price が課金される。breakpoint を block 3 まで伸ばす（option C）と、クライアントの事実が毎回異なるため prefix hash が毎案件で変わることが確定する。lookback はより前の position に既存の write を見つけられず、毎呼び出しで 0.1 倍の read 割引ではなく 1.25 倍の cache-write premium を支払うことになる。これこそ公式 doc が警告する罠である。明示的な breakpoint を置かず automatic caching に頼る（option D）と、breakpoint は最後の cache 対象 block である block 4 に置かれる。suffix が variable なため、同じく cache read ゼロという結果になる。税法の折々の法改正が回答を変えることはない。cache 済みの prefix を一度無効化するだけで、次の案件が cache-write rate で再構築し、読み取りが再開される。やはり大きな節約になる。重要なのは cache lifetime 内の連続する呼び出し間での安定性であり、永遠の不変性ではないからだ。"}, {"qid": "exam2-q3", "domain": "Eval, Testing, and Debugging", "type": "mc", "scenario": "レポート生成サービスは、Anthropic Messages API のレスポンスのうち `stop_reason` が `end_turn` ではないものをすべて失敗と見なし、同一リクエストを3回リトライしたうえでオンコールをページングする仕組みになっている。トレースした1件の呼び出しでは、HTTP 200 で部分的な出力テキストが返され、`stop_reason: \"max_tokens\"` で、トップレベルに `error` オブジェクトは無かった。最も有力な修正策はどれか。", "options": [{"text": "`stop_reason` をエラーのシグナルとして読み取るのをやめる。HTTP 200 かつ `stop_reason: \"max_tokens\"` の場合は、レスポンスを成功だが切り詰められたものとして扱い、リクエストの `max_tokens` を引き上げて上限をなくす（あるいは部分出力を再送し、後続の user turn で残りの出力を求めてターンを継続する）。retry-with-backoff とオンコールページングは、`rate_limit_error` (429)・`api_error` (500)・`overloaded_error` (529) のような構造化された `error.type` を伴う non-2xx レスポンスに限定して実行する。", "is_correct": true, "why": "最適かつ完全な修正。`stop_reason` は成功した HTTP 200 の Messages レスポンスに付与されるメタデータであり、エラーの指標ではない。`max_tokens` は、リクエストで設定された出力上限でターンが終了したことを報告するだけである。`max_tokens` を引き上げる（またはターンを継続する）ことで、切り詰めに直接対処できる。retry／ページングはトランスポート層の障害向け、すなわち構造化された `error.type` を伴う non-2xx ステータスに属し、そのうち 429・500・529 が SDK が自動でバックオフする再試行可能エラー（デフォルト max_retries=2）である。"}, {"text": "現在の失敗分類はそのまま維持しつつ、上限に到達する頻度を下げる。system prompt を簡潔な few-shot のレポート例で書き直し、より大きなモデルに切り替えることで、出力が既存の token 予算内に収まるようにする。", "is_correct": false, "why": "もっともらしいが確率的な対応であり、バグは温存される。few-shot のプロンプト調整とモデルの大型化は切り詰めの頻度を下げられるが、どちらもモデルの裁量次第であり、制御フローは変わらない。長くなるレポートは依然として3回リトライされ、オンコールがページングされる。"}, {"text": "このレスポンスを一時停止されたターンとして扱い、部分出力を assistant メッセージとして再送することで、新しい user turn を送らずに API が停止した位置から自動的に生成を再開するようにする。", "is_correct": false, "why": "2つの stop_reason を混同している。`pause_turn` は agent フローで生成途中にモデルが一時停止したターンの stop_reason であり、assistant の内容を再送して自動再開させる方法は公式ドキュメントに記載されたリカバリ手段である。一方 `max_tokens` は、出力上限に達して既に完了したターンを終了させるもので、API は自動再開しない。そのため継続プロンプトなしに部分出力を再送しても、出力は延びない。"}, {"text": "`stop_reason: \"max_tokens\"` に対して exponential backoff 付きの retry を追加し、この上限を次回の試行で解除される一時的なスロットルとして扱う。", "is_correct": false, "why": "決定的な上限を一時的なものと誤分類している。`max_tokens` は設定された出力上限であり、同じ上限のまま同一リクエストをリトライすれば毎回同じ位置で切り詰めが再現される。exponential backoff は一時的で再試行可能な HTTP エラー（429/500/529）向けの正しいツールであり、自分で設定した生成上限に使うものではない。"}], "explanation": "この不具合は制御フローの誤分類であって、API エラーではない。`stop_reason` は成功した HTTP 200 の Messages レスポンスに付くメタデータであり、`max_tokens` はリクエストで設定された出力上限でターンが終了したことを意味する。したがって直接的な対処は、`max_tokens` を引き上げる（または部分出力を再送し、後続の user turn で残りを求めてターンを継続する）ことである。retry-with-backoff とオンコールページングはトランスポート層の障害、すなわち構造化された `error.type` を伴う non-2xx の HTTP ステータスでのみ発火すべきで、そのうち `rate_limit_error` (429)・`api_error` (500)・`overloaded_error` (529) が SDK が自動でバックオフする再試行可能エラー（デフォルト max_retries=2）である。Bは確率的なプロンプト／モデルによる緩和策であり、分類のバグを残したままである。Cは `max_tokens` と `pause_turn` を混同しており、後者は別の stop_reason で、内容を再送して再開するリカバリは agent フロー内でモデルが生成途中に一時停止したターンにしか適用されない。Dは決定的な出力上限を一時的なスロットルとみなしているため、バックオフはリトライのたびに同じ切り詰めを再現するだけである。"}, {"qid": "exam2-q4", "domain": "Applications and Integration", "type": "mr", "scenario": "ドキュメントチームは、Python Agent SDK（claude_agent_sdk）を使って、docs リポジトリに対するすべての pull request で Claude による review を実行している。各 PR はページを編集または新規追加するもので、Claude はその内容をチームの社内スタイルガイドに照らしてチェックする。このジョブは複数のリージョンにまたがる CI runner 上で自動実行され、実行のたびにスタイルガイドを同一に適用しなければならない。また、各 PR の review は過去の PR の記憶を一切持たずに開始する必要がある。この integration に最も適したアクションを 2 つ選べ。", "options": [{"text": "プロジェクトレベルの CLAUDE.md に社内スタイルガイドを記述し、allowed review permissions を列挙した .claude/settings.json を docs リポジトリに commit する。", "is_correct": true, "why": "CLAUDE.md は Claude が読むスタイルガイドの指示を提供し、.claude/settings.json は allowed review permissions を固定する。これらを repository に commit すれば version 管理され、リージョンを問わずどの runner でも同一になるうえ、他のコード変更と同じように review できる。決定論的に読み込まれるのは、これらが特定の runner の home directory ではなくコードと一緒に移動するからだ。"}, {"text": "各 run が返す session_id を保持し、次回の PR review で resume=<prior_session_id> を渡すことで、Claude がすでに処理したページをスキップするようにする。", "is_correct": false, "why": "resume は以前の session をその完全な context とともに再開する。SDK ドキュメントによれば、以前の run の完全な transcript（ページの内容・過去の判断・すべての過去のメッセージ）を保持したまま再開される。したがって PR をまたいで session_id を cache すると、前の PR の履歴が reviewer に再現されて記憶が引き継がれ、no-memory 要件に直接違反する。ページを再処理しないことによる token の節約は確かに得られるが、それは pipeline が必要とする per-PR isolation と引き換えのものだ。"}, {"text": "review を query() で実行し、CI job で setting_sources=['project'] を設定する。", "is_correct": true, "why": "query() は SDK の one-shot entry point であり、呼び出しごとに carried-over state のない fresh session を開始する。これは独立した PR review にまさに必要な動作だ。setting_sources=['project'] は version 管理された project tier（commit された CLAUDE.md と settings.json）だけを読み込み、runner 間で異なる user tier と local tier を除外する。なお SDK の default は setting source を一切読み込まないことなので、これを明示的に設定しなければならない。設定しなければ CLAUDE.md は一切読み込まれない。"}, {"text": "reviewer をより大きな model に切り替え、reasoning effort を上げることで、どの runner でも社内スタイルガイドがより一貫して適用されるようにする。", "is_correct": false, "why": "より大きな model と高い reasoning effort はガイドが守られる確率を上げるが、確率は保証ではない。adherence はあくまで確率的で、run ごとのばらつきが残る。ここで言う「runner 間で同一に振る舞う」という性質は configuration property（どの settings tier を読み込むか、session を resume するか）であり、model-capability property ではない。したがって capability の強化では、固定された version 管理の configuration ができるような determinism の強制はできない。"}, {"text": "setting_sources=['user','project'] を設定し、各 reviewer の個人の設定が、どの runner でも repository の標準と併せて適用されるようにする。", "is_correct": false, "why": "'user' を含めると各 developer の ~/.claude/ 設定が再 import されるが、これらは異なるリージョンの CI runner 間で存在することも同一であることも保証されない。'project' も同時に指定していても、user tier を追加すれば machine 間のばらつきが再び入り込む（developer によって設定が異なり、run の結果が変わる）。それはまさに ['project'] だけに制限することで防ごうとしていた事態だ。"}], "explanation": "deterministic な CI automation において、reproducibility は configuration property であり、model property ではない。2 つの補完的なアクションが run をコードに固定する。第一に、標準を version 管理された artifact として commit すること。CLAUDE.md は Claude が読むスタイルガイドの指示を担い、.claude/settings.json は共有の review permissions を担う。どちらも repository と一緒に移動し、どの runner でも同一になる。第二に、SDK の呼び出しを、これらの artifact だけを読み込み毎回 clean に開始するように設定すること。query() は one-shot entry point であり、呼び出しごとに fresh session を開始する（各 PR review は carried-over state なしで始まる）。setting_sources=['project'] は読み込みを version 管理された project tier に制限し、runner 間で異なる user（~/.claude/）tier や local tier を除外する。なお SDK の default は setting source を一切読み込まないことなので、setting_sources を明示的に指定しなければ CLAUDE.md は読み込まれない。他の選択肢がダメな理由: cache した session_id を resume する（B）は、SDK ドキュメントに従い以前の session をその完全な transcript（ページの内容・過去の判断・すべての過去のメッセージ）とともに継続する。そのため PR をまたいで履歴を引きずり、no-memory 要件を破ってしまう。ページを再処理しないことによる節約は実在するが、isolation の保証を犠牲にする。より大きな model と高い reasoning effort への upgrade（D）は compliance の確率を高めるが保証はできず、capability の upgrade は enforcement mechanism ではない。determinism は固定された configuration から生まれるもので、model のサイズからは生まれない。setting_sources に 'user' を追加する（E）と、各 developer の個人的な ~/.claude/ 設定が再 import され、runner 間で異なるため、project tier も含まれていても run は reproducible でなくなる。正しい対応は、ルール・permissions・session の範囲を、version 管理された project artifact と project-scoped の one-shot な query() 呼び出しによってコードに固定することだ。"}, {"qid": "exam2-q5", "domain": "Tools and MCPs", "type": "mr", "scenario": "融資プラットフォームのチームが、Claude API でローンアドバイザリーアシスタントを構築している。アシスタントは2つのユーザー定義ツール — get_account_balance と submit_loan_application（チームのコアバンキングシステムの読み書きを行う）— に加えて、現在のプライムレートや金融規制当局の通知を取得する組み込みの web_search ツールを呼び出す。tool-use ループを正しく保つプラクティスは次のうちどの2つか。", "options": [{"text": "アシスタントがバンキングツールに対して発行する各 tool_use block について、アプリケーション側でそのツールを実行し、対応する tool_use_id を持つ tool_result block を含む user message で応答する。", "is_correct": true, "why": "これがユーザー定義（クライアントサイド）ツールの契約である。アプリケーションがツールを実行し、各 tool_use に対して同じ tool_use_id を再利用した tool_result を次の user turn で返さなければならない。これにより tool_use_id の対応付けと、Messages API が強制する assistant/user turn の交代が保たれる。web search には言及しないため、誰が web search を実行するかに依存せずループの仕組み単体をテストできる。"}, {"text": "一貫性のため、3つのツールすべて（バンキングツール2つと web search）をアプリケーション側で実行し、それぞれに対して tool_result を返す。", "is_correct": false, "why": "純粋なクライアントサイドのツールセットであれば、均一なローカル実行は正しい直感であり、この選択肢は魅力的に見える。しかし組み込みの web search はサーバーサイドのツールであり、server_tool_use block として現れ、その結果は Anthropic が注入する web_search_tool_result block として返される。これは tool_use/tool_result とは異なる content-block の契約であり、アプリケーションはこれを実行せず tool_result も返さない。これを排除するには、組み込みの web search がサーバー実行されることを思い出す必要があるが、設問は「built-in」とだけ示しており、どこで実行されるかは述べていない。"}, {"text": "組み込みの web_search をサーバーサイドツールとして扱う。Anthropic がこれを実行して web_search_tool_result block を注入するため、アプリケーションはこれに対する tool_result を供給しない。", "is_correct": true, "why": "実行の所有権が誰が結果を返すかを決める。組み込み web search のようなサーバーサイドツールは Anthropic が実行し、server_tool_use block を発行して結果 block を自ら注入する。アプリケーションは自身が実行するクライアントサイドツールについてのみ結果を返す。これは順序の契約とは独立して所有権をテストする。候補者は web search がサーバーサイドであることを知らなくてもループの仕組みを理解できるし、その逆も可能である。"}, {"text": "few-shot example を追加して、モデルが実行時に各ツールを client-side / server-side にラベル付けし、そのラベルに従って tool_result block を構築する。", "is_correct": false, "why": "few-shot example は出力フォーマットを整える効果があるため、もっともらしく聞こえる。しかしツールが client 実行か server 実行かは、tools array での宣言方法によって決まる固定のプロパティであり、実行時のモデルの判断ではない。確定的な契約を確率論的なプロンプトに経由させるのは prompt-fix-versus-deterministic-code のアンチパターンである。所有権の分類はアプリケーションコードに存在すべきで、モデルの推測に委ねるべきではない。"}, {"text": "API ラウンドトリップを最小化するため、すべての tool_result を集め、最終回答を要求する直前に1つの user message でまとめて送信する。", "is_correct": false, "why": "ラウンドトリップの削減は正当なエンジニアリング目標であり、この最適化は魅力的に見える。しかし各 tool_result は、対応する tool_use を発行した assistant turn の直後の user message に現れなければならない。結果を末尾のバッチに遅延させると、tool_use_id の対応付けと API が強制する turn ごとの順序が断たれる。1つの turn からの複数の tool_result を1つの user message にバッチ化するのは正しいが、turn をまたいで遅延させるのは誤りである。"}], "explanation": "tool-use ループは2つの独立したルールに支配されており、2つの正解はそれぞれ異なるルールをテストする。そのため候補者は一方を理解していなくても他方を正解できる。これは、両方の正解が同じバンキングツールのルールを主張して1つの事実に縮退していた元の欠陥を修正したものである。\\n\\n第1に、ユーザー定義のバンキングツールはクライアントサイドである。アプリケーションが実行し、すべての tool_use に対して同じ tool_use_id を再利用した tool_result で応答しなければならず、それを生成した assistant turn の直後の user message に配置する（option 1）。これが Messages API が強制する ID の対応付けと turn ごとの順序の契約である。\\n\\n第2に、組み込みの web_search はサーバーサイドツールである。Anthropic がレスポンス内で実行し、server_tool_use block を発行して web_search_tool_result block を注入するため、アプリケーションは応答すべき tool_use を受け取らず、これに対する tool_result を構築してはならない（option 3）。これが所有権のルールである。2つの事実は直交しており、順序の契約を知っていることと web search がサーバー実行されることを知っていることは互いに含意しない。\\n\\noption 2 は均一実行の罠である。純粋なクライアントサイドのツールセットであれば正解になるが、組み込みの web search はサーバー実行され、異なる content-block の契約（server_tool_use と Anthropic が注入する web_search_tool_result）を使用するため、アプリケーションはこれに対して tool_result を返さない。これを排除するには、Claude API において「built-in」がサーバーサイドを意味することを思い出す必要があるが、設問は web search がどこで実行されるかを述べていない。option 4 は prompt-fix-versus-deterministic-code のアンチパターンであり、client 実行か server 実行かはツールの宣言方法で決まる固定のプロパティであって、few-shot example を通じてモデルに委ねる実行時の判断ではない。option 5 は API ラウンドトリップの削減のために、厳密な turn ごとの順序と tool_use_id の対応付けを犠牲にする。ループは各 tool_result が対応する tool_use の直後の user turn に続くことを要求するため、結果を末尾のバッチに遅延させることは許可されない。ただし1つの turn からの複数の tool_result を1つの user message にバッチ化するのは正しい。"}, {"qid": "exam2-q6", "domain": "Agents and Workflows", "type": "mc", "scenario": "あるチームが Claude Agent SDK 上で社内のコーディングアシスタントを構築しています。ソースファイルを修正できるよう、Claude に組み込みの Edit・Write ツールを付与しています。必須のライセンスヘッダを含まないファイルは一切書き込まれないことを保証しなければならず、しかも Claude がどう振る舞っても、このチェックは編集の試行ごとに毎回発火しなければなりません。この保証を実現できる実装はどれですか。", "options": [{"text": "Edit・Write ツールに対する PreToolUse hook。各ファイルのライセンスヘッダを検査し、ヘッダが欠けていれば permissionDecision 'deny' を返す。", "is_correct": true, "why": "PreToolUse は SDK が該当ツールを実行する前に発火し、permissionDecision 'deny' は SDK にその呼び出しをブロックさせるため、ヘッダのないファイルがディスクに書き込まれることはありません。hook は Claude が選んで実行するステップではなく、イベントによって発火する決定的なコードであるため、モデルの判断にかかわらず編集の試行ごとに毎回チェックが走ります。これこそがシナリオが求める「例外なく毎回の編集で発火する」という保証です。"}, {"text": "Edit・Write ツールに対する PostToolUse hook。各編集の後にヘッダを検査し、欠けていれば「この編集はルール違反なので取り消すべき」というフィードバックを Claude に返す。", "is_correct": false, "why": "強制のプリミティブ（hook）としては正しいですが、イベントが違います。PostToolUse はツールの実行が終わった後でのみ発火するため、チェックが走る時点で、すでにコンプライアンス違反の編集がワーキングツリーを変更してしまっています。hook は Claude に差し戻しを促すフィードバックを返せますが、それは事後的な補正であり、そもそも編集がディスクに届くことを防ぐことはできません。これでは「ヘッダのない編集は決して書き込まれない」という要件に違反します。"}, {"text": "Edit・Write ツールに対する PreToolUse hook。ヘッダを検査し、permissionDecision 'allow' を返しつつ、ヘッダが欠けていればトランスクリプトに警告を追記する。", "is_correct": false, "why": "イベント（Pre）は正しいですが、決定が違います。permissionDecision 'allow' はツール呼び出しの実行を明示的に許可するため、hook は警告を記録するだけで、コンプライアンス違反の編集を通してしまいます。PreToolUse が呼び出しをゲートするのは 'deny'（あるいは 'ask' へのエスカレーション）を返したときだけです。'allow' を返すのはブロックの逆です。"}, {"text": "system-prompt のルール。正しいチェックの few-shot 例で補強し、Claude に毎回の編集前にライセンスヘッダを確認するよう指示する。", "is_correct": false, "why": "決定的ではありません。system-prompt のルールや few-shot 例はモデルの振る舞いを確率論的に形成するものであり、コンプライアンスを高めることはできても、毎回の編集でチェックが走ることを保証はできません。そのステップが実行されるかは結局 Claude が選ぶかどうかに依存するからです。シナリオが求めているのは、モデルの記憶に依存しない強制であり、それはモデルの裁量の外にあるコードでのみ実現できます。"}], "explanation": "この要件は、ファイル編集の実行前に毎回ブロックし、かつ Claude が「実行するのを忘れない」ことに依存しないチェックを求めています。Agent SDK では、PreToolUse hook は SDK が該当ツールを実行する前に発火し、permissionDecision 'deny' を返すと呼び出し全体をブロックするため、編集がワーキングツリーに到達することはありません。このチェックはイベントによって発火するコードであり、モデルが実行するステップではないため、Claude の判断にかかわらず毎回の編集で発火します。正しいイベント（実行前）と正しい決定（deny）を組み合わせているのは、この選択肢だけです。\\n\\n他の選択肢がダメな理由: B はプリミティブは正しいがイベントが違います。PostToolUse は編集の実行が終わった後でのみ発火するため、Claude に差し戻しを促すフィードバックは返せますが、そもそもコンプライアンス違反の編集が書き込まれることを止められません。C はイベントは正しいが決定が違います。permissionDecision 'allow' は呼び出しの実行を許可するため、hook は警告を追記するだけで編集はそのまま通ってしまいます。呼び出しをゲートするのは 'deny'（または 'ask'）だけです。D はそもそもコードではありません。プロンプトのルールや few-shot 例はモデルに確率論的な影響を与えるだけで、毎回チェックが走ることを保証できず、シナリオはそれを明示的に排除しています。"}, {"qid": "exam2-q7", "domain": "Prompt and Context Engineering", "type": "mr", "scenario": "あるクレーム対応チームが、Messages API 上でトリアージアシスタントを構築している。固定のトリアージプロトコルが、最初のターンから developer-level の権限で全件を支配しなければならない——クレームを分類し、書面での支払承認は一切行わず、訴訟への言及があればエスカレーションする。チームには事前に用意した地域ルール（EU 用と US 用の分岐）もあり、会話の途中でケースの地域が特定された時点で適用しなければならない。チームは統治ルールが (a) 最初のターンから system-level の権限を持つこと、(b) 以降のすべてのターンでプロンプトキャッシュにヒットし続けること、を求めている。両方の目標を同時に達成する配置判断はどれか。2つ選べ。", "options": [{"text": "最初のターンから、トリアージプロトコルと地域ルール全体（EU 分岐と US 分岐の両方を条件分岐として記述したもの）を、トップレベルの `system` パラメータに配置する。", "is_correct": true, "why": "`system` パラメータは永続的な開発者インテント（durable developer intent）の本来の置き場所である。最初のターンから適用され、すべての応答に対する権限を持ち、キャッシュ可能な prefix の先頭に位置する。条件付きルールがここに属するのは、ルール自体が永続的な開発者インテントだからであり、後から会話を通じてファクトとして到着するのは地域の「値（VALUE）」だけである。"}, {"text": "`messages` 配列にはケース固有の内容だけを送る——顧客とのやり取りと、地域が特定された時点での「どの地域が適用されるか」という 1 つのファクト。`system` ブロックは各ターンでバイト単位で同一に保つ。", "is_correct": true, "why": "ケース固有の内容は定義上変動するため、`messages` の末尾（tail）に属する。`system` を各ターンで変更しなければキャッシュされた prefix が維持され、毎ターン再処理されることなく、以降の全リクエストでキャッシュにヒットし続ける。"}, {"text": "トリアージプロトコルを、各ユーザーメッセージの冒頭に強い表現で繰り返し記述し、その目立たせ方で毎ターンモデルを整合させ続ける。", "is_correct": false, "why": "強調を伴う反復は確率的なナッジ（nudge）に過ぎず、権限のメカニズムではない。従順になる確率は上がるが、交渉不可のルールが system-level の権限を持つという構造的な保証は何もない。さらに各ユーザーメッセージは新規のキャッシュされないコンテンツなので、毎リクエストごとにキャッシュされない `messages` の末尾を膨らませることになる。強調は強制（enforcement）ではない。"}, {"text": "トリアージプロトコルを各会話の最初のユーザーメッセージに配置し、別フィールドではなく対話として Claude に読み込ませる。", "is_correct": false, "why": "ユーザーメッセージは会話コンテンツであり system 命令ではない。system-level の権限を持たず、安定した prefix ではなくキャッシュされない `messages` の末尾に位置するため、ここに置かれたプロトコルは権限として統治しないし、キャッシュの恩恵も受けない。「会話の早い段階」は「system プロンプトの中」と同じではない。"}, {"text": "毎ターン、トップレベルの `system` パラメータを書き換え、判明した地域と最新のやり取りを追記して、すべてのコンテキストを 1 つのフィールドにまとめる。", "is_correct": false, "why": "`system` ブロックを編集するとキャッシュされた prefix の先頭が変わり、毎ターンその後ろ全体のキャッシュが無効化される——まさにチームが避けたかった繰り返しコストである。1 つのフィールドにまとめることは、実質的なキャッシュの恩恵を表面的な整理整頓と引き換えに捨てる行為だ。"}], "explanation": "ここでは 2 つの配置原則が働く。第一に、統治ルール——地域ルールのような条件付きルールを含む——は永続的な開発者インテント（durable developer intent）であるため、トップレベルの `system` パラメータに置く。そこは最初のターンから適用され、system-level の権限を持ち、キャッシュされた prefix の先頭に位置する。後からファクトとして供給されるのは地域の「値（VALUE）」だけである。第二に、ケース固有の内容（会話と特定された地域）は変動するため `messages` の末尾に属する。これらを `system` から外しておけば、prefix は各ターンでバイト単位で同一に保たれ、プロンプトキャッシュがヒットし続けるために必要な安定性が得られる。この 2 つを組み合わせることで、ルールに権限を持たせつつキャッシュヒットを維持できる。以上から、選択肢 1 と 2 が正解のペアとなる。\\n\\nなぜ他がダメか：プロトコルを各ユーザーメッセージに強調して繰り返す（選択肢 3）は確率的な強調の微調整に過ぎず、従順さをナッジするだけで、交渉不可のルールが system-level の権限として扱われることを保証できない。さらにキャッシュされない末尾を膨らませる（強調は強制ではない）。プロトコルを最初のユーザーメッセージに置く（選択肢 4）は配置ミスである。ユーザーメッセージは会話コンテンツであり system-level の権限を持たず、キャッシュされた prefix 中にも居場所がない。したがって「会話の早い段階」は「system プロンプトの中」と同じではない。そして毎ターン `system` パラメータを書き換えて新しい内容を取り込む（選択肢 5）は、キャッシュの観点で最悪の選択である。prefix を変えると毎ターンその後ろ全体のキャッシュが無効化され、それはまさに安定した `system` ブロックが避けるために存在するコストそのものである。"}, {"qid": "exam2-q8", "domain": "Prompt and Context Engineering", "type": "mc", "scenario": "プラットフォームチームは、長いマルチターンのClaudeセッションをcontext window内に収めるため、server-side compaction（ベータヘッダー `compact-2026-01-12`、デフォルトで150Kトークン到達時にトリガー）を有効にしている。彼らのコストダッシュボードは、各ターンの課金をレスポンスのトップレベルにある `usage.input_tokens` と `usage.output_tokens` だけを使って計算している。このダッシュボードの月次合計は常にAnthropicの請求額を下回り、その差はその月にトリガーされたcompactionの回数とともに拡大していく。課金パイプラインは何を変更すべきか？", "options": [{"text": "レスポンスの `usage.iterations` 配列内の全エントリ（`compaction` iterationを含む）を合計する。トップレベルの `usage.input_tokens`/`output_tokens` はcompactionトークンを含まないため、これらを基にするのはやめる。", "is_correct": true, "why": "compactionのドキュメントでは、compactionは課金対象となる追加のsampling stepであり、トップレベルの `input_tokens`/`output_tokens` にはcompaction iterationの使用量が含まれず非compactionのiterationのみが反映されること、そしてリクエストで消費・課金される総トークン数を算出するには `usage.iterations` 配列の全エントリを合計しなければならないことが示されている。つまりトップレベルのフィールドだけを読むと、すべてのcompaction iterationのトークンを見落とすことになる。それこそがダッシュボードで欠落している課金対象の処理である。"}, {"text": "各ターンの終了後に `messages.count_tokens()` を呼び出し、その戻り値の `input_tokens` をセッション全体の権威ある合計として課金の基準にする。", "is_correct": false, "why": "エンドポイントとフィールドは実在するためもっともらしく見えるが、`count_tokens` はpreflightの推定ツールである。渡されたリクエストのトークンを数える際、既存のcompactionブロックがあればそれを適用するが、新たなcompactionはトリガーせず、compaction iterationがすでに消費したトークンも報告しない。これは次のリクエストのサイズを見積もるものであり、すでに実行された課金対象のsampling処理を計上するものではないため、過少計上は解消されない。"}, {"text": "可視の `compaction` ブロックから欠落トークンを見積もり、そのsummaryの文字数をトークンに変換してトップレベルの `output_tokens` に加算する。", "is_correct": false, "why": "summaryはレスポンス内で可視であるため、欠落したコストは復元できそうに見える。しかしドキュメントのusage例では、compaction iterationは約180,000のinputトークンを読み込んで、わずか約3,500のoutputトークンしか生成しない。compactionのコストは前のcontextを読むためのinputが大半を占め、生成されるsummaryではない。したがってsummaryの文字数を数えても小さなoutputの端数しか捉えられず、課金対象のinput量を見落とす。"}, {"text": "system promptでClaudeに対し、compactionステップを含む総トークン消費量の構造化された自己報告を各レスポンスに付記するよう指示し、その自己報告を課金の基準にする。", "is_correct": false, "why": "これは決定論的な計上業務を確率論的なシステムに任せることになる。モデルにはサーバー側のトークン合計やcompaction iterationの課金量にアクセスする内省的な手段はない。tokenizationはモデルにとって不透明であり、compactionのコストはプラットフォーム側の事実であって構造化されたusage objectでのみ報告される。ダッシュボードは体系的な過少計上を、信頼できない推測に置き換えることになる。"}], "explanation": "compactionは、プラットフォームが無料で提供する要約ではない。ドキュメントでは「rate limitと課金に影響する追加のsampling stepを必要とする」と明記されている。ダッシュボードはトップレベルの `usage.input_tokens`/`output_tokens` だけを読んでいるが、ドキュメントによればこれらはcompaction iterationの使用量を除外し、非compactionのiterationのみを反映する。各compaction iterationのトークンは `usage.iterations` 配列で個別に報告される。compactionの発生頻度に比例して過少計上が拡大するという症状は、見出しフィールドから課金対象のバックグラウンド処理が漏れていることを示す明確な兆候である。決定論的な修正は `usage.iterations` を集計することだ。APIがすでに返している構造化されたusageを読み出せばよく、自前で再構築する必要はない。\\n\\n他の選択肢がダメな理由: `count_tokens` は渡したリクエストのトークンを数えるpreflightの推定ツールであり、新たなcompactionをトリガーしないため、compaction iterationがすでに消費したトークンを報告することはない。可視のsummaryの文字数からの推定も失敗する。compactionのコストはinputトークンが大半を占めるからで（ドキュメントの例では約180K input対約3.5K output）、文字数を数えてもoutputの端数しか見えない。そしてモデルに自己消費量の報告を促すのは、決定論的な計上タスクを、サーバー側のトークン合計への内省的アクセスを持たないシステムに委ねることだ。これは構造化データが存在する場所でpromptに依頼するのと同じ、確率論対決定論のギャップである。`usage.iterations` を合計することだけが、プラットフォームが実際に実行した処理を正しく課金できる。"}, {"qid": "exam2-q9", "domain": "Applications and Integration", "type": "mc", "scenario": "Claude Code のセッションで、開発者がある monorepo のモジュールで data-layer の refactor を完了した。複数の file にまたがるいくつかの field 名を変更し、それらを参照する query も更新している。その後、別のモジュールに移って新機能を build し始めると、Claude は refactor 前の古い field 名や query pattern を提案し続ける。この以前の作業が新しいタスクに持ち込まれるのを最もよく防ぐのはどれか。", "options": [{"text": "新機能の作業を始める前に /clear を実行し、context window の会話履歴を空にする。", "is_correct": true, "why": "Claude Code のセッションは会話であり、context window は何かが空にしない限り過去のすべての message と tool result を保持し続ける。/clear はその履歴を破棄し、その場で新しい window を開くため、refactor 前の古い field 名や query が model の出力を誘導できなくなる。古い context を完全に削除するのは選択肢の中でこれだけで、model が無視することを選ぶかに依存しない、確定的な reset を実現できる。"}, {"text": "新機能の作業を始める前に /compact を実行して会話を要約する。", "is_correct": false, "why": "/compact は既存の会話を要約に圧縮して context の空きを取り戻すが、要約された履歴を削除せずに保持する。refactor 前の field 名や query pattern は要約の中に残り、新しいタスクへの影響を続けるおそれがある。つまりこれは context のリセットではなく削減に過ぎない。"}, {"text": "新しいモジュールの file を context に読み込み、現在のコードで refactor 前の古い pattern を上書きする。", "is_correct": false, "why": "file の読み込みは内容を window に追加するだけで、追加は退去（eviction）ではない。refactor 時の以前の message や tool result は依然として残っており、出力を誘導し続ける。新しいコードは古い context と置き換わるのではなく、競合することになる。"}, {"text": "CLAUDE.md に「以前のモジュールで行ったことはすべて無視せよ」という指示を追記する。", "is_correct": false, "why": "CLAUDE.md は常駐するガイダンスとして読み込まれるものであり、強制される設定ではない。「以前のモジュールを無視せよ」という否定の指示は確率的に従われるだけで、すでに window に入っている message を削除することはできない。したがって抑制は保証されず、model 依存のままとなる。"}], "explanation": "Claude Code のセッションは会話であり、file system のライブビューではない。context window は /clear（あるいは新しいセッションの開始）で空にしない限り、すべての message と tool result を保持し続ける。モジュールを切り替えても Claude が読める file が変わるだけで、refactor の議論は削除されない。そのため古い field 名や query pattern は新しいタスクに漏れ出し続ける。/clear は確定的な解決策である。会話履歴を破棄して新しい window を始めることで、model の判断にかかわらず clean な状態を保証する。各誤答はもっともらしいが、どれも window を空にはしない。/compact は履歴を保持された要約に圧縮するだけで、古い pattern を運び続けるおそれがある。新しいモジュールの file を読み込んでも、内容は追加されるだけで以前の message は退去しない。CLAUDE.md の指示は model が確率的に従う常駐ガイダンスであり、削除操作ではない。境目は「構造的な reset」か「model 依存の回避策」かであり、必ず実行しなければならない処理に prompt の反復ではなく hooks を使うのも同じ理由である。"}, {"qid": "exam2-q10", "domain": "Model Selection and Optimization", "type": "mc", "scenario": "ある pharmacovigilance（薬剤安全性監視）チームが、市販後調査プログラムで報告された稀な有害事象を調査している。症例ナラティブ、臨床試験報告書、公表文献、規制当局との往復書簡を集約し、約 920,000 tokens の単一コーパスを構築した。チームは Claude ファミリー全体で最も高いレイテンシとトークンコストも許容する。何よりも優先するのは分析の徹底であり、文書間のわずかなシグナルを一つも見逃さないことだ。この要件に最も適した構成はどれか。", "options": [{"text": "Claude Opus 4.6 で 1M-token beta の context window を使用し、effort を max に設定する。", "is_correct": true, "why": "920K tokens のコーパスは標準の 200K window を超えるため、エンドツーエンドの一括処理には 1M-token beta window が必要となる。これは Opus 4.6 と Sonnet 4.6 で利用可能だが、Haiku 4.5 では提供されない。徹底性が最優先である以上、最高性能モデルの Opus 4.6 が最適であり、effort=max は最深の推論レベルだ。max は Opus 4.6 でのみ指定可能。effort は、adaptive-thinking モデルの推論の深さを制御する GA の決定論的パラメータである。"}, {"text": "Claude Sonnet 4.6 で 1M-token beta の context window を使用し、few-shot のサンプルと system prompt 内の明示的な chain-of-thought 指示で分析的厳密さを補強する。", "is_correct": false, "why": "Sonnet 4.6 は 1M beta window を提供するため、コーパスは収まる。しかし Sonnet 4.6 の effort の上限は high であり（max は Opus 4.6 専用）、few-shot や chain-of-thought の指示は確率的なナッジにすぎず、モデルの性能上限を引き上げることはできない。これは、決定論的な制御である effort がすでに存在するにもかかわらず、プロンプトで代替しようとするアプローチだ。"}, {"text": "Claude Haiku 4.5 を使用し、コーパスを 200K 未満のチャンクに分割して並列処理し、部分結果を集約する。", "is_correct": false, "why": "Haiku 4.5 は 200K window であり 1M beta はないため、シャーディングは実際に必要で、各チャンクを 200K 未満に収める設計はエンジニアリングとして正しい。しかし map-reduce では 920K tokens 全体にわたるコーパス全体の推論が失われ、それはまさにチームが見逃せない文書間シグナルそのものだ。Haiku は最高性能層ではなく、Haiku 4.5 では effort パラメータ自体がエラーになる。"}, {"text": "Claude Opus 4.6 で 1M-token beta の context window を使用し、モデルがレポートを出力する前に budget_tokens を引き上げて思考の深さを拡張する。", "is_correct": false, "why": "モデルと window の選択は正しい。しかし budget_tokens は Opus 4.6（および Sonnet 4.6）で非推奨になっており、指定しても推論が深まることはなく、API に拒否される。adaptive-thinking モデルで推論の深さを制御するサポートされた仕組みは effort パラメータである。"}], "explanation": "正解: A。920K tokens のコーパスは標準の 200K window を超えるため、エンドツーエンドの一括呼び出しには 1M-token beta の context window が必要となる。これは Opus 4.6 と Sonnet 4.6 で利用可能だが、Haiku 4.5 では提供されない。徹底性が最優先である以上、最適な構成は最高性能モデルの Opus 4.6 に effort=max を指定することだ。max は最深の推論レベルで Opus 4.6 でのみ指定可能、そして effort は adaptive-thinking モデルの推論の深さを制御する GA の決定論的パラメータである。\\n\\nB が不適な理由: Sonnet 4.6 は正しい window を提供するが、徹底性をプロンプトの問題として扱っている。few-shot や chain-of-thought の指示は確率的なナッジであり性能上限を引き上げられない上、Sonnet 4.6 の effort の上限は high（max は Opus 4.6 専用）だ。これは、決定論的な制御が存在するのにプロンプトで代替しようとするアプローチであり、必須ステップを system prompt の指示ではなく hook で強制するのと同じ原理である。\\n\\nC が不適な理由: Haiku 4.5（200K・1M beta なし）ではシャーディングが正しく必要になるが、map-reduce はコーパス全体の推論を犠牲にする。それはまさにチームが明確に見逃せないとする文書間シグナルであり、Haiku は最高性能層ではなく、Haiku 4.5 では effort 自体がエラーになる。\\n\\nD が不適な理由: モデルと window の選択は正しいが、budget_tokens は Opus 4.6 と Sonnet 4.6 で非推奨であり、API に拒否されて推論が深まることはない。サポートされた制御は effort である。"}, {"qid": "exam2-q11", "domain": "Tools and MCPs", "type": "mc", "scenario": "プラットフォームチームが運用する共有の MCP server は HTTPS でアクセス可能で、複数のツールを公開している。Claude Messages API を基盤とする複数のバックエンドが、サーバーの現在のツール群をそのまま（as-is）利用してツールを呼び出す必要がある。チームは自前の MCP クライアントを一切構築・ホスト・運用しない。最も適したアプローチはどれか。", "options": [{"text": "各バックエンドで、サーバーのツールを手作業で user-defined tools としてリクエストに定義し、Claude が出力する tool call をバックエンドが HTTPS 経由でサーバーへ転送する。", "is_correct": false, "why": "機能自体は成り立ち、MCP クライアントを使わないため「クライアント禁止」の制約では排除されない。しかし、すべてのバックエンドがツールスキーマを手書きし、サーバーの進化に合わせて同期し続けなければならない。これは「現在のツール群をそのまま利用する」に反するうえ、バックエンドごとに統合処理が重複する。"}, {"text": "各バックエンドで、HTTP transport 経由でサーバーに対する MCP クライアントセッション（ClientSession）を開き、tool-use loop を通じてサーバーのツールを公開する。", "is_correct": false, "why": "SDK でドキュメント化された汎用的な MCP のパスであり、ローカルサーバーや prompts、resources、接続のきめ細かな制御が必要な場合には正しい選択肢である。しかし本ケースでは、各バックエンドが独自の MCP クライアントと tool loop を所有・実行することになり、まさにチームが拒否する運用負荷そのものとなる。"}, {"text": "単一の内部 gateway を構築し、そこだけが唯一の MCP クライアントを保持してリモートサーバーへ tool call をプロキシし、すべてのバックエンドがその gateway を呼び出すようにする。", "is_correct": false, "why": "集約化によりバックエンドごとの重複は解消され、共有の認証・レート制限・observability が欲しい場合には妥当なパターンである。しかし API が直接サーバーへ到達できるにもかかわらず、チームは独自の MCP クライアントと新たなサービスを構築・ホスト・運用することになる。"}, {"text": "Messages API の MCP connector を使用する。サーバーを mcp_servers パラメータで宣言すれば、Anthropic がサーバー側で接続を開き、サーバーのツールがレスポンス内の tools として直接現れる。", "is_correct": true, "why": "MCP connector は、リモートの HTTP MCP サーバーを別クライアントなしで Messages API に接続する、公式ドキュメントに記載された方法である。Anthropic が接続を開いて維持し、既存のツール群をネイティブに利用でき、allow/deny によるツールのフィルタリングも利用できる。そのため、クライアント不要の制約を満たしつつ、サーバーのツールをそのまま利用できる。"}], "explanation": "決定的な制約は次の 4 点である。(1) リモートの HTTPS MCP サーバーであること、(2) ツールだけが必要なこと、(3) サーバーの現在のツール群をそのまま利用すること、(4) 構築・ホスト・運用すべき MCP クライアントがないこと。この 4 つをすべて満たすのは MCP connector だけだ。リモートの HTTP MCP サーバーを Messages API に直接接続し、Anthropic がサーバー側で接続を開いて維持するため、サーバーのツールはネイティブに tools として現れ、allow/deny でフィルタリングでき、クライアントコードは一切書く・動かす必要がない。\n\n他の選択肢がもっともらしいのに最適でない理由:\n- A（ツールの手定義とバックエンド転送）は MCP クライアントを使わないため、クライアント禁止の制約では生き残る。その手がかりだけでは排除できない。ただ、すべてのバックエンドがツールスキーマを手作業で定義して保守し、サーバーの変更に合わせて同期し続けなければならない。これは「現在のツール群をそのまま利用する」の対極であり、バックエンドごとに作業が重複する。\n- B（バックエンドごとの SDK MCP クライアント）は、ローカルサーバーや prompts、resources、接続のきめ細かな制御が必要な場合のドキュメント化されたパスだが、本ケースでは各バックエンドが独自のクライアントと tool loop を所有・運用することになり、チームが排除しようとする運用負荷そのものになる。\n- C（単一の MCP クライアントを持つ中央 gateway）はバックエンドごとの重複を解消し、共有ガバナンスの観点では正当だが、API が単独で接続できるにもかかわらず、チームは独自の MCP クライアントと新サービスを構築・運用することになる。\n\n選択の分かれ目は、Messages API 自体がクライアントコードなしでリモートの MCP サーバーに接続でき、保守されている外部のツール面をネイティブに利用できると認識できるかにある。クライアントを手作り・複製・集約するのではなく、運用中のツール面をそのまま消費する。クライアント禁止の制約は B と C を排除し、サーバーの現在のツール群をそのまま利用する要件は A を排除する。結果、4 つの制約をすべて満たすのは D だけになる。D の正しさは概念（Anthropic 管理のサーバー側接続・ネイティブなツール面・クライアントゼロ）に基づいており、mcp_servers パラメータはドキュメントによる確認にすぎない。したがって、単一トークンの暗記には依存しない。"}, {"qid": "exam2-q12", "domain": "Agents and Workflows", "type": "mc", "scenario": "TypeScript のデスクトップチームがコーディングアシスタントを開発している。依頼された変更を完了するため、Claude は未知のコードベースを調査し、ファイルを編集し、シェルコマンドを実行しながら、変更が完了するまで自ら段階的にイテレーションを回す必要がある。各ステップは実行された時点で UI にストリーミングされる。チームは、エージェントを支える基盤（plumbing）、すなわちファイル・検索・シェルの各ツールの実装と、次のツールを選んで実行し、結果をフィードバックし、タスクの完了を判定するループを、自ら実装して保守したくないと考えている。最も適切なアプローチはどれか。", "options": [{"text": "`@anthropic-ai/claude-agent-sdk` を使用する。同 SDK は組込みのコーディングツール（Read, Write, Edit, Glob, Grep, Bash）と管理された turn loop でイテレーション全体を実行するため、チームはツールもループも実装せずに済み、`query()` の async stream が各ステップを UI に送出する。", "is_correct": true, "why": "Agent SDK はエージェント型コーディングアシスタント向けに公式にドキュメント化されたインターフェースである。シナリオで必要なファイル・検索・シェルツールを同梱し、turn loop を内部で実行する（モデルを呼び出し、選択されたツールを実行し、結果をフィードバックし、最終回答に至るまで繰り返す）。各ステップはストリーミングメッセージとして送出される。チームはツールもループも自作するのではなく受け取る形になり、ストリームによってライブ UI の要件も満たされる。"}, {"text": "`@anthropic-ai/sdk` の Messages API と tool use を使用し、TypeScript で実装したファイル・検索・シェルの各ツールを登録した上で、アプリケーション側で tool-use loop を回す。Claude が返す tool call を都度実行し、結果を次の turn に渡す。", "is_correct": false, "why": "これは実際にサポートされているパターンであり（独自のツールでループを制御する場合、Messages API + tool use はドキュメント化されたインターフェース）、もっともらしく見える。しかし本シナリオでは、チームが自らファイル・検索・シェルツールを実装し、turn loop を運用することを強いる。それはまさに避けたい基盤部分そのものである。組込みのコーディングツールがすでに存在する状況よりも、カスタムツールが必要な場合に適した選択である。"}, {"text": "`@anthropic-ai/claude-agent-sdk` を使用するが、組込みツールは無効化し、ファイル編集・検索・シェル実行は独自の TypeScript 実装に差し替えて、チームが各操作を厳密に制御できるようにする。", "is_correct": false, "why": "SDK はデフォルトのツールセットの制限や独自ツールの追加をサポートしているため、選択肢としては成立する。しかし、同梱のコーディングツールを捨ててファイル編集・検索・シェルをゼロから再実装すれば、チームが避けたかったツール作成の負担がそのまま再現され、しかも SDK のコストは支払い続けることになる。`allowedTools` で組込みセットを制限するのは妥当だが、ツール全体を丸ごと差し替えるのは本シナリオにおける SDK の目的を損なう。"}, {"text": "`@anthropic-ai/sdk` の Messages API を使用し、利用可能な最強モデルと、詳細な system prompt、そして Claude にタスク完了までのファイル編集・検索・シェルコマンドの計画と連鎖を教え込む few-shot example を組み合わせる。", "is_correct": false, "why": "より強力なモデル、より豊富なプロンプト、few-shot example は、Claude が何を要求するかを確かに変えるため、自然な発想としては理解できる。しかし、これらはツールを実行することもイテレーションを駆動することもできない。Messages API は依然としてクライアントが処理すべき tool-call request を返し続けるし、ツールレイヤーがなければファイル編集もコマンド実行も実際には何も起きない。モデルとプロンプトは構造的なギャップに対する確率的なレバーであって、実行ハーネスの代わりにはならない。"}], "explanation": "公式のインターフェース選定ガイダンスでは、ファイル・検索・シェルへのアクセスを必要とするエージェント型コーディングアシスタントは Agent SDK に誘導される。`@anthropic-ai/claude-agent-sdk` は組込みのコーディングツール（Read, Write, Edit, Glob, Grep, Bash）を同梱し、`query()` を通じて turn loop を内部で実行する（モデルを呼び出し、選択されたツールを実行し、結果を戻し、最終回答に至るまで繰り返す）。同時に各ステップをストリーミングするため、UI でライブ描画できる。結果としてチームはツールもループも受け取る形になり、まさにシナリオが求めるものと一致する。\\n\\n選択肢 B はカスタムエージェント向けの正統な Messages API + tool use パターンであり、もっともらしく見える。しかし、チームが自らファイル・検索・シェルツールを実装し、turn loop を運用することになる。それは避けたい基盤部分そのものであり、組込みのコーディングツールがすでに存在する状況では過剰な道具立てになる。\\n\\n選択肢 C は正しいパッケージを選んでいるが、同梱ツールを捨てて再実装しており、SDK によって除去しようとしたツール作成負担を再現してしまう。`allowedTools` で組込みセットを制限するのは妥当だが、丸ごとの差し替えは不可である。\\n\\n選択肢 D はモデルのスケールとプロンプトの品質に頼る。どちらも実際に有用だが、ツールを実行することもイテレーションを生成することもできない。Messages API は依然としてクライアントが満たすべき tool call を返し続けるため、構造的なギャップに対する確率的なレバーでしかない。\\n\\nSDK を選んだ後も、チームはエージェントに許可する操作を管理するため `allowedTools` と `permissionMode` を意識的に設定すべきである。ただしこれらは「許可される操作」を管理するものであり、ループとツールの所有者がどこにあるかとは別の問題である。"}, {"qid": "exam2-q13", "domain": "Agents and Workflows", "type": "mc", "scenario": "プラットフォームの信頼性チームは、Claude にすべての本番インシデントのトリアージを行わせたいと考えている。チームには7人のスペシャリストが固定で在籍する — データベースパフォーマンス、ネットワーク、アプリケーション/バックエンド、フロントエンド、インフラとオートスケーリング、セキュリティ、リリースとデプロイ — そして各インシデントは固定スキーマに従った1ページの Incident Triage Brief を必ず生成しなければならない（スキーマはハード要件）。どのスペシャリストの判断を要するかはインシデントごとに予測不能で、アラートのペイロードと初期ログを読まなければ分からない。データベースのフェイルオーバーならスペシャリスト1人で済むこともあれば、不良デプロイならリリース・データベース・セキュリティ・フロントエンドが一度に必要になることもある。現実的なスペシャリストの組み合わせは数十通りに上り、インシデントの文脈ごとに変化する。", "options": [{"text": "orchestrator-workers ワークフロー: orchestrator LLM が各インシデントのアラートとログを読み、実行時にどのスペシャリストを起動するかを決定し、それらを隔離された worker として実行する。そして固定の synthesis ステップが Triage Brief を組み立てる。", "is_correct": true, "why": "最適。Anthropic の「Building Effective Agents」は、orchestrator-workers を「サブタスクが事前に予測できない」タスク向けに定義している。このチームはインシデントを読むまでスペシャリストの部分集合を知る手段がない — まさにその定義条件である。orchestrator は実行時に worker を動的に選択して委譲する一方で、worker のカタログと Brief の synthesis はコードに固定されるため、どのスペシャリストが実行されても要求される Brief のスキーマが保証される。"}, {"text": "prompt-chaining パイプライン: すべてのインシデントに対してすべてのスペシャリストを固定順序で実行し、各ステージの後に validation gate を挟み、最終的に synthesis 呼び出しを行う。", "is_correct": false, "why": "もっともらしい — chaining は予測可能性とステージごとの validation を最大化し、どちらもオンコールの信頼性において価値がある。しかし prompt chaining はすべての入力に対して1つの固定手順を適用するものであり、本ケースではインシデントごとに必要なスペシャリストが異なる。そのため chaining では全インシデントで全スペシャリストを起動することになり、無関係な分析（純粋なデータベースフェイルオーバーでフロントエンド分析を実行するなど）にトークンとレイテンシを費やすことになる。これは各ステップが各入力に適用されるタスクには適しているが、ステップの構成が変動するタスクには適していない。"}, {"text": "routing レイヤー: 各インシデントを事前定義されたスペシャリスト組み合わせバンドルのいずれかに分類し、対応するマルチスペシャリストパスにディスパッチする。", "is_correct": false, "why": "もっともらしい — インシデントには認識可能なタイプがあり、routing はスペシャリストのディスパッチを扱う。しかし routing は「正確に処理できる明確なカテゴリ」、つまり分類器がターゲットにできる小さく安定した事前定義可能な集合を前提とする。本ケースの現実的な組み合わせは数十通りに上りインシデントの文脈で変動するため、それらを網羅する有限で事前列挙可能なカテゴリ集合は存在しない — まさに orchestrator-workers が存在意義を持つ「予測不能なサブタスク」のケースである。"}, {"text": "単一の Claude agent: すべてのスペシャリストのドメインと Brief のスキーマを明記した包括的な system prompt を持ち、インシデントごとにどの分析を実行するか、また Brief をどう組み立てるかを自由に決定できる。", "is_correct": false, "why": "もっともらしい — 最も能力の高いモデルに丁寧な system prompt を与えれば、柔軟で工数の少ない解決策に見える。しかしこれはスペシャリストの選択と Brief の組み立ての両方をモデルの裁量に委ねる。Brief には固定のハードスキーマ要件があるため、synthesis ステップはその形状を保証する決定論的なコードであるべきであり、インシデントごとにドリフトする可能性のあるモデルの判断に任せるべきではない。「十分に機能する最もシンプルな構成から始める」という Anthropic の指針に照らしても、すでに知れている構造を保ち、無限定な自律性に丸投げしない方が優れている。"}], "explanation": "Anthropic の「Building Effective Agents」は、ワークフローのパターンを「どこまで前もって構造を固定するか」で区別している。prompt chaining はすべての入力に対して1つの固定手順を適用する。routing は各入力を有限で正確に分類可能なカテゴリ集合のいずれかにディスパッチする。orchestrator-workers は「サブタスクが事前に予測できない」ケース向けに、orchestrator LLM が「タスクを動的に分割し、worker LLM に委譲し、結果を統合する」。このチームはスペシャリストのカタログと Brief のスキーマを固定できるが、インシデントを読むまで個々のスペシャリストの部分集合を予測できない — まさに orchestrator-workers の定義ケースであり、カタログと synthesis を決定論的に保ったまま orchestrator が組み合わせを選ぶ。prompt chaining は1つの固定手順がすべてのインシデントに適合すると誤って想定し、各インシデントに無関係なスペシャリストを強制する。routing は組み合わせが数十通りに上り文脈で変動するにもかかわらず、有限で事前分類可能なカテゴリ集合が存在すると誤って想定する。そして完全に自律的な単一 agent は、固定スキーマの Brief が要求する決定論的な synthesis ステップを、タスクにとって不要な無限定な柔軟性と引き換えてしまい、「十分に機能する最もシンプルな構成から始める」という原則に反する。"}, {"qid": "exam2-q14", "domain": "Applications and Integration", "type": "mc", "scenario": "プラットフォームチームのコードレビューボットは、1日約600件のプルリクエストを処理している。毎回の呼び出しで、コーディング標準・アーキテクチャ決定記録・APIリファレンス・ツールスキーマからなる約70,000 tokenの同じバンドルを再送しており、これらは週単位でほとんど変わらない。一方で、変化するのは約3,000 tokenの差分のみだ。レビューアーは各結果を数秒以内に受け取ることを期待している。チームは、毎回の呼び出しでこの共有コンテキストを再処理することで生じるコストとレイテンシを削減したい。どの変更が、このレバーを動かすか。", "options": [{"text": "Files API 経由でコーディング標準・記録・リファレンスを一度だけアップロードし、以降の呼び出しでは token を再送せずにその file_id を渡す。", "is_correct": false, "why": "Files API は転送と保存の利便性を提供するものだ。upload・list・delete は無料だが、file_id で参照されるコンテンツは、それを使うすべての呼び出しで input token に展開され、完全に処理されて課金される。キャッシュされることはないため、70,000 token の繰り返し処理は変わらない。"}, {"text": "レビューをより安価で高速なモデルに切り替え、毎回の呼び出しでコンテキスト全体を再送し続ける。", "is_correct": false, "why": "より安価なモデルは token 単価を下げ、より高速なモデルは token あたりのレイテンシを下げる。しかし 70,000 token の prefix 全体は、1日約600回のすべての呼び出しで処理・課金される。コストとレイテンシを左右する「繰り返し処理の乗数」は手つかずのままだ。さらに、より小さなモデルはこうしたレビューが依存するセキュリティやアーキテクチャの判断力で劣る。"}, {"text": "安定したコンテキストをリクエストの先頭に置き、その終端に cache_control の単一の breakpoint を設定し、その後に diff とレビュー指示を送る。", "is_correct": true, "why": "Prompt caching は、真のレバーを動かす唯一の選択肢だ。一度 prefix が書き込まれると、以降の呼び出しはキャッシュから標準 input レートの約0.1倍（約90%安価）で読み出し、再計算をスキップするため、コストと time-to-first-token の両方が下がる。各リクエストは依然として通常の同期型 Messages 呼び出しなので、レビューアーは引き続き数秒以内に結果を得られる。"}, {"text": "標準を system prompt に移し、Claude に一度だけ内部化して記憶から答えるよう指示し、毎回の呼び出しでコンテキストを送るのをやめる。", "is_correct": false, "why": "Claude は呼び出し間でステートレスだ。ある呼び出しでルールを内部化し、token が存在しないまま別の呼び出しで再現することはできない。system prompt 内の標準は依然として毎回のリクエストで送られるため、モデルに記憶を求めても処理は取り除けない。これは確率的な期待であって、コストやレイテンシを減らす仕組みではない。"}], "explanation": "チームが動かしたいレバーは、大きくて安定した prefix の繰り返し処理だ。unit price でも、byte の転送でも、モデルの記憶でもない。Prompt caching だけがそれを決定論的に動かせる。安定したコンテンツをリクエストの先頭に置き、その prefix の終端に cache_control の単一の breakpoint を設定し、その後に diff とレビュー指示を送る。最初の呼び出し以降、prefix はキャッシュから標準 input レートの約0.1倍（約90%安価）で提供され、再計算されないため、コストと time-to-first-token の両方が下がる。1日約600回の呼び出しであれば、デフォルトの5分間 TTL の下で prefix はウォーム状態を保てる。各キャッシュ読み出しがその TTL を更新するからだ。5分以上のアイドル間隔が想定される場合は、同じ breakpoint を1時間の extended TTL（ttl: 1h）に設定し直せる。2つの TTL は breakpoint ごとに選ぶ選択肢であり、決して併用しない。Files API は byte の再アップロードを回避するだけだ。file_id で参照されるコンテンツは毎回の呼び出しで input として課金・処理されるため、繰り返し処理は残る。ステートレスなモデルに、呼び出しをまたいで標準を記憶するよう求めても token は取り除けない。system prompt は依然として毎回のリクエストで送られる。また、より安価・高速なモデルに切り替えても unit price や token あたりのレイテンシは下がるが、70,000 token の prefix は毎回の呼び出しで完全に再計算されたままで、タスクが依存するレビューの判断力は低下する。"}, {"qid": "exam2-q15", "domain": "Applications and Integration", "type": "mr", "scenario": "物流企業の配車コンソールは、配車担当者へルーティング推奨の説明を行うために Claude を組み込んでいる。担当者は顧客との実通話中であり、すべての応答は数秒以内に返る必要がある。契約の料金レートは、会社の既存のユーザー別認可チェックがその担当者を承認した場合に限って回答に含めることができる。レートはプライベートな価格データベースに格納されており、ルックアップコードはプラットフォームチームが既に保守している。両方の要件を満たすために、組み合わせて必要となる実装上の選択を2つ選べ。", "options": [{"text": "各説明リクエストには Message Batches API ではなく、同期型の Messages API を使用する。担当者は数秒以内の回答を必要とするため。", "is_correct": true, "why": "レイテンシ要件に対して正しい。Messages API はインタラクティブで低レイテンシなリクエスト/レスポンス向けに設計されており、Message Batches API は24時間以内に結果を返す。実通話中の担当者は数時間のターンアラウンドを許容できず、秒単位の SLA には同期 API が必須である。"}, {"text": "価格ルックアップをクライアント側ツールとして実装する。配車コンソールはユーザー別認可チェックを実行した後にのみルックアップを実行し、担当者が承認された場合に限り、レートを tool_result として Claude に返す。", "is_correct": true, "why": "認可要件に対して正しく、構造的な保証を実現する唯一の方法。tool use では、ツールを実行するかどうか、また tool_result として何を返すかはモデルではなくクライアントが決定する。コンソールは既存のユーザー別チェックを実行し、成功時のみレートを返すため、未認可のデータはモデルに一切届かない。強制は決定論的であり、モデルが従うかどうかに依存しない。"}, {"text": "説明機能に Message Batches API を使用し、各リクエストのコストを約半分に削減する。", "is_correct": false, "why": "リクエストあたり約50%のコスト削減は事実でありドキュメントにも記載されている。しかし Message Batches は最大24時間のターンアラウンドを許容できるレイテンシ非敏感なワークロード向けに設計されている。秒単位の実通話 SLA はバッチのターンアラウンドと両立せず、表面上いくら魅力的に見えても、このワークロードでは削減効果は無意味である。"}, {"text": "Claude に価格データベースへの直接読み取りアクセスを与え、いかなる料金レートを公開する前に担当者の認可レベルを確認することを求めるルールを system prompt に追加する。", "is_correct": false, "why": "これは保証をプロンプト指示の遵守問題として扱っている。system prompt のルールは遵守確率を高めるが、モデルが未認可のレートを出力することを決定論的に防ぐことはできない。境界を保証できるのは認可チェック後のクライアント側ツール実行だけである。コンソールが呼び出しを承認しない限りデータが構造的に渡されないからである。"}, {"text": "Messages API を使用し、Claude にルックアップツールを呼び出させる。ただし担当者はログイン時に認証済みであるため、各呼び出しでのユーザー別認可チェックの再実行はスキップする。", "is_correct": false, "why": "これはセッション認証とデータ単位の認可を混同している。料金レートの可視性はレーン、顧客、契約によって異なり得るため、ログイン時のクレデンシャルはあるクエリでこの担当者がどのレートを参照できるかを確定しない。認可チェックはすべてのツール呼び出しで実行しなければならない。さもなければ境界は要求されたデータに対する実際の権限ではなく、古いログイン時のアサーションに依存することになる。"}], "explanation": "2つの要件は互いに独立した2つの意思決定を求めており、2つの正解はそれぞれ1つずつを解決し、組み合わせることで完全なソリューションとなる。(1) 秒単位の SLA には同期型の Messages API が必須である。Message Batches API は24時間以内に結果を返すため、約50%のコスト削減は担当者が実通話中である状況では無意味である。これにより選択肢Aが正解となり、選択肢Cはドキュメントに記載される実際の削減効果を提示するもののレイテンシ制約に違反するダミーとなる。(2) 認可要件にはプロンプト指示の遵守ではなく構造的な保証が必要である。tool use では、ツールを実行するか、また tool_result として何を返すかはモデルではなくクライアントが制御する。したがってコンソールは既存のユーザー別チェックを実行し、承認時のみレートを返すことができ、未認可のデータはモデルに一切届かない。これにより選択肢Bが正解となる。残りのダミーはいずれも技術的には正確なメカニズムでありながら特定の1つの制約に失敗している。選択肢D（データベースへの直接アクセスと system prompt のルール）は保証を確率として扱う。プロンプトのルールは遵守の確率を改善するが、未認可のレートを決定論的にブロックすることはできない。強制がプロンプトではなくツール実行レイヤーに属する理由がここにある。選択肢E（担当者がログイン済みであることを理由に呼び出しごとのチェックをスキップ）は、セッション認証とデータ単位の認可を混同する。料金レートの可視性はレーンや契約によって異なり得るため、チェックは毎回の呼び出しで実行されなければならない。問題文は、選択された2つの選択肢が組み合わせて機能するよう調整されており、1つはレイテンシを、もう1つは認可を解決する。これにより以前の表現で採点不能だった曖昧さを排除している。本問題は意図的に単一概念であり、回答を暴露する表面的な手がかり（長さ、ヘッジ、ブランド名）は一切ない。"}, {"qid": "exam2-q16", "domain": "Claude Code", "type": "mr", "scenario": "プラットフォームチームは共有リポジトリを管理しており、そこで作業するすべてのエンジニアが、Claude Code のセッションを開始するたびに、同じバージョン管理されたエンジニアリング標準を読むことを求めている。一方で、各エンジニアはこの1つのリポジトリに固有の個人的なメモ（ローカルの sandbox URL、使い捨ての一回限りのコマンドなど）を持っており、それらはそのエンジニア個人に留め、チームメイトには共有してはならない。Claude Code の CLAUDE.md memory ファイルのスコープを正しく使っている設定を2つ選べ。", "options": [{"text": "共有の標準を ./CLAUDE.md（または ./.claude/CLAUDE.md）に commit する。これは Claude Code の project-scope memory であり、source control を通じて全員に配布され、リポジトリで作業する各エンジニアのセッションで読み込まれる。", "is_correct": true, "why": "公式ドキュメントでは、project の指示は ./CLAUDE.md または ./.claude/CLAUDE.md に置かれ、'shared with team members via source control'（source control を通じてチームメンバーと共有される）と定義されている。これはシナリオが求める、バージョン管理されたチーム全体の標準そのものである。"}, {"text": "各エンジニアの個人的でリポジトリ固有のメモは ./CLAUDE.local.md に置く。これは Claude Code が project の CLAUDE.md と一緒に読み込む local-scope memory であり、この1つのリポジトリの中で、その1人のエンジニアとのみ共有される。", "is_correct": true, "why": "公式ドキュメントでは ./CLAUDE.local.md を 'personal project-specific preferences'（個人的なプロジェクト固有の設定）と定義し、'just you (current project)'（あなただけ・現在のプロジェクト）と共有され、'loads alongside CLAUDE.md'（CLAUDE.md と一緒に読み込まれる）とされている。スコープはこの単一リポジトリ内の個人なので、エンジニアごとのスクラッチメモがチームメイトに渡ることはない。プライベートなリポジトリ固有メモの正しい置き場所である。"}, {"text": "共有の標準を ./CLAUDE.md ではなく ./CLAUDE.local.md に commit する。CLAUDE.local.md も起動時に読み込まれ、すべてのセッションで利用できるため。", "is_correct": false, "why": "スコープの誤り。CLAUDE.local.md は個人的なエンジニアごとの memory であり、source control では配布されない（'shared with: just you (current project)'）。そのためチーム全体に共有標準を行き渡らせることはできず、各エンジニアが同期されないプライベートなコピーを持つことになる。全エンジニアが読むべき標準は、source control で共有される ./CLAUDE.md に置くべきである。"}, {"text": "各エンジニアの個人的でリポジトリ固有のメモを ~/.claude/CLAUDE.md に置く。こうすれば project リポジトリに commit せずに、毎回のセッションで読み込まれる。", "is_correct": false, "why": "スコープの誤り。~/.claude/CLAUDE.md は 'just you (all projects)'（あなただけ・すべてのプロジェクト）で共有される user-scope memory である。そのため1つのリポジトリに固有のメモ（このリポジトリの sandbox URL、使い捨てコマンド）が他のすべてのプロジェクトのコンテキストにも取り込まれてしまう。リポジトリ固有の個人的なメモは、global な user memory ではなく ./CLAUDE.local.md に置くべきである。"}, {"text": "個人的なメモをリポジトリルートの ./NOTES.md に置く。Claude Code はルートに置かれた任意の Markdown ファイルを起動時にコンテキストとして自動的に読み込むため。", "is_correct": false, "why": "誤り。Claude Code が自動的に読み込むのは、ディレクトリツリーを走査して発見される memory ファイルのみ — CLAUDE.md、.claude/CLAUDE.md、CLAUDE.local.md、.claude/rules/ 配下のファイル — であり、ルートの任意の Markdown ではない。./NOTES.md は起動時には読み込まれない（CLAUDE.md の中で明示的に @NOTES.md で import するか、オンデマンドで読み込む必要がある）。また personal スコープの保証もない。"}], "explanation": "Claude Code の memory はスコープごとに整理されており、各スコープにはドキュメントで規定されたファイルの場所と共有範囲がある。project-scope memory は ./CLAUDE.md または ./.claude/CLAUDE.md に置かれ、source control を通じてチームに共有される。これが、すべてのエンジニアが読むべきバージョン管理された標準の正しい置き場所である（選択肢 A）。local-scope memory は ./CLAUDE.local.md に置かれる。'personal project-specific preferences'（個人的なプロジェクト固有の設定）を想定したもので、project の CLAUDE.md と一緒に読み込まれ、'just you (current project)'（あなただけ・現在のプロジェクト）と共有される。そのため各エンジニアのプライベートなリポジトリ固有のスクラッチメモの正しい置き場所となる（選択肢 B）。選択肢 C が不適切な理由は、CLAUDE.local.md は source control で配布されないため、チーム全体の共有標準を行き渡らせることができず、各エンジニアがバラバラの同期されない個人のコピーを持つことになるからである。共有標準は ./CLAUDE.md に置くべきである。選択肢 D は逆方向の誤りである。~/.claude/CLAUDE.md は user-scope memory であり、エンジニアのすべてのプロジェクトにまたがって適用される。そのため1つのリポジトリに固有のメモが他のすべてのプロジェクトのコンテキストを汚染してしまう。リポジトリ固有の個人的なメモは ./CLAUDE.local.md に置くべきである。選択肢 E が不適切な理由は、Claude Code が自動的に読み込むのは、ディレクトリツリーを走査して発見される名前付き memory ファイル（CLAUDE.md、.claude/CLAUDE.md、CLAUDE.local.md、.claude/rules/*.md）のみであり、ルートの任意の ./NOTES.md は起動時に読み込まれないうえに personal スコープとしても保証されないからである。プライバシーの要件は、別の enforcement step によってではなく、local scope 自体（'shared with: just you (current project)'）によって満たされる。"}, {"qid": "exam2-q17", "domain": "Applications and Integration", "type": "mc", "scenario": "法律事務所の案件準備アシスタントが Messages API 上に構築されている。各案件について戦略メモと過去の和解決定の背景にある理由を記録し、それらを後日の同じ案件での独立した相談でも利用できるようにしなければならない。メモは事務所が所有し監査可能なストレージに置かれ、かつ毎回の呼び出しで案件ファイル全体を再送せずに取り出せる必要がある。", "options": [{"text": "メモを事務所が所有する外部の memory store に永続化し、各相談では関連する事実だけを context に読み込む。", "is_correct": true, "why": "Messages API は呼び出し間でステートレスであり、案件ごとの永続的な知識はアプリケーションが制御するストレージに持たせる必要がある。この方法は3つの要件をすべて満たす: 独立した呼び出しをまたいで存続し、事務所所有の監査可能なストレージに置かれ、毎回の呼び出しでファイル全体ではなく関連する事実だけを読み込む。通常は、事務所のバックエンドが自社ストレージに対して読み書きを行う memory tool として実装される。"}, {"text": "case file に cache_control の breakpoint を追加し、その prefix を再処理せずに相談間で再利用できるようキャッシュする。", "is_correct": false, "why": "prompt caching は繰り返し使われる prefix の再処理コストを下げるが、ストアではない。キャッシュされた内容はやはり毎回のリクエストに含める必要があり、context window を消費し、更新されなければ TTL で期限切れとなる。ファイルを再送しない相談では何も取り出せない。"}, {"text": "notes を Files API で一度だけアップロードし、各相談では file_id で参照する。", "is_correct": false, "why": "Files API はバイトデータの再アップロードを避けられるが、コンテンツは事務所が制御・監査できるストレージではなく Anthropic のインフラ上にホストされる。さらにファイルを参照しても毎回の呼び出しで全内容が context に読み込まれる。重複を排除できるのはアップロードだけで、呼び出しごとの context コストや所有権の要件は満たさない。"}, {"text": "常時参照させる notes を system prompt に置き、その案件のすべての相談で毎回参照できるようにする。", "is_correct": false, "why": "これでは notes 全体を毎回のリクエストに戻すことになり、再送禁止の要件に違反するうえ、案件が蓄積するにつれて context が膨張し、選択的な取り出しもできない。アプリケーションが所有する just-in-time なストアではなく、context 内に保持する形になってしまう。"}], "explanation": "ここで求められるのは、独立した Messages API 呼び出しをまたいで保持される案件ごとの永続的な state であり、事務所所有の監査可能なストレージに置かれ、just-in-time に取り出せることである。各 Messages API 呼び出しは独立しており state を保持しないため、3つの要件をすべて満たすのは標準的な agent-memory パターンだけだ: notes をアプリケーションが所有する外部ストアに永続化し、各相談では関連する事実だけを読み込む。通常は、事務所のバックエンドが自社ストレージに対して読み書きを行う memory tool 経由で実装する。prompt caching はストアではなく、キャッシュされた prefix は毎回の呼び出しで再送する必要があり、TTL で期限切れとなり、context window も消費する。Files API はコンテンツを Anthropic 側にホストし、毎回の呼び出しでファイル全体を context に読み込むため、所有権と全文再送禁止の両方の要件を満たさない。notes を system prompt に読み込ませると、選択的な取り出しがないまま毎回のリクエストに強制的に含まれることになり、notes が蓄積するにつれて再送禁止の要件に違反する。仮に extended thinking を追加したとしても、それは context 内にある内容に対する推論を深めるだけで、案件の state を永続化も取得もしない。"}, {"qid": "exam2-q18", "domain": "Prompt and Context Engineering", "type": "mc", "scenario": "カスタマーサポートエージェントが retrieval tools を呼び出すと、ファイル内容・検索ヒット・アカウントレコードのような大きなブロックが返される。各ブロックはそのターンでは不可欠だが、以降のすべてのターンではノイズに変わる。会話が長くなるにつれて、こうした古くなった tool results が context window を膨張させ、Claude の集中を散らしていく。チームが実現したいのは、後のターンでは古い結果に注意を向けさせず、一方でまだ関連のある結果については詳細を正確に保つことだ。この問題に最も適した対応はどれか。", "options": [{"text": "system-prompt に、推論時には以前の tool results を無視するよう Claude に指示する一文を追加する。", "is_correct": false, "why": "指示は確率的に注意を偏らせるだけで、token を1つも削らない。古い結果は依然として context window を占拠し、集中を散らし続けるうえ、毎ターン必ず無視される保証もない。token 数に影響せず裁量に任せる手法なので、context の膨張という問題を決定論的には解決できない。"}, {"text": "tool_result blocks に cache_control breakpoint を設定して cache する。", "is_correct": false, "why": "Prompt caching は繰り返し現れる prefix の cost と latency を下げるが、cached token は依然として context window にカウントされ、Claude にも提示され続ける。これは課金と latency の最適化であり、pruning 機構ではない。膨張と集中の散漫化はそのまま残る。"}, {"text": "会話がある threshold を超えたら全体を要約する server-side compaction を有効にする。", "is_correct": false, "why": "Compaction は一般的な長時間会話に対する推奨デフォルトだが、まだ有用な直近の tool results も含めて履歴全体を lossy な要約で置き換えてしまう。チームが必要なのは直近の結果を正確に保ち、古いものだけを捨てること。Compaction はこの問題が必要とする以上に広範で破壊的だ。"}, {"text": "tool-result-clearing 戦略とともに server-side context editing を有効にする。", "is_correct": true, "why": "clear_tool_uses_20250919 戦略は、まさにこのケース、すなわち tool 使用が多く古い結果がノイズになる agentic workflow のために作られたもの。設定した token threshold（デフォルト 100,000 input tokens）を超えると、最も古い tool_result blocks を決定論的に削除し（直近の tool uses をデフォルトで3つ保持）、削除した各結果を placeholder text で置き換えて、Claude に削除されたことを知らせる。処理は Claude が prompt を見る前の server-side で走り、client 側は完全で未編集の履歴を保持し続ける。"}], "explanation": "あるターンでは役立ち、後のターンではノイズになる tool results こそが、server-side context editing の tool-result-clearing 戦略（clear_tool_uses_20250919、context-management-2025-06-27 beta header で有効化）の典型ユースケースだ。設定した trigger（デフォルト 100,000 input tokens）を超えると、API は最も古い tool_result blocks を時系列順に削除し、直近の tool-use/result pair（デフォルト3組）を残したうえで、削除した各結果を placeholder text で置き換えて Claude に削除を伝える。デフォルトでは結果のみが削除され、tool_use の呼び出しパラメータも削除するには clear_tool_inputs: true が必要。この編集は prompt が Claude に届く前の server-side で行われるため、client は引き続き完全で未編集の履歴を送信・保持し、application 側での pruning は不要となる。system-prompt の指示は LLM 流の修正であり、確率的かつ token 数に影響しないため、後のターンで古い結果を無視できるとは限らない。Prompt caching は cost と latency の最適化であって pruning ではなく、cached token は依然として context window を占拠する。Compaction は一般的な長時間会話への推奨デフォルトだが、履歴全体（まだ有用な直近の結果も含む）を lossy な要約にまとめ上げるため、このシナリオが必要とする tool results だけを外科的に切り詰める手法に比べて広範で破壊的になる。"}, {"qid": "exam2-q19", "domain": "Security and Safety", "type": "mc", "scenario": "保険会社の会員ポータルアシスタントは、Claude を使って受信メッセージへの返信をドラフトする。このワークフローは Claude に、会員のクレーム履歴を参照するツールと、支払いの再発行といったクレーム調整を投稿するツールを与えている。会員からのメッセージやアップロードされた不服申立書には、会員が入力した任意のテキストが含まれうる。ある会員のデータが別の会員に漏れたり、別の会員に関する情報が漏れたりすることを防ぎ、かつ不正な調整を防ぐ設計として最も適切なものはどれか。", "options": [{"text": "バックエンドは検証済みセッションから呼び出し元を認証し、すべてのツールがその呼び出し元がアクセス可能なレコードのみを読み書きできるようスコープを絞り、各呼び出しを実行前に認可する。会員が入力したテキストは、system instructions とは分離されたチャネルで、信頼できないデータとして扱う。", "is_correct": true, "why": "認可を決定論的かつサーバーサイドで行う唯一の選択肢。バックエンドは呼び出し元を検証し、読み書きが実行される前に各ツールがアクセス可能なレコードだけを触るよう制約する。信頼できない会員のテキストは特権を付与できず、信頼された instruction チャネルにも到達しない。"}, {"text": "毎ターン system prompt で認可ルールを再記述し、Claude に会員の本人確認と、メッセージに埋め込まれた指令の無視を指示する。後日監査できるようすべてのツール呼び出しをログに記録する。ツール自体は変更しない。", "is_correct": false, "why": "ルールの再記述と呼び出しのログ記録は、通常時の挙動とトレーサビリティを改善する点ではもっともらしい。しかし system prompt の指示はアクセス制御ではない。ツールが変更されず任意のクレームを読めるままなら、不服申立書に仕込まれた注入指令が検索を誤ったレコードへ誘導できてしまう。ログは事後の侵害発見にしか役立たない。"}, {"text": "バックエンドは呼び出し元を認証するが、クレーム履歴ツールは会員の雇用主グループの全クレームを返す。Claude にはドラフト前に他の会員のフィールドをマスキングし、返信に必要な分だけ残すよう指示する。", "is_correct": false, "why": "呼び出し元を認証し、ドラフト出力を最小化する点ではもっともらしい。しかしグループ全体のクレームを返すことは least privilege に違反し、マスキング前に他の会員のデータがコンテキストに入ってしまう。モデルによるマスキングは確率的であり、そのデータが返信に漏れないことを保証できない。"}, {"text": "より大きくインジェクション耐性の高いモデルにアップグレードし、安全な拒否の few-shot 例を先頭に置き、すべてのツールリクエストを第二のモデル経由にして、実行前に不審な呼び出しをブロックする。", "is_correct": false, "why": "大きなモデルと第二モデルのゲートは、平均的にインジェクション耐性を向上させる点ではもっともらしい。しかしいずれのレイヤーも確率的な推論であり、決定論的な強制ではない。モデルの機能アップグレードとモデルベースのフィルタでは、サーバーサイド認証・呼び出し元ごとのスコープ・入力の分離を置き換えることはできない。"}], "explanation": "Claude をプライベートデータとアクション実行ツールと組み合わせるワークフローにおいて、Anthropic の tool-use ガイダンスは明確である。モデルはツール呼び出しを「提案」するが、それを安全に実行する責任はアプリケーションにある。ツールランナーはモデルが要求するたびにツール関数を実行し、リファレンス実装にはアクセス制御が組み込まれていない。そのため認証と呼び出し元ごとの認可はツールハンドラに実装しなければならない。したがって正しい設計では、Claude が提案する呼び出しと会員が入力したすべてのコンテンツを「制御されたアプリケーションへの入力」として扱い、決して「認可」とは見なさない。各ツールを実行するバックエンドは認証済みセッションを検証し、リクエストをその呼び出し元が参照可能なレコードへスコープし、データが返却される前、あるいは調整が投稿される前に、不正または危険な操作を拒否する。\\n\\n会員のメッセージや不服申立書は、prompt-injection の試行（それまでのルールを無視する指示、別の会員のクレームを明かす指示、不適切な支払いを投稿する指示など）を運ぶ可能性がある信頼できない入力である。そのため、信頼された system instructions から明確に分離されたチャネルで運ばれ、いかなる特権も付与しない。\\n\\n誤答選択肢はいずれも強制を確率的なものに委ねている。ルールの再記述と呼び出しのログ記録（B）は、任意のクレームを読めるままのツールを制約しない。prompt はアクセス制御ではない。雇用主グループ全体のクレームを返し、マスキングをモデルに任せる（C）と、マスキング前に他の会員のデータがコンテキストに入るが、それは保証されない。より大きなモデル、few-shot 例、第二モデルのゲート（D）は成功率を改善するが、依然是推論であり強制ではない。プロンプトとモデルの選択は通常時の挙動を形作るが、決定論的なサーバーサイドの認証・認可・入力の分離を置き換えることはできない。"}, {"qid": "exam2-q20", "domain": "Claude Code", "type": "mr", "scenario": "プラットフォームチームは、セルフホストの CI runner 上で Claude Code を無人ステップとして実行している。ターミナルにオペレーターはいない。このステップは agentic task を実行して終了しなければならず、インタラクティブなセッションは決して起動してはならない。さらに、共有の API 予算を保護するため、1 回の実行は常に固定の最大 agent ターン数で停止しなければならない。チームが取るべきアクションは次のうちどれか（2つ選択）。", "options": [{"text": "Claude Code を print mode の `claude -p`（エイリアス `--print`）で実行し、プロンプトは CLI 引数として渡すか、CI スクリプトから stdin でパイプする。", "is_correct": true, "why": "デフォルトでは CLI はインタラクティブなターミナルセッションを起動する。`-p`/`--print` は Claude Code の公式ドキュメントに記載された non-interactive（headless）パスであり、プロンプトを CLI 引数または stdin で受け取り、agentic task を実行して出力を返し、REPL を開かずに終了する。無人実行の要件を満たす唯一のドキュメント済みエントリポイントである。"}, {"text": "`--max-turns N` を指定し、1 回の実行で許容される agent のターン数に上限を設ける。", "is_correct": true, "why": "`--max-turns` は agentic turn（tool-use のラウンド数）に対するドキュメント済みのハーネス強制キャップである。モデルの判断に関わらずハーネスが毎回の実行で適用するため、共有予算を確実に保護できる。要件が指定するのはまさに「ターン数」であり、`--max-turns` はその値に上限を設ける。"}, {"text": "`claude` をデフォルトの interactive mode で実行し、プロンプトを stdin でパイプして、`timeout N` でラップすることでプロセスが自力で終了するようにする。", "is_correct": false, "why": "2つの独立した失敗がある。第一に、`-p`/`--print` なしでは Claude Code は（キーボードの前に人間がいることを前提とした）インタラクティブなターミナルセッションを起動する。stdin をパイプしても、ドキュメント済みの headless パスには切り替わらない。第二に、`timeout` は経過時間（wall-clock 秒）に上限を設けるものであり、agent のターン数には上限を設けない。そのため仮に mode を修正しても、要件が指定するターン数の上限は強制できない。"}, {"text": "`claude -p` を実行し、`--max-turns` の代わりに「N 回の tool call を完了したら停止せよ」のような system prompt の指示を追加して、モデル自身に上限を強制させる。", "is_correct": false, "why": "プロンプトの指示によるモデルの自己制限は裁量に依存し、非決定論的である。実行ごとにモデルが上限を超えたり、手前で止まったりする可能性があるため、自動化された予算ゲートはこれを信頼できない。ハーネスが毎回の実行で強制するのは `--max-turns` だけであり、モデルの裁量には頼らない（これは「毎回必ず実行されなければならない」要件において hook が繰り返しのプロンプト指示より優れるという、決定論的 vs 裁量的の原則と同じである）。"}, {"text": "`claude -p` を実行し、各レスポンスを `max_tokens` でキャップして、トークン上限が agent の tool call のラウンド数を制限すると期待する。", "is_correct": false, "why": "`max_tokens` は単一レスポンスの出力長（output length）に上限を設けるものであり、agent のターン数には上限を設けない。agent は多数の短いレスポンスに分けて多くの tool call を実行できてしまうため、ターン予算は実際には制限されない。`--max-turns` はターン数のノブであり、`max_tokens` は出力長のノブである。これらは異なる値をゲートする。"}], "explanation": "Print mode（`claude -p` / `claude --print`）は、Claude Code におけるスクリプトや CI 向けのドキュメント済み non-interactive パスである。デフォルトでは CLI はインタラクティブなターミナルセッションを起動するが、`-p`/`--print` はプロンプトを CLI 引数または stdin で受け取り、agentic task を実行して出力を返し、終了する。そのため無人実行の要件を満たす。`--max-turns N` は agent のターン「数」に対するドキュメント済みのハーネス強制キャップであり、モデルの判断に関わらず毎回の実行でハーネスが適用する。要件が「固定の最大ターン数」として表現されている場合、共有 API 予算を保護する唯一の確実な手段である。2つの正解アクションはそれぞれ、記載された2つの要件の一方を独立して満たす。\\n\\n他の選択肢がダメな理由: C は2点で失敗している。`--print` なしでは Claude Code はインタラクティブセッションを起動し（ドキュメント済みの headless パスではない）、`timeout` は経過時間に上限を設けるものでターン数ではないため、どちらの要件も満たさない。D と E はターンキャップのノブを間違えている。D はプロンプトの指示でモデル自身に上限を強制させようとしているが、モデルの自己制限は非決定論的であり自動ゲートは信頼できない。毎回の実行でハーネスが強制するのは `--max-turns` だけである（「毎回必ず実行されなければならない」要件において hook が繰り返しのプロンプト指示より優れるという、決定論的 vs 裁量的の原則と同じ）。E は `max_tokens` で代替しているが、これは各レスポンスごとの出力長に上限を設けるものであり、agent のターン数ではない。agent は短いレスポンスを多数繰り返すことで多数の tool call を実行できてしまい、予算は実際には制限されない。\\n\\nNote: `--max-budget-usd` は別の有効なフラグだが、これは「ドル支出」に上限を設けるものであり、シナリオが指定する「固定の最大 agent ターン数」とは異なる値である。そのためターン数の上限には `--max-turns` が引き続き適切なノブとなる。Anthropic の Claude Code ドキュメント（プログラム実行に関する記述）によれば、`claude -p`（print mode）と `--max-turns N` が、無人実行とターン上限の要件を確定的に満たす2つのフラグである。"}, {"qid": "exam2-q21", "domain": "Applications and Integration", "type": "mc", "scenario": "語学学習アプリで、Claude が生成するのに合わせて画面上の文法解説が1語ずつ表示されるようにしたい。バックエンドサービスが API key を保持し、学習者の代わりに Claude を呼び出す。Claude Messages API が実際に公開している streaming 機構を使っている実装はどれか。", "options": [{"text": "バックエンドから stream: true を指定して POST /v1/messages を呼び出し、server-sent event stream (content_block_delta events) を消費して、各 text delta を画面に転送する。", "is_correct": true, "why": "これが Messages API が実際に公開している transport である。POST /v1/messages は RESTful HTTP endpoint であり、stream: true を指定すると response は server-sent events (message_start, content_block_start, content_block_delta, message_stop) として到着する。各 content_block_delta は text_delta を運ぶため、バックエンドは生成された瞬間にそれを画面へ push でき、真の1語ずつ表示が実現できる。"}, {"text": "バックエンドから Anthropic API への WebSocket 接続を開き、サーバーが socket 経由で push する各 text frame を転送する。", "is_correct": false, "why": "Anthropic API は Messages API 向けの WebSocket endpoint を公開していない。HTTP 経由で server-sent events を使って配信するため、開くべき socket も転送すべき frame も存在せず、この real-time transport は Messages リクエストには存在しない。"}, {"text": "バックエンドから Message Batches API (POST /v1/messages/batches) に streaming を要求してリクエストを送信し、各 streamed token を画面に転送する。", "is_correct": false, "why": "Message Batches API は非同期でレイテンシに寛容なワークロード向け（大半のバッチは1時間以内、最大24時間で完了、コストは約50%低）であり、streaming mode を持たない。結果は各 batch request が解決された時点でのみ現れるため、token が段階的に emit されることはなく、token 単位で転送できるものもない。"}, {"text": "system prompt で Claude に1文ずつの turn として回答するよう指示し、non-streaming mode で turn ごとに1回モデルを呼び出して、完了した turn から順に表示する。", "is_correct": false, "why": "prompt 駆動の分割は output を整形するだけで、配信の transport は変えない。turn ごとの呼び出しはそれぞれ独立した non-streaming リクエストであり、その turn 全体を一度に返す。そのため画面は1文単位の burst で更新され、リクエストごとのレイテンシが乗るだけで、モデルの生成に合わせて1語ずつ streaming することにはならない。"}], "explanation": "正解: A。Claude Messages API は RESTful HTTP endpoint (POST /v1/messages) であり、公式 SDK はこれを wrap している。stream: true を指定すると、response は HTTP 経由の server-sent events として返る (message_start, content_block_delta, message_stop)。各 content_block_delta は text delta を運ぶため、バックエンドは生成された瞬間にそれを画面へ転送できる。全選択肢がバックエンド経由であるため、唯一の識別基準は「API が実際に公開している streaming transport を使っているか」であり、A だけがそれを満たす。\\n\\n他を選ばない理由:\\nB がダメなのは、Anthropic API が Messages 向けの WebSocket endpoint を提供していないため。SSE により HTTP 経由で配信されるため、接続先の socket も中継すべき frame も存在しない。\\nC がダメなのは、Message Batches API (POST /v1/messages/batches) が非同期・レイテンシ寛容なワークロード向け（完了まで最大24時間、コストは約50%低）で streaming mode を持たないため。batch が解決した時点で初めて結果が現れ、incremental な token は emit されない。\\nD は prompt engineering による代替手段であり、transport の変更ではない。回答を多数の non-streaming 呼び出しに分割しても各 turn は全体が一度に返るため、画面は token 単位ではなく burst 単位で更新され、リクエストごとのレイテンシが乗る。"}, {"qid": "exam2-q22", "domain": "Prompt and Context Engineering", "type": "mc", "scenario": "ある小売業者の ingestion pipeline は、毎日数千件の raw な product feed レコードを Claude に送り、構造化された catalog field（brand, category, attributes）への正規化を行わせている。system prompt には target schema が定義されており、曖昧な商品をどう分類すべきかも含めて、すべての mapping rule がすでに文章で記述されている。QA の結果、少数の既知の edge-case 商品が毎回誤分類されていることが判明した。同じレコードが毎回 wrong category value を受け取る一方で、どの出力も schema に対しては妥当なままである。チームは、model の変更や別の validation service の追加なしに、この特定の繰り返し発生する失敗を修正したいと考えている。", "options": [{"text": "prompt に、各 failing record pattern に対する正確な望ましい mapping を示す worked input-output example を追加する。", "is_correct": true, "why": "最適な選択肢。失敗は systematic である（同じレコードが毎回同じように誤分類される）。これは model が rule をランダムに見落としているわけではないことを意味する。すでに prompt にある文章での rule は、これらの特定 pattern が要求する正確な input-to-output mapping を伝えきれていない。Anthropic の prompting guidance は、曖昧で decision-sensitive な case においては、worked example（「show, don't tell」）が文章で再記述された rule よりはるかに確実に意図した mapping を伝えると明記している。各 failing pattern に対して的を絞った example を追加することで、欠けている mapping を直接教え込み、model にそれを一貫して適用させることができる。model の変更も新規 service の追加も不要である。"}, {"text": "system prompt 内の edge-case mapping rule をより明確かつ強調的に書き直し、model がこれらを高優先として扱うようにする。", "is_correct": false, "why": "rule はすでに prompt に記述されているのに、model は同じレコードを毎回誤分類している。これは attention の一時的な lapse ではなく、consistent な miss である。rule をより強調的に再記述することは、attention 起因の error における compliance 確率を上げるが、worked example が提供するような正確な input-to-output mapping を与えるわけではないため、systematic な誤分類は持続する。Anthropic の guidance は、まさにこの種の edge case に対して強調的な prose より concrete な example を推奨している。"}, {"text": "`output_config.format` で structured outputs を有効にし、すべての response を target schema に制約する。", "is_correct": false, "why": "structured outputs は response の shape を保証する（正しい field・type と、allowed category set から選ばれた value を持つ、構文的に valid な JSON）。しかし、分類が難しいレコードがどの allowed value を受け取るべきかを決定することはできない。failing している出力はすでに schema-valid であるため、この制約は structure に対して働くものであり、edge case が失敗している semantic categorization には作用しない。結果として各誤分類は schema-valid-but-wrong としてそのまま通過してしまう。"}, {"text": "`output_config.effort` を上げ、model が response 前に各レコードについてより長く reasoning するようにする。", "is_correct": false, "why": "effort を上げると model の reasoning budget が増え、より高い cost と latency で general な thoroughness は向上するが、これらの pattern に対するチーム固有の mapping が追加されるわけではない。これらのレコードの正しい mapping は、model が一貫して適用に失敗している文章での記述でしか示されたことがない。そのため、同じ不十分な記述についてより長く reasoning しても wrong category に到達する可能性があり、systematic な失敗は残る。"}], "explanation": "exam2-q22 -- 正解: A。失敗は systematic である。同じレコードが毎回同じように誤分類され、出力はすでに schema-valid であるため、問題は structural ではなく semantic（wrong category value）である。すでに prompt にある文章での rule は、これらの特定 pattern が要求する正確な mapping を伝えきれていない。Anthropic の prompting guidance は、まさにこの種の decision-sensitive な曖昧 case の normalization に対して worked example（「show, don't tell」）を推奨している。example は正確な input-to-output mapping を直接 encode し、再記述された文章 rule よりはるかに確実に適用される。これにより、model の変更や新規 service なしに既知の edge case を修正できる。\n\n他の選択肢がダメな理由:\n- B（rule を強調的に書き直す）: rule はすでに存在し一貫して失敗しているため、強調は missing mapping ではなく attention を対象とする。これは model がすでに適用に失敗している instruction を繰り返すのと同じ probabilistic-vs-reliable のギャップであり、systematic な miss は持続する。\n- C（`output_config.format` で structured outputs）: response の shape を制約し allowed category set からの value を強制するが、分類が難しいレコードがどの value を受け取るべきかは決定できない。failing している出力はすでに schema-valid であるため、誤分類は schema-valid-but-wrong として通過してしまう。\n- D（`output_config.effort` を上げる）: より多くの reasoning budget は、より高い cost と latency で general な thoroughness を向上させるが、これらの pattern に対するチームの mapping は追加しない。すでに失敗している同じ文章記述についてより長く reasoning しても、wrong category を生成する可能性がある。"}, {"qid": "exam2-q23", "domain": "Applications and Integration", "type": "mc", "scenario": "ある規制対象の決済会社が、Claude Code のコードレビューワークフローを特定の Sonnet モデルで検証済みだとします。コンプライアンス上、いかなるエンジニアや CI runner も別のモデルを使ってはならず、コマンドラインで `--model` を指定した場合も例外ではありません。この要件を強制できる構成メカニズムはどれですか？", "options": [{"text": "検証済みのモデルを `.claude/settings.json` に記述してコミットし、すべての作業コピーが起動時に読み込むようにする。", "is_correct": false, "why": "もっともらしい選択肢: project settings.json は実際に存在する共有設定であり、clone する全員が起動時に読み込むため、チームレベルの規範的な対策に見えます。しかし Claude Code のドキュメントに記載された優先順位では、コマンドライン引数が project settings より優先されます。開発者が `--model` を渡せばそちらが勝ちます。再現可能なデフォルトを設定するだけで、上書きを防ぐ制御ではありません。"}, {"text": "CLAUDE.md に、常に検証済みの Sonnet を使うようアシスタントへ指示する恒久的なルールを記載する。", "is_correct": false, "why": "もっともらしい選択肢: CLAUDE.md は実際の project memory であり、すべてのセッションで読み込まれるため、権威ある設定に見えます。しかしこれはモデルがセッション内で読んで解釈するガイダンスであり、設定フィールドではありません。そもそもモデルを指定することすらできず、ましてやコマンドラインでの上書きをブロックすることはできません。"}, {"text": "検証済みのモデルを enterprise の managed settings 経由でデプロイする。project ファイルでもコマンドライン引数でも上書きできない。", "is_correct": true, "why": "最適解: managed settings は Claude Code のドキュメント優先順位の最上位（Managed > CLI args > Local > Project > User）に位置し、user・project・local・コマンドライン引数のいずれでも上書きできません。選択を強制でき、単にデフォルトにするだけではないリスト中唯一のメカニズムです。"}, {"text": "すべての開発者と CI launcher に対し、毎回の実行で `--model <sonnet-id>` を渡すことを義務付ける。", "is_correct": false, "why": "もっともらしい選択肢: `--model` フラグは実際に機能するものであり、義務化は規範的に聞こえます。しかしここでの強制は手続き的なものに過ぎません。全員とすべてのスクリプトが毎回フラグを覚えていることに依存しており、呼び出し側なら誰でも省略や変更ができます。手続き上の規律こそ、上書きを防ぐコンプライアンス制御が排除すべき脆弱性そのものです。"}], "explanation": "ユーザーが明示的に上書きしようとしても成り立たせたい要件は、すべて managed settings に置くべきです。managed settings は、コマンドライン引数や project ファイルで上書きできない Claude Code 設定優先順位の唯一の階層です（ドキュメント順: Managed > CLI arguments > Local > Project > User）。Project settings.json (A) は再現可能な共有デフォルトを提供しますが `--model` に屈するため、強制できません。CLAUDE.md (B) はモデルが解釈するガイダンスであり、設定フィールドではないため、モデルを固定できません。CLI flags (D) は手続き的であり、容易に省略・変更できます。この原則は deterministic hooks と同じで、毎回の実行で真でなければならないことは構造的に強制すべきであり、モデルの解釈や人の記憶に委ねてはいけません。公式の Claude Code settings ドキュメント（configuration scopes・settings precedence）を参照してください。"}, {"qid": "exam2-q24", "domain": "Tools and MCPs", "type": "mc", "scenario": "あるサポートチームのMCP serverは、承認済みplaybookのライブラリ（製品ラインごとに1件）から顧客への返信文面を下書きするアシスタントを支えている。チームの方針として、チケットを担当するrepは、アシスタントが文面を下書きする前に、必ず正しい製品のplaybookを明示的に選択しなければならない。現在、各playbookはMCP toolsとして公開されている。レビューの結果、アシスタントが自らplaybookを選択してしまうため、誤った製品のplaybookから下書きを作成するケースがあることが判明した。repに明示的にplaybookを選ばせる（アシスタントに選ばせない）ことを最も確実に保証するredesignはどれか。", "options": [{"text": "playbookをMCP promptsとして再公開し、各playbookを作業開始前にrepが製品ライン単位で選択できる明示的なユーザー選択可能コマンドとして表示する。", "is_correct": true, "why": "promptsはMCPのuser-controlled primitiveである。公式specはこれをユーザー制御に割り当て、ユーザーが明示的に選択するtemplateとして公開する。各playbookをpromptにすれば製品の選択権がrepに移り、アシスタントの自己選択を排除できる。方針を直接満たす唯一の手段である。"}, {"text": "playbookはtoolsのまま維持しつつ、few-shot examplesで補強したsystem-prompt ruleを追加し、repが製品名を指定するまでアシスタントは下書きを作らないよう要求する。", "is_correct": false, "why": "toolsはmodel-controlledであり、呼び出すかどうか・いつ呼び出すかは最終的にアシスタントが決める。system-prompt ruleやfew-shot examplesは遵守確率を上げるだけで強制はできず、レビューで既に観察されているのと同じ確率的な失敗が残る。"}, {"text": "playbookはtoolsのまま維持しつつ、各toolのdescriptionを単一の製品ラインに絞り込み、アシスタントがチケットのmetadataに合致するものを選ぶようにする。", "is_correct": false, "why": "descriptionを絞り込めばtool選択は確かに改善するが、toolsはmodel-controlledのままである。アシスタントがmetadataに基づいて選ぶだけでrepが選ぶわけではなく、選択権はユーザーに移らない。"}, {"text": "playbookをMCP resourcesとして再公開し、host applicationが製品tagと一致するplaybookをチケットに自動的にattachするようにする。", "is_correct": false, "why": "resourcesはapplication-controlledであるため、アシスタントの裁量は排除できる。しかし選択を行うのはhostの自動tag matchingであり、repではない。方針が要求する明示的な人間の選択をバイパスしてしまう。"}], "explanation": "MCPの3つのserver primitivesは、それぞれ制御権を異なるactorに委ねる。toolsはmodel-controlled（modelが発見して呼び出す）、resourcesはapplication-controlled（hostがattachする）、promptsはuser-controlled（ユーザーが明示的に選択するtemplateとして公開）。repがplaybookを選ばなければならないという方針は、promptsに直接対応する。各playbookをpromptとして公開すれば、選択は明示的な人間の操作となり、誤製品エラーの根本原因であるアシスタントの自己選択を排除できる。\n\n他の選択肢が不適切な理由：BとCはどちらもplaybookをmodel-controlledのtoolsのまま維持するため、呼び出すかどうかを最終的に決めるのはアシスタントのままである。system-prompt rule、few-shot examples、descriptionの絞り込みは遵守確率を上げるだけで、選択権をrepに移すことはできず、確率的な保証しか得られない。Dはapplication-controlledのresourcesを使うことでアシスタントの裁量を排除するが、選択をhostの自動tag matchingに委ねてrepに渡さず、方針が要求する明示的なユーザー選択を満たさない。実行時に人間を選択者にできるのはpromptsだけである。したがって決定論的な修正とは、要件に合致する制御モデルを持つprimitiveを選ぶことだ。"}, {"qid": "exam2-q25", "domain": "Applications and Integration", "type": "mc", "scenario": "APIプロダクトを提供する企業が、Messages API 上で営業アシスタントを運用しています。保存済みのトランスクリプトのなかに、以前の assistant ターンが従量課金の超過料金を「$0.02/request」と引用している箇所がありますが、実際の料金は「$0.20/request」です。同じ顧客からフォローアップが届き、来月の超過コストを見積もるようアシスタントに依頼しました。チームは、次回のレスポンスを、$0.20 の料金が含まれ $0.02 の数値が存在しない「修正済みの会話状態」から計算したいと考えています。Messages API におけるターン間の会話状態の維持方法を正しく適用している実装はどれですか。", "options": [{"text": "新しいフォローアップだけを単一の user メッセージとして送り、前回の response の id を渡して、保存された会話をサーバー側で再読み込みすることを API に任せる。", "is_correct": false, "why": "Messages API はステートレスであり、Anthropic はリクエスト間で会話オブジェクトを保持しません。response id は過去の補完を名指しするだけで、それを再開するものではありません。サーバー側には以前のターンが一切保持されないため、このリクエストはフォローアップだけを運び、会話のプランや利用量のコンテキストなしでコスト見積もりが生成されてしまいます。"}, {"text": "保存済みのトランスクリプトをそのまま送信し、正しい超過料金が $0.20/request であることを Claude に指示する system prompt を追加する。", "is_correct": false, "why": "$0.02 を引用する古い assistant ターンは messages 配列に残ったままであり、会話状態は依然として誤った数値を含んでいます。チームの要件は出力が $0.20 に傾くことではなく、状態そのものが修正されることです。system prompt はモデルにバイアスをかけますが、モデルが条件付けの対象とする配列から矛盾するターンを削除することはできません。"}, {"text": "古い assistant ターンを $0.20 を引用するように書き換え、input token を減らすために最も古い user/assistant ペア（顧客のプラン階層と月次利用量を記録していたもの）を削除し、残りのターンを残してフォローアップを追加する。", "is_correct": false, "why": "料金は修正され、有効な user/assistant の交互配置も保たれるためリクエスト自体は受理されます。しかし API はステートレスなため、削除されたペアはこのリクエストから完全に失われます。そのペアが持っていたプラン階層と利用量がないと、モデルは超過見積もりが依存する正確な入力を欠くため、コスト計算は正確になり得ません。"}, {"text": "次回のリクエストが送る保存済みトランスクリプトのなかで、$0.02 の assistant ターンを $0.20 を引用する内容にその場で置き換え、他のすべてのターンはそのまま残し、フォローアップを新しい user メッセージとして追加する。", "is_correct": true, "why": "Messages API は呼び出し側が毎回のリクエストで完全なメッセージ履歴を提供することを要求し、以前の assistant ターンはアプリケーションが制御する単なる文字列です。それらは Claude が生成した逐語的な出力である必要はなく、その場で編集できます。古いターンを編集することで、確定的に修正された一貫性のある状態が得られ、調整すべき矛盾する数値も、失われる周辺コンテキストも残りません。"}], "explanation": "Messages API はステートレスであり、Anthropic はリクエスト間で会話オブジェクトを保持しません。response id は過去の補完を識別するだけで、それを再開するものではありません。マルチターンの呼び出しでは毎回アプリケーションが完全な messages 配列を提供するため、呼び出し側の保存済みトランスクリプトが唯一の信頼できる情報源となります。配列内の assistant ターンはアプリケーションが制御する単なる文字列であり、Claude が生成した逐語的な出力である必要はなく、その場で編集できます（制限があるのは prefill として使われる末尾の assistant ターンのみであり、ここでは最後のメッセージが新しい user フォローアップであるため該当しません）。\n\n選択肢 D はこれを直接適用しています。古い $0.02 のターンを $0.20 を引用する内容に置き換え、他のすべてのターンはそのまま残し、フォローアップを追加します。これにより Claude は、完全なプランと利用量のコンテキストが保たれたクリーンに修正された状態に対して、確定的に条件付けられます。\n\n選択肢 A は、ステートレスな API が提供しない response id による再開という振る舞いを想定しています。以前の履歴はサーバーに存在しないため、フォローアップは会話コンテキスト一切なしでモデルに到達します。選択肢 B はプロンプトレベルの上書きです。$0.02 のターンは messages 配列に残るため、会話状態は依然として誤った数値を含みます。要件は修正された状態であり、$0.20 にバイアスされた出力ではありません。system prompt はモデルが参照する配列からターンを削除できません。選択肢 C は正しいターンを編集するものの、token 節約のために最も古い user/assistant ペアを削除します。API はステートレスなため、見積もりが依存するプラン階層と利用量を持っていたそのペアはリクエストから失われ、モデルは必要な入力を欠いた状態になります。\n\n誤った各選択肢はそれぞれ異なる理由で失敗します（存在しないサーバー側の状態、削除されていない古いターン、失われた周辺コンテキスト）。したがってどの 2 つも一緒に除外することはできず、古い数値の修正と会話の残りの保持を両立するのは選択肢 D だけです。"}, {"qid": "exam2-q26", "domain": "Applications and Integration", "type": "mc", "scenario": "あるチームが Claude Code を使って、数週間にわたり決済サービスのリファクタリングを進めている。各セッションは次を開始する前に context がクリアされるため、前のセッションの memory を引き継ぐことはない。チームは新しいセッションごとに (1) これまでの進捗を再開し、(2) 直近の変更が誤っていた場合にはクリーンに revert できる必要がある。両方の要件を満たすアプローチはどれか。", "options": [{"text": "system prompt に、各セッションの終了前に進捗サマリーを書き出すようモデルへ指示し、確実に従わせるために大きな model へ切り替える。", "is_correct": false, "why": "確率的でしかない。モデルが詳細を省略したり、要約の過程で消し去る可能性がある。文章のサマリーは機械的に検証できず、指示も大きな model も、悪い変更を取り消す recovery point を作らない。引き継ぎがうまくいく確率を上げるだけだ。"}, {"text": "各セッションで auto-compaction を実行させる。compaction されたサマリーが、蓄積された state を次のセッションへ持ち越す。", "is_correct": false, "why": "auto-compaction が要約するのは単一の会話の中だけ。context をクリアされた新しいセッションは、別セッションの compact されたサマリーを引き継がない。サマリーは lossy であり、会話の外に recovery point も残らない。"}, {"text": "state を durable なプロジェクトの成果物として外部化し、各セッションが起動時にそれを読み込むようにする。さらに、各ステップの後に version control へ commit し、すべての変更を回復可能な checkpoint にする。", "is_correct": true, "why": "確定的。disk 上のファイルは、モデルの挙動に関わらずセッション開始時に毎回 verbat
